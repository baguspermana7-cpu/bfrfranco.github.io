<circle cx="50" cy="110" r="2.0" fill="#1a64cc"/>

  <circle cx="130" cy="110" r="9" fill="#555" stroke="#1a64cc" stroke-width="2"/>
<line x1="139.0" y1="110.0" x2="121.0" y2="110.0" stroke="#1a64cc" stroke-width="1.2"/>
<line x1="136.4" y1="116.4" x2="123.6" y2="103.6" stroke="#1a64cc" stroke-width="1.2"/>
<line x1="130.0" y1="119.0" x2="130.0" y2="101.0" stroke="#1a64cc" stroke-width="1.2"/>
