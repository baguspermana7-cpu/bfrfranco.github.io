<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="200" height="130">
  <!-- Malivlak — dark brick-red silhouette steam locomotive (facing left) -->
  <defs>
    <linearGradient id="malG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A52010"/>
      <stop offset="100%" stop-color="#6B0E05"/>
    </linearGradient>
  </defs>

  <!-- chimney / smokestack (tall, at front-left) -->
  <rect x="28" y="20" width="16" height="32" rx="3" fill="url(#malG)"/>
  <rect x="23" y="16" width="26" height="8" rx="3" fill="#8B1A0A"/>

  <!-- boiler (large, rounded cylinder) -->
  <ellipse cx="95" cy="52" rx="60" ry="22" fill="url(#malG)"/>
  <rect x="35" y="30" width="120" height="44" rx="10" fill="url(#malG)"/>

  <!-- dome on boiler -->
  <ellipse cx="80" cy="29" rx="13" ry="9" fill="#8B1A0A"/>

  <!-- cab / driver house (right side) -->
  <rect x="145" y="22" width="45" height="52" rx="4" fill="#6B0E05"/>
  <!-- cab window -->
  <rect x="152" y="28" width="14" height="11" rx="2" fill="#3D0800" opacity="0.7"/>
  <rect x="170" y="28" width="14" height="11" rx="2" fill="#3D0800" opacity="0.7"/>

  <!-- running board / frame -->
  <rect x="25" y="68" width="165" height="8" rx="2" fill="#6B0E05"/>

  <!-- tender (coal car behind cab) -->
  <rect x="175" y="42" width="22" height="34" rx="3" fill="#5A0C04"/>

  <!-- wheels — large driving wheels -->
  <circle cx="60"  cy="90" r="18" fill="#5A0C04" stroke="#8B1A0A" stroke-width="3"/>
  <circle cx="100" cy="90" r="18" fill="#5A0C04" stroke="#8B1A0A" stroke-width="3"/>
  <circle cx="140" cy="90" r="18" fill="#5A0C04" stroke="#8B1A0A" stroke-width="3"/>
  <!-- wheel spokes -->
  <line x1="60" y1="72" x2="60" y2="108" stroke="#8B1A0A" stroke-width="2"/>
  <line x1="42" y1="90" x2="78"  y2="90"  stroke="#8B1A0A" stroke-width="2"/>
  <line x1="46" y1="74" x2="74"  y2="106" stroke="#8B1A0A" stroke-width="2"/>
  <line x1="74" y1="74" x2="46"  y2="106" stroke="#8B1A0A" stroke-width="2"/>
  <line x1="100" y1="72" x2="100" y2="108" stroke="#8B1A0A" stroke-width="2"/>
  <line x1="82"  y1="90" x2="118" y2="90"  stroke="#8B1A0A" stroke-width="2"/>
  <line x1="87"  y1="75" x2="113" y2="105" stroke="#8B1A0A" stroke-width="2"/>
  <line x1="113" y1="75" x2="87"  y2="105" stroke="#8B1A0A" stroke-width="2"/>
  <line x1="140" y1="72" x2="140" y2="108" stroke="#8B1A0A" stroke-width="2"/>
  <line x1="122" y1="90" x2="158" y2="90"  stroke="#8B1A0A" stroke-width="2"/>
  <line x1="127" y1="75" x2="153" y2="105" stroke="#8B1A0A" stroke-width="2"/>
  <line x1="153" y1="75" x2="127" y2="105" stroke="#8B1A0A" stroke-width="2"/>
  <!-- small front wheel -->
  <circle cx="32" cy="94" r="10" fill="#5A0C04" stroke="#8B1A0A" stroke-width="2"/>
  <!-- tender wheels -->
  <circle cx="178" cy="94" r="10" fill="#5A0C04" stroke="#8B1A0A" stroke-width="2"/>
  <circle cx="192" cy="94" r="10" fill="#5A0C04" stroke="#8B1A0A" stroke-width="2"/>

  <!-- coupling rod -->
  <rect x="42" y="87" width="116" height="5" rx="2" fill="#8B1A0A" opacity="0.7"/>

  <!-- cow catcher (pilot) at front -->
  <path d="M28,74 L8,82 L8,86 L28,82 Z" fill="#6B0E05"/>

  <!-- label -->
  <text x="100" y="122" font-family="Arial,sans-serif" font-size="8" font-weight="bold"
        fill="#8B1A0A" text-anchor="middle">Malivlak</text>
  <text x="100" y="130" font-family="Arial,sans-serif" font-size="6"
        fill="#999" text-anchor="middle">Character · Steam</text>
</svg>
