<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="200" height="130">

  <!-- vertical boiler - tall cylinder, key feature -->
  <rect x="75" y="30" width="36" height="58" rx="10" fill="#6B3A2A"/>
  <ellipse cx="93" cy="30" rx="18" ry="8" fill="#5a2e1e"/>
  <!-- chimney from top -->
  <rect x="88" y="10" width="10" height="22" rx="3" fill="#333"/>
  <rect x="84" y="7" width="18" height="7" rx="3" fill="#222"/>
  <!-- smoke -->
  <circle cx="93" cy="5" r="5" fill="#bbb" opacity="0.45"/>
  <!-- only 2 drive wheels, large -->
  <circle cx="78" cy="100" r="12" fill="#2a1800" stroke="#c87820" stroke-width="2"/>
<line x1="90.0" y1="100.0" x2="66.0" y2="100.0" stroke="#c87820" stroke-width="1.2"/>
<line x1="88.4" y1="106.0" x2="67.6" y2="94.0" stroke="#c87820" stroke-width="1.2"/>
<line x1="84.0" y1="110.4" x2="72.0" y2="89.6" stroke="#c87820" stroke-width="1.2"/>
<line x1="78.0" y1="112.0" x2="78.0" y2="88.0" stroke="#c87820" stroke-width="1.2"/>
<line x1="72.0" y1="110.4" x2="84.0" y2="89.6" stroke="#c87820" stroke-width="1.2"/>
<line x1="67.6" y1="106.0" x2="88.4" y2="94.0" stroke="#c87820" stroke-width="1.2"/>
<circle cx="78" cy="100" r="2.6" fill="#c87820"/>

  <circle cx="108" cy="100" r="12" fill="#2a1800" stroke="#c87820" stroke-width="2"/>
<line x1="120.0" y1="100.0" x2="96.0" y2="100.0" stroke="#c87820" stroke-width="1.2"/>
<line x1="118.4" y1="106.0" x2="97.6" y2="94.0" stroke="#c87820" stroke-width="1.2"/>
<line x1="114.0" y1="110.4" x2="102.0" y2="89.6" stroke="#c87820" stroke-width="1.2"/>
<line x1="108.0" y1="112.0" x2="108.0" y2="88.0" stroke="#c87820" stroke-width="1.2"/>
<line x1="102.0" y1="110.4" x2="114.0" y2="89.6" stroke="#c87820" stroke-width="1.2"/>
<line x1="97.6" y1="106.0" x2="118.4" y2="94.0" stroke="#c87820" stroke-width="1.2"/>
<circle cx="108" cy="100" r="2.6" fill="#c87820"/>

  <!-- elliptical track hint -->
  <ellipse cx="93" cy="115" rx="60" ry="6" fill="none" stroke="#888" stroke-width="2.5" stroke-dasharray="4,4"/>
  <!-- firebox -->
  <rect x="80" y="76" width="26" height="14" rx="3" fill="#8B4513"/>
  <!-- frame -->
  <rect x="60" y="88" width="66" height="6" rx="2" fill="#5C2A00"/>

  <text x="100" y="126" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Catch Me Who Can · 1808</text>
</svg>