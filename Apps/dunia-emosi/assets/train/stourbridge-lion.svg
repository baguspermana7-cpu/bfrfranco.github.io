<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="200" height="130">

  <!-- main boiler horizontal BLUE -->
  <rect x="35" y="50" width="100" height="36" rx="10" fill="#1a3a8c"/>
  <!-- lion face on front (right side) -->
  <circle cx="130" cy="68" r="18" fill="#c8a020"/>
  <!-- lion eyes -->
  <circle cx="125" cy="64" r="3" fill="#1a1a1a"/>
  <circle cx="135" cy="64" r="3" fill="#1a1a1a"/>
  <!-- lion nose/mouth -->
  <ellipse cx="130" cy="72" rx="5" ry="3" fill="#8B4513"/>
  <path d="M125,73 Q130,78 135,73" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- lion mane -->
  <circle cx="130" cy="68" r="20" fill="none" stroke="#c87820" stroke-width="4" opacity="0.6"/>
  <!-- chimney -->
  <rect x="50" y="20" width="15" height="32" rx="4" fill="#1a1a1a"/>
  <rect x="46" y="16" width="23" height="8" rx="3" fill="#444"/>
  <!-- smoke -->
  <circle cx="57" cy="11" r="5" fill="#bbb" opacity="0.4"/>
  <!-- 4 wheels 0-4-0 -->
  <circle cx="58" cy="100" r="11" fill="#0d1e5c" stroke="#c8a020" stroke-width="2"/>
<line x1="69.0" y1="100.0" x2="47.0" y2="100.0" stroke="#c8a020" stroke-width="1.2"/>
<line x1="67.5" y1="105.5" x2="48.5" y2="94.5" stroke="#c8a020" stroke-width="1.2"/>
<line x1="63.5" y1="109.5" x2="52.5" y2="90.5" stroke="#c8a020" stroke-width="1.2"/>
<line x1="58.0" y1="111.0" x2="58.0" y2="89.0" stroke="#c8a020" stroke-width="1.2"/>
<line x1="52.5" y1="109.5" x2="63.5" y2="90.5" stroke="#c8a020" stroke-width="1.2"/>
<line x1="48.5" y1="105.5" x2="67.5" y2="94.5" stroke="#c8a020" stroke-width="1.2"/>
<circle cx="58" cy="100" r="2.4" fill="#c8a020"/>

  <circle cx="82" cy="100" r="11" fill="#0d1e5c" stroke="#c8a020" stroke-width="2"/>
<line x1="93.0" y1="100.0" x2="71.0" y2="100.0" stroke="#c8a020" stroke-width="1.2"/>
<line x1="91.5" y1="105.5" x2="72.5" y2="94.5" stroke="#c8a020" stroke-width="1.2"/>
<line x1="87.5" y1="109.5" x2="76.5" y2="90.5" stroke="#c8a020" stroke-width="1.2"/>
<line x1="82.0" y1="111.0" x2="82.0" y2="89.0" stroke="#c8a020" stroke-width="1.2"/>
<line x1="76.5" y1="109.5" x2="87.5" y2="90.5" stroke="#c8a020" stroke-width="1.2"/>
<line x1="72.5" y1="105.5" x2="91.5" y2="94.5" stroke="#c8a020" stroke-width="1.2"/>
<circle cx="82" cy="100" r="2.4" fill="#c8a020"/>

  <circle cx="106" cy="100" r="11" fill="#0d1e5c" stroke="#c8a020" stroke-width="2"/>
<line x1="117.0" y1="100.0" x2="95.0" y2="100.0" stroke="#c8a020" stroke-width="1.2"/>
<line x1="115.5" y1="105.5" x2="96.5" y2="94.5" stroke="#c8a020" stroke-width="1.2"/>
<line x1="111.5" y1="109.5" x2="100.5" y2="90.5" stroke="#c8a020" stroke-width="1.2"/>
<line x1="106.0" y1="111.0" x2="106.0" y2="89.0" stroke="#c8a020" stroke-width="1.2"/>
<line x1="100.5" y1="109.5" x2="111.5" y2="90.5" stroke="#c8a020" stroke-width="1.2"/>
<line x1="96.5" y1="105.5" x2="115.5" y2="94.5" stroke="#c8a020" stroke-width="1.2"/>
<circle cx="106" cy="100" r="2.4" fill="#c8a020"/>

  <!-- coupling rod -->
  <rect x="58" y="98" width="48" height="4" rx="2" fill="#c8a020" opacity="0.8"/>
  <!-- frame -->
  <rect x="35" y="84" width="100" height="6" rx="2" fill="#0d1e5c"/>
  <line x1="25" y1="112" x2="175" y2="112" stroke="#888" stroke-width="2.5"/>


  <text x="100" y="126" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Stourbridge Lion · 1829</text>
