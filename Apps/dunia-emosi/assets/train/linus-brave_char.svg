<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="200" height="130">
  <!-- Linus — Brave Locomotive character (strong, heroic, dark green steam engine) -->
  <defs>
    <linearGradient id="linBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="60%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#0A3010"/>
    </linearGradient>
    <linearGradient id="linBrass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#A07000"/>
    </linearGradient>
    <radialGradient id="linGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6600" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#CC3300" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- steam / smoke puffs -->
  <ellipse cx="38" cy="12" rx="11" ry="8" fill="#B0BEC5" opacity="0.6"/>
  <ellipse cx="52" cy="6"  rx="8"  ry="6" fill="#90A4AE" opacity="0.4"/>
  <ellipse cx="62" cy="11" rx="6"  ry="5" fill="#78909C" opacity="0.3"/>

  <!-- smokestack (tall, ornate) -->
  <rect x="26" y="20" width="18" height="30" rx="3"  fill="url(#linBody)"/>
  <rect x="22" y="15" width="26" height="8"  rx="3"  fill="#1B5E20"/>
  <rect x="20" y="12" width="30" height="5"  rx="2"  fill="url(#linBrass)"/>

  <!-- boiler — large powerful cylinder -->
  <rect x="34" y="30" width="118" height="42" rx="14" fill="url(#linBody)"/>
  <ellipse cx="90" cy="51" rx="59" ry="21" fill="url(#linBody)"/>

  <!-- boiler brass bands -->
  <rect x="62"  y="30" width="6" height="42" rx="2" fill="url(#linBrass)" opacity="0.6"/>
  <rect x="86"  y="30" width="6" height="42" rx="2" fill="url(#linBrass)" opacity="0.6"/>
  <rect x="110" y="30" width="6" height="42" rx="2" fill="url(#linBrass)" opacity="0.6"/>

  <!-- dome (pressure dome) -->
  <ellipse cx="78" cy="29" rx="14" ry="10" fill="#1B5E20"/>
  <ellipse cx="78" cy="27" rx="10" ry="6"  fill="url(#linBrass)"/>

  <!-- safety valve -->
  <rect x="100" y="24" width="6" height="8" rx="2" fill="url(#linBrass)"/>
  <rect x="98"  y="21" width="10" height="4" rx="2" fill="#A07000"/>

  <!-- firebox glow (visible through side) -->
  <rect x="130" y="38" width="22" height="34" rx="3" fill="#CC3300" opacity="0.5"/>
  <ellipse cx="141" cy="55" rx="9" ry="11"   fill="url(#linGlow)" opacity="0.7"/>

  <!-- cab — strong, heroic cab shape -->
  <rect x="145" y="18" width="48" height="54" rx="4" fill="#1B5E20"/>
  <path d="M140,18 L193,18 L193,14 Q167,8 140,14 Z" fill="url(#linBrass)"/>
  <!-- cab windows -->
  <rect x="152" y="25" width="14" height="13" rx="3" fill="#87CEEB" opacity="0.75"/>
  <rect x="171" y="25" width="14" height="13" rx="3" fill="#87CEEB" opacity="0.75"/>
  <!-- window frames -->
  <rect x="151" y="24" width="16" height="15" rx="3" fill="none" stroke="url(#linBrass)" stroke-width="1.5"/>
  <rect x="170" y="24" width="16" height="15" rx="3" fill="none" stroke="url(#linBrass)" stroke-width="1.5"/>

  <!-- name plate on cab -->
  <rect x="152" y="44" width="34" height="10" rx="2" fill="url(#linBrass)" opacity="0.8"/>
  <text x="169" y="52" font-family="Arial,sans-serif" font-size="6" font-weight="bold"
        fill="#1B5E20" text-anchor="middle">LINUS</text>

  <!-- running board / footplate -->
  <rect x="26" y="69" width="167" height="8" rx="2" fill="#0A3010"/>
  <rect x="26" y="67" width="167" height="3" rx="1" fill="url(#linBrass)" opacity="0.5"/>

  <!-- pilot / cow-catcher -->
  <path d="M28,70 L6,80 L6,85 L28,78 Z" fill="#0A3010"/>
  <line x1="9"  y1="76" x2="28" y2="71" stroke="url(#linBrass)" stroke-width="1.5"/>
  <line x1="13" y1="79" x2="28" y2="74" stroke="url(#linBrass)" stroke-width="1.5"/>
  <line x1="17" y1="83" x2="28" y2="78" stroke="url(#linBrass)" stroke-width="1.5"/>

  <!-- wheels — large green with brass rims -->
  <circle cx="55"  cy="92" r="18" fill="#0A3010" stroke="url(#linBrass)" stroke-width="4"/>
  <circle cx="97"  cy="92" r="18" fill="#0A3010" stroke="url(#linBrass)" stroke-width="4"/>
  <circle cx="139" cy="92" r="18" fill="#0A3010" stroke="url(#linBrass)" stroke-width="4"/>
  <!-- front pony wheel -->
  <circle cx="28"  cy="96" r="10" fill="#0A3010" stroke="url(#linBrass)" stroke-width="2.5"/>
  <!-- rear wheel -->
  <circle cx="175" cy="96" r="12" fill="#0A3010" stroke="url(#linBrass)" stroke-width="3"/>

  <!-- spokes -->
  <line x1="55" y1="74" x2="55"  y2="110" stroke="#D4A017" stroke-width="2"/>
  <line x1="37" y1="92" x2="73"  y2="92"  stroke="#D4A017" stroke-width="2"/>
  <line x1="42" y1="79" x2="68"  y2="105" stroke="#D4A017" stroke-width="2"/>
  <line x1="68" y1="79" x2="42"  y2="105" stroke="#D4A017" stroke-width="2"/>
  <line x1="97" y1="74" x2="97"  y2="110" stroke="#D4A017" stroke-width="2"/>
  <line x1="79" y1="92" x2="115" y2="92"  stroke="#D4A017" stroke-width="2"/>
  <line x1="84" y1="79" x2="110" y2="105" stroke="#D4A017" stroke-width="2"/>
  <line x1="110" y1="79" x2="84" y2="105" stroke="#D4A017" stroke-width="2"/>
  <line x1="139" y1="74" x2="139" y2="110" stroke="#D4A017" stroke-width="2"/>
  <line x1="121" y1="92" x2="157" y2="92"  stroke="#D4A017" stroke-width="2"/>
  <line x1="126" y1="79" x2="152" y2="105" stroke="#D4A017" stroke-width="2"/>
  <line x1="152" y1="79" x2="126" y2="105" stroke="#D4A017" stroke-width="2"/>

  <!-- hub centres -->
  <circle cx="55"  cy="92" r="4.5" fill="url(#linBrass)"/>
  <circle cx="97"  cy="92" r="4.5" fill="url(#linBrass)"/>
  <circle cx="139" cy="92" r="4.5" fill="url(#linBrass)"/>
  <circle cx="28"  cy="96" r="3"   fill="url(#linBrass)"/>
  <circle cx="175" cy="96" r="3.5" fill="url(#linBrass)"/>

  <!-- coupling rod -->
  <rect x="40" y="89" width="108" height="5" rx="2" fill="#D4A017" opacity="0.6"/>

  <!-- headlamp (glowing warm) -->
  <circle cx="26" cy="56" r="7"   fill="#1B5E20" stroke="url(#linBrass)" stroke-width="2"/>
  <circle cx="26" cy="56" r="4.5" fill="#FFDD00" opacity="0.9"/>
  <circle cx="26" cy="56" r="2"   fill="white"/>

  <!-- label -->
  <text x="100" y="118" font-family="Arial,sans-serif" font-size="9" font-weight="bold"
        fill="#2E7D32" text-anchor="middle">Linus</text>
  <text x="100" y="127" font-family="Arial,sans-serif" font-size="6"
        fill="#888" text-anchor="middle">Brave Locomotive · Character</text>
</svg>
