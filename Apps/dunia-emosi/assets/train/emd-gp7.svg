  <circle cx="108" cy="104" r="8" fill="#333" stroke="#C8A800" stroke-width="2"/>
<line x1="116.0" y1="104.0" x2="100.0" y2="104.0" stroke="#C8A800" stroke-width="1.2"/>
<line x1="113.7" y1="109.7" x2="102.3" y2="98.3" stroke="#C8A800" stroke-width="1.2"/>
<line x1="108.0" y1="112.0" x2="108.0" y2="96.0" stroke="#C8A800" stroke-width="1.2"/>
