  <line x1="10" y1="112" x2="195" y2="112" stroke="#888" stroke-width="2.5"/>


  <text x="100" y="126" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">EMD GP7 · 1949</text>
