<line x1="67.7" y1="109.7" x2="56.3" y2="98.3" stroke="#C8A800" stroke-width="1.2"/>
<line x1="62.0" y1="112.0" x2="62.0" y2="96.0" stroke="#C8A800" stroke-width="1.2"/>
