<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" width="100" height="110">
  <!-- Front-view diesel locomotive — red/orange/black (CC 201 style) -->
  <defs>
    <linearGradient id="lfBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#96281e"/>
    </linearGradient>
    <linearGradient id="lfGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6a817"/>
      <stop offset="100%" stop-color="#c88a0a"/>
    </linearGradient>
    <linearGradient id="lfOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d48a14"/>
      <stop offset="100%" stop-color="#b06e0a"/>
    </linearGradient>
    <linearGradient id="lfWin" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#a8c8e8"/>
      <stop offset="40%" stop-color="#7faec8"/>
      <stop offset="100%" stop-color="#6898b8"/>
    </linearGradient>
  </defs>

  <!-- Cab roof — dark charcoal -->
  <rect x="30" y="4" width="40" height="10" rx="3" fill="#2d2d2d"/>
  <rect x="35" y="2" width="10" height="5" rx="2" fill="#222"/>
  <!-- Roof vents -->
  <rect x="38" y="6" width="8" height="3" rx="1" fill="#444" stroke="#333" stroke-width="0.5"/>
  <rect x="54" y="6" width="8" height="3" rx="1" fill="#444" stroke="#333" stroke-width="0.5"/>

  <!-- Headlights on roof -->
  <circle cx="42" cy="10" r="3" fill="#f5d76e"/>
  <circle cx="42" cy="10" r="2" fill="#ffe680"/>
  <circle cx="58" cy="10" r="3" fill="#f5d76e"/>
  <circle cx="58" cy="10" r="2" fill="#ffe680"/>

  <!-- Main cab body — red upper -->
  <path d="M18,14 L82,14 L86,22 L86,46 L14,46 L14,22 Z" fill="url(#lfBody)"/>
  <!-- Red side accents -->
  <rect x="14" y="14" width="5" height="32" fill="#a82020"/>
  <rect x="81" y="14" width="5" height="32" fill="#a82020"/>

  <!-- Windshield frames -->
  <rect x="20" y="16" width="26" height="22" rx="2" fill="#5a1010"/>
  <rect x="54" y="16" width="26" height="22" rx="2" fill="#5a1010"/>
  <!-- Windows -->
  <rect x="22" y="18" width="22" height="18" rx="1.5" fill="url(#lfWin)"/>
  <rect x="56" y="18" width="22" height="18" rx="1.5" fill="url(#lfWin)"/>
  <!-- Window shine -->
  <path d="M24,19 L30,19 L24,30 Z" fill="rgba(255,255,255,0.2)"/>
  <path d="M58,19 L64,19 L58,30 Z" fill="rgba(255,255,255,0.2)"/>
  <!-- Wipers -->
  <path d="M32,35 Q28,22 26,20" fill="none" stroke="#222" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M68,35 Q72,22 74,20" fill="none" stroke="#222" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Gold nose band -->
  <rect x="14" y="46" width="72" height="6" fill="url(#lfGold)"/>
  <!-- Thin gold border -->
  <rect x="14" y="44" width="72" height="2.5" fill="#c8920a"/>

  <!-- Orange lower body -->
  <rect x="14" y="52" width="72" height="16" fill="url(#lfOrange)"/>

  <!-- Side headlights -->
  <circle cx="20" cy="42" r="5" fill="#999"/>
  <circle cx="20" cy="42" r="3.5" fill="#666"/>
  <circle cx="20" cy="42" r="2" fill="#888"/>
  <rect x="24" y="40" width="4" height="1.5" fill="#888"/>
  <circle cx="80" cy="42" r="5" fill="#999"/>
  <circle cx="80" cy="42" r="3.5" fill="#666"/>
  <circle cx="80" cy="42" r="2" fill="#888"/>
  <rect x="72" y="40" width="4" height="1.5" fill="#888"/>

  <!-- Lower red band -->
  <path d="M14,68 L14,80 Q14,84 18,86 L82,86 Q86,84 86,80 L86,68 Z" fill="#961e1e"/>
  <rect x="14" y="68" width="72" height="3" fill="#7a1818"/>

  <!-- Undercarriage — black -->
  <rect x="18" y="86" width="64" height="14" fill="#1a1a1a"/>
  <!-- Grill slats left -->
  <rect x="20" y="88" width="18" height="10" rx="1" fill="#222"/>
  <line x1="24" y1="88" x2="24" y2="98" stroke="#333" stroke-width="1"/>
  <line x1="28" y1="88" x2="28" y2="98" stroke="#333" stroke-width="1"/>
  <line x1="32" y1="88" x2="32" y2="98" stroke="#333" stroke-width="1"/>
  <line x1="36" y1="88" x2="36" y2="98" stroke="#333" stroke-width="1"/>
  <!-- Grill slats right -->
  <rect x="62" y="88" width="18" height="10" rx="1" fill="#222"/>
  <line x1="66" y1="88" x2="66" y2="98" stroke="#333" stroke-width="1"/>
  <line x1="70" y1="88" x2="70" y2="98" stroke="#333" stroke-width="1"/>
  <line x1="74" y1="88" x2="74" y2="98" stroke="#333" stroke-width="1"/>
  <line x1="78" y1="88" x2="78" y2="98" stroke="#333" stroke-width="1"/>

  <!-- Center coupler -->
  <rect x="44" y="92" width="12" height="8" rx="1" fill="#555"/>
  <rect x="46" y="100" width="3" height="6" fill="#444"/>
  <rect x="51" y="100" width="3" height="6" fill="#444"/>

  <!-- Bottom dots (rivets) -->
  <circle cx="25" cy="86" r="1" fill="#111"/>
  <circle cx="30" cy="86" r="1" fill="#111"/>
  <circle cx="35" cy="86" r="1" fill="#111"/>
  <circle cx="40" cy="86" r="1" fill="#111"/>
  <circle cx="45" cy="86" r="1" fill="#111"/>
  <circle cx="50" cy="86" r="1" fill="#111"/>
  <circle cx="55" cy="86" r="1" fill="#111"/>
  <circle cx="60" cy="86" r="1" fill="#111"/>
  <circle cx="65" cy="86" r="1" fill="#111"/>
  <circle cx="70" cy="86" r="1" fill="#111"/>
  <circle cx="75" cy="86" r="1" fill="#111"/>
</svg>
