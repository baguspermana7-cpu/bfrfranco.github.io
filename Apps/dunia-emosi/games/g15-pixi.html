<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Lokomotif Pemberani 🚂</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100svh;overflow:hidden;font-family:'Fredoka One',sans-serif;touch-action:none}
#pixi-canvas{position:fixed;inset:0;width:100vw;height:100svh;display:block}

/* ── HUD Top ── */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 14px 8px;background:linear-gradient(180deg,rgba(0,0,0,0.72) 0%,transparent 100%);pointer-events:none}
#btn-back{background:#FFF8E7;border:2.5px solid #FFD6A0;border-radius:12px;color:#8B4513;padding:7px 13px;font-size:16px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0;box-shadow:0 3px 0 #D4956A;font-weight:900}
#btn-back:active{transform:translateY(2px);box-shadow:0 1px 0 #D4956A}
#word-display{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;min-width:0}
#word-emoji{font-size:24px;flex-shrink:0}
#word-slots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.slot{display:inline-flex;align-items:center;justify-content:center;width:28px;height:32px;border-radius:8px;border:2px solid rgba(255,255,255,0.35);background:rgba(0,0,0,0.35);color:#fff;font-size:15px;font-weight:900;transition:all .2s}
.slot.filled{border-color:#fbbf24;background:rgba(251,191,36,0.28);color:#fde68a}
.slot.done{border-color:#4ade80;background:rgba(74,222,128,0.28);color:#bbf7d0;animation:slotPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes slotPop{from{transform:scale(0.7)}to{transform:scale(1)}}
#lives-hud{display:flex;gap:3px;flex-shrink:0}
.life-heart{font-size:20px;transition:all .3s;display:inline-block}
.life-heart.lost{opacity:0.18;transform:scale(0.65);filter:grayscale(1)}

/* ── Next letter hint ── */
#next-letter{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:49;background:rgba(255,248,231,0.92);border:2px solid #FFD6A0;border-radius:14px;padding:5px 16px;display:flex;align-items:center;gap:6px;pointer-events:none;box-shadow:0 3px 0 #D4956A}
#next-label{font-size:10px;color:#92400e;letter-spacing:1.2px;font-weight:700}
#next-char{font-size:24px;font-weight:900;color:#dc2626;text-shadow:0 0 10px rgba(220,38,38,0.35)}

/* ── Flash ── */
#flash{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:0;transition:opacity .05s}

/* ── HUD Bottom ── */
#hud-bottom{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:8px 14px calc(env(safe-area-inset-bottom,0px)+12px)}
#ctrl-row{display:flex;gap:10px;align-items:stretch}
#btn-up{flex:1;padding:15px 0;border-radius:18px;border:3px solid #50E0A0;background:linear-gradient(160deg,#2DBF7E,#1A9E66);color:#fff;font-size:22px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .08s,box-shadow .08s;font-family:inherit;-webkit-tap-highlight-color:transparent;line-height:1.2;box-shadow:0 5px 0 #0A7A48,0 8px 20px rgba(45,191,126,0.3);font-weight:900}
#btn-up:active{transform:scale(.91) translateY(4px);box-shadow:0 1px 0 #0A7A48}
#btn-dn{flex:1;padding:15px 0;border-radius:18px;border:3px solid #F07050;background:linear-gradient(160deg,#E85A32,#C84020);color:#fff;font-size:22px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .08s,box-shadow .08s;font-family:inherit;-webkit-tap-highlight-color:transparent;line-height:1.2;box-shadow:0 5px 0 #9A2A10,0 8px 20px rgba(232,90,50,0.3);font-weight:900}
#btn-dn:active{transform:scale(.91) translateY(4px);box-shadow:0 1px 0 #9A2A10}
#lane-indicator{flex:1.2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 6px;border-radius:18px;border:3px solid #B8D4FF;background:linear-gradient(160deg,#E8F4FF,#C8E8FF);box-shadow:0 5px 0 #7AADDD}
#lane-dots{display:flex;flex-direction:column;gap:6px;align-items:center}
.lane-dot{width:12px;height:12px;border-radius:50%;background:rgba(100,160,220,0.3);border:2px solid rgba(100,160,220,0.4);transition:all .2s}
.lane-dot.active{background:#3B82F6;box-shadow:0 0 10px #3B82F6;border-color:#93C5FD;transform:scale(1.4)}
#lane-label{font-size:10px;color:#1e40af;letter-spacing:1px;margin-top:2px;font-weight:700}

/* ── Math Quiz Overlay ── */
#math-quiz{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;background:rgba(10,5,25,0.82);backdrop-filter:blur(14px)}
#math-quiz.show{display:flex}
#math-card{background:linear-gradient(145deg,#1e1b4b,#312e81);border:3px solid #818cf8;border-radius:28px;padding:24px 20px;max-width:300px;width:88%;text-align:center;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 60px rgba(129,140,248,0.4),0 20px 40px rgba(0,0,0,.6)}
#math-question{font-size:34px;font-weight:900;color:#e0e7ff;margin-bottom:4px}
#math-timer-bar{height:6px;background:rgba(255,255,255,0.12);border-radius:4px;margin:8px 0 16px;overflow:hidden}
#math-timer-fill{height:100%;background:linear-gradient(90deg,#4ade80,#22c55e);border-radius:4px;transition:width 0.1s linear}
#math-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.math-btn{padding:14px 8px;border-radius:16px;border:2px solid;color:#fff;font-size:20px;font-weight:900;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:transform .08s}
.math-btn:active{transform:scale(.91)}
.math-btn:nth-child(1){background:linear-gradient(160deg,#6D28D9,#7C3AED);border-color:#A78BFA;box-shadow:0 4px 0 #4C1D95}
.math-btn:nth-child(2){background:linear-gradient(160deg,#C2410C,#EA580C);border-color:#FB923C;box-shadow:0 4px 0 #9A3412}
.math-btn:nth-child(3){background:linear-gradient(160deg,#0D9488,#14B8A6);border-color:#2DD4BF;box-shadow:0 4px 0 #0F766E}
.math-btn:nth-child(4){background:linear-gradient(160deg,#D97706,#F59E0B);border-color:#FCD34D;box-shadow:0 4px 0 #B45309}
#math-label{font-size:12px;color:#a5b4fc;letter-spacing:1.5px;margin-bottom:8px;font-weight:700}

/* ── Result Overlay ── */
.ovl{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.78);backdrop-filter:blur(12px)}
.ovl.show{display:flex}
.ovl-card{background:linear-gradient(145deg,#1e1b4b,#312e81);border:2px solid rgba(129,140,248,.5);border-radius:28px;padding:28px 24px;text-align:center;max-width:320px;width:90%;box-shadow:0 0 60px rgba(129,140,248,.3),0 20px 40px rgba(0,0,0,.6);color:#fff;animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.72);opacity:0}to{transform:scale(1);opacity:1}}
.ovl-emoji{font-size:58px;display:block;margin-bottom:6px}
.ovl-title{font-size:26px;font-weight:900;margin-bottom:6px}
.ovl-msg{color:rgba(255,255,255,.65);font-size:13px;margin-bottom:14px;line-height:1.5}
.ovl-stars{font-size:30px;letter-spacing:5px;margin:8px 0 18px}
.ovl-btn{background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;border-radius:16px;color:#fff;padding:14px 0;font-size:16px;font-weight:900;cursor:pointer;width:100%;margin-top:8px;box-shadow:0 5px 0 #3730a3;transition:transform .1s,box-shadow .1s;font-family:inherit;-webkit-tap-highlight-color:transparent}
.ovl-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #3730a3}
.ovl-btn.sec{background:rgba(255,255,255,.1);box-shadow:none;border:1.5px solid rgba(255,255,255,.22);margin-top:8px}

/* ── Screen shake ── */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shaking{animation:shake .3s ease}

/* ── Train Select Screen ── */
#train-select{position:fixed;inset:0;z-index:900;background:linear-gradient(180deg,#0a0212 0%,#120430 60%,#0a0212 100%);display:flex;flex-direction:column;overflow:hidden}
#ts-header{padding:14px 16px 6px;flex-shrink:0}
#ts-title{font-size:22px;font-weight:900;color:#e9d5ff;text-align:center;text-shadow:0 0 20px rgba(139,92,246,0.7)}
#ts-subtitle{font-size:11px;color:rgba(233,213,255,0.45);letter-spacing:1.5px;text-align:center;margin:2px 0 8px}
#station-intro{text-align:center;background:rgba(139,92,246,0.14);border:1.5px solid rgba(139,92,246,0.4);border-radius:14px;margin:0 14px 10px;padding:8px 14px;flex-shrink:0}
.si-label{font-size:9px;color:rgba(233,213,255,0.5);letter-spacing:1.8px;font-weight:700}
.si-icon{font-size:26px;display:block;margin:1px 0}
.si-name{font-size:17px;font-weight:900;color:#e9d5ff}
.si-landmark{font-size:11px;color:rgba(233,213,255,0.6);margin-top:2px}
#ts-grid-wrap{flex:1;overflow-y:auto;padding:0 10px 16px;-webkit-overflow-scrolling:touch}
#train-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
@media(min-width:380px){#train-grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:520px){#train-grid{grid-template-columns:repeat(6,1fr)}}
.tcard{border-radius:12px;border:2px solid rgba(139,92,246,0.22);background:rgba(139,92,246,0.07);cursor:pointer;-webkit-tap-highlight-color:transparent;overflow:hidden;display:flex;flex-direction:column;transition:all .12s}
.tcard:active{transform:scale(0.9);background:rgba(139,92,246,0.25);border-color:rgba(167,139,250,0.6)}
.tcard canvas{width:100%;height:48px;display:block}
.tcard .tname{font-size:8px;font-weight:700;color:#c4b5fd;text-align:center;padding:2px 3px 5px;line-height:1.3;min-height:24px}

/* ── Station Banner (shown at game start) ── */
#station-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;display:none;flex-direction:column;align-items:center;gap:3px;background:rgba(0,0,0,0.88);border:2.5px solid rgba(139,92,246,0.7);border-radius:24px;padding:20px 32px;backdrop-filter:blur(18px);pointer-events:none;opacity:1;transition:opacity .5s,transform .5s}
#station-banner.visible{display:flex}
#station-banner.fade-out{opacity:0;transform:translate(-50%,-55%)}
#sb-label{font-size:10px;color:rgba(233,213,255,0.5);letter-spacing:2.5px;font-weight:700}
#sb-icon{font-size:40px;line-height:1;margin:4px 0}
#sb-name{font-size:22px;font-weight:900;color:#e9d5ff;text-align:center;text-shadow:0 0 16px rgba(139,92,246,0.8)}
#sb-landmark{font-size:13px;color:rgba(233,213,255,0.65);text-align:center}

/* ── Station chip in HUD ── */
#station-chip{position:fixed;top:66px;right:10px;z-index:49;background:rgba(0,0,0,0.68);border:1.5px solid rgba(139,92,246,0.45);border-radius:10px;padding:3px 9px;pointer-events:none}
.sc-label{font-size:8px;color:rgba(233,213,255,0.45);letter-spacing:1.2px;display:block}
.sc-name{font-size:10px;font-weight:700;color:#e9d5ff;white-space:nowrap;display:block}
</style>
</head>
<body>
<canvas id="pixi-canvas"></canvas>

<!-- HUD Top -->
<div id="hud-top">
  <button id="btn-back" onclick="goBack()">⌂</button>
  <div id="word-display">
    <span id="word-emoji">❓</span>
    <div id="word-slots"></div>
  </div>
  <div id="lives-hud"></div>
</div>

<!-- Next letter hint -->
<div id="next-letter">
  <span id="next-label">KUMPULKAN</span>
  <span id="next-char">?</span>
</div>

<!-- HUD Bottom -->
<div id="hud-bottom">
  <div id="ctrl-row">
    <button id="btn-up" ontouchstart="switchLane(-1);event.preventDefault()" onclick="switchLane(-1)">▲<br><span style="font-size:11px">ATAS</span></button>
    <div id="lane-indicator">
      <div id="lane-dots">
        <div class="lane-dot" id="ld0"></div>
        <div class="lane-dot" id="ld1"></div>
        <div class="lane-dot" id="ld2"></div>
      </div>
      <div id="lane-label">JALUR</div>
    </div>
    <button id="btn-dn" ontouchstart="switchLane(1);event.preventDefault()" onclick="switchLane(1)">▼<br><span style="font-size:11px">BAWAH</span></button>
  </div>
</div>

<!-- Flash -->
<div id="flash"></div>

<!-- Math Quiz -->
<div id="math-quiz">
  <div id="math-card">
    <div id="math-label">❓ SOAL MATEMATIKA</div>
    <div id="math-question">5 + 3 = ?</div>
    <div id="math-timer-bar"><div id="math-timer-fill" style="width:100%"></div></div>
    <div id="math-choices"></div>
  </div>
</div>

<!-- Win/Lose overlay -->
<div class="ovl" id="end-ovl">
  <div class="ovl-card">
    <span class="ovl-emoji" id="end-emoji">🏆</span>
    <div class="ovl-title" id="end-title">Hore!</div>
    <div class="ovl-msg" id="end-msg">Kamu berhasil!</div>
    <div class="ovl-stars" id="end-stars">⭐⭐⭐</div>
    <button class="ovl-btn" onclick="restartGame()">🔄 Ulang</button>
    <button class="ovl-btn sec" onclick="goBack()">🏠 Selesai</button>
  </div>
</div>

<!-- Train Select Screen -->
<div id="train-select">
  <div id="ts-header">
    <div id="ts-title">🚂 Pilih Keretamu!</div>
    <div id="ts-subtitle">PILIH KERETA UNTUK MEMULAI PERJALANAN</div>
  </div>
  <div id="station-intro">
    <div class="si-label">STASIUN BERANGKAT</div>
    <span class="si-icon" id="si-icon">🏛️</span>
    <div class="si-name" id="si-name">Surabaya Kota</div>
    <div class="si-landmark" id="si-landmark">Tugu Pahlawan</div>
  </div>
  <div id="ts-grid-wrap"><div id="train-grid"></div></div>
</div>

<!-- Station Banner -->
<div id="station-banner">
  <div id="sb-label">TIBA DI STASIUN</div>
  <div id="sb-icon">🏛️</div>
  <div id="sb-name">Surabaya Kota</div>
  <div id="sb-landmark">Tugu Pahlawan</div>
</div>

<!-- Station chip -->
<div id="station-chip" style="display:none">
  <span class="sc-label">📍 STASIUN</span>
  <span class="sc-name" id="sc-name">Surabaya Kota</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script>
'use strict';
// Polyfill ctx.roundRect for older Android WebViews (Chrome < 99)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const radius = Math.min(+r || 0, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + radius, y);
    this.lineTo(x + w - radius, y);
    this.arcTo(x + w, y, x + w, y + radius, radius);
    this.lineTo(x + w, y + h - radius);
    this.arcTo(x + w, y + h, x + w - radius, y + h, radius);
    this.lineTo(x + radius, y + h);
    this.arcTo(x, y + h, x, y + h - radius, radius);
    this.lineTo(x, y + radius);
    this.arcTo(x, y, x + radius, y, radius);
    this.closePath();
    return this;
  };
}

// ── Config ───────────────────────────────────────────────────────────────────
const cfg = (() => { try { return JSON.parse(sessionStorage.getItem('g15Config') || '{}'); } catch { return {}; } })();
const LEVEL = Math.max(1, Math.min(30, cfg.level || 1));

function goBack() { if (document.referrer) history.back(); else window.location.href = '../index.html'; }

// ── Java Station Route: Surabaya → Banten ────────────────────────────────────
const JAVA_STATIONS = [

  {name:'TUJUAN AKHIR! 🎉',  icon:'🏆', landmark:'Selat Sunda — Selamat Tiba!'},
];
function getCurrentStation(){ return JAVA_STATIONS[Math.min(LEVEL-1,JAVA_STATIONS.length-1)]; }

// ── Train Catalog: 100 unique named trains ─────────────────────────────────────
// b=body, r=roof, s=stripe, w=window, k=dark  v=variant(1-5 within sub-type)
const TRAIN_MODELS = [
  // ── STEAM / CLASSIC ── v1:3-wheel single chimney, v2:4-wheel, v3:tall chimney, v4:double chimney, v5:4-wheel compact
  {id:'sc1',name:'D51 Mikado JNR',      type:'steam',sub:'classic',  v:1,b:0x1c1917,r:0xe11d48,s:0xfbbf24,w:0xdbeafe,k:0x111827},
  {id:'sc2',name:'C62 Tokkyu JNR',      type:'steam',sub:'classic',  v:2,b:0x172554,r:0x1d4ed8,s:0x93c5fd,w:0xdbeafe,k:0x111827},
  {id:'sc3',name:'Mallard LNER A4',     type:'steam',sub:'classic',  v:3,b:0x1d4ed8,r:0x1e3a8a,s:0x38bdf8,w:0xe0f2fe,k:0x0c4a6e},
  {id:'sc4',name:'Flying Scotsman GNR', type:'steam',sub:'classic',  v:4,b:0x14532d,r:0x052e16,s:0x86efac,w:0xd1fae5,k:0x111827},
  {id:'sc5',name:'BR Standard 5MT',     type:'steam',sub:'classic',  v:5,b:0x1e1b4b,r:0x3730a3,s:0x818cf8,w:0xede9fe,k:0x111827},
  // ── STEAM / PACIFIC ── v1:3-wheel deflectors, v2:4-wheel narrow def, v3:3-wheel no def, v4:4-wheel dbl chimney, v5:2-wheel wide
  {id:'sp1',name:'Duchess of Hamilton', type:'steam',sub:'pacific',  v:1,b:0x9d174d,r:0x881337,s:0xfda4af,w:0xfce7f3,k:0x111827},
  {id:'sp2',name:'A1 Class Tornado',    type:'steam',sub:'pacific',  v:2,b:0x14532d,r:0x052e16,s:0xfbbf24,w:0xd1fae5,k:0x111827},
  {id:'sp3',name:'P36 Soviet Pacific',  type:'steam',sub:'pacific',  v:3,b:0x0f4c32,r:0xdc2626,s:0xfde68a,w:0xfef3c7,k:0x111827},

function genMathQuestion() {
  const maxN = LEVEL <= 4 ? 5 : LEVEL <= 9 ? 10 : 15;
  const useSubtract = LEVEL > 4;
  const op = useSubtract && Math.random() < 0.4 ? '-' : '+';
  let a, b, ans;
  if (op === '+') {
    a = Math.floor(Math.random() * (maxN + 1));
    b = Math.floor(Math.random() * (maxN - a + 1));
    ans = a + b;
  } else {
    a = Math.floor(Math.random() * (maxN + 1));
    b = Math.floor(Math.random() * (a + 1));
    ans = a - b;
  }
  return { text: `${a} ${op} ${b} = ?`, answer: ans };
}

function genWrongOptions(correct, count) {
  const opts = new Set([correct]);
  while (opts.size < count + 1) {
    const delta = Math.floor(Math.random() * 5) + 1;
    const wrong = Math.max(0, correct + (Math.random() < 0.5 ? delta : -delta));
    if (wrong !== correct && wrong >= 0 && wrong <= 20) opts.add(wrong);
  }
  return shuffle([...opts]).slice(0, count + 1);
}

// ── PixiJS Init ───────────────────────────────────────────────────────────────
async function initPixi() {
  app = new PIXI.Application();
  await app.init({
    canvas: document.getElementById('pixi-canvas'),
    width: window.innerWidth, height: window.innerHeight,
    backgroundColor: T.sky, antialias: true,
    resolution: window.devicePixelRatio || 1, autoDensity: true
  });
  W = app.screen.width; H = app.screen.height;
  const topHUD = 120, botHUD = 115;
  const available = H - topHUD - botHUD;
  LANE_Y = [
    topHUD + available * 0.18,
    topHUD + available * 0.50,
    topHUD + available * 0.82
  ];
  stage = app.stage;
  bgLayer       = new PIXI.Container(); stage.addChild(bgLayer);
  trackLayer    = new PIXI.Container(); stage.addChild(trackLayer);
  trainContainer= new PIXI.Container(); stage.addChild(trainContainer);
  boxLayer      = new PIXI.Container(); stage.addChild(boxLayer);
  particleLayer = new PIXI.Container(); stage.addChild(particleLayer);

  buildBackground();
  buildTracks();
  buildTrain();
  updateLivesHUD();
  updateLaneDots();
  refreshHUD();
  updateStationChip();
  showStationBanner(getCurrentStation());

  gameRunning = true;
  startTime = Date.now();
  let spawnTimer = 0;
  const spawnInterval = () => Math.max(45, 90 - LEVEL * 2);

  app.ticker.add((ticker) => {
    if (!gameRunning || mathQuizActive) return;
    const dt = ticker.deltaTime;

    // Scroll sleepers
    for (const s of sleepers) { s.x -= gameSpeed * dt; if (s.x < -20) s.x += W + 40; }

    // Stars (night/space theme)
    if (BG_THEME === 0 || BG_THEME === 3) {
      for (const st of bgStars) {
        st.x -= st._speed * dt;
        if (st.x < 0) { st.x = W; st.y = Math.random() * H * 0.65; }
      }
    }

    // Clouds move
    for (const c of bgClouds) {
      c.x -= c._speed * dt;
      if (c.x < -200) c.x = W + 150;
    }

    // Fireflies (forest theme)
    if (BG_THEME === 2) {
      for (const ff of bgFireflies) {
        ff._phase += 0.04 * dt;
        ff.alpha = 0.3 + Math.sin(ff._phase) * 0.6;
        ff.x += ff._vx * dt;
        ff.y += Math.sin(ff._phase * 0.7) * 0.3 * dt;
        if (ff.x < 0) ff.x = W; if (ff.x > W) ff.x = 0;
      }
    }

    // Rainbow fade
    if (rainbow) {
      rainbow.alpha -= 0.008 * dt;
      if (rainbow.alpha <= 0) { bgLayer.removeChild(rainbow); rainbow = null; }
    }

    // Steam puffs
    for (let i = steamPuffs.length - 1; i >= 0; i--) {
      const p = steamPuffs[i];
      p.x += p._vx * dt; p.y += p._vy * dt;
      p.alpha -= 0.018 * dt;
      p.scale.x += 0.025 * dt; p.scale.y += 0.025 * dt;
      if (p.alpha <= 0) { particleLayer.removeChild(p); steamPuffs.splice(i, 1); }
    }

    // Wheel spin
    for (const w of wheels) w.rotation += 0.09 * dt * (gameSpeed / 2);

    // Spawn
    spawnTimer += dt;
    totalBoxSpawned += dt;
    mathBoxTimer += dt;
    heartBoxTimer += dt;

    if (spawnTimer >= spawnInterval()) {
      spawnTimer = 0;
      spawnLetterBox();
    }

    // Math box
    if (mathBoxTimer >= nextMathAt) {
      mathBoxTimer = 0; nextMathAt = MATH_BOX_INTERVAL();
      spawnSpecialBox('math');
    }

    // Heart box (only if lives < MAX)
    if (heartBoxTimer >= nextHeartAt && lives < MAX_LIVES) {
      heartBoxTimer = 0; nextHeartAt = HEART_BOX_INTERVAL();
      spawnSpecialBox('heart');
    }

    // Move + check boxes
    for (let i = letterBoxes.length - 1; i >= 0; i--) {
      const b = letterBoxes[i];
      b.container.x -= gameSpeed * dt;

      // Glow pulse
      if (b.glowGfx) {
        b._glowPhase = (b._glowPhase || 0) + 0.1 * dt;
        b.glowGfx.alpha = 0.45 + Math.sin(b._glowPhase) * 0.4;
      }

      // Collision: must match lane AND be within Y proximity (fix phantom hit)
      if (!invincible && b.container.x < TRAIN_X + 52 && b.container.x > TRAIN_X - 52) {
        if (b.lane === playerLane && Math.abs(b.container.y - trainContainer.y) < 42) {
          collectBox(b, i);
          continue;
        }
      }

      if (b.container.x < -90) { boxLayer.removeChild(b.container); letterBoxes.splice(i, 1); }
    }

    // Train bounce
    if (trainContainer._bounceT > 0) {
      trainContainer._bounceT -= 0.1 * dt;
      trainContainer.y = LANE_Y[playerLane] - Math.sin(trainContainer._bounceT * Math.PI) * 6;
    } else {
      trainContainer._bounceT = 0;
      trainContainer.y = LANE_Y[playerLane];
    }

    // Steam emit
    if (Math.random() < 0.05 * dt) emitSteam();
  });
}

function buildCloud(color, alpha) {
  const c = new PIXI.Container();
  const g = new PIXI.Graphics();
  g.circle(0, 0, 22).fill({ color });
  g.circle(26, 4, 18).fill({ color });
  g.circle(-24, 5, 16).fill({ color });
  g.circle(12, -10, 16).fill({ color });
  g.rect(-28, 5, 72, 18).fill({ color }); // base fill
  c.addChild(g);
  c.alpha = alpha;
  return c;
}

// ── Tracks ────────────────────────────────────────────────────────────────────
function buildTracks() {
  for (let lane = 0; lane < 3; lane++) {
    const lY = LANE_Y[lane];
    const rail1 = new PIXI.Graphics();
    rail1.rect(0, lY + 14, W, 5).fill({ color: T.railColor });
    trackLayer.addChild(rail1);
    const rail2 = new PIXI.Graphics();
    rail2.rect(0, lY + 25, W, 5).fill({ color: T.railColor });
    trackLayer.addChild(rail2);
    // Rail glow
    const glow = new PIXI.Graphics();
    glow.rect(0, lY + 10, W, 24).fill({ color: T.railShadow });
    glow.alpha = 0.18; trackLayer.addChild(glow);
    // Sleepers
    for (let x = 0; x < W + 40; x += 40) {
      const sl = new PIXI.Graphics();
      sl.rect(-7, lY + 10, 14, 24).fill({ color: T.sleeperColor });
      sl.rect(-7, lY + 10, 14, 24).stroke({ width: 1, color: 0x000000, alpha: 0.3 });
      sl.x = x; trackLayer.addChild(sl); sleepers.push(sl);
    }
  }
}

// ── Train: Parametric from selectedTrain ──────────────────────────────────────
function buildTrain() {
  if (!selectedTrain) selectedTrain = TRAIN_CATALOG[0];
  trainContainer.x = TRAIN_X;
  trainContainer.y = LANE_Y[1];
  trainContainer._bounceT = 0;

  const g = new PIXI.Graphics();
  const c = selectedTrain;

  // Dispatch to type-specific builder
  if (c.type === 'steam') drawSteamBody(g, c);
  else if (c.type === 'diesel') drawDieselBody(g, c);
  else if (c.type === 'electric' || c.type === 'tram') drawElectricBody(g, c);
  else if (c.type === 'highspeed') drawHighSpeedBody(g, c);
  else if (c.type === 'heritage') drawHeritageBody(g, c);
  else drawSteamBody(g, c); // fallback

  trainContainer.addChild(g);
  addWheels(c);
}

function drawSteamBody(g, c) {
  const b=c.b,r=c.r,s=c.s,w=c.w,k=c.k;
  const LL = r; // use roof color as cab color for steam
  const boilerLight = blendColor(b, 0xffffff, 0.25);
  // Boiler
  g.roundRect(-78,-18,55,26,12).fill({color:boilerLight});
  g.rect(-76,-18,51,6).fill({color:w});
  // Chimney (centered at ~x=-50)
  g.roundRect(-57,-38,14,22,4).fill({color:k});
  g.roundRect(-61,-42,22,7,3).fill({color:k});
  g.circle(-50,-44,5).fill({color:0x374151});
  // Dome
  g.circle(-40,-18,9).fill({color:b});
  g.circle(-40,-18,6).fill({color:s});
  // Headlamp
  g.circle(-79,-10,6).fill({color:0xfef9c3});
  g.circle(-79,-10,4).fill({color:0xfde68a});
  // Cab
  g.roundRect(-25,-24,42,32,7).fill({color:LL});
  g.roundRect(-27,-30,46,10,5).fill({color:b});
  g.roundRect(-21,-22,14,14,3).fill({color:w});
  g.roundRect(0,-22,14,14,3).fill({color:w});
  // Gold stripe
  g.rect(-78,-3,100,4).fill({color:s});
  g.roundRect(-78,8,100,6,2).fill({color:b});
  // Cowcatcher
  g.poly([-78,8,-92,16,-78,16]).fill({color:0x6b7280});
  // Tender
  const TS=22;
  g.roundRect(TS,-14,38,22,5).fill({color:b});
  g.roundRect(TS,-14,38,22,5).stroke({width:1.5,color:boilerLight});
  g.ellipse(TS+19,-16,17,8).fill({color:k});
  for(let ci=0;ci<4;ci++) g.circle(TS+8+ci*6,-17,2).fill({color:0x374151});
  // Passenger car
  const PC=64;
  g.roundRect(PC,-18,52,28,6).fill({color:LL});

// blend two hex colors (t=0 → a, t=1 → b)
function blendColor(a,b,t){
  const ar=(a>>16)&0xff,ag=(a>>8)&0xff,ab=a&0xff;
  const br=(b>>16)&0xff,bg=(b>>8)&0xff,bb=b&0xff;
  const nr=Math.round(ar+(br-ar)*t),ng=Math.round(ag+(bg-ag)*t),nb=Math.round(ab+(bb-ab)*t);
  return (nr<<16)|(ng<<8)|nb;
}

function addWheels(c) {
  const isSmall = (c.type==='tram'||c.sub==='shunter'||c.sub==='narrow'||c.sub==='prairie');
  const isSteam = (c.type==='steam');
  const wheelColor = c.k;

  let wheelDefs;
  if (isSteam) {
    wheelDefs=[
      {x:-64,r:11},{x:-47,r:11},{x:-30,r:11}, // driving
      {x:-73,r:7},{x:8,r:7},                    // small loco
      {x:30,r:7},{x:54,r:7},                    // tender
      {x:70,r:7},{x:102,r:7},                   // passenger
      {x:126,r:7},{x:142,r:7},                  // caboose
    ];
  } else if (c.type==='tram'||isSmall) {
    wheelDefs=[{x:-30,r:8},{x:-10,r:8},{x:10,r:8},{x:30,r:8}];
  } else if (c.type==='highspeed') {
    wheelDefs=[{x:-70,r:9},{x:-40,r:9},{x:10,r:9},{x:60,r:9},{x:100,r:9},{x:140,r:9}];
  } else {
    wheelDefs=[
      {x:-65,r:9},{x:-40,r:9},{x:-15,r:9}, // loco
      {x:38,r:8},{x:68,r:8},                 // coach 1
      {x:98,r:8},{x:128,r:8},                // coach 2
    ];
  }

  for(const{x,r} of wheelDefs){
    const wc=new PIXI.Container(); wc.x=x; wc.y=14;
    const wg=new PIXI.Graphics();
    wg.circle(0,0,r).fill({color:wheelColor});

// ── Letter / Special Boxes ────────────────────────────────────────────────────
const BOX_COLORS = [0xe11d48, 0x7c3aed, 0x0284c7, 0x059669, 0xd97706, 0xbe123c, 0x0d9488, 0x6d28d9];

function spawnLetterBox() {
  if (!gameRunning) return;
  const word = WORDS_LIST[currentWordIdx];
  if (!word) return;
  const targetLetter = word.word[currentLetterIdx];
  const allLetters = 'ABCDEFGHIJKLMNOPRSTUVWY';
  const lanesToFill = shuffle([0, 1, 2]);
  const numBoxes = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < Math.min(numBoxes, 3); i++) {
    const lane = lanesToFill[i];
    const isTarget = (i === 0);
    const letter = isTarget ? targetLetter : randomDistractor(targetLetter, allLetters);
    const color = BOX_COLORS[Math.floor(Math.random() * BOX_COLORS.length)];
    letterBoxes.push(createBox({ type: 'letter', lane, letter, isTarget, color }));
  }
}

function spawnSpecialBox(type) {
  if (!gameRunning) return;
  const lane = Math.floor(Math.random() * 3);
  const color = type === 'math' ? 0xd97706 : 0x16a34a;
  letterBoxes.push(createBox({ type, lane, letter: type === 'math' ? '?' : '❤', isTarget: false, color }));
}

function randomDistractor(avoid, pool) {
  let c; do { c = pool[Math.floor(Math.random() * pool.length)]; } while (c === avoid); return c;
}

function createBox({ type, lane, letter, isTarget, color }) {
  const container = new PIXI.Container();
  const lY = LANE_Y[lane];
  container.x = W + 55; container.y = lY - 8;
  const BW = 44, BH = 44;

  // Glow
  let glowGfx = null;
  const glowColor = type === 'math' ? 0xfbbf24 : type === 'heart' ? 0x4ade80 : isTarget ? 0xfbbf24 : null;
  if (glowColor) {
    glowGfx = new PIXI.Graphics();
    glowGfx.roundRect(-BW/2 - 7, -BH/2 - 7, BW + 14, BH + 14, 11).fill({ color: glowColor });
    glowGfx.alpha = 0.55;
    container.addChild(glowGfx);
  }

  // Box body
  const bg = new PIXI.Graphics();
  bg.roundRect(-BW/2, -BH/2, BW, BH, 10).fill({ color });
  bg.roundRect(-BW/2, -BH/2, BW, BH, 10).stroke({
    width: isTarget || type !== 'letter' ? 3 : 1.5,
    color: glowColor || 0xffffff,
    alpha: glowColor ? 1 : 0.4
  });
  container.addChild(bg);

  // Top shine
  const shine = new PIXI.Graphics();
  shine.roundRect(-BW/2 + 2, -BH/2 + 2, BW - 4, 10, 6).fill({ color: 0xffffff });
  shine.alpha = 0.18; container.addChild(shine);

  // Label
  const isEmoji = type !== 'letter';
  const txt = new PIXI.Text({
    text: isEmoji ? (type === 'math' ? '?' : '♥') : letter,
    style: {
      fontFamily: 'Fredoka One, sans-serif',
      fontSize: isEmoji ? 26 : 22,
      fontWeight: '900',
      fill: 0xffffff,
      dropShadow: true, dropShadowBlur: 4, dropShadowDistance: 2, dropShadowColor: 0x000000
    }
  });
  txt.anchor.set(0.5);
  container.addChild(txt);

  boxLayer.addChild(container);
  return { container, lane, letter, isTarget, type, glowGfx, _glowPhase: 0 };
}

// ── Box Collection ────────────────────────────────────────────────────────────
function collectBox(box, idx) {
  if (box.type === 'heart') {
    lives = Math.min(MAX_LIVES, lives + 1);
    spawnCollectParticles(box.container.x, box.container.y, 0x4ade80);
    updateLivesHUD();
    flashScreen('green');
    boxLayer.removeChild(box.container);
    letterBoxes.splice(idx, 1);
    return;
  }

  if (box.type === 'math') {
    boxLayer.removeChild(box.container);
    letterBoxes.splice(idx, 1);
    showMathQuiz();
    return;
  }

  // Letter box
  const word = WORDS_LIST[currentWordIdx];
  if (!word) return;
  if (box.isTarget) {
    spawnCollectParticles(box.container.x, box.container.y, 0xfbbf24);
    boxLayer.removeChild(box.container);
    letterBoxes.splice(idx, 1);
    currentLetterIdx++;
    if (currentLetterIdx >= word.word.length) onWordComplete();
    else refreshHUD();
  } else {
    if (!invincible) { wrongTaps++; triggerWrong(); }
    boxLayer.removeChild(box.container);
    letterBoxes.splice(idx, 1);
  }
}

// ── Math Quiz ─────────────────────────────────────────────────────────────────
let mathTimerRaf = null;
function showMathQuiz() {
  if (!gameRunning) return;
  mathQuizActive = true;
  const q = genMathQuestion();
  const allAnswers = genWrongOptions(q.answer, 3);
  document.getElementById('math-question').textContent = q.text;
  const choicesEl = document.getElementById('math-choices');
  choicesEl.innerHTML = '';
  allAnswers.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'math-btn'; btn.textContent = opt;
    btn.onclick = () => answerMath(opt === q.answer, btn);
    choicesEl.appendChild(btn);
  });
  document.getElementById('math-quiz').classList.add('show');

  // Timer bar
  const fill = document.getElementById('math-timer-fill');
  fill.style.transition = 'none'; fill.style.width = '100%';
  requestAnimationFrame(() => {
    fill.style.transition = 'width 8s linear';
    requestAnimationFrame(() => { fill.style.width = '0%'; });
  });

  // Auto-fail after 8s
  let timedOut = false;
  mathTimerRaf = setTimeout(() => {
    if (mathQuizActive) { timedOut = true; answerMath(false, null, true); }
  }, 8000);
}

function answerMath(correct, btnEl, timeout = false) {
  if (!mathQuizActive) return;
  clearTimeout(mathTimerRaf);
  mathQuizActive = false;
  document.getElementById('math-quiz').classList.remove('show');

  if (correct) {
    mathCorrect++;
    spawnCollectParticles(W / 2, H / 2, 0x4ade80);
    flashScreen('green');
  } else if (!timeout) {
    triggerWrong();
  } else {
    flashScreen('red');
    lives--; if (lives < 0) lives = 0;
    updateLivesHUD();
    if (lives <= 0) { setTimeout(showLose, 600); return; }
  }
}

// ── Rainbow effect ────────────────────────────────────────────────────────────
function spawnRainbow() {
  if (rainbow) { bgLayer.removeChild(rainbow); rainbow = null; }
  const rb = new PIXI.Graphics();
  const colors = [0xff6b6b, 0xffa500, 0xffd700, 0x4ade80, 0x38bdf8, 0x818cf8, 0xf472b6];
  const cx = W * 0.5, cy = H * 0.85;
  for (let i = 0; i < colors.length; i++) {
    const r = 180 + i * 22;
    rb.arc(cx, cy, r, Math.PI, 0, false).stroke({ width: 16, color: colors[i], alpha: 0.55 });
  }
  rb.alpha = 0.7;
  bgLayer.addChild(rb);
  rainbow = rb;
}

// ── Word Complete / Game Logic ─────────────────────────────────────────────────
function onWordComplete() {
  document.querySelectorAll('.slot').forEach(s => { s.classList.remove('filled'); s.classList.add('done'); });
  trainContainer._bounceT = Math.PI;
  spawnRainbow();
  spawnCollectParticles(TRAIN_X, trainContainer.y, 0xfbbf24);
  flashScreen('green');
  gameSpeed = Math.min(gameSpeed * 1.12, 8);
  currentWordIdx++;
  if (currentWordIdx >= WORDS_LIST.length) { setTimeout(showWin, 700); return; }
  currentLetterIdx = 0;
  setTimeout(refreshHUD, 500);
}

function triggerWrong() {
  if (invincible) return;
  invincible = true;
  lives--; if (lives < 0) lives = 0;
  updateLivesHUD();
  document.body.classList.add('shaking');
  setTimeout(() => document.body.classList.remove('shaking'), 320);
  flashScreen('red');
  if (lives <= 0) { setTimeout(showLose, 600); return; }
  setTimeout(() => { invincible = false; }, 900);
}

function flashScreen(type) {
  const flash = document.getElementById('flash');
  flash.style.background = type === 'green' ? 'rgba(74,222,128,0.28)' : 'rgba(239,68,68,0.38)';
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 200);
}

// ── Particles ─────────────────────────────────────────────────────────────────
function spawnCollectParticles(x, y, mainColor) {
  const colors = [mainColor, 0xfbbf24, 0x38bdf8, 0xf472b6, 0xc084fc, 0x4ade80];
  for (let i = 0; i < 16; i++) {
    const p = new PIXI.Graphics();
    const r = 3 + Math.random() * 3.5;
    p.circle(0, 0, r).fill({ color: colors[i % colors.length] });
    p.x = x; p.y = y;
    const angle = (Math.PI * 2 * i) / 16 + Math.random() * 0.5;
    const spd = 2.5 + Math.random() * 4;
    p._vx = Math.cos(angle) * spd; p._vy = Math.sin(angle) * spd - 1.5;
    p.alpha = 1;
    particleLayer.addChild(p);
    const tick = app.ticker.add((t) => {
      p.x += p._vx * t.deltaTime; p.y += p._vy * t.deltaTime;
      p._vy += 0.18 * t.deltaTime;
      p.alpha -= 0.035 * t.deltaTime;
      if (p.alpha <= 0) { particleLayer.removeChild(p); app.ticker.remove(tick); }
    });
  }
}

// ── HUD ────────────────────────────────────────────────────────────────────────
function updateLivesHUD() {
  const el = document.getElementById('lives-hud');
  el.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) {
    const s = document.createElement('span');
    s.className = 'life-heart' + (i >= lives ? ' lost' : '');
    s.textContent = '❤️';
    el.appendChild(s);
  }
}

function refreshHUD() {
  const word = WORDS_LIST[currentWordIdx]; if (!word) return;
  document.getElementById('word-emoji').textContent = word.emoji;
  const slotsEl = document.getElementById('word-slots');
  slotsEl.innerHTML = '';
  for (let i = 0; i < word.word.length; i++) {
    const s = document.createElement('span');
    s.className = 'slot' + (i < currentLetterIdx ? ' filled' : '');
    s.textContent = i < currentLetterIdx ? word.word[i] : '_';
    slotsEl.appendChild(s);
  }
  document.getElementById('next-char').textContent = word.word[currentLetterIdx] || '✓';
}

function updateLaneDots() {
  for (let i = 0; i < 3; i++) {
    const d = document.getElementById('ld' + i);
    if (d) d.classList.toggle('active', i === playerLane);
  }
}

// ── Controls ───────────────────────────────────────────────────────────────────
function switchLane(dir) {
  if (!gameRunning || mathQuizActive) return;
  const n = Math.max(0, Math.min(2, playerLane + dir));
  if (n === playerLane) return;
  playerLane = n; updateLaneDots();
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') switchLane(-1);
  if (e.key === 'ArrowDown') switchLane(1);
});
document.getElementById('pixi-canvas').addEventListener('click', e => {
  if (!gameRunning || mathQuizActive) return;
  const y = e.clientY;
  for (let i = 0; i < 3; i++) {
    if (Math.abs(y - LANE_Y[i]) < 55) { playerLane = i; updateLaneDots(); return; }
  }
});

// ── Win / Lose ─────────────────────────────────────────────────────────────────
function showWin() {
  gameRunning = false;
  const elapsed = (Date.now() - startTime) / 1000;
  const timeBonus = elapsed < WORDS_LIST.length * 15;
  let s = 3;
  if (wrongTaps === 0) s = Math.min(5, s + 1);
  if (timeBonus) s = Math.min(5, s + 1);
  if (mathCorrect >= 2) s = Math.min(5, s + 1);
  sessionStorage.setItem('g15Result', JSON.stringify({ stars: Math.min(5, s) }));
  document.getElementById('end-emoji').textContent = '🏆';
  document.getElementById('end-title').textContent = 'Hore! Berhasil!';
  document.getElementById('end-msg').textContent =
    wrongTaps === 0
      ? `Sempurna! Tidak ada kesalahan! Soal Matematika Benar: ${mathCorrect} 🎉`
      : `${wrongTaps} kesalahan. Matematika benar: ${mathCorrect}. Terus berlatih!`;
  document.getElementById('end-stars').textContent = '⭐'.repeat(s) + '☆'.repeat(5 - s);
  document.getElementById('end-ovl').classList.add('show');
}

function showLose() {
  gameRunning = false;
  sessionStorage.setItem('g15Result', JSON.stringify({ stars: 1 }));
  document.getElementById('end-emoji').textContent = '💔';
  document.getElementById('end-title').textContent = 'Habis Nyawa!';
  document.getElementById('end-msg').textContent = 'Jangan menyerah, coba lagi!';
  document.getElementById('end-stars').textContent = '⭐☆☆☆☆';
  document.getElementById('end-ovl').classList.add('show');
}

function restartGame() {
  document.getElementById('end-ovl').classList.remove('show');
  document.getElementById('math-quiz').classList.remove('show');
  clearTimeout(mathTimerRaf);

  playerLane = 1; currentWordIdx = 0; currentLetterIdx = 0;

  bgClouds = []; bgFireflies = []; rainbow = null; LANE_Y = [];
  mathBoxTimer = 0; heartBoxTimer = 0; totalBoxSpawned = 0;

}

// ── Utils ──────────────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Train Select Screen ──────────────────────────────────────────────────────
function showTrainSelect() {
  const station = getCurrentStation();
  document.getElementById('si-icon').textContent = station.icon;
  document.getElementById('si-name').textContent = station.name;
  document.getElementById('si-landmark').textContent = station.landmark;
  document.getElementById('train-select').style.display = 'flex';
  document.getElementById('station-chip').style.display = 'none';
  buildTrainGrid();
}

function buildTrainGrid() {
  const grid = document.getElementById('train-grid');
  grid.innerHTML = '';
  TRAIN_CATALOG.forEach(entry => {
    const card = document.createElement('div');
    card.className = 'tcard';
    const canvas = document.createElement('canvas');
    canvas.width = 120; canvas.height = 48;
    const name = document.createElement('div');
    name.className = 'tname';
    name.textContent = entry.name;
    card.appendChild(canvas);
    card.appendChild(name);
    if (selectedTrain && selectedTrain.id === entry.id) {
      card.style.borderColor = '#a78bfa';
      card.style.background = 'rgba(139,92,246,0.25)';
    }
    grid.appendChild(card);
    // Draw after append so a throw doesn't prevent card from showing
    try {
      drawTrainPreview2d(canvas, entry);
    } catch(e) {
      // Fallback: solid color rect
      try {
        const ctx = canvas.getContext('2d');
        if (ctx) {
          ctx.fillStyle = '#' + entry.b.toString(16).padStart(6, '0');
          ctx.fillRect(0, 0, 120, 48);
        }
      } catch(_) {}
    }
    card.addEventListener('click', () => {
      selectedTrain = entry;
      document.getElementById('train-select').style.display = 'none';
      initPixi().catch(e => console.error('g15 pixi init error:', e));
    });
  });
}

function _hex(n) {
  return `rgb(${(n>>16)&0xff},${(n>>8)&0xff},${n&0xff})`;
}

function drawTrainPreview2d(canvas, c) {
  const ctx = canvas.getContext('2d');
  const CW = canvas.width, CH = canvas.height;
  ctx.clearRect(0, 0, CW, CH);
  const type = c.type, sub = c.sub;
  const B=_hex(c.b),R=_hex(c.r),S=_hex(c.s),W=_hex(c.w),K=_hex(c.k);
  const V=c.v||1; const vi=V-1;

  // ── Track (all types) ───────────────────────────────────────────────────
  ctx.fillStyle='#3b2a14'; ctx.fillRect(0,CH-7,CW,7);
  for(let i=0;i<CW;i+=10){ctx.fillStyle='#5a3a1a';ctx.fillRect(i,CH-6,7,5);}
  ctx.fillStyle='#999'; ctx.fillRect(0,CH-7,CW,2);
  ctx.fillStyle='#999'; ctx.fillRect(0,CH-4,CW,2);
  const tY=CH-7; // top of track

  // ── Helper: draw spoked wheel ────────────────────────────────────────────
  function wheel(cx,cy,r,rimC,spokeC,hubC,spokes){
    ctx.fillStyle=rimC; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=spokeC; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
    const n=spokes||6;
    for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*(r-1),cy+Math.sin(a)*(r-1));ctx.stroke();}
    ctx.fillStyle=hubC; ctx.beginPath(); ctx.arc(cx,cy,2.2,0,Math.PI*2); ctx.fill();
  }
  function bogie(cx,cy,rimC,spokeC){
    ctx.fillStyle='#555'; ctx.fillRect(cx-14,cy-3,28,5);
    ctx.beginPath(); ctx.arc(cx-9,cy+1,5,0,Math.PI*2); ctx.fillStyle=rimC; ctx.fill();
    ctx.beginPath(); ctx.arc(cx+9,cy+1,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=spokeC; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx-9,cy+1,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+9,cy+1,5,0,Math.PI*2); ctx.stroke();
  }
  function pantoV(cx,roofY,w,col){
    ctx.strokeStyle=col||'#ccc'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx-w/2,roofY+1); ctx.lineTo(cx,roofY-9); ctx.lineTo(cx+w/2,roofY+1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-w/4,roofY-4); ctx.lineTo(cx+w/4,roofY-4); ctx.stroke();
    ctx.fillStyle=col||'#ccc'; ctx.fillRect(cx-w/2-1,roofY,3,5); ctx.fillRect(cx+w/2-1,roofY,3,5);
  }
  function catWire(col){
    ctx.strokeStyle=col||'rgba(180,180,180,0.6)'; ctx.lineWidth=1;
    ctx.setLineDash([4,3]); ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(CW,4); ctx.stroke(); ctx.setLineDash([]);
  }

  // ══════════════════════════════════════════════════════════════════════════
  // STEAM variants
  // ══════════════════════════════════════════════════════════════════════════
  if(type==='steam'){
    const wY=tY;

    if(sub==='classic'){
      // v1:3-wheel single chimney, v2:4-wheel, v3:tall chimney, v4:double chimney, v5:4-wheel compact
      const wX=[[40,60,80],[34,52,70,88],[40,60,80],[38,58,78],[36,56,76,96]][vi];
      const chH=[11,9,16,11,8][vi];
      const chX=[26,22,26,24,26][vi];
      const hasPilot=[true,false,true,true,false][vi];
      const dblChimney=(V===4);
      ctx.fillStyle=B; ctx.fillRect(22,10,75,18);
      ctx.beginPath(); ctx.ellipse(22,19,5,9,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(97,19,5,9,0,0,Math.PI*2); ctx.fill();
      wX.slice(1,-1).forEach(x=>{ ctx.fillStyle=S; ctx.fillRect(x,10,2,18); });
      ctx.fillStyle=R; ctx.fillRect(97,5,21,23);
      ctx.fillStyle=W; ctx.fillRect(100,8,8,8);
      ctx.fillStyle='#111';
      ctx.fillRect(chX,0,8,chH); ctx.fillRect(chX-3,0,14,4);
      if(dblChimney){ ctx.fillRect(chX+9,0,8,chH); ctx.fillRect(chX+6,0,14,4); }
      ctx.fillStyle=S; ctx.beginPath(); ctx.arc(80,10,5,Math.PI,0); ctx.fill();
      if(V!==2&&V!==5){ ctx.beginPath(); ctx.arc(62,10,4,Math.PI,0); ctx.fill(); }
      wX.forEach(x=>wheel(x,wY,8,K,S,R,6));
      if(hasPilot) wheel(22,wY+2,5,K,S,R,4);
      ctx.strokeStyle=R; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(wX[0],wY); ctx.lineTo(wX[wX.length-1],wY); ctx.stroke();
      ctx.fillStyle='rgba(210,220,255,0.5)';
      ctx.beginPath(); ctx.arc(29,0,5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(35,-3,4,0,Math.PI*2); ctx.fill();

    } else if(sub==='pacific'){
      // v1:drives[38,60,82] pilot=17 trailer=105, deflectors w=7
      // v2:drives[32,50,68,86] pilot=15 trailer=108, deflectors w=5
      // v3:drives[40,62,84] pilot=18, NO deflectors
      // v4:drives[36,58,80] pilot=16 trailer=106, WIDE deflectors w=10, double chimney
      // v5:drives[44,66] pilot=20, deflectors w=6 (only 2 drive wheels)
      const driveX=[[38,60,82],[32,50,68,86],[40,62,84],[36,58,80],[44,66]][vi];
      const pilotX=[17,15,18,16,20][vi];
      const trailerX=[105,108,0,106,0][vi];
      const defW=[7,5,0,10,6][vi];
      const dblCh=(V===4);
      ctx.fillStyle=B; ctx.fillRect(16,11,88,16);
      ctx.beginPath(); ctx.ellipse(16,19,5,8,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(104,19,5,8,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=S; driveX.forEach(x=>ctx.fillRect(x,11,2,16));
      ctx.fillStyle=R; ctx.fillRect(104,6,14,22);
      ctx.fillStyle=W; ctx.fillRect(106,9,8,7);
      ctx.fillStyle='#1a1a1a'; ctx.fillRect(20,2,7,10); ctx.fillRect(17,2,13,4);
      if(dblCh){ ctx.fillStyle='#1a1a1a'; ctx.fillRect(29,2,7,10); ctx.fillRect(26,2,13,4); }
      ctx.fillStyle=S; ctx.beginPath(); ctx.arc(88,11,5,Math.PI,0); ctx.fill();
      if(defW>0){
        ctx.fillStyle=R; ctx.fillRect(14,4,defW,15); ctx.fillRect(28,4,defW,15);
      }
      driveX.forEach(x=>wheel(x,wY,9,K,S,R,6));
      wheel(pilotX,wY+3,5,K,S,R,4);
      if(trailerX>0) wheel(trailerX,wY+3,5,K,S,R,4);
      ctx.strokeStyle=R; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(driveX[0],wY); ctx.lineTo(driveX[driveX.length-1],wY); ctx.stroke();
      ctx.fillStyle='rgba(200,215,255,0.55)';
      ctx.beginPath(); ctx.arc(25,-1,6,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(32,2,4,0,Math.PI*2); ctx.fill();

    } else if(sub==='mountain'){
      // v1:drives[42,68] r=10, v2:drives[36,60,84] r=9, v3:drives[40,66] r=11
      // v4:drives[38,62,86] r=9 + extra trailer, v5:drives[42,68] r=10 + double chimney
      const driveX=[[42,68],[36,60,84],[40,66],[38,62,86],[42,68]][vi];
      const dR=[10,9,11,9,10][vi];
      const cabW=[26,26,24,28,26][vi];
      const dblCh=(V===5);
      ctx.fillStyle=B; ctx.fillRect(22,12,70,16);
      ctx.beginPath(); ctx.ellipse(22,20,5,8,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=R; ctx.fillRect(92,4,cabW,24);
      ctx.fillStyle=W; ctx.fillRect(95,7,10,9); ctx.fillRect(107,7,8,9);
      ctx.fillStyle='#111'; ctx.fillRect(24,0,11,13); ctx.fillRect(20,0,19,5);
      if(dblCh){ ctx.fillStyle='#111'; ctx.fillRect(36,0,11,13); ctx.fillRect(32,0,19,5); }
      ctx.fillStyle=S; ctx.beginPath(); ctx.arc(72,12,5,Math.PI,0); ctx.fill();
      driveX.forEach(x=>wheel(x,wY,dR,K,S,R,8));
      wheel(20,wY+3,5,K,S,R,4);
      if(V===4) wheel(98,wY+3,6,K,S,R,4);
      else wheel(95,wY+3,6,K,S,R,4);
      ctx.strokeStyle=S; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(driveX[0],wY); ctx.lineTo(driveX[driveX.length-1],wY); ctx.stroke();
      ctx.fillStyle='rgba(215,215,255,0.6)';
      for(let i=0;i<3;i++) ctx.beginPath(),ctx.arc(28-i*3,-i*4,4+i,0,Math.PI*2),ctx.fill();

    } else if(sub==='tank'){
      // v1:drives[32,55,78] standard, v2:drives[28,46,64,82] narrower tanks
      // v3:drives[32,55,78] EXTENDED tanks, v4:drives[24,38,52,66,80] 5 small wheels r=5
      // v5:drives[32,55,78] + pilot wheel x=14
      const driveX=[[32,55,78],[28,46,64,82],[32,55,78],[24,38,52,66,80],[32,55,78]][vi];
      const dR=[7,7,7,5,7][vi];
      const tankExt=(V===3);
      const hasPilot=(V===5);
      const tankL=tankExt?36:30;
      ctx.fillStyle=B; ctx.fillRect(10,12,84,16);
      ctx.beginPath(); ctx.ellipse(10,20,5,8,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(94,20,5,8,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=R;
      ctx.fillRect(10,10,tankL,6); ctx.fillRect(10,26,tankL,5);
      ctx.fillRect(94-tankL+30,10,tankL,6); ctx.fillRect(94-tankL+30,26,tankL,5);
      ctx.fillStyle=R; ctx.fillRect(94,8,22,22);
      ctx.fillStyle=W; ctx.fillRect(97,11,8,8);
      ctx.fillStyle='#111'; ctx.fillRect(14,4,7,9); ctx.fillRect(11,4,13,4);
      ctx.fillStyle=S; ctx.beginPath(); ctx.arc(50,12,5,Math.PI,0); ctx.fill();
      driveX.forEach(x=>wheel(x,wY,dR,K,S,R,6));
      if(hasPilot) wheel(14,wY+2,4,K,S,R,4);
      ctx.strokeStyle=R; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(driveX[0],wY); ctx.lineTo(driveX[driveX.length-1],wY); ctx.stroke();

    } else { // prairie
      // v1:drives[34,56] pilot=16 bodyEnd=78
      // v2:drives[30,52,74] pilot=14 bodyEnd=96 (longer + 3 wheels)
      // v3:drives[36,56] pilot=18 bodyEnd=74 (shorter)
      // v4:drives[34,58] pilot=16 bodyEnd=82 (medium-longer)
      // v5:drives[28,50,72] NO pilot bodyEnd=94
      const driveX=[[34,56],[30,52,74],[36,56],[34,58],[28,50,72]][vi];
      const pilotX=[16,14,18,16,0][vi];
      const bodyEnd=[78,96,74,82,94][vi];
      const bodyW=bodyEnd-18;
      ctx.fillStyle=B; ctx.fillRect(18,14,bodyW,14);
      ctx.beginPath(); ctx.ellipse(18,21,4,7,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(18+bodyW,21,4,7,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=R; ctx.fillRect(18+bodyW,10,22,18);
      ctx.fillStyle=W; ctx.fillRect(18+bodyW+3,13,7,7);
      ctx.fillStyle='#111'; ctx.fillRect(21,6,6,9); ctx.fillRect(18,6,12,4);
      ctx.fillStyle=S; ctx.beginPath(); ctx.arc(18+bodyW-20,14,4,Math.PI,0); ctx.fill();
      driveX.forEach(x=>wheel(x,wY,6,K,S,R,5));
      if(pilotX>0) wheel(pilotX,wY+3,4,K,S,R,4);
      ctx.strokeStyle=R; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(driveX[0],wY); ctx.lineTo(driveX[driveX.length-1],wY); ctx.stroke();
      ctx.fillStyle='rgba(220,225,255,0.55)';
      ctx.beginPath(); ctx.arc(25,2,4,0,Math.PI*2); ctx.fill();
    }

  // ══════════════════════════════════════════════════════════════════════════
  // DIESEL variants
  // ══════════════════════════════════════════════════════════════════════════
  } else if(type==='diesel'){

    if(sub==='hood'){
      // v1:stacks[30,46] 3 windows, v2:stacks[22,38,54] 4 windows, v3:stack[38] single 3 windows
      // v4:stacks[24,40,56] wide cab 3 windows, v5:stacks[34,50] narrow 2 windows only
      const stacks=[[30,46],[22,38,54],[38],[24,40,56],[34,50]][vi];
      const winX=[[78,92,106],[74,88,102,116],[80,96,112],[76,92,108],[82,96]][vi];
      ctx.fillStyle=B; ctx.fillRect(0,12,74,18);
      ctx.fillStyle=S; ctx.fillRect(0,12,5,18); ctx.fillRect(10,12,5,18); ctx.fillRect(20,12,5,18);
      ctx.fillStyle=R; ctx.fillRect(74,8,44,22);
      ctx.fillStyle=W; winX.forEach(x=>ctx.fillRect(x,11,10,9));
      ctx.fillStyle='#555';
      stacks.forEach(x=>{ ctx.fillRect(x,4,6,9); });
      ctx.fillStyle='#333';
      stacks.forEach(x=>{ ctx.fillRect(x-1,2,8,4); });
      ctx.fillStyle=B; ctx.fillRect(0,10,4,4); ctx.fillRect(116,10,4,4);
      bogie(22,tY-1,K,S); bogie(88,tY-1,K,S);

    } else if(sub==='boxcab'){
      // v1:hump x=40 w=40 h=5, v2:hump x=48 w=24 h=5 (narrow)
      // v3:hump x=40 w=40 h=3 + wide cabs (cabW=26), v4:hump x=38 w=44 h=8 tall + extra exhaust
      // v5:left cab taller (h+4) than right (asymmetric)
      const humpX=[40,48,40,38,40][vi];
      const humpW=[40,24,40,44,40][vi];
      const humpH=[5,5,3,8,5][vi];
      const cabW=(V===3)?26:22;
      const leftH=(V===5)?26:22;
      ctx.fillStyle=R; ctx.fillRect(0,8,cabW,leftH);
      ctx.fillStyle=R; ctx.fillRect(120-cabW,8,cabW,22);
      ctx.fillStyle=B; ctx.fillRect(cabW,12,120-2*cabW,18);
      ctx.fillStyle=B; ctx.fillRect(humpX,8-humpH+5,humpW,humpH);
      ctx.fillStyle=W; ctx.fillRect(4,12,cabW-8,8);
      ctx.fillStyle=W; ctx.fillRect(120-cabW+4,12,cabW-8,8);
      ctx.fillStyle='#555'; ctx.fillRect(50,3,5,8); ctx.fillRect(65,3,5,8);
      if(V===4){ ctx.fillStyle='#555'; ctx.fillRect(72,3,5,8); ctx.fillRect(80,3,5,8); }
      ctx.fillStyle=S; ctx.fillRect(cabW,18,120-2*cabW,3); ctx.fillRect(cabW,27,120-2*cabW,3);
      bogie(28,tY-1,K,S); bogie(92,tY-1,K,S);

    } else if(sub==='streamline'){
      // v1:nose quadratic std 4 windows, v2:straight angled longer 4 windows
      // v3:shorter curve 5 windows, v4:double stripe 4 windows, v5:different curve + skirt stripe 5 windows
      const winX=[[40,58,76,94],[44,62,80,98],[32,48,64,80,96],[40,58,76,94],[34,50,66,82,98]][vi];
      const noseType=[1,2,3,1,4][vi];
      ctx.fillStyle=B;
      if(noseType===1){
        ctx.beginPath(); ctx.moveTo(0,28); ctx.quadraticCurveTo(12,28,18,14); ctx.lineTo(18,10); ctx.lineTo(116,10); ctx.lineTo(116,28); ctx.closePath(); ctx.fill();
      } else if(noseType===2){
        ctx.beginPath(); ctx.moveTo(0,28); ctx.lineTo(22,10); ctx.lineTo(116,10); ctx.lineTo(116,28); ctx.closePath(); ctx.fill();
      } else if(noseType===3){
        ctx.beginPath(); ctx.moveTo(0,28); ctx.quadraticCurveTo(10,28,14,14); ctx.lineTo(14,10); ctx.lineTo(116,10); ctx.lineTo(116,28); ctx.closePath(); ctx.fill();
      } else {
        ctx.beginPath(); ctx.moveTo(0,28); ctx.quadraticCurveTo(14,28,20,12); ctx.lineTo(20,10); ctx.lineTo(116,10); ctx.lineTo(116,28); ctx.closePath(); ctx.fill();
      }
      ctx.fillStyle=S;
      ctx.beginPath(); ctx.moveTo(5,22); ctx.quadraticCurveTo(20,22,24,14); ctx.lineTo(116,14); ctx.lineTo(116,18); ctx.lineTo(24,18); ctx.quadraticCurveTo(22,26,5,26); ctx.closePath(); ctx.fill();
      if(V===4||V===5){
        ctx.fillStyle=S; ctx.fillRect(24,20,92,3); // second stripe
      }
      if(V===5){
        ctx.fillStyle=S; ctx.fillRect(24,24,92,2); // skirt stripe
      }
      ctx.fillStyle=W; winX.forEach(x=>ctx.fillRect(x,12,12,8));
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(4,20,4,0,Math.PI*2); ctx.fill();
      bogie(26,tY-1,K,S); bogie(90,tY-1,K,S);

    } else if(sub==='shunter'){
      // v1:body x=10 w=65, v2:body x=14 w=55 shorter no footstep
      // v3:body x=8 w=70 longer LARGE buffers, v4:body x=6 w=80 longest 2 bogies
      // v5:cab offset right (asymmetric), body x=12 w=62
      const bX=[10,14,8,6,12][vi];
      const bW=[65,55,70,80,62][vi];
      const hasFootstep=(V!==2);
      ctx.fillStyle=B; ctx.fillRect(bX,10,bW,20);
      ctx.fillStyle=R; ctx.fillRect(bX,8,bW,5);
      if(V===5){
        // asymmetric: cab shifted right
        ctx.fillStyle=W; ctx.fillRect(bX+bW-34,14,10,9); ctx.fillRect(bX+bW-20,14,10,9);
      } else {
        ctx.fillStyle=W; ctx.fillRect(bX+10,14,10,9); ctx.fillRect(bX+28,14,10,9); ctx.fillRect(bX+46,14,10,9);
      }
      if(hasFootstep){
        ctx.fillStyle='#555'; ctx.fillRect(bX-6,25,8,5); ctx.fillRect(bX+bW-2,25,8,5);
        ctx.fillStyle='#777'; ctx.fillRect(bX-6,28,8,2); ctx.fillRect(bX+bW-2,28,8,2);
      }
      ctx.fillStyle='#333'; ctx.fillRect(bX+20,2,8,9); ctx.fillRect(bX+18,2,12,4);
      const bufW=(V===3)?10:8;
      ctx.fillStyle=S; ctx.fillRect(bX-bufW,18,bufW,8); ctx.fillRect(bX+bW,18,bufW,8);
      if(V===4){ bogie(bX+20,tY-1,K,S); bogie(bX+55,tY-1,K,S); }
      else bogie(bX+bW/2,tY-1,K,S);

    } else { // railbus
      // v1:6 windows[12,28,44,60,76,92], v2:7 windows[10,24,38,52,66,80,94] wider
      // v3:5 windows[16,34,52,70,88] rounder ends, v4:6 windows face with accent band
      // v5:7 windows destination board + double stripe
      const winX=[[12,28,44,60,76,92],[10,24,38,52,66,80,94],[16,34,52,70,88],[12,28,44,60,76,92],[10,24,38,52,66,80,94]][vi];
      ctx.fillStyle=B; ctx.fillRect(4,6,112,24);
      ctx.fillStyle=R; ctx.fillRect(4,6,112,5);
      ctx.fillStyle=R; ctx.fillRect(4,27,112,3);
      if(V===5){ ctx.fillStyle=S; ctx.fillRect(4,20,112,2); } // double stripe
      ctx.fillStyle=W; winX.forEach(x=>ctx.fillRect(x,9,12,12));
      if(V===3){
        // Rounder ends
        ctx.fillStyle=B;
        ctx.beginPath(); ctx.arc(10,18,6,Math.PI*0.5,Math.PI*1.5); ctx.fill();
        ctx.beginPath(); ctx.arc(110,18,6,-Math.PI*0.5,Math.PI*0.5); ctx.fill();
      }
      ctx.fillStyle=R; ctx.fillRect(0,6,6,24);
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(3,14,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(3,22,3,0,Math.PI*2); ctx.fill();
      if(V===4){
        ctx.fillStyle=S; ctx.fillRect(8,7,30,5); // accent band
      }
      if(V===1||V===5){
        ctx.fillStyle='#001133'; ctx.fillRect(8,7,30,5);
        ctx.fillStyle='#ffffff'; ctx.font='4px sans-serif'; ctx.fillText('KERETA',9,11);
      }
      bogie(28,tY-1,K,S); bogie(90,tY-1,K,S);
    }

  // ══════════════════════════════════════════════════════════════════════════
  // HIGHSPEED / MAGLEV
  // ══════════════════════════════════════════════════════════════════════════
  } else if(type==='highspeed'){

    if(sub==='maglev'){
      // v1:visor h=7 y=15, v2:visor h=10 y=13 (wide), v3:visor h=5 y=17 (narrow)
      // v4:visor h=8 y=14 (flat rect), v5:visor h=14 y=10 (full face dark)
      const visH=[7,10,5,8,14][vi];
      const visY=[15,13,17,14,10][vi];
      const noseX=[14,14,12,16,10][vi];
      ctx.fillStyle='rgba(56,189,248,0.2)'; ctx.fillRect(10,tY-6,100,6);
      ctx.fillStyle='rgba(56,189,248,0.5)'; ctx.fillRect(10,tY-4,100,2);
      ctx.fillStyle=B;
      ctx.beginPath(); ctx.moveTo(0,22); ctx.lineTo(noseX,10); ctx.lineTo(106,10); ctx.quadraticCurveTo(120,10,120,20); ctx.lineTo(120,30); ctx.lineTo(0,30); ctx.closePath(); ctx.fill();
      ctx.fillStyle=S; ctx.fillRect(noseX,13,106-noseX+10,4);
      ctx.fillStyle=W; [22,40,60,80,98].forEach(x=>ctx.fillRect(x,15,14,8));
      // Visor
      ctx.fillStyle='#0a1a3a'; ctx.fillRect(0,visY,noseX+2,visH);
      ctx.fillStyle='#38bdf8'; ctx.beginPath(); ctx.arc(4,20,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#e0f2fe'; ctx.beginPath(); ctx.arc(4,20,2,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(56,189,248,0.8)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(8,tY-3); ctx.lineTo(112,tY-3); ctx.stroke();

    } else { // bullet
      // v1:nose y=24 x=22 body H=16 5 windows, v2:nose y=26 x=16 steep H=16 4 windows
      // v3:nose y=22 x=28 shallow H=18 5 windows, v4:nose y=24 x=20 H=20 fat 4 windows
      // v5:nose y=22 x=30 shallow H=14 thin 5 windows
      const noseStartY=[24,26,22,24,22][vi];
      const noseEndX=[22,16,28,20,30][vi];
      const bodyH=[16,16,18,20,14][vi];
      const bodyTop=28-bodyH;
      const winX=[[30,50,70,90,108],[32,52,74,96],[28,46,64,82,100],[32,54,76,98],[28,46,64,82,100]][vi];
      ctx.fillStyle=B;
      ctx.beginPath(); ctx.moveTo(0,noseStartY); ctx.lineTo(noseEndX,bodyTop); ctx.lineTo(114,bodyTop); ctx.lineTo(118,bodyTop+6); ctx.lineTo(118,28); ctx.lineTo(0,28); ctx.closePath(); ctx.fill();
      ctx.fillStyle=S; ctx.fillRect(noseEndX,bodyTop+2,118-noseEndX,4);
      ctx.fillStyle=W; winX.forEach(x=>ctx.fillRect(x,bodyTop+3,12,7));
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(2,noseStartY-2,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#888'; ctx.fillRect(104,bodyTop-2,2,3); ctx.fillRect(112,bodyTop-2,2,3); ctx.fillRect(104,bodyTop-2,10,2);
      bogie(28,tY-1,K,S); bogie(95,tY-1,K,S);
    }

  // ══════════════════════════════════════════════════════════════════════════
  // ELECTRIC variants
  // ══════════════════════════════════════════════════════════════════════════
  } else if(type==='electric'){
    catWire(S);

    if(sub==='krl'){
      // v1:5 windows[18,36,56,76,96] panto x=62, v2:4 windows[20,40,62,84] panto x=40
      // v3:5 windows[18,36,56,76,96] panto x=84, v4:6 windows[14,28,44,60,76,92] TWO pantos
      // v5:5 windows panto x=62 DOUBLE stripe
      const winX=[[18,36,56,76,96],[20,40,62,84],[18,36,56,76,96],[14,28,44,60,76,92],[18,36,56,76,96]][vi];
      const pantoX=[62,40,84,40,62][vi];
      const dblStripe=(V===5);
      ctx.fillStyle=B; ctx.fillRect(2,12,116,20);
      ctx.fillStyle=R; ctx.fillRect(2,12,116,5);
      if(dblStripe){ ctx.fillStyle=S; ctx.fillRect(2,29,116,3); }
      ctx.fillStyle='#111'; ctx.fillRect(2,12,4,20);
      ctx.fillStyle='#0a0a2a'; ctx.fillRect(6,14,8,10);
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(4,15,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(4,25,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=W; winX.forEach(x=>ctx.fillRect(x,15,16,10));
      pantoV(pantoX,12,20,S);
      if(V===4) pantoV(84,12,20,S);
      bogie(28,tY-1,K,S); bogie(90,tY-1,K,S);

    } else if(sub==='mrt'){
      // v1:arc r=10 2 stripes (top+bottom), v2:arc r=14 1 thick stripe center
      // v3:arc r=7 3 thin stripes, v4:arc r=10 1 stripe only top, v5:arc r=14 2 stripes + nose accent
      const arcR=[10,14,7,10,14][vi];
      ctx.fillStyle=B; ctx.fillRect(8,10,108,22);
      ctx.beginPath(); ctx.arc(8+arcR,21,arcR,Math.PI*0.5,Math.PI*1.5); ctx.fillStyle=B; ctx.fill();
      ctx.fillStyle=S; ctx.fillRect(8,13,108,4); // top stripe always
      if(V===1||V===5){ ctx.fillStyle=S; ctx.fillRect(8,27,108,3); } // bottom stripe
      if(V===2){ ctx.fillStyle=S; ctx.fillRect(8,19,108,6); } // thick center
      if(V===3){ ctx.fillStyle=S; ctx.fillRect(8,16,108,2); ctx.fillRect(8,20,108,2); ctx.fillRect(8,24,108,2); } // 3 thin
      if(V===5){ ctx.fillStyle=S; ctx.beginPath(); ctx.arc(8+arcR,21,arcR-2,Math.PI*0.5,Math.PI*1.5); ctx.stroke(); } // nose accent
      ctx.fillStyle='#0a1a3a'; ctx.fillRect(2,15,12,12);
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(6,18,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(6,26,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=W; [24,46,68,90].forEach(x=>ctx.fillRect(x,15,16,12));
      pantoV(76,10,22,S);
      bogie(26,tY-1,K,S); bogie(90,tY-1,K,S);

    } else { // lrt
      // v1:flat roof 5 windows[18,38,58,78,98], v2:angled roof 4 windows[20,42,64,86]
      // v3:flat 5 windows + extra stripe mid, v4:curved ends 6 windows[14,28,44,60,76,92]
      // v5:arched roof 5 windows
      const winX=[[18,38,58,78,98],[20,42,64,86],[18,38,58,78,98],[14,28,44,60,76,92],[18,38,58,78,98]][vi];
      ctx.fillStyle=B; ctx.fillRect(6,10,108,20);
      if(V===2){
        // Angled roof (sloped 3px)
        ctx.fillStyle=R;
        ctx.beginPath(); ctx.moveTo(6,10); ctx.lineTo(114,13); ctx.lineTo(114,10); ctx.lineTo(6,10); ctx.closePath(); ctx.fill();
      } else if(V===5){
        // Arched roof
        ctx.fillStyle=R;
        ctx.beginPath(); ctx.moveTo(6,10); ctx.quadraticCurveTo(60,4,114,10); ctx.lineTo(114,10); ctx.lineTo(6,10); ctx.closePath(); ctx.fill();
      } else {
        ctx.fillStyle=R; ctx.fillRect(6,10,108,4);
      }
      ctx.fillStyle=R; ctx.fillRect(6,28,108,2);
      if(V===3){ ctx.fillStyle=S; ctx.fillRect(6,19,108,2); } // mid stripe
      if(V===4){
        // Curved ends
        ctx.fillStyle=B;
        ctx.beginPath(); ctx.arc(14,20,8,Math.PI*0.5,Math.PI*1.5); ctx.fill();
        ctx.beginPath(); ctx.arc(106,20,8,-Math.PI*0.5,Math.PI*0.5); ctx.fill();
      }
      ctx.fillStyle=R; ctx.fillRect(2,10,6,20);
      ctx.fillStyle=W; ctx.fillRect(4,14,4,8);
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(4,13,2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=W; winX.forEach(x=>ctx.fillRect(x,13,16,11));
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(6,30,108,3);
      pantoV(60,10,18,S);
      bogie(28,tY-1,K,S); bogie(88,tY-1,K,S);
    }

  // ══════════════════════════════════════════════════════════════════════════
  // TRAM
  // ══════════════════════════════════════════════════════════════════════════
  } else if(type==='tram'){
    catWire(S);
    // v1:4 windows[22,42,62,82] panto x=60, v2:5 windows[18,36,54,72,90] panto x=54
    // v3:6 windows[16,30,46,62,78,94] panto x=60, v4:4 windows panto x=80
    // v5:5 windows panto x=36 DOUBLE stripe
    const winX=[[22,42,62,82],[18,36,54,72,90],[16,30,46,62,78,94],[22,42,62,82],[18,36,54,72,90]][vi];
    const pantoX=[60,54,60,80,36][vi];
    const dblStripe=(V===5);
    ctx.fillStyle=B; ctx.fillRect(4,8,112,24);
    ctx.fillStyle=R; ctx.fillRect(4,8,112,4);
    ctx.fillStyle=R; ctx.fillRect(4,30,112,2);
    if(dblStripe){ ctx.fillStyle=S; ctx.fillRect(4,24,112,2); }
    ctx.fillStyle=W; ctx.fillRect(4,11,8,14); ctx.fillRect(108,11,8,14);
    ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(6,14,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(6,24,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(114,14,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(114,24,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=W; winX.forEach(x=>ctx.fillRect(x,11,14,14));
    pantoV(pantoX,8,24,S);
    bogie(28,tY-1,K,S); bogie(90,tY-1,K,S);

  // ══════════════════════════════════════════════════════════════════════════
  // HERITAGE variants
  // ══════════════════════════════════════════════════════════════════════════
  } else if(type==='heritage'){

    if(sub==='royal'){
      // v1:5-arch h=12 1 gold band, v2:4-arch h=8 1 gold band
      // v3:5-arch h=16 very high 2 gold bands, v4:5-arch h=12 3 gold bands
      // v5:4-arch h=10 2 gold bands + ornate pillars
      const winX=[[14,36,58,80,100],[16,42,68,94],[12,34,56,78,100],[14,36,58,80,100],[16,44,72,100]][vi];
      const archH=[12,8,16,12,10][vi];
      const goldBands=[1,1,2,3,2][vi];
      const ornatePillars=(V===5);
      ctx.fillStyle=B;
      ctx.beginPath(); ctx.moveTo(4,30); ctx.lineTo(4,16);
      ctx.bezierCurveTo(4,30-archH*2,116,30-archH*2,116,16); ctx.lineTo(116,30); ctx.closePath(); ctx.fill();
      ctx.fillStyle=S;
      ctx.beginPath(); ctx.moveTo(4,18); ctx.quadraticCurveTo(60,18-archH,116,18); ctx.lineTo(116,22); ctx.quadraticCurveTo(60,22-archH,4,22); ctx.closePath(); ctx.fill();
      if(goldBands>=2){ ctx.fillStyle=S; ctx.fillRect(4,10,112,2); }
      if(goldBands>=3){ ctx.fillStyle=S; ctx.fillRect(4,14,112,2); }
      winX.forEach(x=>{
        ctx.fillStyle='#001133'; ctx.fillRect(x,17,14,14);
        ctx.fillStyle=W;
        ctx.beginPath(); ctx.arc(x+7,17,7,Math.PI,0); ctx.fill();
        ctx.fillRect(x,17,14,8);
        ctx.strokeStyle=S; ctx.lineWidth=1; ctx.strokeRect(x,17,14,14);
      });
      if(ornatePillars){
        ctx.fillStyle=S; [8,44,80,108].forEach(x=>{ ctx.fillRect(x,12,3,18); ctx.fillRect(x-1,12,5,3); ctx.fillRect(x-1,27,5,3); });
      }
      ctx.fillStyle=S; ctx.fillRect(4,28,112,3);
      [40,60,80].forEach(x=>wheel(x,tY,8,K,S,'#8B6914',8));
      wheel(10,tY+2,5,K,S,'#8B6914',6); wheel(106,tY+2,5,K,S,'#8B6914',6);

    } else if(sub==='heritage'){
      // v1:5 windows[14,34,54,74,94] 6 pillars[4,26,46,68,88,108]
      // v2:4 windows[16,40,64,88] 5 pillars[4,30,56,82,108]
      // v3:5 windows[14,34,54,74,94] 7 pillars[4,22,40,58,76,94,108] dense
      // v4:4 windows[16,40,64,88] arch-top + 5 pillars, v5:5 windows 4 pillars[4,42,76,108] sparse
      const winX=[[14,34,54,74,94],[16,40,64,88],[14,34,54,74,94],[16,40,64,88],[14,34,54,74,94]][vi];
      const pillarX=[[4,26,46,68,88,108],[4,30,56,82,108],[4,22,40,58,76,94,108],[4,30,56,82,108],[4,42,76,108]][vi];
      ctx.fillStyle=B; ctx.fillRect(4,12,112,22);
      ctx.fillStyle=R;
      ctx.beginPath(); ctx.moveTo(4,12); ctx.quadraticCurveTo(60,5,116,12); ctx.lineTo(116,12); ctx.lineTo(4,12); ctx.closePath(); ctx.fill();
      ctx.fillStyle=S; ctx.fillRect(4,20,112,3);
      winX.forEach(x=>{
        ctx.fillStyle='#1a3a1a'; ctx.fillRect(x,15,14,16);
        ctx.fillStyle=W;
        ctx.beginPath(); ctx.arc(x+7,15,7,Math.PI,0); ctx.fill();
        ctx.fillRect(x,15,14,8);
        if(V===4){
          // More ornate: extra arch detail
          ctx.strokeStyle=S; ctx.lineWidth=0.5; ctx.strokeRect(x,15,14,16);
        }
      });
      ctx.fillStyle=S; pillarX.forEach(x=>ctx.fillRect(x,12,3,22));
      [38,62,86].forEach(x=>wheel(x,tY,7,K,S,R,8));
      wheel(10,tY+2,5,K,S,R,6); wheel(106,tY+2,5,K,S,R,6);

    } else if(sub==='narrow'){
      // v1:bodyW=100 6 windows plank every 4px, v2:bodyW=110 7 windows plank every 4px
      // v3:bodyW=90 5 windows plank every 4px, v4:bodyW=100 6 windows NO planks
      // v5:bodyW=110 7 windows plank every 6px sparse
      const bodyW=[100,110,90,100,110][vi];
      const winX=[[18,34,50,66,82,96],[16,30,44,58,72,86,100],[18,36,54,72,88],[18,34,50,66,82,96],[16,30,44,58,72,86,100]][vi];
      const plankStep=[4,4,4,0,6][vi];
      const bX=10;
      ctx.fillStyle=B; ctx.fillRect(bX,14,bodyW,20);
      ctx.fillStyle=R; ctx.fillRect(bX,14,bodyW,4);
      ctx.fillStyle=W; winX.forEach(x=>ctx.fillRect(x,17,10,10));
      ctx.fillStyle=S; ctx.fillRect(bX,24,bodyW,2);
      ctx.fillStyle=R; [bX,bX+Math.floor(bodyW/2),bX+bodyW-4].forEach(x=>ctx.fillRect(x,14,4,20));
      if(plankStep>0){
        ctx.strokeStyle=R; ctx.lineWidth=0.8; ctx.globalAlpha=0.4;
        for(let y=14;y<34;y+=plankStep){ctx.beginPath();ctx.moveTo(bX,y);ctx.lineTo(bX+bodyW,y);ctx.stroke();}
        ctx.globalAlpha=1;
      }
      ctx.fillStyle='#5a3a1a'; ctx.fillRect(0,28,bX+2,6); ctx.fillRect(bX+bodyW-2,28,12,6);
      [bX+18,bX+50,bX+bodyW-32].forEach(x=>wheel(x,tY,6,K,S,R,6));
      wheel(6,tY+3,4,K,S,R,4); wheel(bX+bodyW+2,tY+3,4,K,S,R,4);

    } else { // doubledeck
      // v1:equal decks top h=10 bottom h=10 5 windows[14,32,52,72,92]
      // v2:tall top (top h=13 bottom h=8) 5+5 windows
      // v3:tall bottom (top h=8 bottom h=13) 5+5 windows
      // v4:equal 6 windows each[12,28,46,62,78,96] narrow pillars
      // v5:equal 5 windows WIDE pillars (pillarW=8)
      const topH=[10,13,8,10,10][vi];
      const botH=[10,8,13,10,10][vi];
      const upperWinX=[[14,32,52,72,92],[14,32,52,72,92],[14,32,52,72,92],[12,28,46,62,78,96],[14,32,52,72,92]][vi];
      const lowerWinX=[[14,32,52,72,92],[14,32,52,72,92],[14,32,52,72,92],[12,28,46,62,78,96],[14,32,52,72,92]][vi];
      const pillarW=(V===5)?8:6;
      const totalH=topH+botH+4; // 4 for divider+roof
      const bodyTop=34-totalH;
      ctx.fillStyle=B; ctx.fillRect(4,bodyTop,112,totalH);
      ctx.fillStyle=R; ctx.fillRect(4,bodyTop,112,4);
      ctx.fillStyle=S; ctx.fillRect(4,bodyTop+4+topH,112,3);
      ctx.fillStyle=W; upperWinX.forEach(x=>ctx.fillRect(x,bodyTop+4,14,topH-2));
      ctx.fillStyle=W; lowerWinX.forEach(x=>ctx.fillRect(x,bodyTop+4+topH+3,14,botH-2));
      ctx.fillStyle=R; ctx.fillRect(4,bodyTop,pillarW,totalH); ctx.fillRect(116-pillarW,bodyTop,pillarW,totalH);
      ctx.strokeStyle=S; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(102,bodyTop+4); ctx.lineTo(102,bodyTop+totalH); ctx.stroke();
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(6,bodyTop+6,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffee88'; ctx.beginPath(); ctx.arc(6,bodyTop+totalH-5,3,0,Math.PI*2); ctx.fill();
      bogie(26,tY-1,K,S); bogie(90,tY-1,K,S);
    }
  }
}


function showStationBanner(station) {
  const el = document.getElementById('station-banner');
  document.getElementById('sb-icon').textContent = station.icon;
  document.getElementById('sb-name').textContent = station.name;
  document.getElementById('sb-landmark').textContent = station.landmark;
  el.classList.remove('fade-out');
  el.classList.add('visible');
  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => el.classList.remove('visible', 'fade-out'), 600);
  }, 3000);
}

function updateStationChip() {
  const station = getCurrentStation();
  document.getElementById('sc-name').textContent = station.name;
  document.getElementById('station-chip').style.display = 'block';
}

// ── Boot ───────────────────────────────────────────────────────────────────────
showTrainSelect();
