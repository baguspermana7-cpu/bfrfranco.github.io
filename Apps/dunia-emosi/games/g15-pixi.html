<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Lokomotif Pemberani 🚂</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100svh;overflow:hidden;font-family:'Fredoka One',sans-serif;touch-action:none}
#pixi-canvas{position:fixed;inset:0;width:100vw;height:100svh;display:block}

/* ── HUD Top ── */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 14px 8px;background:linear-gradient(180deg,rgba(0,0,0,0.72) 0%,transparent 100%);pointer-events:none}
#btn-back{background:#fff3c4;border:2.5px solid #f59e0b;border-radius:8px;color:#3f2a08;padding:8px 12px;font-size:14px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0;box-shadow:0 3px 0 #b45309;font-weight:900;min-width:96px;text-align:center}
#btn-back:active{transform:translateY(2px);box-shadow:0 1px 0 #D4956A}
#word-display{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;min-width:0}
#word-emoji{font-size:24px;flex-shrink:0}
#word-slots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.slot{display:inline-flex;align-items:center;justify-content:center;width:28px;height:32px;border-radius:8px;border:2px solid rgba(255,255,255,0.35);background:rgba(0,0,0,0.35);color:#fff;font-size:15px;font-weight:900;transition:all .2s}
.slot.filled{border-color:#fbbf24;background:rgba(251,191,36,0.28);color:#fde68a}
.slot.done{border-color:#4ade80;background:rgba(74,222,128,0.28);color:#bbf7d0;animation:slotPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes slotPop{from{transform:scale(0.7)}to{transform:scale(1)}}
#lives-hud{display:flex;gap:3px;flex-shrink:0}
.life-heart{font-size:20px;transition:all .3s;display:inline-block}
.life-heart.lost{opacity:0.18;transform:scale(0.65);filter:grayscale(1)}

/* ── Next letter hint ── */
#next-letter{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:49;background:rgba(255,248,231,0.92);border:2px solid #FFD6A0;border-radius:14px;padding:5px 16px;display:flex;align-items:center;gap:6px;pointer-events:none;box-shadow:0 3px 0 #D4956A}
#next-label{font-size:10px;color:#92400e;letter-spacing:1.2px;font-weight:700}
#next-char{font-size:24px;font-weight:900;color:#dc2626;text-shadow:0 0 10px rgba(220,38,38,0.35)}

/* ── Flash ── */
#flash{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:0;transition:opacity .05s}

/* ── HUD Bottom ── */
#hud-bottom{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:8px 14px calc(env(safe-area-inset-bottom,0px)+12px)}
#ctrl-row{display:flex;gap:10px;align-items:stretch}
#btn-up{flex:1;padding:15px 0;border-radius:18px;border:3px solid #50E0A0;background:linear-gradient(160deg,#2DBF7E,#1A9E66);color:#fff;font-size:22px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .08s,box-shadow .08s;font-family:inherit;-webkit-tap-highlight-color:transparent;line-height:1.2;box-shadow:0 5px 0 #0A7A48,0 8px 20px rgba(45,191,126,0.3);font-weight:900}
#btn-up:active{transform:scale(.91) translateY(4px);box-shadow:0 1px 0 #0A7A48}
#btn-dn{flex:1;padding:15px 0;border-radius:18px;border:3px solid #F07050;background:linear-gradient(160deg,#E85A32,#C84020);color:#fff;font-size:22px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .08s,box-shadow .08s;font-family:inherit;-webkit-tap-highlight-color:transparent;line-height:1.2;box-shadow:0 5px 0 #9A2A10,0 8px 20px rgba(232,90,50,0.3);font-weight:900}
#btn-dn:active{transform:scale(.91) translateY(4px);box-shadow:0 1px 0 #9A2A10}
#lane-indicator{flex:1.2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 6px;border-radius:18px;border:3px solid #B8D4FF;background:linear-gradient(160deg,#E8F4FF,#C8E8FF);box-shadow:0 5px 0 #7AADDD}
#lane-dots{display:flex;flex-direction:column;gap:6px;align-items:center}
.lane-dot{width:12px;height:12px;border-radius:50%;background:rgba(100,160,220,0.3);border:2px solid rgba(100,160,220,0.4);transition:all .2s}
.lane-dot.active{background:#3B82F6;box-shadow:0 0 10px #3B82F6;border-color:#93C5FD;transform:scale(1.4)}
#lane-label{font-size:10px;color:#1e40af;letter-spacing:1px;margin-top:2px;font-weight:700}

/* ── Math Quiz Overlay ── */
#math-quiz{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;background:rgba(10,5,25,0.82);backdrop-filter:blur(14px)}
#math-quiz.show{display:flex}
#math-card{background:linear-gradient(145deg,#1e1b4b,#312e81);border:3px solid #818cf8;border-radius:28px;padding:24px 20px;max-width:300px;width:88%;text-align:center;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 60px rgba(129,140,248,0.4),0 20px 40px rgba(0,0,0,.6)}
#math-question{font-size:34px;font-weight:900;color:#e0e7ff;margin-bottom:4px}
#math-timer-bar{height:6px;background:rgba(255,255,255,0.12);border-radius:4px;margin:8px 0 16px;overflow:hidden}
#math-timer-fill{height:100%;background:linear-gradient(90deg,#4ade80,#22c55e);border-radius:4px;transition:width 0.1s linear}
#math-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.math-btn{padding:14px 8px;border-radius:16px;border:2px solid;color:#fff;font-size:20px;font-weight:900;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:transform .08s}
.math-btn:active{transform:scale(.91)}
.math-btn:nth-child(1){background:linear-gradient(160deg,#6D28D9,#7C3AED);border-color:#A78BFA;box-shadow:0 4px 0 #4C1D95}
.math-btn:nth-child(2){background:linear-gradient(160deg,#C2410C,#EA580C);border-color:#FB923C;box-shadow:0 4px 0 #9A3412}
.math-btn:nth-child(3){background:linear-gradient(160deg,#0D9488,#14B8A6);border-color:#2DD4BF;box-shadow:0 4px 0 #0F766E}
.math-btn:nth-child(4){background:linear-gradient(160deg,#D97706,#F59E0B);border-color:#FCD34D;box-shadow:0 4px 0 #B45309}
#math-label{font-size:12px;color:#a5b4fc;letter-spacing:1.5px;margin-bottom:8px;font-weight:700}

/* Overlays handled by game-modal.js */

/* ── Screen shake ── */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shaking{animation:shake .3s ease}

/* ── Train Select Screen ── */
#train-select{position:fixed;inset:0;z-index:900;background:linear-gradient(180deg,#1a1028 0%,#2a1848 40%,#1e1230 70%,#140e22 100%);display:flex;flex-direction:column;overflow:hidden}
#ts-header{padding:12px 16px 6px;flex-shrink:0;display:flex;align-items:center;gap:10px;position:relative;z-index:2}
#ts-back{background:#fff3c4;border:2.5px solid #f59e0b;border-radius:8px;color:#3f2a08;padding:8px 12px;font-size:14px;cursor:pointer;font-family:inherit;flex-shrink:0;box-shadow:0 3px 0 #b45309;font-weight:900;min-width:112px;text-align:center}
#ts-back:active{transform:translateY(2px);box-shadow:0 1px 0 #b45309}
#ts-title-wrap{flex:1;text-align:center}
#ts-title{font-size:20px;font-weight:900;color:#e9d5ff;text-shadow:0 0 20px rgba(139,92,246,0.7);line-height:1}
#ts-subtitle{font-size:10px;color:rgba(233,213,255,0.4);letter-spacing:1.5px;margin-top:1px}
#station-intro{display:flex;align-items:center;gap:10px;background:rgba(139,92,246,0.14);border:1.5px solid rgba(139,92,246,0.4);border-radius:14px;margin:8px 12px 0;padding:8px 14px;flex-shrink:0}
.si-icon{font-size:28px;flex-shrink:0}
.si-text{text-align:left}
.si-label{font-size:8px;color:rgba(233,213,255,0.45);letter-spacing:1.8px;font-weight:700;display:block}
.si-name{font-size:15px;font-weight:900;color:#e9d5ff;display:block;line-height:1.2}
.si-landmark{font-size:10px;color:rgba(233,213,255,0.55);display:block;margin-top:1px}
/* Filter tabs */
#type-filter{display:flex;gap:6px;overflow-x:auto;padding:10px 12px 2px;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#type-filter::-webkit-scrollbar{display:none}
.tfbtn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:2px solid rgba(139,92,246,0.3);background:rgba(139,92,246,0.08);color:rgba(196,181,253,0.7);font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit;transition:all .12s;letter-spacing:0.3px}
.tfbtn.active{background:rgba(139,92,246,0.45);border-color:#a78bfa;color:#fff;box-shadow:0 0 14px rgba(139,92,246,0.5)}
/* Train count badge */
#ts-count{font-size:9px;color:rgba(196,181,253,0.5);text-align:center;padding:4px 0 2px;letter-spacing:0.8px;flex-shrink:0}
#ts-grid-wrap{flex:1;overflow-y:auto;padding:6px 12px 20px;-webkit-overflow-scrolling:touch}
#train-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px}
@media(min-width:500px){#train-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}}
@media(min-width:900px){#train-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}}
.tcard{border-radius:8px;border:1.5px solid rgba(180,160,220,0.2);background:rgba(248,240,255,0.06);cursor:pointer;-webkit-tap-highlight-color:transparent;overflow:hidden;display:flex;flex-direction:column;transition:all .14s;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.tcard.selected{border-color:#a78bfa;background:rgba(139,92,246,0.18);box-shadow:0 0 10px rgba(139,92,246,0.35)}
.tcard:active{transform:scale(0.94)}
.tcard canvas{width:100%;aspect-ratio:3/1;display:block;image-rendering:pixelated;image-rendering:crisp-edges}
.tcard-info{padding:2px 4px 3px;font-size:9px;line-height:1.2}
.tname{font-size:9px;font-weight:700;color:#e9d5ff;display:block;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsub{font-size:7px;color:rgba(167,139,250,0.45);display:block;margin-top:1px;letter-spacing:0.2px;text-transform:uppercase}

/* ── Station Banner (shown at game start) ── */
#station-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;display:none;flex-direction:column;align-items:center;gap:3px;background:rgba(0,0,0,0.88);border:2.5px solid rgba(139,92,246,0.7);border-radius:24px;padding:20px 32px;backdrop-filter:blur(18px);pointer-events:none;opacity:1;transition:opacity .5s,transform .5s}
#station-banner.visible{display:flex}
#station-banner.fade-out{opacity:0;transform:translate(-50%,-55%)}
#sb-label{font-size:10px;color:rgba(233,213,255,0.5);letter-spacing:2.5px;font-weight:700}
#sb-icon{font-size:40px;line-height:1;margin:4px 0}
#sb-name{font-size:22px;font-weight:900;color:#e9d5ff;text-align:center;text-shadow:0 0 16px rgba(139,92,246,0.8)}
#sb-landmark{font-size:13px;color:rgba(233,213,255,0.65);text-align:center}

/* ── Station chip in HUD ── */
#station-chip{position:fixed;top:66px;right:10px;z-index:49;background:rgba(0,0,0,0.68);border:1.5px solid rgba(139,92,246,0.45);border-radius:10px;padding:3px 9px;pointer-events:none}
.sc-label{font-size:8px;color:rgba(233,213,255,0.45);letter-spacing:1.2px;display:block}
.sc-name{font-size:10px;font-weight:700;color:#e9d5ff;white-space:nowrap;display:block}
</style>
</head>
<body>
<canvas id="pixi-canvas"></canvas>

<!-- HUD Top -->
<div id="hud-top">
  <button id="btn-back" type="button" onclick="goBack()">← Kembali</button>
  <div id="word-display">
    <span id="word-emoji">❓</span>
    <div id="word-slots"></div>
  </div>
  <div id="lives-hud"></div>
</div>

<!-- Next letter hint -->
<div id="next-letter">
  <span id="next-label">KUMPULKAN</span>
  <span id="next-char">?</span>
</div>

<!-- HUD Bottom -->
<div id="hud-bottom">
  <div id="ctrl-row">
    <button id="btn-up" ontouchstart="switchLane(-1);event.preventDefault()" onclick="switchLane(-1)">▲<br><span style="font-size:11px">ATAS</span></button>
    <div id="lane-indicator">
      <div id="lane-dots">
        <div class="lane-dot" id="ld0"></div>
        <div class="lane-dot" id="ld1"></div>
        <div class="lane-dot" id="ld2"></div>
      </div>
      <div id="lane-label">JALUR</div>
    </div>
    <button id="btn-dn" ontouchstart="switchLane(1);event.preventDefault()" onclick="switchLane(1)">▼<br><span style="font-size:11px">BAWAH</span></button>
  </div>
</div>

<!-- Flash -->
<div id="flash"></div>

<!-- Math Quiz -->
<div id="math-quiz">
  <div id="math-card">
    <div id="math-label">❓ SOAL MATEMATIKA</div>
    <div id="math-question">5 + 3 = ?</div>
    <div id="math-timer-bar"><div id="math-timer-fill" style="width:100%"></div></div>
    <div id="math-choices"></div>
  </div>
</div>

<script src="game-modal.js"></script>

<!-- Train Select Screen -->
<div id="train-select">
  <div id="ts-header">
    <button id="ts-back" type="button" onclick="goBack()">← Kembali</button>
    <div id="ts-title-wrap">
      <div id="ts-title">🚂 Pilih Keretamu!</div>
      <div id="ts-subtitle">PILIH KERETA UNTUK MEMULAI</div>
    </div>
  </div>
  <div id="station-intro">
    <span class="si-icon" id="si-icon">🏛️</span>
    <div class="si-text">
      <span class="si-label">STASIUN BERANGKAT</span>
      <span class="si-name" id="si-name">Surabaya Kota</span>
      <span class="si-landmark" id="si-landmark">Tugu Pahlawan</span>
    </div>
  </div>
  <div id="type-filter">
    <button class="tfbtn active" data-filter="all" onclick="setTrainFilter(this)">🚆 Semua</button>
    <button class="tfbtn" data-filter="steam" onclick="setTrainFilter(this)">♨️ Steam</button>
    <button class="tfbtn" data-filter="diesel" onclick="setTrainFilter(this)">🛢️ Diesel</button>
    <button class="tfbtn" data-filter="electric" onclick="setTrainFilter(this)">⚡ Elektrik</button>
    <button class="tfbtn" data-filter="highspeed" onclick="setTrainFilter(this)">💨 Highspeed</button>
    <button class="tfbtn" data-filter="tram" onclick="setTrainFilter(this)">🚃 Tram</button>
    <button class="tfbtn" data-filter="heritage" onclick="setTrainFilter(this)">👑 Heritage</button>
  </div>
  <div id="ts-count">100 KERETA TERSEDIA</div>
  <div id="ts-grid-wrap"><div id="train-grid"></div></div>
</div>

<!-- Station Banner -->
<div id="station-banner">
  <div id="sb-label">TIBA DI STASIUN</div>
  <div id="sb-icon">🏛️</div>
  <div id="sb-name">Surabaya Kota</div>
  <div id="sb-landmark">Tugu Pahlawan</div>
</div>

<!-- Station chip -->
<div id="station-chip" style="display:none">
  <span class="sc-label">📍 STASIUN</span>
  <span class="sc-name" id="sc-name">Surabaya Kota</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script src="trains-db.js"></script>
<script>
'use strict';
// Polyfill ctx.roundRect for older Android WebViews (Chrome < 99)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const radius = Math.min(+r || 0, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + radius, y);
    this.lineTo(x + w - radius, y);
    this.arcTo(x + w, y, x + w, y + radius, radius);
    this.lineTo(x + w, y + h - radius);
    this.arcTo(x + w, y + h, x + w - radius, y + h, radius);
    this.lineTo(x + radius, y + h);
    this.arcTo(x, y + h, x, y + h - radius, radius);
    this.lineTo(x, y + radius);
    this.arcTo(x, y, x + radius, y, radius);
    this.closePath();
    return this;
  };
}

// ── Config ───────────────────────────────────────────────────────────────────
const cfg = (() => { try { return JSON.parse(sessionStorage.getItem('g15Config') || '{}'); } catch { return {}; } })();
const LEVEL = Math.max(1, Math.min(30, cfg.level || 1));

function goBack() { window.location.replace('../index.html'); }

// ── Java Station Route: Surabaya → Banten ────────────────────────────────────
const JAVA_STATIONS = [
  {name:'Surabaya Kota',      icon:'🏛️', landmark:'Tugu Pahlawan'},
  {name:'Surabaya Gubeng',    icon:'🏢', landmark:'Gedung Gubernuran'},
  {name:'Sidoarjo',           icon:'🌊', landmark:'Lumpur Lapindo'},
  {name:'Mojokerto',          icon:'🏯', landmark:'Candi Trowulan'},
  {name:'Jombang',            icon:'🕌', landmark:'Pondok Pesantren Tebuireng'},
  {name:'Kertosono',          icon:'🛤️', landmark:'Persimpangan KA Kertosono'},
  {name:'Nganjuk',            icon:'⛰️', landmark:'Lereng Gunung Wilis'},
  {name:'Madiun',             icon:'🍛', landmark:'Pusat Wisata Pecel'},
  {name:'Solo Balapan',       icon:'👑', landmark:'Keraton Kasunanan Solo'},
  {name:'Klaten',             icon:'🏛️', landmark:'Candi Prambanan'},
  {name:'Yogyakarta Tugu',    icon:'🎭', landmark:'Kraton Ngayogyakarta'},
  {name:'Wates',              icon:'🏖️', landmark:'Pantai Glagah'},
  {name:'Kebumen',            icon:'🕳️', landmark:'Goa Jatijajar'},
  {name:'Kroya',              icon:'🛤️', landmark:'Simpang Besar KA Kroya'},
  {name:'Purwokerto',         icon:'🌄', landmark:'Baturaden'},
  {name:'Bumiayu',            icon:'💧', landmark:'Waduk Malahayu'},
  {name:'Cirebon',            icon:'👑', landmark:'Keraton Kasepuhan Cirebon'},
  {name:'Jatibarang',         icon:'🌾', landmark:'Sawah Indramayu'},
  {name:'Cikampek',           icon:'🏭', landmark:'Pabrik Kereta INKA'},
  {name:'Bekasi',             icon:'🏙️', landmark:'Kota Metropolitan Bekasi'},
  {name:'Jakarta Kota',       icon:'🏛️', landmark:'Kawasan Kota Tua Jakarta'},
  {name:'Gambir',             icon:'🗺️', landmark:'Monumen Nasional (Monas)'},
  {name:'Tangerang',          icon:'🕌', landmark:'Masjid Agung Al-Ittihad'},
  {name:'Serpong',            icon:'🏢', landmark:'Kawasan BSD City'},
  {name:'Rangkasbitung',      icon:'🌿', landmark:'Kebun Teh Cianten'},
  {name:'Serang',             icon:'🏛️', landmark:'Banten Lama & Mesjid Agung'},
  {name:'Cilegon',            icon:'🏭', landmark:'Krakatau Steel'},
  {name:'Anyer',              icon:'🏖️', landmark:'Pantai Anyer'},
  {name:'Merak',              icon:'⛴️', landmark:'Pelabuhan Merak'},
  {name:'TUJUAN AKHIR! 🎉',  icon:'🏆', landmark:'Selat Sunda — Selamat Tiba!'},
];
function getCurrentStation(){ return JAVA_STATIONS[Math.min(LEVEL-1,JAVA_STATIONS.length-1)]; }

// ── Train Catalog: 100 unique named trains ─────────────────────────────────────
// b=body, r=roof, s=stripe, w=window, k=dark  v=variant(1-5 within sub-type)
// Build TRAIN_MODELS from shared TRAIN_CATS (trains-db.js)
const TRAIN_MODELS = typeof TRAIN_CATS !== 'undefined'
  ? TRAIN_CATS.flatMap((cat, ci) => cat.trains.map((t, ti) => {
      const hexToInt = s => parseInt((s||'#000').replace('#',''), 16)
      const typeMap = {steam_id:'steam',steam_world:'steam',diesel_id:'diesel',diesel_world:'diesel',emu:'electric',hsr:'highspeed',maglev:'highspeed'}
      const subMap = {steam_id:'classic',steam_world:'pacific',diesel_id:'hood',diesel_world:'boxcab',emu:'krl',hsr:'bullet',maglev:'maglev'}
      return {id:t.key, name:t.name, type:typeMap[cat.key]||'heritage', sub:subMap[cat.key]||'royal',
        v:(ti%5)+1, b:hexToInt(t.bodyColor), r:hexToInt(t.accColor), s:hexToInt(t.accColor),
        w:0xdbeafe, k:0x111827 }
    }))
  : [
  // ── STEAM / CLASSIC ── v1:3-wheel single chimney, v2:4-wheel, v3:tall chimney, v4:double chimney, v5:4-wheel compact
  {id:'sc1',name:'D51 Mikado JNR',      type:'steam',sub:'classic',  v:1,b:0x1c1917,r:0xe11d48,s:0xfbbf24,w:0xdbeafe,k:0x111827},

function pickWords(count) {
  const pool = [...WORDS[getDifficulty()]];
  const result = [];
  for (let i = 0; i < count && pool.length; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    result.push(pool.splice(idx, 1)[0]);
  }
  return result;
}

function genMathQuestion() {
  const maxN = LEVEL <= 4 ? 5 : LEVEL <= 9 ? 10 : 15;
  const useSubtract = LEVEL > 4;
  const op = useSubtract && Math.random() < 0.4 ? '-' : '+';
  let a, b, ans;
  if (op === '+') {
    a = Math.floor(Math.random() * (maxN + 1));
    b = Math.floor(Math.random() * (maxN - a + 1));
    ans = a + b;
  } else {
    a = Math.floor(Math.random() * (maxN + 1));
    b = Math.floor(Math.random() * (a + 1));
    ans = a - b;
  }
  return { text: `${a} ${op} ${b} = ?`, answer: ans };
}

function genWrongOptions(correct, count) {
  const opts = new Set([correct]);
  while (opts.size < count + 1) {
    const delta = Math.floor(Math.random() * 5) + 1;
    const wrong = Math.max(0, correct + (Math.random() < 0.5 ? delta : -delta));
    if (wrong !== correct && wrong >= 0 && wrong <= 20) opts.add(wrong);
  }
  return shuffle([...opts]).slice(0, count + 1);
}

// ── PixiJS Init ───────────────────────────────────────────────────────────────
async function initPixi() {
  app = new PIXI.Application();
  await app.init({
    canvas: document.getElementById('pixi-canvas'),
    width: window.innerWidth, height: window.innerHeight,
    backgroundColor: T.sky, antialias: true,
    resolution: window.devicePixelRatio || 1, autoDensity: true
  });
  W = app.screen.width; H = app.screen.height;
  const topHUD = 120, botHUD = 115;
  const available = H - topHUD - botHUD;
  LANE_Y = [
    topHUD + available * 0.18,
    topHUD + available * 0.50,
    topHUD + available * 0.82
  ];
  stage = app.stage;
  bgLayer       = new PIXI.Container(); stage.addChild(bgLayer);
  trackLayer    = new PIXI.Container(); stage.addChild(trackLayer);
  trainContainer= new PIXI.Container(); stage.addChild(trainContainer);
  boxLayer      = new PIXI.Container(); stage.addChild(boxLayer);
  particleLayer = new PIXI.Container(); stage.addChild(particleLayer);

  buildBackground();
  buildTracks();
  buildTrain();
  updateLivesHUD();
  updateLaneDots();
  refreshHUD();
  updateStationChip();
  showStationBanner(getCurrentStation());

  gameRunning = true;
  startTime = Date.now();
  let spawnTimer = 0;
  const spawnInterval = () => Math.max(45, 90 - LEVEL * 2);

  app.ticker.add((ticker) => {
    if (!gameRunning || mathQuizActive) return;
    const dt = ticker.deltaTime;

    // Scroll sleepers
    for (const s of sleepers) { s.x -= gameSpeed * dt; if (s.x < -20) s.x += W + 40; }

    // Stars (night/space theme)
    if (BG_THEME === 0 || BG_THEME === 3) {
      for (const st of bgStars) {
        st.x -= st._speed * dt;
        if (st.x < 0) { st.x = W; st.y = Math.random() * H * 0.65; }
      }
    }

    // Clouds move
    for (const c of bgClouds) {
      c.x -= c._speed * dt;
      if (c.x < -200) c.x = W + 150;
    }

    // Fireflies (forest theme)
    if (BG_THEME === 2) {
      for (const ff of bgFireflies) {
        ff._phase += 0.04 * dt;
        ff.alpha = 0.3 + Math.sin(ff._phase) * 0.6;
        ff.x += ff._vx * dt;
        ff.y += Math.sin(ff._phase * 0.7) * 0.3 * dt;
        if (ff.x < 0) ff.x = W; if (ff.x > W) ff.x = 0;
      }
    }

    // Rainbow fade
    if (rainbow) {
      rainbow.alpha -= 0.008 * dt;
      if (rainbow.alpha <= 0) { bgLayer.removeChild(rainbow); rainbow = null; }
    }

    // Steam puffs
    for (let i = steamPuffs.length - 1; i >= 0; i--) {
      const p = steamPuffs[i];
      p.x += p._vx * dt; p.y += p._vy * dt;
      p.alpha -= 0.018 * dt;
      p.scale.x += 0.025 * dt; p.scale.y += 0.025 * dt;
      if (p.alpha <= 0) { particleLayer.removeChild(p); steamPuffs.splice(i, 1); }
    }

    // Wheel spin
    for (const w of wheels) w.rotation += 0.09 * dt * (gameSpeed / 2);

    // Spawn
    spawnTimer += dt;
    totalBoxSpawned += dt;
    mathBoxTimer += dt;
    heartBoxTimer += dt;

    if (spawnTimer >= spawnInterval()) {
      spawnTimer = 0;
      spawnLetterBox();
    }

    // Math box
    if (mathBoxTimer >= nextMathAt) {
      mathBoxTimer = 0; nextMathAt = MATH_BOX_INTERVAL();
      spawnSpecialBox('math');
    }

    // Heart box (only if lives < MAX)
    if (heartBoxTimer >= nextHeartAt && lives < MAX_LIVES) {
      heartBoxTimer = 0; nextHeartAt = HEART_BOX_INTERVAL();
      spawnSpecialBox('heart');
    }

    // Move + check boxes
    for (let i = letterBoxes.length - 1; i >= 0; i--) {
      const b = letterBoxes[i];
      b.container.x -= gameSpeed * dt;

      // Glow pulse
      if (b.glowGfx) {
        b._glowPhase = (b._glowPhase || 0) + 0.1 * dt;
        b.glowGfx.alpha = 0.45 + Math.sin(b._glowPhase) * 0.4;
      }

      // Collision: must match lane AND be within Y proximity (fix phantom hit)
      if (!invincible && b.container.x < TRAIN_X + 52 && b.container.x > TRAIN_X - 52) {
        if (b.lane === playerLane && Math.abs(b.container.y - trainContainer.y) < 42) {
          collectBox(b, i);
          continue;
        }
      }

      if (b.container.x < -90) { boxLayer.removeChild(b.container); letterBoxes.splice(i, 1); }
    }

    // Train bounce
    if (trainContainer._bounceT > 0) {
      trainContainer._bounceT -= 0.1 * dt;
      trainContainer.y = LANE_Y[playerLane] - Math.sin(trainContainer._bounceT * Math.PI) * 6;
    } else {
      trainContainer._bounceT = 0;
      trainContainer.y = LANE_Y[playerLane];
    }

    // Steam emit
    if (Math.random() < 0.05 * dt) emitSteam();
  });
}

      const g = new PIXI.Graphics();
      const r = Math.random() * 1.4 + 0.4;
      g.circle(0, 0, r).fill({ color: 0xcfe8ff });
      g.x = Math.random() * W; g.y = Math.random() * H * 0.55;
      g.alpha = Math.random() * 0.5 + 0.2;
      g._speed = Math.random() * 0.15 + 0.05;
      bgLayer.addChild(g); bgStars.push(g);
    }
    // Snow peaks
    const peaks = [[0.2, 0.55], [0.45, 0.45], [0.65, 0.52], [0.85, 0.42]];
    for (const [px, py] of peaks) {
      const p = new PIXI.Graphics();
      const pw = 120 + Math.random() * 80;
      p.poly([0, 0, -pw/2, pw*0.6, pw/2, pw*0.6]).fill({ color: 0x2a3f6a });
      p.poly([0, 0, -pw*0.22, pw*0.22, pw*0.22, pw*0.22]).fill({ color: 0xe0f2fe });
      p.x = W * px; p.y = H * py;
      bgLayer.addChild(p);
    }
  } else if (BG_THEME === 4) {
    // Tropical: sun + ocean shimmer
    const sun = new PIXI.Graphics();
    sun.circle(0, 0, 44).fill({ color: 0xfbbf24 });
    sun.x = W * 0.7; sun.y = H * 0.15;
    bgLayer.addChild(sun);
    // Ocean band
    const ocean = new PIXI.Graphics();
    ocean.rect(0, H * 0.58, W, H * 0.14).fill({ color: 0x0ea5e9 });
    ocean.alpha = 0.35;
    bgLayer.addChild(ocean);
  }

  // Clouds (all themes)
  const cloudCount = BG_THEME === 1 ? 5 : BG_THEME === 4 ? 4 : 3;
  const cloudColors = BG_THEME === 0 ? [0x1e293b] : BG_THEME === 2 ? [0x1a3a20] : BG_THEME === 3 ? [0x2a4a70] : [0xffffff, 0xe0f2fe];
  for (let i = 0; i < cloudCount; i++) {
    const c = buildCloud(cloudColors[i % cloudColors.length], 0.6 + i * 0.1);
    c.x = Math.random() * W; c.y = H * (0.06 + Math.random() * 0.20);
    c._speed = 0.18 + Math.random() * 0.18;
    bgLayer.addChild(c); bgClouds.push(c);
  }

  // Background silhouettes (trees/buildings)
  if (BG_THEME === 2) {
    // Tree line
    for (let x = 0; x < W + 80; x += 55) {
      const tree = new PIXI.Graphics();
      tree.poly([0, 0, -18, 38, 18, 38]).fill({ color: 0x14532d });
      tree.poly([0, -10, -14, 24, 14, 24]).fill({ color: 0x166534 });
      tree.rect(-4, 38, 8, 16).fill({ color: 0x78350f });
      tree.x = x + Math.random() * 20; tree.y = H * 0.65;
      bgLayer.addChild(tree);
    }
  } else if (BG_THEME === 4) {
    // Palm trees
    for (let x = 0; x < W; x += 200) {
      const palm = new PIXI.Graphics();
      palm.rect(-5, 0, 10, 55).fill({ color: 0x92400e });
      for (let a = 0; a < 6; a++) {
        const angle = (a / 6) * Math.PI * 2;
        palm.ellipse(Math.cos(angle) * 28, Math.sin(angle) * 14 - 8, 28, 9).fill({ color: 0x15803d });
      }
      palm.x = x + Math.random() * 80; palm.y = H * 0.6;
      bgLayer.addChild(palm);
    }
  } else if (BG_THEME === 3) {
    // Pine trees
    for (let x = 0; x < W; x += 60) {
      const pine = new PIXI.Graphics();
      pine.poly([0, 0, -12, 30, 12, 30]).fill({ color: 0x1e3a5f });
      pine.poly([0, -8, -9, 18, 9, 18]).fill({ color: 0x1e4060 });
      pine.rect(-3, 30, 6, 12).fill({ color: 0x3b1f0a });
      pine.x = x + Math.random() * 20; pine.y = H * 0.63;
      bgLayer.addChild(pine);
    }
  }

  // Ground
  const ground = new PIXI.Graphics();
  ground.rect(0, H * 0.72, W, H * 0.28).fill({ color: T.ground });
  bgLayer.addChild(ground);

  // Hills
  for (let i = 0; i < 5; i++) {
    const hill = new PIXI.Graphics();
    const bw = 180 + Math.random() * 130; const bh = 55 + Math.random() * 55;
    hill.ellipse(0, 0, bw, bh).fill({ color: T.hill });
    hill.x = Math.random() * W; hill.y = H * 0.72;
    bgLayer.addChild(hill);
  }
}

function buildCloud(color, alpha) {
  const c = new PIXI.Container();
  const g = new PIXI.Graphics();
  g.circle(0, 0, 22).fill({ color });
  g.circle(26, 4, 18).fill({ color });
  g.circle(-24, 5, 16).fill({ color });
  g.circle(12, -10, 16).fill({ color });
  g.rect(-28, 5, 72, 18).fill({ color }); // base fill
  c.addChild(g);
  c.alpha = alpha;
  return c;
}

// ── Tracks ────────────────────────────────────────────────────────────────────
function buildTracks() {
  for (let lane = 0; lane < 3; lane++) {
    const lY = LANE_Y[lane];
    const rail1 = new PIXI.Graphics();
    rail1.rect(0, lY + 14, W, 5).fill({ color: T.railColor });
    trackLayer.addChild(rail1);
    const rail2 = new PIXI.Graphics();
    rail2.rect(0, lY + 25, W, 5).fill({ color: T.railColor });
    trackLayer.addChild(rail2);
    // Rail glow
    const glow = new PIXI.Graphics();
    glow.rect(0, lY + 10, W, 24).fill({ color: T.railShadow });
    glow.alpha = 0.18; trackLayer.addChild(glow);
    // Sleepers
    for (let x = 0; x < W + 40; x += 40) {
      const sl = new PIXI.Graphics();
      sl.rect(-7, lY + 10, 14, 24).fill({ color: T.sleeperColor });
      sl.rect(-7, lY + 10, 14, 24).stroke({ width: 1, color: 0x000000, alpha: 0.3 });
      sl.x = x; trackLayer.addChild(sl); sleepers.push(sl);
    }
  }
}

// ── Train: Parametric from selectedTrain ──────────────────────────────────────
function buildTrain() {
  if (!selectedTrain) selectedTrain = TRAIN_CATALOG[0];
  trainContainer.x = TRAIN_X;
  trainContainer.y = LANE_Y[1];
  trainContainer._bounceT = 0;
  // Flip so locomotive faces RIGHT (direction of travel)
  trainContainer.scale.x = -1;

  const g = new PIXI.Graphics();
  const c = selectedTrain;

  // Dispatch to type-specific builder
  if (c.type === 'steam') drawSteamBody(g, c);
  else if (c.type === 'diesel') drawDieselBody(g, c);
  else if (c.type === 'electric' || c.type === 'tram') drawElectricBody(g, c);
  else if (c.type === 'highspeed') drawHighSpeedBody(g, c);
  else if (c.type === 'heritage') drawHeritageBody(g, c);
  else drawSteamBody(g, c); // fallback

  trainContainer.addChild(g);
  addWheels(c);
}

function drawSteamBody(g, c) {
  const b=c.b,r=c.r,s=c.s,w=c.w,k=c.k;
  const LL = r; // use roof color as cab color for steam
  const boilerLight = blendColor(b, 0xffffff, 0.25);
  // Boiler
  g.roundRect(-78,-18,55,26,12).fill({color:boilerLight});
  g.rect(-76,-18,51,6).fill({color:w});
  // Chimney (centered at ~x=-50)
  g.roundRect(-57,-38,14,22,4).fill({color:k});
  g.roundRect(-61,-42,22,7,3).fill({color:k});
  g.circle(-50,-44,5).fill({color:0x374151});
  // Dome
  g.circle(-40,-18,9).fill({color:b});
  g.circle(-40,-18,6).fill({color:s});
  // Headlamp
  g.circle(-79,-10,6).fill({color:0xfef9c3});
  g.circle(-79,-10,4).fill({color:0xfde68a});
  // Cab
  g.roundRect(-25,-24,42,32,7).fill({color:LL});
  g.roundRect(-27,-30,46,10,5).fill({color:b});
  g.roundRect(-21,-22,14,14,3).fill({color:w});
  g.roundRect(0,-22,14,14,3).fill({color:w});
  // Gold stripe
  g.rect(-78,-3,100,4).fill({color:s});
  g.roundRect(-78,8,100,6,2).fill({color:b});
  // Cowcatcher
  g.poly([-78,8,-92,16,-78,16]).fill({color:0x6b7280});
  // Tender
  const TS=22;
  g.roundRect(TS,-14,38,22,5).fill({color:b});
  g.roundRect(TS,-14,38,22,5).stroke({width:1.5,color:boilerLight});
  g.ellipse(TS+19,-16,17,8).fill({color:k});
  for(let ci=0;ci<4;ci++) g.circle(TS+8+ci*6,-17,2).fill({color:0x374151});
  // Passenger car
  const PC=64;
  g.roundRect(PC,-18,52,28,6).fill({color:LL});
  g.roundRect(PC,-18,52,28,6).stroke({width:1.5,color:b});
  g.roundRect(PC,-18,52,8,6).fill({color:b});
  for(let wi=0;wi<3;wi++) g.roundRect(PC+6+wi*15,-14,9,12,2).fill({color:w});
  g.rect(PC,-4,52,3).fill({color:s});
  g.rect(PC+22,-10,2,18).fill({color:b});
  // Caboose
  const CC=120;
  g.roundRect(CC,-16,30,24,6).fill({color:r});
  g.roundRect(CC,-16,30,24,6).stroke({width:1.5,color:b});
  g.roundRect(CC,-16,30,8,6).fill({color:b});
  g.roundRect(CC+8,-26,14,12,4).fill({color:b});
  g.roundRect(CC+10,-24,5,8,2).fill({color:w});
  g.circle(CC+28,-6,4).fill({color:0xef4444});
  // Couplers
  for(const cx of [TS-2,PC-2,CC-2]) g.roundRect(cx,-2,4,6,1).fill({color:0x6b7280});
}

// blend two hex colors (t=0 → a, t=1 → b)
function blendColor(a,b,t){
  const ar=(a>>16)&0xff,ag=(a>>8)&0xff,ab=a&0xff;
  const br=(b>>16)&0xff,bg=(b>>8)&0xff,bb=b&0xff;
  const nr=Math.round(ar+(br-ar)*t),ng=Math.round(ag+(bg-ag)*t),nb=Math.round(ab+(bb-ab)*t);
  return (nr<<16)|(ng<<8)|nb;
}

function addWheels(c) {
  const isSmall = (c.type==='tram'||c.sub==='shunter'||c.sub==='narrow'||c.sub==='prairie');
  const isSteam = (c.type==='steam');
  const wheelColor = c.k;

  let wheelDefs;
  if (isSteam) {
    wheelDefs=[
      {x:-64,r:11},{x:-47,r:11},{x:-30,r:11}, // driving
      {x:-73,r:7},{x:8,r:7},                    // small loco
      {x:30,r:7},{x:54,r:7},                    // tender
      {x:70,r:7},{x:102,r:7},                   // passenger
      {x:126,r:7},{x:142,r:7},                  // caboose
    ];
  } else if (c.type==='tram'||isSmall) {
    wheelDefs=[{x:-30,r:8},{x:-10,r:8},{x:10,r:8},{x:30,r:8}];
  } else if (c.type==='highspeed') {
    wheelDefs=[{x:-70,r:9},{x:-40,r:9},{x:10,r:9},{x:60,r:9},{x:100,r:9},{x:140,r:9}];
  } else {
    wheelDefs=[
      {x:-65,r:9},{x:-40,r:9},{x:-15,r:9}, // loco
      {x:38,r:8},{x:68,r:8},                 // coach 1
      {x:98,r:8},{x:128,r:8},                // coach 2
    ];
  }

  for(const{x,r} of wheelDefs){
    const wc=new PIXI.Container(); wc.x=x; wc.y=14;
    const wg=new PIXI.Graphics();
    wg.circle(0,0,r).fill({color:wheelColor});
    wg.circle(0,0,r).stroke({width:2,color:c.b});
    wg.rect(-1.5,-r+2,3,r*2-4).fill({color:c.w});
    wg.rect(-r+2,-1.5,r*2-4,3).fill({color:c.w});
    wg.circle(0,0,2.5).fill({color:c.b});
    wc.addChild(wg);
    trainContainer.addChild(wc);
    wheels.push(wc);
  }
}

// ── Steam ─────────────────────────────────────────────────────────────────────
function emitSteam() {

// ── Letter / Special Boxes ────────────────────────────────────────────────────
const BOX_COLORS = [0xe11d48, 0x7c3aed, 0x0284c7, 0x059669, 0xd97706, 0xbe123c, 0x0d9488, 0x6d28d9];

function spawnLetterBox() {
  if (!gameRunning) return;
  const word = WORDS_LIST[currentWordIdx];
  if (!word) return;
  const targetLetter = word.word[currentLetterIdx];
  const allLetters = 'ABCDEFGHIJKLMNOPRSTUVWY';
  const lanesToFill = shuffle([0, 1, 2]);
  const isEasy = getDifficulty() === 'easy';
  const numBoxes = isEasy ? 1 : 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < Math.min(numBoxes, 3); i++) {
    const lane = lanesToFill[i];
    const isTarget = (i === 0);
    const letter = isTarget ? targetLetter : randomDistractor(targetLetter, allLetters);
    const color = BOX_COLORS[Math.floor(Math.random() * BOX_COLORS.length)];
    letterBoxes.push(createBox({ type: 'letter', lane, letter, isTarget, color }));
  }
}

function spawnSpecialBox(type) {
  if (!gameRunning) return;
  const lane = Math.floor(Math.random() * 3);
  const color = type === 'math' ? 0xd97706 : 0x16a34a;
  letterBoxes.push(createBox({ type, lane, letter: type === 'math' ? '?' : '❤', isTarget: false, color }));
}

function randomDistractor(avoid, pool) {
  let c; do { c = pool[Math.floor(Math.random() * pool.length)]; } while (c === avoid); return c;
}

function createBox({ type, lane, letter, isTarget, color }) {
  const container = new PIXI.Container();
  const lY = LANE_Y[lane];
  container.x = W + 55; container.y = lY - 8;
  const BW = 44, BH = 44;

  // Glow
  let glowGfx = null;
  const glowColor = type === 'math' ? 0xfbbf24 : type === 'heart' ? 0x4ade80 : isTarget ? 0xfbbf24 : null;
  if (glowColor) {
    glowGfx = new PIXI.Graphics();
    glowGfx.roundRect(-BW/2 - 7, -BH/2 - 7, BW + 14, BH + 14, 11).fill({ color: glowColor });
    glowGfx.alpha = 0.55;
    container.addChild(glowGfx);
  }

  // Box body
  const bg = new PIXI.Graphics();
  bg.roundRect(-BW/2, -BH/2, BW, BH, 10).fill({ color });
  bg.roundRect(-BW/2, -BH/2, BW, BH, 10).stroke({
    width: isTarget || type !== 'letter' ? 3 : 1.5,
    color: glowColor || 0xffffff,
    alpha: glowColor ? 1 : 0.4
  });
  container.addChild(bg);

  // Top shine
  const shine = new PIXI.Graphics();
  shine.roundRect(-BW/2 + 2, -BH/2 + 2, BW - 4, 10, 6).fill({ color: 0xffffff });
  shine.alpha = 0.18; container.addChild(shine);

  // Label
  const isEmoji = type !== 'letter';
  const txt = new PIXI.Text({
    text: isEmoji ? (type === 'math' ? '?' : '♥') : letter,
    style: {
      fontFamily: 'Fredoka One, sans-serif',
      fontSize: isEmoji ? 26 : 22,
      fontWeight: '900',
      fill: 0xffffff,
      dropShadow: true, dropShadowBlur: 4, dropShadowDistance: 2, dropShadowColor: 0x000000
    }
  });
  txt.anchor.set(0.5);
  container.addChild(txt);

  boxLayer.addChild(container);
  return { container, lane, letter, isTarget, type, glowGfx, _glowPhase: 0 };
}

// ── Box Collection ────────────────────────────────────────────────────────────
function collectBox(box, idx) {
  if (box.type === 'heart') {
    lives = Math.min(MAX_LIVES, lives + 1);
    spawnCollectParticles(box.container.x, box.container.y, 0x4ade80);
    updateLivesHUD();
    flashScreen('green');
    boxLayer.removeChild(box.container);
    letterBoxes.splice(idx, 1);
    return;
  }

  if (box.type === 'math') {
    boxLayer.removeChild(box.container);
    letterBoxes.splice(idx, 1);
    showMathQuiz();
    return;
  }

  // Letter box
  const word = WORDS_LIST[currentWordIdx];
  if (!word) return;
  if (box.isTarget) {
    spawnCollectParticles(box.container.x, box.container.y, 0xfbbf24);
    boxLayer.removeChild(box.container);
    letterBoxes.splice(idx, 1);
    currentLetterIdx++;
    if (currentLetterIdx >= word.word.length) onWordComplete();
    else refreshHUD();
  } else {
    if (!invincible) { wrongTaps++; triggerWrong(); }
    boxLayer.removeChild(box.container);
    letterBoxes.splice(idx, 1);
  }
}

// ── Math Quiz ─────────────────────────────────────────────────────────────────
let mathTimerRaf = null;
function showMathQuiz() {
  if (!gameRunning) return;
  mathQuizActive = true;
  const q = genMathQuestion();
  const allAnswers = genWrongOptions(q.answer, 3);
  document.getElementById('math-question').textContent = q.text;
  const choicesEl = document.getElementById('math-choices');
  choicesEl.innerHTML = '';
  allAnswers.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'math-btn'; btn.textContent = opt;
    btn.onclick = () => answerMath(opt === q.answer, btn);
    choicesEl.appendChild(btn);
  });
  document.getElementById('math-quiz').classList.add('show');

  // Timer bar
  const fill = document.getElementById('math-timer-fill');
  fill.style.transition = 'none'; fill.style.width = '100%';
  requestAnimationFrame(() => {
    fill.style.transition = 'width 8s linear';
    requestAnimationFrame(() => { fill.style.width = '0%'; });
  });

  // Auto-fail after 8s
  let timedOut = false;
  mathTimerRaf = setTimeout(() => {
    if (mathQuizActive) { timedOut = true; answerMath(false, null, true); }
  }, 8000);
}

function answerMath(correct, btnEl, timeout = false) {
  if (!mathQuizActive) return;
  clearTimeout(mathTimerRaf);
  mathQuizActive = false;
  document.getElementById('math-quiz').classList.remove('show');

  if (correct) {
    mathCorrect++;
    spawnCollectParticles(W / 2, H / 2, 0x4ade80);
    flashScreen('green');
  } else if (!timeout) {
    triggerWrong();
  } else {
    flashScreen('red');
    lives--; if (lives < 0) lives = 0;
    updateLivesHUD();
    if (lives <= 0) { setTimeout(showLose, 600); return; }
  }
}

// ── Rainbow effect ────────────────────────────────────────────────────────────
function spawnRainbow() {
  if (rainbow) { bgLayer.removeChild(rainbow); rainbow = null; }
  const rb = new PIXI.Graphics();
  const colors = [0xff6b6b, 0xffa500, 0xffd700, 0x4ade80, 0x38bdf8, 0x818cf8, 0xf472b6];
  const cx = W * 0.5, cy = H * 0.85;
  for (let i = 0; i < colors.length; i++) {
    const r = 180 + i * 22;
    rb.arc(cx, cy, r, Math.PI, 0, false).stroke({ width: 16, color: colors[i], alpha: 0.55 });
  }
  rb.alpha = 0.7;
  bgLayer.addChild(rb);
  rainbow = rb;
}

// ── Word Complete / Game Logic ─────────────────────────────────────────────────
function onWordComplete() {
  document.querySelectorAll('.slot').forEach(s => { s.classList.remove('filled'); s.classList.add('done'); });
  trainContainer._bounceT = Math.PI;
  spawnRainbow();
  spawnCollectParticles(TRAIN_X, trainContainer.y, 0xfbbf24);
  flashScreen('green');
  gameSpeed = Math.min(gameSpeed * 1.12, 8);
  currentWordIdx++;
  if (currentWordIdx >= WORDS_LIST.length) { setTimeout(showWin, 700); return; }
  currentLetterIdx = 0;
  setTimeout(refreshHUD, 500);
}

function triggerWrong() {
  if (invincible) return;
  invincible = true;
  // Easy mode: 50% chance to survive (shield)
  if (getDifficulty() === 'easy' && Math.random() < 0.5) {
    flashScreen('yellow');
    setTimeout(() => { invincible = false; }, 800);
    return;
  }
  lives--; if (lives < 0) lives = 0;
  updateLivesHUD();
  document.body.classList.add('shaking');
  setTimeout(() => document.body.classList.remove('shaking'), 320);
  flashScreen('red');
  if (lives <= 0) { setTimeout(showLose, 600); return; }
  setTimeout(() => { invincible = false; }, 900);
}

function flashScreen(type) {
  const flash = document.getElementById('flash');
  flash.style.background = type === 'green' ? 'rgba(74,222,128,0.28)' : 'rgba(239,68,68,0.38)';
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 200);
}

// ── Particles ─────────────────────────────────────────────────────────────────
function spawnCollectParticles(x, y, mainColor) {
  const colors = [mainColor, 0xfbbf24, 0x38bdf8, 0xf472b6, 0xc084fc, 0x4ade80];
  for (let i = 0; i < 16; i++) {
    const p = new PIXI.Graphics();
    const r = 3 + Math.random() * 3.5;
    p.circle(0, 0, r).fill({ color: colors[i % colors.length] });
    p.x = x; p.y = y;
    const angle = (Math.PI * 2 * i) / 16 + Math.random() * 0.5;
    const spd = 2.5 + Math.random() * 4;
    p._vx = Math.cos(angle) * spd; p._vy = Math.sin(angle) * spd - 1.5;
    p.alpha = 1;
    particleLayer.addChild(p);
    const tick = app.ticker.add((t) => {
      p.x += p._vx * t.deltaTime; p.y += p._vy * t.deltaTime;
      p._vy += 0.18 * t.deltaTime;
      p.alpha -= 0.035 * t.deltaTime;
      if (p.alpha <= 0) { particleLayer.removeChild(p); app.ticker.remove(tick); }
    });
  }
}

// ── HUD ────────────────────────────────────────────────────────────────────────
function updateLivesHUD() {
  const el = document.getElementById('lives-hud');
  el.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) {
    const s = document.createElement('span');
    s.className = 'life-heart' + (i >= lives ? ' lost' : '');
    s.textContent = '❤️';
    el.appendChild(s);
  }
}

function refreshHUD() {
  const word = WORDS_LIST[currentWordIdx]; if (!word) return;
  document.getElementById('word-emoji').textContent = word.emoji;
  const slotsEl = document.getElementById('word-slots');
  slotsEl.innerHTML = '';
  for (let i = 0; i < word.word.length; i++) {
    const s = document.createElement('span');
    s.className = 'slot' + (i < currentLetterIdx ? ' filled' : '');
    s.textContent = i < currentLetterIdx ? word.word[i] : '_';
    slotsEl.appendChild(s);
  }
  document.getElementById('next-char').textContent = word.word[currentLetterIdx] || '✓';
}

function updateLaneDots() {
  for (let i = 0; i < 3; i++) {
    const d = document.getElementById('ld' + i);
    if (d) d.classList.toggle('active', i === playerLane);
  }
}

// ── Controls ───────────────────────────────────────────────────────────────────
function switchLane(dir) {
  if (!gameRunning || mathQuizActive) return;
  const n = Math.max(0, Math.min(2, playerLane + dir));
  if (n === playerLane) return;
  playerLane = n; updateLaneDots();
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') switchLane(-1);
  if (e.key === 'ArrowDown') switchLane(1);
});
document.getElementById('pixi-canvas').addEventListener('click', e => {
  if (!gameRunning || mathQuizActive) return;
  const y = e.clientY;
  for (let i = 0; i < 3; i++) {
    if (Math.abs(y - LANE_Y[i]) < 55) { playerLane = i; updateLaneDots(); return; }
  }
});

// ── Win / Lose ─────────────────────────────────────────────────────────────────
function showWin() {
  gameRunning = false;
  const elapsed = (Date.now() - startTime) / 1000;
  const timeBonus = elapsed < WORDS_LIST.length * 15;
  let s = 3;
  if (wrongTaps === 0) s = Math.min(5, s + 1);
  if (timeBonus) s = Math.min(5, s + 1);
  if (mathCorrect >= 2) s = Math.min(5, s + 1);
  sessionStorage.setItem('g15Result', JSON.stringify({ stars: Math.min(5, s) }));
  const msg = wrongTaps === 0
    ? `Sempurna! Tidak ada kesalahan! Matematika Benar: ${mathCorrect}`
    : `${wrongTaps} kesalahan. Matematika benar: ${mathCorrect}. Terus berlatih!`;
  const finalStars = Math.min(5, s);
  const title = finalStars >= 5 ? 'Sempurna!' : finalStars >= 4 ? 'Hebat Sekali!' : finalStars >= 3 ? 'Bagus!' : 'Selesai!';
  const nextLevel = LEVEL < 30 ? () => { sessionStorage.setItem('g15Config', JSON.stringify({level: LEVEL + 1})); location.reload(); } : null;
  GameModal.show({
    emoji: finalStars >= 4 ? '🏆' : '⭐', title, stars: finalStars, msg,
    onNext: nextLevel, onAgain: () => restartGame(), onBack: () => goBack()
  });
}

function showLose() {
  gameRunning = false;
  sessionStorage.setItem('g15Result', JSON.stringify({ stars: 1 }));
  GameModal.show({
    emoji: '💔', title: 'Habis Nyawa!', stars: 1, msg: 'Jangan menyerah, coba lagi!',
    onAgain: () => restartGame(), onBack: () => goBack()
  });
}

function restartGame() {
  document.getElementById('math-quiz').classList.remove('show');
  clearTimeout(mathTimerRaf);
  app.destroy(false, { children: true });
  playerLane = 1; currentWordIdx = 0; currentLetterIdx = 0;
  wrongTaps = 0; mathCorrect = 0; invincible = false; mathQuizActive = false;
  gameRunning = false; gameSpeed = 2 + LEVEL * 0.15;
  lives = MAX_LIVES;
  wheels = []; steamPuffs = []; letterBoxes = []; bgStars = []; sleepers = [];
  bgClouds = []; bgFireflies = []; rainbow = null; LANE_Y = [];
  mathBoxTimer = 0; heartBoxTimer = 0; totalBoxSpawned = 0;
  nextMathAt = MATH_BOX_INTERVAL(); nextHeartAt = HEART_BOX_INTERVAL();
  WORDS_LIST = pickWords(WORD_COUNT);
  initPixi();
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const TYPE_LABEL = {
  'steam':'Steam','diesel':'Diesel','electric':'Elektrik',
  'highspeed':'Highspeed','tram':'Tram','heritage':'Heritage'
};

function buildTrainGrid() {
  const grid = document.getElementById('train-grid');
  grid.innerHTML = '';
  const filtered = activeTrainFilter === 'all'
    ? TRAIN_CATALOG
    : TRAIN_CATALOG.filter(e => e.type === activeTrainFilter);
  const countEl = document.getElementById('ts-count');
  if (countEl) countEl.textContent = filtered.length + ' KERETA ' + (activeTrainFilter === 'all' ? 'TERSEDIA' : (TYPE_LABEL[activeTrainFilter]||'').toUpperCase());
  filtered.forEach(entry => {
    const card = document.createElement('div');
    card.className = 'tcard' + (selectedTrain && selectedTrain.id === entry.id ? ' selected' : '');
    const canvas = document.createElement('canvas');
    canvas.width = 120; canvas.height = 48;
    const info = document.createElement('div');
    info.className = 'tcard-info';
    const name = document.createElement('span');
    name.className = 'tname';
    name.textContent = entry.name;
    const sub = document.createElement('span');
    sub.className = 'tsub';
    sub.textContent = (TYPE_LABEL[entry.type] || entry.type) + (entry.sub ? ' · ' + entry.sub : '');
    info.appendChild(name);
    info.appendChild(sub);
    card.appendChild(canvas);
    card.appendChild(info);
    grid.appendChild(card);
    // Draw after append so a throw doesn't prevent card from showing
    try {
      drawTrainPreview2d(canvas, entry);
    } catch(e) {
      try {
        const ctx = canvas.getContext('2d');
        if (ctx) {
          ctx.fillStyle = '#' + entry.b.toString(16).padStart(6, '0');
          ctx.fillRect(0, 0, 120, 48);
        }
      } catch(_) {}
    }
    card.addEventListener('click', () => {
      selectedTrain = entry;
      document.getElementById('train-select').style.display = 'none';
      initPixi().catch(e => console.error('g15 pixi init error:', e));
    });
  });
}

function _hex(n) {
  return `rgb(${(n>>16)&0xff},${(n>>8)&0xff},${n&0xff})`;
}

function drawTrainPreview2d(canvas, c) {
  const ctx = canvas.getContext('2d');
  const CW = canvas.width, CH = canvas.height;
  ctx.clearRect(0, 0, CW, CH);
  const type = c.type, sub = c.sub;
  const B=_hex(c.b),R=_hex(c.r),S=_hex(c.s),W=_hex(c.w),K=_hex(c.k);
  const V=c.v||1; const vi=V-1;

  // ── Track (all types) ───────────────────────────────────────────────────
  ctx.fillStyle='#3b2a14'; ctx.fillRect(0,CH-7,CW,7);
  for(let i=0;i<CW;i+=10){ctx.fillStyle='#5a3a1a';ctx.fillRect(i,CH-6,7,5);}
  ctx.fillStyle='#999'; ctx.fillRect(0,CH-7,CW,2);
  ctx.fillStyle='#999'; ctx.fillRect(0,CH-4,CW,2);
  const tY=CH-7; // top of track

  // ── Helper: draw spoked wheel ────────────────────────────────────────────
  function wheel(cx,cy,r,rimC,spokeC,hubC,spokes){
    ctx.fillStyle=rimC; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=spokeC; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
    const n=spokes||6;
    for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*(r-1),cy+Math.sin(a)*(r-1));ctx.stroke();}
    ctx.fillStyle=hubC; ctx.beginPath(); ctx.arc(cx,cy,2.2,0,Math.PI*2); ctx.fill();
  }
  function bogie(cx,cy,rimC,spokeC){
    ctx.fillStyle='#555'; ctx.fillRect(cx-14,cy-3,28,5);
    ctx.beginPath(); ctx.arc(cx-9,cy+1,5,0,Math.PI*2); ctx.fillStyle=rimC; ctx.fill();
    ctx.beginPath(); ctx.arc(cx+9,cy+1,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=spokeC; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx-9,cy+1,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+9,cy+1,5,0,Math.PI*2); ctx.stroke();
  }
  function pantoV(cx,roofY,w,col){
    ctx.strokeStyle=col||'#ccc'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx-w/2,roofY+1); ctx.lineTo(cx,roofY-9); ctx.lineTo(cx+w/2,roofY+1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-w/4,roofY-4); ctx.lineTo(cx+w/4,roofY-4); ctx.stroke();
    ctx.fillStyle=col||'#ccc'; ctx.fillRect(cx-w/2-1,roofY,3,5); ctx.fillRect(cx+w/2-1,roofY,3,5);
  }
  function catWire(col){
    ctx.strokeStyle=col||'rgba(180,180,180,0.6)'; ctx.lineWidth=1;
    ctx.setLineDash([4,3]); ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(CW,4); ctx.stroke(); ctx.setLineDash([]);
  }

  // ══════════════════════════════════════════════════════════════════════════
  // STEAM  — each vi is a structurally different locomotive type
  // ══════════════════════════════════════════════════════════════════════════
  if(type==='steam'){
    const wY=tY;

    if(sub==='classic'){
      if(vi===0){ // 0-4-0T saddle tank shunter – tiny, no tender
        ctx.fillStyle=B; ctx.fillRect(28,10,50,20);
        ctx.fillStyle=R; ctx.beginPath(); ctx.arc(53,10,13,Math.PI,0); ctx.fill(); // saddle tank
        ctx.fillStyle=W; ctx.fillRect(60,13,10,9);
        ctx.fillStyle='#111'; ctx.fillRect(32,0,8,12); ctx.fillRect(29,0,14,4);
        ctx.fillStyle=S; ctx.beginPath(); ctx.arc(48,10,5,Math.PI,0); ctx.fill();
        wheel(40,wY,9,K,S,R,6); wheel(60,wY,9,K,S,R,6);
        ctx.strokeStyle=R; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(40,wY); ctx.lineTo(60,wY); ctx.stroke();
      } else if(vi===1){ // 2-6-0 Mogul + tender
        ctx.fillStyle=B; ctx.fillRect(16,11,68,17);
        ctx.beginPath(); ctx.ellipse(16,19,4,8,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=R; ctx.fillRect(86,7,26,21); ctx.fillStyle=W; ctx.fillRect(89,10,8,8); ctx.fillRect(99,10,8,8);
        ctx.fillStyle='#111'; ctx.fillRect(20,1,8,11); ctx.fillRect(17,1,14,4);
        ctx.fillStyle=S; ctx.beginPath(); ctx.arc(68,11,5,Math.PI,0); ctx.fill();
        wheel(10,wY+3,5,K,S,R,4);
        [34,52,70].forEach(x=>wheel(x,wY,8,K,S,R,6));
        ctx.strokeStyle=R; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(34,wY); ctx.lineTo(70,wY); ctx.stroke();
        ctx.fillStyle=S; ctx.fillRect(82,21,4,7); ctx.fillRect(112,21,4,7);
      } else if(vi===2){ // 4-6-2 Pacific + long tender
        ctx.fillStyle=B; ctx.fillRect(10,11,78,16);
        ctx.beginPath(); ctx.ellipse(10,19,4,8,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=R; ctx.fillRect(90,6,26,22); ctx.fillStyle=W; ctx.fillRect(93,9,8,8); ctx.fillRect(104,9,7,8);
        ctx.fillStyle='#111'; ctx.fillRect(16,2,7,10); ctx.fillRect(13,2,13,4);
        ctx.fillStyle=R; ctx.fillRect(12,4,6,13); ctx.fillRect(24,4,6,13); // deflectors
        ctx.fillStyle=S; ctx.beginPath(); ctx.arc(76,11,5,Math.PI,0); ctx.fill();
        wheel(5,wY+3,4,K,S,R,4);
        [28,46,64].forEach(x=>wheel(x,wY,9,K,S,R,6));
        wheel(82,wY+3,5,K,S,R,4);
        ctx.strokeStyle=R; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(28,wY); ctx.lineTo(64,wY); ctx.stroke();
        ctx.fillStyle=S; ctx.fillRect(86,21,4,7); ctx.fillRect(116,21,4,7);
      } else if(vi===3){ // 2-8-0 Consolidation – 4 big drives + double chimney
        ctx.fillStyle=B; ctx.fillRect(12,10,78,18);
        ctx.beginPath(); ctx.ellipse(12,19,4,9,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=R; ctx.fillRect(92,6,24,22); ctx.fillStyle=W; ctx.fillRect(95,9,8,8); ctx.fillRect(106,9,7,8);
        ctx.fillStyle='#111'; ctx.fillRect(18,0,7,13); ctx.fillRect(15,0,13,4);
        ctx.fillStyle='#111'; ctx.fillRect(28,0,7,13); ctx.fillRect(25,0,13,4);
        ctx.fillStyle=S; ctx.beginPath(); ctx.arc(78,10,5,Math.PI,0); ctx.fill();
        wheel(7,wY+3,4,K,S,R,4);
        [26,42,58,74].forEach(x=>wheel(x,wY,8,K,S,R,6));
        ctx.strokeStyle=R; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(26,wY); ctx.lineTo(74,wY); ctx.stroke();
        ctx.fillStyle=S; ctx.fillRect(88,21,4,7); ctx.fillRect(116,21,4,7);
      } else { // vi=4: Beyer-Garratt articulated
        ctx.fillStyle=B; ctx.fillRect(0,13,34,15); // left engine
        ctx.fillStyle='#111'; ctx.fillRect(4,2,7,13); ctx.fillRect(1,2,13,4);
        ctx.fillStyle=S; ctx.beginPath(); ctx.arc(26,13,4,Math.PI,0); ctx.fill();
        ctx.fillStyle=R; ctx.fillRect(34,8,52,20); // central tank
        ctx.fillStyle=W; ctx.fillRect(52,11,10,10); ctx.fillRect(64,11,10,10);
        ctx.fillStyle=B; ctx.fillRect(86,13,34,15); // right engine
        ctx.fillStyle='#111'; ctx.fillRect(109,2,7,13); ctx.fillRect(106,2,13,4);
        ctx.fillStyle=S; ctx.beginPath(); ctx.arc(94,13,4,Math.PI,0); ctx.fill();
        [10,22].forEach(x=>wheel(x,wY,7,K,S,R,6));
        [98,110].forEach(x=>wheel(x,wY,7,K,S,R,6));
        bogie(60,tY-1,K,S);
      }

    } else if(sub==='pacific'){
      if(vi===0){ // Standard exposed-motion Pacific
        ctx.fillStyle=B; ctx.fillRect(16,11,76,16);
        ctx.beginPath(); ctx.ellipse(16,19,5,8,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=R; ctx.fillRect(94,6,22,22); ctx.fillStyle=W; ctx.fillRect(97,9,8,7); ctx.fillRect(107,9,7,7);
        ctx.fillStyle='#1a1a1a'; ctx.fillRect(20,2,7,10); ctx.fillRect(17,2,13,4);
        ctx.fillStyle=S; ctx.beginPath(); ctx.arc(80,11,5,Math.PI,0); ctx.fill();
        ctx.fillStyle=R; ctx.fillRect(14,4,7,14); ctx.fillRect(26,4,7,14);
        wheel(10,wY+3,5,K,S,R,4);
        [36,54,72].forEach(x=>wheel(x,wY,9,K,S,R,6));
        wheel(90,wY+3,5,K,S,R,4);
        ctx.strokeStyle=R; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(36,wY); ctx.lineTo(72,wY); ctx.stroke();
        ctx.fillStyle=S; ctx.fillRect(90,21,4,7); ctx.fillRect(116,21,4,7);
      } else if(vi===1){ // Streamlined casing (smooth shell, no exposed boiler)
        ctx.fillStyle=B;
        ctx.beginPath(); ctx.moveTo(6,28); ctx.quadraticCurveTo(6,10,20,10); ctx.lineTo(94,10); ctx.lineTo(94,28); ctx.closePath(); ctx.fill();
        ctx.fillStyle=S; ctx.fillRect(20,12,74,4); // speed stripe
        ctx.fillStyle=R; ctx.fillRect(94,8,22,20); ctx.fillStyle=W; ctx.fillRect(97,11,8,8); ctx.fillRect(107,11,7,8);
        ctx.fillStyle='#38bdf8'; ctx.beginPath(); ctx.arc(7,20,5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=W; [30,50,70].forEach(x=>ctx.fillRect(x,12,12,7));
        wheel(6,wY+3,4,K,S,R,4);

function showStationBanner(station) {
  const el = document.getElementById('station-banner');
  document.getElementById('sb-icon').textContent = station.icon;
  document.getElementById('sb-name').textContent = station.name;
  document.getElementById('sb-landmark').textContent = station.landmark;
  el.classList.remove('fade-out');
  el.classList.add('visible');
  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => el.classList.remove('visible', 'fade-out'), 600);
  }, 3000);
}

function updateStationChip() {
  const station = getCurrentStation();
  document.getElementById('sc-name').textContent = station.name;
  document.getElementById('station-chip').style.display = 'block';
}
