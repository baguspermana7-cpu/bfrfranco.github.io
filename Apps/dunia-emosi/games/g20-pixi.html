<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ducky Volley 🏐</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100svh;overflow:hidden;background:#38bdf8;font-family:'Fredoka One',sans-serif;touch-action:none}
#pixi-canvas{position:fixed;inset:0;width:100vw;height:100svh;display:block}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:8px;padding:8px 12px;background:linear-gradient(180deg,rgba(0,0,0,0.55) 0%,transparent 100%);pointer-events:none}
#btn-back{background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);border-radius:12px;color:#fff;padding:6px 10px;font-size:14px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0}
#game-badge{background:rgba(0,0,0,0.4);border:1.5px solid rgba(251,191,36,0.4);border-radius:10px;padding:4px 10px;color:#fbbf24;font-size:12px;font-weight:700;flex-shrink:0}
#hud-center{flex:1;text-align:center}
#score-display{font-size:clamp(20px,6vw,32px);font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.5)}
#level-text{font-size:10px;color:#bfdbfe}
#round-text{font-size:11px;color:#fbbf24;font-weight:700;flex-shrink:0}

/* ── Controls ── */
#controls{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;padding:8px 12px 16px;pointer-events:none}
.ctrl-zone{width:44%;height:70px;display:flex;gap:5px;pointer-events:all}
.ctrl-btn{flex:1;border-radius:14px;border:2px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.4);color:#fff;font-size:22px;font-weight:900;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.ctrl-btn:active{background:rgba(139,92,246,0.5);transform:scale(0.93)}
#btn-jump{background:rgba(251,191,36,0.4);border-color:rgba(251,191,36,0.5);font-size:16px}

/* ── Quiz ── */
#quiz-panel{position:fixed;bottom:0;left:0;right:0;z-index:200;display:none;flex-direction:column;align-items:center;padding:12px 16px 24px;background:linear-gradient(0deg,rgba(10,2,25,0.97),rgba(26,5,53,0.95));border-top:3px solid #fbbf24;backdrop-filter:blur(14px)}
#quiz-panel.show{display:flex}
#quiz-question{color:#fff;font-size:clamp(20px,6vw,30px);font-weight:900;text-align:center;margin-bottom:12px;text-shadow:0 0 16px rgba(251,191,36,0.5)}
#quiz-choices{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.qbtn{min-width:60px;padding:12px 8px;border:2.5px solid rgba(255,255,255,0.3);border-radius:14px;background:linear-gradient(160deg,#7C3AED,#6D28D9);color:#fff;font-size:clamp(16px,5vw,24px);font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 0 #4C1D95;-webkit-tap-highlight-color:transparent}
.qbtn:nth-child(2){background:linear-gradient(160deg,#E85A32,#C84020);box-shadow:0 4px 0 #9A2A10}
.qbtn:nth-child(3){background:linear-gradient(160deg,#2DBF7E,#1A9E66);box-shadow:0 4px 0 #0A7A48}
.qbtn:nth-child(4){background:linear-gradient(160deg,#F59E0B,#D97706);box-shadow:0 4px 0 #92400E}
.qbtn.correct{border-color:#4ade80;background:rgba(74,222,128,0.3);animation:pop .4s ease}
.qbtn.wrong{border-color:#ef4444;background:rgba(239,68,68,0.3);animation:shake .35s ease}
@keyframes pop{0%{transform:scale(1.1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── Round Banner ── */
#round-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;display:none;flex-direction:column;align-items:center;gap:6px;background:rgba(0,0,0,0.85);border:3px solid #fbbf24;border-radius:24px;padding:24px 40px;backdrop-filter:blur(12px);color:#fff;font-weight:900}
#round-banner.show{display:flex}
#round-banner .rb-title{font-size:28px;color:#fbbf24}
#round-banner .rb-score{font-size:20px;color:#bfdbfe}

/* ── Start Overlay ── */
#start-overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,30,60,0.92);backdrop-filter:blur(8px)}
#start-overlay.hidden{display:none}
.start-icon{font-size:72px}
.start-title{font-size:clamp(26px,8vw,40px);font-weight:900;color:#fbbf24}
.start-sub{font-size:16px;color:#bfdbfe}
.start-hint{font-size:15px;color:#86efac;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{50%{opacity:.5;transform:scale(.96)}}
</style>
</head>
<body>

<canvas id="pixi-canvas"></canvas>

<div id="hud">
  <button id="btn-back" onclick="goBack()">◀</button>
  <div id="game-badge">🏐 Ducky Volley</div>
  <div id="hud-center">
    <div id="level-text"></div>
    <div id="score-display">0 — 0</div>
  </div>
  <div id="round-text">Round 1/3</div>
</div>

<div id="controls">
  <div class="ctrl-zone">
    <button class="ctrl-btn" id="btn-left">◀</button>
    <button class="ctrl-btn" id="btn-right">▶</button>
  </div>
  <div class="ctrl-zone" style="justify-content:flex-end">
    <button class="ctrl-btn" id="btn-jump">🦆 JUMP</button>
  </div>
</div>

<div id="quiz-panel">
  <div id="quiz-question"></div>
  <div id="quiz-choices"></div>
</div>

<div id="round-banner"><div class="rb-title"></div><div class="rb-score"></div></div>

<div id="start-overlay">
  <div class="start-icon">🦆🏐</div>
  <div class="start-title">Ducky Volley</div>
  <div class="start-sub" id="start-level"></div>
  <div class="start-hint">Tap untuk Mulai!</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script src="game-modal.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const cfg = { level: 1 }
try { const s = sessionStorage.getItem('g20Config'); if (s) Object.assign(cfg, JSON.parse(s)) } catch(_){}
document.getElementById('level-text').textContent = `Level ${cfg.level}`
document.getElementById('start-level').textContent = `Level ${cfg.level}`

// Questions
const QS = [
  {q:'1+1=?',ans:'2',w:['3','4','1']},{q:'3+2=?',ans:'5',w:['4','6','7']},{q:'5-2=?',ans:'3',w:['2','4','1']},
  {q:'4+4=?',ans:'8',w:['7','9','6']},{q:'2+3=?',ans:'5',w:['4','6','3']},{q:'6-3=?',ans:'3',w:['2','4','5']},
  {q:'3x2=?',ans:'6',w:['4','8','5']},{q:'10-4=?',ans:'6',w:['5','7','4']},{q:'7+2=?',ans:'9',w:['8','10','11']},
  {q:'Warna 🔴?',ans:'MERAH',w:['BIRU','HIJAU','KUNING']},{q:'Warna 🔵?',ans:'BIRU',w:['MERAH','HIJAU','UNGU']},
  {q:'🐱 Huruf awal?',ans:'K',w:['A','M','B']},{q:'🍎 Huruf awal?',ans:'A',w:['I','U','E']},
]
function pickQ(){return QS[Math.floor(Math.random()*QS.length)]}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let W, H, GROUND_Y, NET_X, NET_TOP, NET_H
const GRAVITY = 0.42
const BALL_R = 16
const DUCK_R = 28
const JUMP_POWER = -12
const MOVE_SPD = 5
const POINTS_TO_WIN = 5
const TOTAL_ROUNDS = 3

const S = {
  running:false, paused:false, started:false, gameOver:false,
  pScore:0, cScore:0, pRounds:0, cRounds:0, round:1,
  quizActive:false, correctQ:0, wrongQ:0,
  // Ball
  bx:0, by:0, bvx:0, bvy:0, bSpin:0, lastHitter:'none',
  // Player duck
  px:0, py:0, pvx:0, pvy:0, pGnd:true, pSet:false, pHasCrown:false,
  // CPU duck
  cx:0, cy:0, cvx:0, cvy:0, cGnd:true, cHasCrown:false,
  // Powerup
  crabX:-100, crabDir:1, crabActive:false, crabTimer:0,
  powerup:null, powerupTimer:0,
  // FX
  shakeX:0, shakeY:0, shakeTimer:0, frame:0,
  // Physics variation
  gravMod:1, bounceMod:1,
  // Input
  moveL:false, moveR:false, jump:false,
}

function randomizePhysics(){
  S.gravMod = 0.9 + Math.random()*0.2 // ±10%
  S.bounceMod = 0.85 + Math.random()*0.3 // ±15%
  NET_H = H*0.2 + Math.random()*H*0.06 // slight variation
  NET_TOP = GROUND_Y - NET_H
}

// ═══════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════
let ac
function ea(){if(!ac)try{ac=new(window.AudioContext||window.webkitAudioContext)()}catch(_){}}
function tone(f,d,t='sine',v=0.12){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.linearRampToValueAtTime(0,ac.currentTime+d/1000);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d/1000)}
function sfxHit(){tone(600,70);setTimeout(()=>tone(800,50),25)}
function sfxSmash(){tone(200,120,'square',0.15);setTimeout(()=>tone(400,80),40)}
function sfxScore(){tone(900,100);setTimeout(()=>tone(1100,120),80)}
function sfxBounce(){tone(350,40,'triangle',0.08)}
function sfxWhistle(){tone(1200,200);setTimeout(()=>tone(1000,150),120)}
function sfxPowerup(){tone(600,80);setTimeout(()=>tone(900,100),60);setTimeout(()=>tone(1200,120),120)}

// ═══════════════════════════════════════════════════════════
//  PIXI INIT
// ═══════════════════════════════════════════════════════════
let app, bgLayer, courtLayer, entityLayer, fxLayer
const particles = [], trails = []

;(async function init(){
  app = new PIXI.Application()
  await app.init({
    canvas: document.getElementById('pixi-canvas'),
    width: window.innerWidth, height: window.innerHeight,
    backgroundAlpha:1, backgroundColor:0x38bdf8,
    antialias:true, resolution: Math.min(window.devicePixelRatio,2)
  })
  W = app.screen.width; H = app.screen.height
  GROUND_Y = H * 0.75; NET_X = W / 2; NET_H = H * 0.22; NET_TOP = GROUND_Y - NET_H

  bgLayer = new PIXI.Container(); app.stage.addChild(bgLayer)
  courtLayer = new PIXI.Container(); app.stage.addChild(courtLayer)
  entityLayer = new PIXI.Container(); app.stage.addChild(entityLayer)
  fxLayer = new PIXI.Container(); app.stage.addChild(fxLayer)

  drawBackground()
  drawCourt()
  resetRound('player')
  app.ticker.add(gameLoop)
})().catch(e=>{
  console.error('G20 init failed:',e)
  document.querySelector('.start-hint').textContent='Gagal memuat. Muat ulang halaman.'
})

// ═══════════════════════════════════════════════════════════
//  BACKGROUND (parallax beach)
// ═══════════════════════════════════════════════════════════
let clouds=[], waveOffset=0, palmTrees=[]
function drawBackground(){
  // Sky gradient
  const sky = new PIXI.Graphics()
  sky.rect(0,0,W,GROUND_Y).fill(0x38bdf8)
  sky.rect(0,0,W,H*0.3).fill({color:0x7dd3fc,alpha:0.5})
  sky.rect(0,H*0.15,W,H*0.15).fill({color:0xbae6fd,alpha:0.3})
  bgLayer.addChild(sky)

  // Sun with glow
  const sun = new PIXI.Graphics()
  sun.circle(W*0.82,H*0.1,45).fill({color:0xfef08a,alpha:0.3})
  sun.circle(W*0.82,H*0.1,32).fill({color:0xfef08a,alpha:0.7})
  sun.circle(W*0.82,H*0.1,22).fill(0xfefce8)
  bgLayer.addChild(sun)

  // Clouds
  for(let i=0;i<4;i++){
    const cl=new PIXI.Graphics()
    const cw=35+Math.random()*40
    cl.ellipse(0,0,cw,cw*0.35).fill({color:0xffffff,alpha:0.65})
    cl.ellipse(cw*0.5,-cw*0.1,cw*0.6,cw*0.3).fill({color:0xffffff,alpha:0.5})
    cl.ellipse(-cw*0.4,-cw*0.05,cw*0.5,cw*0.25).fill({color:0xffffff,alpha:0.45})
    cl.x=Math.random()*W; cl.y=H*0.06+Math.random()*H*0.12
    cl._speed=0.15+Math.random()*0.2
    bgLayer.addChild(cl); clouds.push(cl)
  }

  // Far mountains/hills
  const hills=new PIXI.Graphics()
  hills.moveTo(0,GROUND_Y)
  for(let x=0;x<=W;x+=15){
    const y=GROUND_Y-20-Math.sin(x*0.006)*25-Math.sin(x*0.015)*12
    hills.lineTo(x,y)
  }
  hills.lineTo(W,GROUND_Y).closePath().fill({color:0x22c55e,alpha:0.4})
  bgLayer.addChild(hills)

  // Palm trees
  for(const px of[W*0.08,W*0.92]){
    const palm=new PIXI.Graphics()
    // Trunk
    palm.rect(px-4,GROUND_Y-80,8,80).fill(0x92400e)
    palm.rect(px-3,GROUND_Y-80,6,80).fill({color:0xa16207,alpha:0.5})
    // Leaves
    for(let a=-2.5;a<=0.5;a+=0.5){
      palm.moveTo(px,GROUND_Y-80)
      const lx=px+Math.cos(a)*55, ly=GROUND_Y-80+Math.sin(a)*30
      palm.quadraticCurveTo(px+Math.cos(a)*30,GROUND_Y-90,lx,ly)
      palm.lineTo(px,GROUND_Y-78)
      palm.fill({color:0x22c55e,alpha:0.7})
    }
    bgLayer.addChild(palm)
  }
}

// ═══════════════════════════════════════════════════════════
//  COURT + NET
// ═══════════════════════════════════════════════════════════
let netGfx
function drawCourt(){
  // Sand
  const sand=new PIXI.Graphics()
  sand.rect(0,GROUND_Y,W,H-GROUND_Y).fill(0xf5d08a)
  sand.rect(0,GROUND_Y,W,4).fill({color:0xd4a843,alpha:0.5})
  // Sand texture dots
  for(let i=0;i<30;i++){
    const sx=Math.random()*W, sy=GROUND_Y+5+Math.random()*(H-GROUND_Y-10)
    sand.circle(sx,sy,1+Math.random()*1.5).fill({color:0xe8c06a,alpha:0.4})
  }
  courtLayer.addChild(sand)

  // Ocean waves at bottom
  const ocean=new PIXI.Graphics()
  ocean.rect(0,H*0.92,W,H*0.08).fill({color:0x38bdf8,alpha:0.25})
  ocean.rect(0,H*0.95,W,H*0.05).fill({color:0x0ea5e9,alpha:0.15})
  courtLayer.addChild(ocean)

  // Net
  netGfx=new PIXI.Graphics()
  drawNet()
  courtLayer.addChild(netGfx)
}

function drawNet(){
  netGfx.clear()
  // Post
  netGfx.rect(NET_X-4,NET_TOP-6,8,GROUND_Y-NET_TOP+6).fill(0x6b7280)
  netGfx.rect(NET_X-3,NET_TOP-6,6,GROUND_Y-NET_TOP+6).fill({color:0x9ca3af,alpha:0.5})
  // Post cap
  netGfx.circle(NET_X,NET_TOP-6,6).fill(0xf8fafc)
  // Net mesh
  const meshW=24
  for(let y=NET_TOP;y<GROUND_Y;y+=8){
    netGfx.rect(NET_X-meshW,y,meshW*2,1).fill({color:0xf8fafc,alpha:0.3})
  }
  for(let x=NET_X-meshW;x<=NET_X+meshW;x+=6){
    netGfx.rect(x,NET_TOP,1,GROUND_Y-NET_TOP).fill({color:0xf8fafc,alpha:0.2})
  }
  // Net border rope
  netGfx.rect(NET_X-meshW,NET_TOP,meshW*2,2).fill({color:0xf8fafc,alpha:0.5})
}

// ═══════════════════════════════════════════════════════════
//  DUCK DRAWING
// ═══════════════════════════════════════════════════════════
function drawDuck(g, x, y, color, darkColor, facing, hasCrown, squash=1){
  g.clear()
  const sw=1/squash, sh=squash // squash/stretch

  // Shadow
  g.ellipse(x,GROUND_Y+3,DUCK_R*0.8,5).fill({color:0x000000,alpha:0.15})

  // Body
  g.ellipse(x,y-DUCK_R*0.5*sh,DUCK_R*sw,DUCK_R*0.6*sh).fill(color)
  // Belly
  g.ellipse(x,y-DUCK_R*0.4*sh,DUCK_R*0.7*sw,DUCK_R*0.4*sh).fill(0xfef3c7)
  // Wing
  const wingFlap=Math.sin(S.frame*0.25)*3
  g.ellipse(x-facing*10,y-DUCK_R*0.5*sh,8*sw,(12+wingFlap)*sh).fill(darkColor)

  // Head
  const hx=x+facing*16, hy=y-DUCK_R*sh
  g.circle(hx,hy,14*Math.min(sw,sh)).fill(color)
  // Eye
  g.circle(hx+facing*7,hy-2,4).fill(0x1c1917)
  g.circle(hx+facing*8,hy-3,2).fill(0xffffff)
  // Beak
  g.poly([hx+facing*12,hy+1, hx+facing*22,hy+4, hx+facing*12,hy+7]).fill(0xf97316)
  // Blush
  g.circle(hx+facing*3,hy+6,4).fill({color:0xfca5a5,alpha:0.35})

  // Feet
  g.roundRect(x-10,y-3,8,4,2).fill(0xf97316)
  g.roundRect(x+3,y-3,8,4,2).fill(0xf97316)

  // Crown
  if(hasCrown){
    g.poly([hx-8,hy-16, hx-5,hy-22, hx-2,hy-16, hx+1,hy-24, hx+4,hy-16, hx+7,hy-22, hx+10,hy-16]).fill(0xfbbf24)
    g.poly([hx-8,hy-16, hx-5,hy-22, hx-2,hy-16, hx+1,hy-24, hx+4,hy-16, hx+7,hy-22, hx+10,hy-16]).stroke({color:0xf59e0b,width:1})
    g.circle(hx+1,hy-20,2).fill(0xef4444)
  }
}

// ═══════════════════════════════════════════════════════════
//  BALL DRAWING + TRAIL
// ═══════════════════════════════════════════════════════════
let ballGfx, playerGfx, cpuGfx, crabGfx
function createEntities(){
  playerGfx=new PIXI.Graphics(); entityLayer.addChild(playerGfx)
  cpuGfx=new PIXI.Graphics(); entityLayer.addChild(cpuGfx)
  ballGfx=new PIXI.Graphics(); entityLayer.addChild(ballGfx)
  crabGfx=new PIXI.Graphics(); entityLayer.addChild(crabGfx)
}
createEntities()

function drawBall(){
  ballGfx.clear()
  // Ball shadow
  ballGfx.ellipse(S.bx,GROUND_Y+2,BALL_R*0.7,4).fill({color:0x000000,alpha:0.12})
  // Ball body
  ballGfx.circle(S.bx,S.by,BALL_R).fill(0xf8fafc)
  ballGfx.circle(S.bx,S.by,BALL_R).stroke({color:0x94a3b8,width:2})
  // Volleyball lines (rotate with spin)
  const a=S.bSpin
  for(let i=0;i<3;i++){
    const ang=a+i*Math.PI/1.5
    const x1=S.bx+Math.cos(ang)*(BALL_R-3), y1=S.by+Math.sin(ang)*(BALL_R-3)
    const x2=S.bx+Math.cos(ang+Math.PI)*(BALL_R-3), y2=S.by+Math.sin(ang+Math.PI)*(BALL_R-3)
    ballGfx.moveTo(x1,y1).lineTo(x2,y2).stroke({color:0x3b82f6,width:1.2,alpha:0.4})
  }
}

// ═══════════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════════
function spawnSand(x,y,count=6){
  for(let i=0;i<count;i++){
    const g=new PIXI.Graphics()
    const r=1.5+Math.random()*2
    g.circle(0,0,r).fill(0xf5d08a)
    g.x=x; g.y=y
    fxLayer.addChild(g)
    particles.push({g, vx:(Math.random()-0.5)*4, vy:-Math.random()*5-2, grav:0.25, life:1, decay:0.03+Math.random()*0.02})
  }
}
function spawnConfetti(x,y,count=12){
  const colors=[0xfbbf24,0xef4444,0x22c55e,0x3b82f6,0xc084fc]
  for(let i=0;i<count;i++){
    const g=new PIXI.Graphics()
    g.rect(0,0,4,4).fill(colors[i%colors.length])
    g.x=x; g.y=y
    fxLayer.addChild(g)
    particles.push({g, vx:(Math.random()-0.5)*8, vy:-Math.random()*8-3, grav:0.18, life:1, decay:0.018})
  }
}
function spawnTrail(){
  if(S.frame%2!==0)return
  const g=new PIXI.Graphics()
  g.circle(0,0,BALL_R*0.6).fill({color:0xbfdbfe,alpha:0.3})
  g.x=S.bx; g.y=S.by
  fxLayer.addChild(g)
  trails.push({g, life:1, decay:0.08})
}
function tickParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]
    p.vy+=p.grav*dt; p.g.x+=p.vx*dt; p.g.y+=p.vy*dt
    p.life-=p.decay*dt; p.g.alpha=p.life
    if(p.life<=0){fxLayer.removeChild(p.g);particles.splice(i,1)}
  }
  for(let i=trails.length-1;i>=0;i--){
    const t=trails[i]
    t.life-=t.decay*dt; t.g.alpha=t.life*0.3; t.g.scale.set(t.life)
    if(t.life<=0){fxLayer.removeChild(t.g);trails.splice(i,1)}
  }
}

// ═══════════════════════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════════════════════
function resetRound(server){
  S.px=W*0.22; S.py=GROUND_Y; S.pvx=0; S.pvy=0; S.pGnd=true; S.pSet=false
  S.cx=W*0.78; S.cy=GROUND_Y; S.cvx=0; S.cvy=0; S.cGnd=true
  S.bx=server==='player'?W*0.25:W*0.75; S.by=GROUND_Y-100
  S.bvx=0; S.bvy=0; S.bSpin=0; S.lastHitter='none'
  S.crabActive=false; S.crabTimer=0; S.powerup=null; S.powerupTimer=0
  randomizePhysics()
}

// ═══════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════
function gameLoop(ticker){
  S.frame++
  const dt=ticker.deltaTime
  if(!S.running||S.paused||S.quizActive||S.gameOver) return

  // Screen shake decay
  if(S.shakeTimer>0){
    S.shakeTimer-=dt
    S.shakeX=Math.sin(S.shakeTimer*2)*4*(S.shakeTimer/10)
    S.shakeY=Math.cos(S.shakeTimer*1.5)*3*(S.shakeTimer/10)
    app.stage.x=S.shakeX; app.stage.y=S.shakeY
  } else { app.stage.x*=0.8; app.stage.y*=0.8 }

  // Clouds scroll
  for(const cl of clouds){cl.x-=cl._speed*dt; if(cl.x<-80)cl.x=W+80}

  // Player movement
  const spd = MOVE_SPD * (S.powerup==='speed'?1.5:1)
  if(S.moveL) S.pvx=-spd; else if(S.moveR) S.pvx=spd; else S.pvx*=0.82
  if(S.jump&&S.pGnd){
    S.pvy=JUMP_POWER*(S.powerup==='jump'?1.4:1); S.pGnd=false
    spawnSand(S.px,GROUND_Y,4)
  }
  S.jump=false

  // Player physics
  S.pvy+=GRAVITY*S.gravMod*dt; S.px+=S.pvx*dt; S.py+=S.pvy*dt
  S.px=Math.max(DUCK_R,Math.min(NET_X-DUCK_R-6,S.px))
  if(S.py>=GROUND_Y){S.py=GROUND_Y;if(S.pvy>2)spawnSand(S.px,GROUND_Y,3);S.pvy=0;S.pGnd=true}

  // CPU AI
  updateCPU(dt)

  // Ball physics
  const ballSpd=S.powerup==='slow'?0.6:1
  S.bvy+=GRAVITY*S.gravMod*0.55*dt*ballSpd
  S.bx+=S.bvx*dt*ballSpd; S.by+=S.bvy*dt*ballSpd
  S.bSpin+=S.bvx*0.015*dt // spin follows velocity

  const br=BALL_R*(S.powerup==='big'?1.5:1)

  // Wall bounces
  if(S.bx<br){S.bx=br;S.bvx=Math.abs(S.bvx)*S.bounceMod;sfxBounce()}
  if(S.bx>W-br){S.bx=W-br;S.bvx=-Math.abs(S.bvx)*S.bounceMod;sfxBounce()}
  if(S.by<br+50){S.by=br+50;S.bvy=Math.abs(S.bvy)*0.5;sfxBounce()}

  // Net collision
  if(S.by>NET_TOP&&Math.abs(S.bx-NET_X)<12){
    if(S.bx<NET_X){S.bvx=Math.min(S.bvx,-2);S.bx=NET_X-12}
    else{S.bvx=Math.max(S.bvx,2);S.bx=NET_X+12}
    S.bvy*=-0.6; sfxBounce()
  }

  // Duck-ball collision (player)
  checkHit(S.px,S.py,S.pvx,S.pvy,S.pGnd,'player')
  // Duck-ball collision (CPU)
  checkHit(S.cx,S.cy,S.cvx,S.cvy,S.cGnd,'cpu')

  // Ball trail
  spawnTrail()

  // Ball hits ground
  if(S.by>GROUND_Y-br){
    spawnSand(S.bx,GROUND_Y,8)
    const server=S.bx<NET_X?'player':'cpu'
    if(S.bx<NET_X){
      S.cScore++; sfxWhistle()
      spawnConfetti(W*0.75,GROUND_Y-60)
    } else {
      S.pScore++; sfxScore()
      spawnConfetti(W*0.25,GROUND_Y-60)
    }
    updateHUD()
    // Hold ball above ground during quiz to prevent instant re-score
    S.bx=server==='player'?W*0.25:W*0.75; S.by=GROUND_Y-120; S.bvx=0; S.bvy=0
    checkRoundEnd()
    if(!S.gameOver&&!S.quizActive) resetRound(server)
  }

  // Crab powerup
  updateCrab(dt)

  // Powerup timer
  if(S.powerup&&S.powerupTimer>0){
    S.powerupTimer-=dt/60
    if(S.powerupTimer<=0){S.powerup=null}
  }

  // Draw everything
  tickParticles(dt)
  const pFacing=S.pvx>0.5?1:S.pvx<-0.5?-1:1
  const pSquash=S.pGnd?1:S.pvy<0?0.85:1.15
  drawDuck(playerGfx,S.px,S.py,0xfbbf24,0xf59e0b,pFacing,S.pHasCrown,pSquash)
  const cFacing=S.cvx>0.5?1:S.cvx<-0.5?-1:-1
  const cSquash=S.cGnd?1:S.cvy<0?0.85:1.15
  drawDuck(cpuGfx,S.cx,S.cy,0xef4444,0xdc2626,cFacing,S.cHasCrown,cSquash)
  drawBall()
  drawCrab()
}

// ═══════════════════════════════════════════════════════════
//  HIT MECHANICS (SET / SHOT / SMASH)
// ═══════════════════════════════════════════════════════════
function checkHit(dx,dy,dvx,dvy,onGnd,who){
  const br=BALL_R*(S.powerup==='big'?1.5:1)
  const ddx=S.bx-dx, ddy=S.by-(dy-DUCK_R*0.5)
  const dist=Math.sqrt(ddx*ddx+ddy*ddy)
  if(dist>br+DUCK_R)return
  if(S.lastHitter===who&&S.frame%10!==0)return // debounce
  S.lastHitter=who

  const angle=Math.atan2(ddy,ddx)
  let power, hitType
  if(onGnd){
    // SET: gentle lob upward
    power=6; hitType='set'
    if(who==='player')S.pSet=true
  } else if(who==='player'&&S.pSet){
    // SMASH: powerful spike after set
    power=11; hitType='smash'
    S.pSet=false
    S.shakeTimer=10
    sfxSmash()
  } else {
    // SHOT: jump first-touch
    power=8; hitType='shot'
  }

  S.bvx=Math.cos(angle)*power+dvx*0.35
  S.bvy=Math.sin(angle)*power-3
  S.bvy=Math.min(S.bvy,-2)

  if(hitType==='set') sfxHit()
  else if(hitType==='shot') sfxHit()
}

// ═══════════════════════════════════════════════════════════
//  CPU AI
// ═══════════════════════════════════════════════════════════
function updateCPU(dt){
  const diff=Math.min(0.6+cfg.level*0.035,0.96)
  const react=Math.random()<diff

  if(react){
    const target=S.bx>NET_X?S.bx-8:W*0.75
    if(S.cx<target-12)S.cvx=MOVE_SPD*0.85
    else if(S.cx>target+12)S.cvx=-MOVE_SPD*0.85
    else S.cvx*=0.8

    if(S.cGnd&&S.bx>NET_X&&S.by<GROUND_Y-50&&Math.abs(S.bx-S.cx)<70&&S.bvy>0){
      S.cvy=JUMP_POWER*0.88; S.cGnd=false
      spawnSand(S.cx,GROUND_Y,3)
    }
  } else S.cvx*=0.9

  S.cvy+=GRAVITY*S.gravMod*dt; S.cx+=S.cvx*dt; S.cy+=S.cvy*dt
  S.cx=Math.max(NET_X+DUCK_R+6,Math.min(W-DUCK_R,S.cx))
  if(S.cy>=GROUND_Y){S.cy=GROUND_Y;if(S.cvy>2)spawnSand(S.cx,GROUND_Y,2);S.cvy=0;S.cGnd=true}
}

// ═══════════════════════════════════════════════════════════
//  CRAB POWERUP
// ═══════════════════════════════════════════════════════════
function updateCrab(dt){
  S.crabTimer+=dt/60
  if(!S.crabActive&&S.crabTimer>12+Math.random()*8){
    S.crabActive=true; S.crabX=-30; S.crabDir=1; S.crabTimer=0
  }
  if(S.crabActive){
    S.crabX+=S.crabDir*1.2*dt
    if(S.crabX>W+30){S.crabActive=false;S.crabTimer=0}
    // Player touches crab
    if(Math.abs(S.px-S.crabX)<30&&S.py>GROUND_Y-10){
      S.crabActive=false; S.crabTimer=0
      const types=['big','speed','jump','slow']
      S.powerup=types[Math.floor(Math.random()*types.length)]
      S.powerupTimer=10
      sfxPowerup()
    }
  }
}
let crabQMark = null
function drawCrab(){
  crabGfx.clear()
  if(crabQMark){crabQMark.visible=false}
  if(!S.crabActive)return
  const cx=S.crabX, cy=GROUND_Y+2
  // Body
  crabGfx.ellipse(cx,cy,12,8).fill(0xef4444)
  crabGfx.ellipse(cx,cy-1,10,6).fill({color:0xf87171,alpha:0.5})
  // Claws (animated pinch)
  const pinch=Math.sin(S.frame*0.15)*2
  crabGfx.circle(cx-16-pinch,cy-2,5).fill(0xf87171)
  crabGfx.circle(cx-18-pinch,cy-4,3).fill(0xfca5a5)
  crabGfx.circle(cx+16+pinch,cy-2,5).fill(0xf87171)
  crabGfx.circle(cx+18+pinch,cy-4,3).fill(0xfca5a5)
  // Eyes on stalks
  crabGfx.rect(cx-5,cy-12,2,5).fill(0xef4444)
  crabGfx.rect(cx+3,cy-12,2,5).fill(0xef4444)
  crabGfx.circle(cx-4,cy-13,3).fill(0x1c1917)
  crabGfx.circle(cx+4,cy-13,3).fill(0x1c1917)
  crabGfx.circle(cx-3,cy-14,1.5).fill(0xffffff)
  crabGfx.circle(cx+5,cy-14,1.5).fill(0xffffff)
  // Legs (walking animation)
  for(let i=-2;i<=2;i++){
    if(i===0)continue
    const legY=Math.sin(S.frame*0.3+i)*2
    crabGfx.rect(cx+i*5,cy+3+legY,2,5).fill({color:0xdc2626,alpha:0.6})
  }
  // Powerup bubble
  const bobY=Math.sin(S.frame*0.1)*3
  crabGfx.circle(cx,cy-24+bobY,9).fill({color:0xfbbf24,alpha:0.85})
  crabGfx.circle(cx,cy-24+bobY,9).stroke({color:0xf59e0b,width:1.5})
  crabGfx.circle(cx,cy-24+bobY,4).fill(0xffffff)
  // Use separate Text for ?
  if(!crabQMark){
    crabQMark=new PIXI.Text({text:'?',style:{fontSize:11,fontWeight:'900',fill:0x92400e,fontFamily:'Arial'}})
    crabQMark.anchor.set(0.5)
    entityLayer.addChild(crabQMark)
  }
  crabQMark.x=cx; crabQMark.y=cy-25+bobY; crabQMark.visible=true
}

// ═══════════════════════════════════════════════════════════
//  ROUND + MATCH LOGIC
// ═══════════════════════════════════════════════════════════
function checkRoundEnd(){
  if(S.pScore>=POINTS_TO_WIN||S.cScore>=POINTS_TO_WIN){
    if(S.pScore>=POINTS_TO_WIN){S.pRounds++;S.pHasCrown=true;S.cHasCrown=false}
    else{S.cRounds++;S.cHasCrown=true;S.pHasCrown=false}

    if(S.pRounds>=2||S.cRounds>=2||S.round>=TOTAL_ROUNDS){
      // Match over
      endMatch()
    } else {
      // Next round + quiz
      S.round++; S.pScore=0; S.cScore=0
      showRoundBanner()
      showQuiz()
    }
  }
}

function showRoundBanner(){
  const rb=document.getElementById('round-banner')
  rb.querySelector('.rb-title').textContent=`Round ${S.round}`
  rb.querySelector('.rb-score').textContent=`${S.pRounds} — ${S.cRounds}`
  rb.classList.add('show')
  setTimeout(()=>rb.classList.remove('show'),2000)
  document.getElementById('round-text').textContent=`Round ${S.round}/${TOTAL_ROUNDS}`
}

function endMatch(){
  S.running=false; S.gameOver=true
  const won=S.pRounds>S.cRounds
  const stars=won?(S.correctQ>=2?5:S.cRounds===0?4:3):(S.pRounds>0?2:1)
  try{sessionStorage.setItem('g20Result',JSON.stringify({stars,level:cfg.level}))}catch(_){}

  setTimeout(()=>{
    const next=won&&cfg.level<30?()=>{
      try{sessionStorage.setItem('g20Config',JSON.stringify({level:cfg.level+1}))}catch(_){}
      location.reload()
    }:null
    GameModal.show({
      emoji:won?'🏆':'🦆', title:won?'Kamu Menang!':'Coba Lagi!', stars,
      msg:`Rounds: ${S.pRounds}—${S.cRounds} | Quiz: ${S.correctQ}✅`,
      onNext:next, onAgain:()=>location.reload(), onBack:()=>goBack()
    })
  },800)
}

// ═══════════════════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════════════════
function showQuiz(){
  S.quizActive=true
  const q=pickQ()
  document.getElementById('quiz-question').textContent=q.q
  const ch=document.getElementById('quiz-choices'); ch.innerHTML=''
  const opts=[q.ans,...q.w].sort(()=>Math.random()-0.5)
  let done=false
  opts.forEach(c=>{
    const b=document.createElement('button'); b.className='qbtn'; b.textContent=c
    b.onclick=()=>{
      if(done)return; done=true
      if(c===q.ans){b.classList.add('correct');S.correctQ++;sfxScore()}
      else{b.classList.add('wrong');S.wrongQ++;ch.querySelectorAll('.qbtn').forEach(x=>{if(x.textContent===q.ans)x.classList.add('correct')})}
      setTimeout(()=>{
        document.getElementById('quiz-panel').classList.remove('show')
        S.quizActive=false
        // Reset round positions after quiz so ball doesn't score instantly
        resetRound(S.bx<NET_X?'player':'cpu')
        updateHUD()
      },900)
    }
    ch.appendChild(b)
  })
  document.getElementById('quiz-panel').classList.add('show')
}

// ═══════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════
function updateHUD(){
  document.getElementById('score-display').textContent=`${S.pScore} — ${S.cScore}`
  const pwMap={big:'🔴 Bola Besar',speed:'🔵 Turbo',jump:'🟢 Super Lompat',slow:'🟡 Slow Ball'}
  const rt=document.getElementById('round-text')
  if(S.powerup) rt.textContent=`${pwMap[S.powerup]} ${Math.ceil(S.powerupTimer)}s`
  else rt.textContent=`Round ${S.round}/${TOTAL_ROUNDS}`
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
function startGame(){
  if(S.started)return; ea()
  S.started=true; S.running=true
  document.getElementById('start-overlay').classList.add('hidden')
  resetRound('player'); updateHUD()
  document.getElementById('round-text').textContent=`Round 1/${TOTAL_ROUNDS}`
}

// Touch
const bL=document.getElementById('btn-left'), bR=document.getElementById('btn-right'), bJ=document.getElementById('btn-jump')
bL.addEventListener('touchstart',e=>{e.preventDefault();S.moveL=true})
bL.addEventListener('touchend',e=>{e.preventDefault();S.moveL=false})
bR.addEventListener('touchstart',e=>{e.preventDefault();S.moveR=true})
bR.addEventListener('touchend',e=>{e.preventDefault();S.moveR=false})
bJ.addEventListener('touchstart',e=>{e.preventDefault();S.jump=true})
// Mouse fallback
bL.addEventListener('mousedown',()=>S.moveL=true); bL.addEventListener('mouseup',()=>S.moveL=false)
bR.addEventListener('mousedown',()=>S.moveR=true); bR.addEventListener('mouseup',()=>S.moveR=false)
bJ.addEventListener('mousedown',()=>S.jump=true)
// Keyboard
window.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')S.moveL=true
  if(e.code==='ArrowRight'||e.code==='KeyD')S.moveR=true
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();S.jump=true}
})
window.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')S.moveL=false
  if(e.code==='ArrowRight'||e.code==='KeyD')S.moveR=false
})
document.getElementById('start-overlay').addEventListener('pointerdown',startGame)

function goBack(){window.location.replace('../index.html')}
window.addEventListener('resize',()=>{if(app)app.renderer.resize(window.innerWidth,window.innerHeight)})
</script>
