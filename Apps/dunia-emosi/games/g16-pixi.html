<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Selamatkan Kereta 🚂</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100svh;overflow:hidden;background:#0d1020;font-family:'Fredoka One',sans-serif;touch-action:none}
#pixi-canvas{position:fixed;inset:0;width:100vw;height:100svh;display:block}

/* ── HUD Top ── */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 14px 8px;background:linear-gradient(180deg,rgba(0,0,0,0.78) 0%,transparent 100%);pointer-events:none}
#btn-back{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.22);border-radius:12px;color:#fff;padding:7px 12px;font-size:15px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0}
#game-badge{background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,200,0,0.35);border-radius:10px;padding:5px 10px;color:#fbbf24;font-size:12px;font-weight:700;flex-shrink:0;white-space:nowrap}
#hud-center{flex:1;text-align:center}
#level-text{font-size:12px;color:#c4b5fd;font-weight:700}
#status-text{font-size:16px;font-weight:900;color:#fff}
#obstacle-count{font-size:13px;color:#86efac;font-weight:700;flex-shrink:0}

/* ── Danger Bar ── */
#danger-wrap{position:fixed;top:56px;left:0;right:0;z-index:49;padding:4px 14px 2px;background:rgba(0,0,0,0.4)}
#danger-inner{display:flex;align-items:center;gap:8px}
#danger-label{font-size:9px;color:#ef4444;letter-spacing:2px;font-weight:700;flex-shrink:0;animation:dangerPulse 1s ease-in-out infinite}
@keyframes dangerPulse{50%{opacity:0.4}}
#danger-track{flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
#danger-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#86efac,#fbbf24,#ef4444);transition:width .15s linear;width:0%}
#cliff-icon{font-size:16px;flex-shrink:0}

/* ── Quiz Panel ── */
#quiz-panel{position:fixed;bottom:0;left:0;right:0;z-index:200;display:none;flex-direction:column;align-items:center;padding:14px 16px 22px;background:linear-gradient(0deg,rgba(10,2,25,0.98) 0%,rgba(26,5,53,0.95) 100%);border-top:3px solid #ef4444;backdrop-filter:blur(12px)}
#quiz-panel.show{display:flex}
#quiz-title{color:#ef4444;font-size:10px;font-weight:700;letter-spacing:3px;margin-bottom:4px;animation:dangerPulse 0.8s ease-in-out infinite}
#quiz-question{color:#fff;font-size:28px;font-weight:900;text-align:center;margin-bottom:14px;text-shadow:0 0 20px rgba(251,191,36,0.6)}
#quiz-choices{display:flex;gap:10px;justify-content:center;width:100%;flex-wrap:wrap}
.choice-btn{flex:1;max-width:90px;padding:16px 4px;border:2.5px solid rgba(255,255,255,0.35);border-radius:16px;background:linear-gradient(160deg,#7C3AED,#6D28D9);color:#fff;font-size:22px;font-weight:900;cursor:pointer;transition:all .12s;font-family:inherit;-webkit-tap-highlight-color:transparent;box-shadow:0 5px 0 #4C1D95}
.choice-btn:nth-child(2){background:linear-gradient(160deg,#E85A32,#C84020);border-color:#F07050;box-shadow:0 5px 0 #9A2A10}
.choice-btn:nth-child(3){background:linear-gradient(160deg,#2DBF7E,#1A9E66);border-color:#50E0A0;box-shadow:0 5px 0 #0A7A48}
.choice-btn:nth-child(4){background:linear-gradient(160deg,#F59E0B,#D97706);border-color:#FCD34D;box-shadow:0 5px 0 #92400E}
.choice-btn:active{transform:scale(.91) translateY(4px);box-shadow:0 1px 0 #4C1D95}
.choice-btn:nth-child(2):active{box-shadow:0 1px 0 #9A2A10}
.choice-btn:nth-child(3):active{box-shadow:0 1px 0 #0A7A48}
.choice-btn:nth-child(4):active{box-shadow:0 1px 0 #92400E}
.choice-btn.correct{border-color:#4ade80;background:rgba(74,222,128,0.3);animation:correctFlash .4s ease}
.choice-btn.wrong{border-color:#ef4444;background:rgba(239,68,68,0.3);animation:wrongShake .35s ease}
@keyframes correctFlash{0%{transform:scale(1.1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes wrongShake{0%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}100%{transform:translateX(0)}}
#mercy-bar{margin-top:10px;display:flex;gap:5px;align-items:center}
.mercy-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.2);transition:all .2s}
.mercy-dot.used{background:#ef4444;border-color:#ef4444}

/* ── Speed Lines ── */
#speed-lines{position:fixed;inset:0;z-index:45;pointer-events:none;opacity:0;transition:opacity .15s;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.03) 40px,rgba(255,255,255,0.03) 42px)}

/* ── Flash ── */
#flash{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:0;transition:opacity .08s}

/* ── Train Select Overlay ── */
#train-select{position:fixed;inset:0;z-index:500;background:linear-gradient(180deg,#0d1020 0%,#1a1a3e 60%,#0d1020 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
#ts-title{font-size:26px;font-weight:900;color:#e0e7ff;text-align:center}
#ts-subtitle{font-size:13px;color:rgba(196,181,253,0.7);letter-spacing:1.5px;text-align:center}
#ts-trains{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.ts-card{background:rgba(255,255,255,0.06);border:2.5px solid rgba(255,255,255,0.15);border-radius:20px;padding:16px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;width:min(140px,42vw);text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.ts-card:active{transform:scale(.93)}
.ts-card:hover,.ts-card.selected{border-color:#818cf8;background:rgba(129,140,248,0.14)}
.ts-card-name{font-size:14px;font-weight:700;color:#e0e7ff}
.ts-card-desc{font-size:11px;color:rgba(196,181,253,0.65)}
canvas.ts-preview{border-radius:10px}
#btn-start{background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;border-radius:18px;color:#fff;padding:16px 48px;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 6px 0 #3730a3;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:transform .1s,box-shadow .1s;margin-top:4px}
#btn-start:active{transform:translateY(4px);box-shadow:0 2px 0 #3730a3}
#ts-back{background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;padding:8px 16px;font-size:14px;cursor:pointer;font-family:inherit}

/* ── Overlays ── */
.ovl{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px)}
.ovl.show{display:flex}
.ovl-card{background:linear-gradient(145deg,#0d0521,#1a0535);border:1px solid rgba(139,92,246,0.4);border-radius:28px;padding:28px 24px;text-align:center;max-width:320px;width:92%;box-shadow:0 0 60px rgba(139,92,246,0.3),0 20px 40px rgba(0,0,0,0.7);color:#fff;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.ovl-emoji{font-size:60px;display:block;margin-bottom:8px}
.ovl-title{font-size:24px;font-weight:900;margin-bottom:6px}
.ovl-msg{color:rgba(255,255,255,.65);font-size:13px;margin-bottom:18px;line-height:1.5}
.ovl-stars{font-size:28px;letter-spacing:5px;margin:10px 0 18px;filter:drop-shadow(0 0 8px gold)}
.ovl-btn{background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;border-radius:16px;color:#fff;padding:15px 0;font-size:16px;font-weight:900;cursor:pointer;width:100%;margin-top:8px;box-shadow:0 5px 0 #3b0764;transition:transform .1s,box-shadow .1s;font-family:inherit;-webkit-tap-highlight-color:transparent}
.ovl-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #3b0764}
.ovl-btn.sec{background:rgba(255,255,255,.08);box-shadow:none;border:1.5px solid rgba(255,255,255,.2);margin-top:8px}
.ovl-btn.danger{background:linear-gradient(135deg,#dc2626,#991b1b);box-shadow:0 5px 0 #7f1d1d}
.ovl-btn.danger:active{box-shadow:0 2px 0 #7f1d1d}
</style>
</head>
<body>
<canvas id="pixi-canvas"></canvas>

<!-- HUD Top -->
<div id="hud-top">
  <button id="btn-back" onclick="confirmBack()">⌂</button>
  <div id="game-badge">🚂 Signal Rush</div>
  <div id="hud-center">
    <div id="level-text">Level 1</div>
    <div id="status-text">Bersiap...</div>
  </div>
  <div id="obstacle-count">🚧 0/0</div>
</div>

<!-- Danger Bar -->
<div id="danger-wrap">
  <div id="danger-inner">
    <span id="danger-label">⚠ Bahaya</span>
    <div id="danger-track"><div id="danger-fill"></div></div>
    <span id="cliff-icon">🌋</span>
  </div>
</div>

<!-- Quiz Panel -->
<div id="quiz-panel">
  <div id="quiz-title">🚨 HAPUS RINTANGAN!</div>
  <div id="quiz-question">?</div>
  <div id="quiz-choices"></div>
  <div id="mercy-bar"></div>
</div>

<!-- Speed Lines -->
<div id="speed-lines"></div>
<!-- Flash -->
<div id="flash"></div>

<!-- Train Select -->
<div id="train-select">
  <div id="ts-title">🚂 Pilih Keretamu!</div>
  <div id="ts-subtitle">PILIH LIVERY KERETA FAVORIT</div>
  <div id="ts-trains">
    <div class="ts-card selected" onclick="selectTrain(0)" id="ts-0">
      <canvas class="ts-preview" width="130" height="56" id="prev-0"></canvas>
      <div class="ts-card-name">Biru Express</div>
      <div class="ts-card-desc">Kereta modern</div>
    </div>
    <div class="ts-card" onclick="selectTrain(1)" id="ts-1">
      <canvas class="ts-preview" width="130" height="56" id="prev-1"></canvas>
      <div class="ts-card-name">Hijau Nusantara</div>
      <div class="ts-card-desc">Kereta klasik</div>
    </div>
    <div class="ts-card" onclick="selectTrain(2)" id="ts-2">
      <canvas class="ts-preview" width="130" height="56" id="prev-2"></canvas>
      <div class="ts-card-name">Merah Lokomotif</div>
      <div class="ts-card-desc">Kereta uap</div>
    </div>
  </div>
  <button id="btn-start" onclick="startGame()">🚦 Mulai!</button>
  <button id="ts-back" onclick="goBack()">◀ Kembali</button>
</div>

<!-- Win Overlay -->
<div class="ovl" id="ovl-win">
  <div class="ovl-card">
    <span class="ovl-emoji">🏆</span>
    <div class="ovl-title" id="win-title">Kereta Selamat!</div>
    <div class="ovl-stars" id="win-stars">⭐⭐⭐</div>
    <div class="ovl-msg" id="win-msg">Hebat sekali!</div>
    <button class="ovl-btn" onclick="finishGame()">Kembali 🏠</button>
    <button class="ovl-btn sec" onclick="restartGame()">Main Lagi 🔄</button>
  </div>
</div>

<!-- Lose Overlay -->
<div class="ovl" id="ovl-lose">
  <div class="ovl-card">
    <span class="ovl-emoji">💥</span>
    <div class="ovl-title">Kereta Jatuh!</div>
    <div class="ovl-msg" id="lose-msg">Kereta mencapai tebing... Coba lagi!</div>
    <button class="ovl-btn danger" onclick="restartGame()">Coba Lagi 🔄</button>
    <button class="ovl-btn sec" onclick="finishGame()">Kembali 🏠</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script>
'use strict'

// ── Config ────────────────────────────────────────────────────────────────────
const cfg = { level: 1 }
try { const s = sessionStorage.getItem('g16Config'); if (s) Object.assign(cfg, JSON.parse(s)) } catch(_){}

// ── Train Styles ──────────────────────────────────────────────────────────────
const TRAIN_STYLES = [
  { // 0: Blue Express
    locoBody: 0x1d4ed8, locoCab: 0x60a5fa, locoAccent: 0x3b82f6,
    carBody: 0x2563eb, carWindow: 0xbae6fd, carStripe: 0x93c5fd,
    cabColor: 0x1e3a8a, chimney: 0x1c1917, wheelRim: 0x93c5fd,
    caboose: 0x1e40af, cabooseLight: 0xef4444,
  },
  { // 1: Green Nusantara
    locoBody: 0x15803d, locoCab: 0x4ade80, locoAccent: 0x16a34a,
    carBody: 0x166534, carWindow: 0xbbf7d0, carStripe: 0x86efac,
    cabColor: 0x14532d, chimney: 0x1c1917, wheelRim: 0x86efac,
    caboose: 0x14532d, cabooseLight: 0xfbbf24,
  },
  { // 2: Red Locomotive
    locoBody: 0xdc2626, locoCab: 0xfca5a5, locoAccent: 0xef4444,
    carBody: 0xb91c1c, carWindow: 0xfecaca, carStripe: 0xfca5a5,
    cabColor: 0x7f1d1d, chimney: 0x1c1917, wheelRim: 0xfbbf24,
    caboose: 0x991b1b, cabooseLight: 0xfbbf24,
  },
];

// ── Per-level Background Themes ────────────────────────────────────────────────
const LEVEL_THEMES = [
  { name:'night',   sky:0x03050f, skyMid:0x070a1f, ground:0x07090e, hill1:0x1a0535, hill2:0x0f1a08, railColor:0xDAA520, tieColor:0x5d3a1a, cliffBase:0x0a0015, hasMoon:true,  hasStars:true,  sunX:null },
  { name:'sunrise', sky:0xff7c00, skyMid:0xffd6a0, ground:0x3d2b1f, hill1:0x9a5a2a, hill2:0x3d2010, railColor:0xfbbf24, tieColor:0x5d2a00, cliffBase:0x200a00, hasMoon:false, hasStars:false, sunX:0.8  },
  { name:'forest',  sky:0x0c2010, skyMid:0x143520, ground:0x071209, hill1:0x0d2a0a, hill2:0x071609, railColor:0x4ade80, tieColor:0x1a3a10, cliffBase:0x040c04, hasMoon:false, hasStars:false, sunX:null },
  { name:'mountain',sky:0x0d1b2e, skyMid:0x1a2f4a, ground:0x060d18, hill1:0x1a2f4a, hill2:0x0f1e30, railColor:0x94a3b8, tieColor:0x1e2a40, cliffBase:0x040810, hasMoon:true,  hasStars:true,  sunX:null },
  { name:'coastal', sky:0x1ea6ff, skyMid:0x7dd3fc, ground:0x1a5c1a, hill1:0x0e8a3e, hill2:0x0a5c28, railColor:0xfcd34d, tieColor:0x3d2b00, cliffBase:0x0a2800, hasMoon:false, hasStars:false, sunX:0.75 },
];
const BG_THEME_IDX = Math.min(4, Math.floor((cfg.level - 1) / 3));
const BG = LEVEL_THEMES[BG_THEME_IDX];

// ── Selected Train ─────────────────────────────────────────────────────────────
let selectedTrainIdx = 0;
function selectTrain(idx) {
  selectedTrainIdx = idx;
  document.querySelectorAll('.ts-card').forEach((c, i) => c.classList.toggle('selected', i === idx));
}

// ── Train Select Previews ─────────────────────────────────────────────────────
function drawPreview(canvasId, styleIdx) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const S = TRAIN_STYLES[styleIdx];
  ctx.clearRect(0, 0, 130, 56);

  const hex = (c) => '#' + c.toString(16).padStart(6, '0');

  // Draw mini 4-car train facing right
  const y = 32;

  // Caboose (leftmost)
  ctx.fillStyle = hex(S.caboose);
  ctx.fillRect(2, y - 10, 24, 18);
  ctx.fillStyle = hex(S.carWindow);
  ctx.fillRect(10, y - 7, 8, 8);

  // PassCar 2
  ctx.fillStyle = hex(S.carBody);
  ctx.fillRect(30, y - 12, 28, 20);
  ctx.fillStyle = hex(S.carWindow);
  for (let w = 0; w < 2; w++) ctx.fillRect(33 + w * 12, y - 9, 8, 9);

  // PassCar 1
  ctx.fillStyle = hex(S.carBody);
  ctx.fillRect(62, y - 12, 28, 20);
  ctx.fillStyle = hex(S.carWindow);
  for (let w = 0; w < 2; w++) ctx.fillRect(65 + w * 12, y - 9, 8, 9);

  // Locomotive
  ctx.fillStyle = hex(S.locoBody);
  ctx.fillRect(94, y - 14, 34, 22);
  ctx.fillStyle = hex(S.locoCab);
  ctx.fillRect(94, y - 22, 18, 28);
  // Chimney at center
  ctx.fillStyle = hex(S.chimney);
  ctx.fillRect(108, y - 26, 6, 14);
  // Headlight
  ctx.fillStyle = '#fef9c3';
  ctx.beginPath(); ctx.arc(127, y - 6, 4, 0, Math.PI * 2); ctx.fill();

  // Wheels
  ctx.fillStyle = '#1c1917';
  const wheelXs = [10, 38, 70, 100, 113, 124];
  for (const wx of wheelXs) {
    ctx.beginPath(); ctx.arc(wx, y + 8, 6, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = hex(S.wheelRim); ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(wx, y + 8, 6, 0, Math.PI * 2); ctx.stroke();
  }

  // Rail
  ctx.fillStyle = hex(TRAIN_STYLES[0].carStripe);
  ctx.fillRect(0, y + 14, 130, 3);
}

window.addEventListener('DOMContentLoaded', () => {
  for (let i = 0; i < 3; i++) drawPreview('prev-' + i, i);
});

function startGame() {
  document.getElementById('train-select').style.display = 'none';
  initPixi();
}

// ── Questions ─────────────────────────────────────────────────────────────────
const QUESTIONS = {
  easy: [
    { q:'🐱 Huruf awal?', ans:'K', wrong:['A','M','B'] },
    { q:'🍎 Huruf awal?', ans:'A', wrong:['I','U','E'] },
    { q:'🐶 Huruf awal?', ans:'A', wrong:['K','M','B'] },
    { q:'🦋 Huruf awal?', ans:'K', wrong:['L','S','P'] },
    { q:'🐟 Huruf awal?', ans:'I', wrong:['U','A','O'] },
    { q:'🌸 Huruf awal?', ans:'B', wrong:['K','S','T'] },
    { q:'🐘 Huruf awal?', ans:'G', wrong:['A','K','L'] },
    { q:'🦒 Huruf awal?', ans:'J', wrong:['G','K','L'] },
    { q:'🍌 Huruf awal?', ans:'P', wrong:['B','M','K'] },
    { q:'🐸 Huruf awal?', ans:'K', wrong:['B','S','L'] },
    { q:'1 + 1 = ?',   ans:'2', wrong:['3','4','1'] },
    { q:'2 + 1 = ?',   ans:'3', wrong:['2','4','5'] },
    { q:'3 + 2 = ?',   ans:'5', wrong:['4','6','7'] },
    { q:'5 - 2 = ?',   ans:'3', wrong:['2','4','1'] },
    { q:'4 - 1 = ?',   ans:'3', wrong:['2','5','4'] },
    { q:'Warna 🔴 ?',  ans:'MERAH', wrong:['BIRU','HIJAU','KUNING'] },
    { q:'Warna 🔵 ?',  ans:'BIRU',  wrong:['MERAH','HIJAU','UNGU']  },
    { q:'Warna 🟡 ?',  ans:'KUNING',wrong:['ORANYE','PUTIH','MERAH']},
    { q:'Warna 🟢 ?',  ans:'HIJAU', wrong:['BIRU','KUNING','HITAM'] },
    { q:'Angka ①?',    ans:'1',     wrong:['2','3','4'] },
    { q:'Angka ③?',    ans:'3',     wrong:['2','4','5'] },
  ],
  medium: [
    { q:'2 + 3 = ?',   ans:'5',  wrong:['4','6','7'] },
    { q:'4 + 4 = ?',   ans:'8',  wrong:['7','9','6'] },
    { q:'5 + 5 = ?',   ans:'10', wrong:['9','8','11'] },
    { q:'6 + 3 = ?',   ans:'9',  wrong:['8','7','10'] },
    { q:'10 - 3 = ?',  ans:'7',  wrong:['6','8','4'] },
    { q:'8 - 2 = ?',   ans:'6',  wrong:['5','7','4'] },
    { q:'9 - 4 = ?',   ans:'5',  wrong:['4','6','3'] },
    { q:'5 + 6 = ?',   ans:'11', wrong:['10','12','9'] },
    { q:'4 x 2 = ?',   ans:'8',  wrong:['6','10','7'] },
    { q:'3 x 3 = ?',   ans:'9',  wrong:['6','12','8'] },
    { q:'2 x 5 = ?',   ans:'10', wrong:['8','12','9'] },
    { q:'BUKU huruf ke-2?',  ans:'U', wrong:['B','K','A'] },
    { q:'MEJA huruf ke-3?',  ans:'J', wrong:['M','E','A'] },
    { q:'PAGAR huruf ke-4?', ans:'A', wrong:['P','G','R'] },
    { q:'BULAN huruf ke-1?', ans:'B', wrong:['U','L','A'] },
    { q:'🐘 ada di ...?', ans:'HUTAN', wrong:['LAUT','UDARA','KOTA'] },
    { q:'🐟 ada di ...?', ans:'LAUT',  wrong:['HUTAN','UDARA','TANAH'] },
    { q:'🦅 ada di ...?', ans:'UDARA', wrong:['LAUT','HUTAN','TANAH'] },
  ],
  hard: [
    { q:'K-U-C-I-...?',   ans:'N',  wrong:['A','G','S'] },
    { q:'B-U-K-...?',     ans:'U',  wrong:['A','O','E'] },
    { q:'P-I-S-A-N-...?', ans:'G',  wrong:['K','S','T'] },
    { q:'J-E-R-A-P-A-...?',ans:'H', wrong:['G','K','S'] },
    { q:'12 + 5 = ?',     ans:'17', wrong:['16','18','15'] },
    { q:'15 - 8 = ?',     ans:'7',  wrong:['6','8','9'] },
    { q:'3 x 4 = ?',      ans:'12', wrong:['9','15','10'] },
    { q:'20 - 7 = ?',     ans:'13', wrong:['12','14','11'] },
    { q:'6 x 2 = ?',      ans:'12', wrong:['10','14','8'] },
    { q:'Sebelum 10?',    ans:'9',  wrong:['8','11','10'] },
    { q:'Sesudah 14?',    ans:'15', wrong:['14','16','13'] },
    { q:'2,4,?,8',        ans:'6',  wrong:['5','7','9'] },
    { q:'Ibukota RI?',    ans:'JAKARTA', wrong:['BANDUNG','SURABAYA','MEDAN'] },
    { q:'Bahasa nasional?', ans:'INDONESIA', wrong:['JAWA','MELAYU','SUNDA'] },
  ]
};

function getDifficulty(level) { return level <= 7 ? 'easy' : level <= 14 ? 'medium' : 'hard' }
function pickQuestions(level) {
  const diff = getDifficulty(level);
  const pool = [...QUESTIONS[diff]];
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  return pool.slice(0, Math.min(3 + Math.min(level - 1, 4), pool.length, 7));
}

async function initPixi() {

// ── Sky ────────────────────────────────────────────────────────────────────────
function drawSky(W, H) {
  const g = new PIXI.Graphics()
  const skyH = H * 0.68
  g.rect(0, 0, W, skyH).fill({ color: BG.sky })
  // Gradient overlay
  g.rect(0, 0, W, skyH * 0.4).fill({ color: BG.skyMid, alpha: 0.35 })

  if (BG.hasMoon) {
    g.circle(W * 0.84, H * 0.1, 28).fill({ color: 0xfff8dc })
    g.circle(W * 0.84 + 9, H * 0.1 - 7, 22).fill({ color: BG.sky })
  }
  if (BG.hasStars) {
    for (let i = 0; i < 80; i++) {
      const r = Math.random() * 1.5 + 0.4
      g.circle(Math.random() * W, Math.random() * skyH * 0.72, r)
        .fill({ color: 0xffffff, alpha: Math.random() * 0.7 + 0.2 })
    }
  }
  if (BG.sunX) {
    const sx = W * BG.sunX, sy = H * 0.18
    g.circle(sx, sy, 40).fill({ color: 0xfbbf24 })
    g.circle(sx, sy, 30).fill({ color: 0xfde68a })
    // Sun rays
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2
      g.rect(-2, 0, 4, 18).fill({ color: 0xfde68a, alpha: 0.4 })
    }
  }
  stage.addChild(g)
}

// ── Hills ─────────────────────────────────────────────────────────────────────
function drawHills(W, H) {
  const g = new PIXI.Graphics()
  const tY = getTrackY(H)
  // Far hills
  g.moveTo(0, tY + 10)
  g.bezierCurveTo(W * 0.12, tY - 70, W * 0.22, tY - 95, W * 0.38, tY - 22)
  g.bezierCurveTo(W * 0.55, tY + 12, W * 0.68, tY - 100, W * 0.82, tY - 35)
  g.bezierCurveTo(W * 0.92, tY - 8, W, tY + 10, W, tY + 10)
  g.lineTo(W, H).lineTo(0, H).closePath().fill({ color: BG.hill1 })
  // Near hills
  g.moveTo(-10, tY + 18)
  g.bezierCurveTo(W * 0.06, tY + 5, W * 0.18, tY - 42, W * 0.3, tY - 12)
  g.bezierCurveTo(W * 0.44, tY + 12, W * 0.58, tY - 55, W * 0.72, tY - 8)
  g.bezierCurveTo(W * 0.85, tY + 8, W * 0.97, tY + 2, W + 10, tY + 18)
  g.lineTo(W + 10, H).lineTo(-10, H).closePath().fill({ color: BG.hill2 })

  // Theme-specific silhouettes
  if (BG_THEME_IDX === 2) { // forest: tree line
    for (let x = 0; x < W + 60; x += 55) {
      g.poly([x, tY, x - 16, tY - 44, x + 16, tY - 44]).fill({ color: 0x14532d })
      g.poly([x, tY - 20, x - 11, tY - 55, x + 11, tY - 55]).fill({ color: 0x166534 })
    }
  } else if (BG_THEME_IDX === 3) { // mountain: snow peaks
    const peaks = [[W * 0.15, tY - 30], [W * 0.4, tY - 70], [W * 0.62, tY - 45], [W * 0.85, tY - 60]]
    for (const [px, py] of peaks) {
      const pw = 100 + Math.random() * 60
      g.poly([px, py, px - pw * 0.5, py + pw * 0.55, px + pw * 0.5, py + pw * 0.55]).fill({ color: 0x2a3f6a })
      g.poly([px, py, px - pw * 0.2, py + pw * 0.2, px + pw * 0.2, py + pw * 0.2]).fill({ color: 0xdbeafe })

// ── Track ─────────────────────────────────────────────────────────────────────
function drawTrack(W, H) {

  g.rect(0, tY + 6, W, H - tY - 6).fill({ color: BG.cliffBase })

  const tieSpacing = W / (RAIL_TIE_COUNT - 1)

// ── Obstacles ─────────────────────────────────────────────────────────────────
function buildObstaclesOnTrack(W, H) {
  const tY = getTrackY(H)
  const questions = pickQuestions(S.level)
  S.totalObstacles = questions.length; S.obstacles = []
  const startX = W * 0.28, endX = W * 0.88
  const spacing = (endX - startX) / Math.max(questions.length - 1, 1)
  questions.forEach((q, i) => {
    const ox = questions.length === 1 ? (startX + endX) / 2 : startX + i * spacing
    const obs = { x: ox, question: q, cleared: false, wrongCount: 0, container: null, flashTimer: 0 }
    obs.container = buildObstacleGraphic(ox, tY, i)
    stage.addChild(obs.container)
    S.obstacles.push(obs); obstacleContainers.push(obs.container)
  })
  document.getElementById('obstacle-count').textContent = `🚧 0/${S.totalObstacles}`
}

// ── Game Loop ──────────────────────────────────────────────────────────────────
function gameLoop(ticker) {
  if (!S.running || S.gameOver) return
  const dt = ticker.deltaMS / 1000
  _ticker_t += dt
  updateTrain(dt)
  updateObstacles(dt)
  updateSmoke(dt)
  updateSparks(dt)
  updateAmbient(dt)
  updateHUDFrame()
}

// ── Ambient Update ────────────────────────────────────────────────────────────
function updateAmbient(dt) {
  const W = app.screen.width
  // Birds fly right-to-left
  for (const b of ambientBirds) {
    b.x -= b._speed * dt * 60
    if (b.x < -100) b.x = W + 80
    // Wing flap
    b.children.forEach((bird, i) => { bird.y = Math.abs(i - 2) * 5 + Math.sin(_ticker_t * 4 + i) * 3 })
  }
  // Clouds drift
  for (const c of ambientClouds) {
    c.x -= c._speed * dt * 60
    if (c.x < -150) c.x = W + 120
  }
}

// ── Train Update ──────────────────────────────────────────────────────────────
function updateTrain(dt) {
  const W = app.screen.width, H = app.screen.height
  const tY = getTrackY(H)
  let speed = 0
  const baseSpeed = 80 + S.level * 12
  const boostSpeed = baseSpeed * 2.2

  const nextObs = S.obstacles.find(o => !o.cleared && o.x > S.trainX - 10)
  const stopDist = 80
  const brakeDist = 110  // was 200 — reduced for faster question appearance

  if (S.trainState === 'DEAD') {
    S.deadTimer -= dt
    trainContainer.y += 90 * dt; trainContainer.rotation += 1.5 * dt
    if (S.deadTimer <= 0) { S.running = false; showLose() }
    return
  }
  if (S.trainState === 'BOOSTING') {
    S.boostTimer -= dt; speed = boostSpeed
    if (S.boostTimer <= 0) { S.trainState = 'MOVING'; document.getElementById('speed-lines').style.opacity = '0' }
  } else if (S.trainState === 'MOVING') {
    if (nextObs) {
      const dist = nextObs.x - S.trainX
      if (dist <= stopDist) {
        S.trainState = 'STOPPED'; S.currentObstacleIdx = S.obstacles.indexOf(nextObs)
        showQuizPanel(nextObs); speed = 0
      } else if (dist <= brakeDist) {
        const t = (dist - stopDist) / (brakeDist - stopDist)
        speed = baseSpeed * Math.max(t * 0.6, 0.06)
        showBrakeSparks()
      } else {
        speed = baseSpeed
      }
    } else { speed = baseSpeed }
  } else if (S.trainState === 'STOPPED' || S.trainState === 'CLEARING') { speed = 0 }

  S.trainX += speed * dt
  const cliffX = W * 0.97 - 40
  if (S.trainX > cliffX && S.trainState !== 'DEAD') { triggerDeath(); return }
  if (S.cleared === S.totalObstacles && S.trainState !== 'DEAD') {
    if (S.trainState !== 'BOOSTING' && S.trainState !== 'MOVING') { S.trainState = 'BOOSTING'; S.boostTimer = 3 }
    if (S.trainX > W * 0.9) { triggerWin(); return }
  }

  S.trainBobT += dt * 4
  const bob = Math.sin(S.trainBobT) * (S.trainState === 'BOOSTING' ? 3.5 : 1.5)
  trainContainer.x = S.trainX
  trainContainer.y = tY - 18 + bob

  // Wheel spin
  const spinSpeed = speed * 0.04
  for (const w of trainWheels) w.rotation += spinSpeed * dt * 10
}

// ── Obstacle Update ───────────────────────────────────────────────────────────
function updateObstacles(dt) {
  S.obstacles.forEach((obs) => {
    if (!obs.container) return
    obs.flashTimer = (obs.flashTimer || 0) + dt
    const lightRed = obs.container.getChildByName('lightRed')
    const lightGrn = obs.container.getChildByName('lightGrn')
    if (lightRed && lightGrn) {
      // Alternating red/green (railway signal standard)
      const phase = Math.sin(obs.flashTimer * 6) > 0
      lightRed.alpha = phase ? 1.0 : 0.18
      lightGrn.alpha = phase ? 0.18 : 1.0
    }
    if (!obs.cleared && obs === S.obstacles[S.currentObstacleIdx]) {
      const barrier = obs.container.getChildByName('barrier')
      if (barrier) barrier.rotation = Math.sin(obs.flashTimer * 12) * 0.06
    }
  })
}

// ── Smoke / Sparks ────────────────────────────────────────────────────────────
function updateSmoke(dt) {
  if (Math.random() < 0.3) {
    const p = new PIXI.Graphics()
    const r = 4 + Math.random() * 6
    p.circle(0, 0, r).fill({ color: 0x888888, alpha: 0.5 })
    p.x = trainContainer.x + 22; p.y = trainContainer.y - 46
    p._vx = (Math.random() - 0.5) * 30 - 12; p._vy = -38 - Math.random() * 28
    p._life = 1.0; p._maxLife = 1.0
    stage.addChild(p); smokePuffs.push(p)
  }
  smokePuffs = smokePuffs.filter(p => {
    p._life -= dt * 1.4
    if (p._life <= 0) { stage.removeChild(p); return false }
    p.x += p._vx * dt; p.y += p._vy * dt
    p.alpha = p._life * 0.55; p.scale.set(1 + (1 - p._life) * 1.5)
    return true
  })
}

function showBrakeSparks() {
  if (Math.random() > 0.15) return
  const s = new PIXI.Graphics()
  s.rect(-1, -2, 2, 4).fill({ color: 0xfbbf24 })
  s.x = trainContainer.x + 68; s.y = trainContainer.y + 8
  s._vx = (Math.random() + 0.5) * 60; s._vy = (Math.random() - 0.5) * 40
  s._life = 0.3; stage.addChild(s); sparkParticles.push(s)
}

function updateSparks(dt) {
  sparkParticles = sparkParticles.filter(s => {
    s._life -= dt * 3; if (s._life <= 0) { stage.removeChild(s); return false }
    s.x += s._vx * dt; s.y += s._vy * dt; s._vy += 200 * dt
    s.alpha = s._life; s.rotation += 5 * dt; return true
  })
}

// ── Quiz ──────────────────────────────────────────────────────────────────────
let quizActive = false, quizLocked = false

function showQuizPanel(obs) {
  if (quizActive) return
  quizActive = true; quizLocked = false
  const qEl = document.getElementById('quiz-question')
  const choicesEl = document.getElementById('quiz-choices')
  const mercyEl = document.getElementById('mercy-bar')
  qEl.textContent = obs.question.q
  choicesEl.innerHTML = ''
  const choices = [obs.question.ans, ...obs.question.wrong]
  for (let i = choices.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [choices[i], choices[j]] = [choices[j], choices[i]]; }
  choices.forEach(c => {
    const btn = document.createElement('button'); btn.className = 'choice-btn'; btn.textContent = c
    btn.onclick = () => onChoiceTap(btn, c, obs); choicesEl.appendChild(btn)
  })
  mercyEl.innerHTML = ''
  for (let m = 0; m < 3; m++) {
    const dot = document.createElement('div'); dot.className = 'mercy-dot' + (m < obs.wrongCount ? ' used' : ''); mercyEl.appendChild(dot)
  }
  document.getElementById('quiz-panel').classList.add('show')
}

function onChoiceTap(btn, choice, obs) {
  if (quizLocked) return; quizLocked = true
  if (choice === obs.question.ans) {
    btn.classList.add('correct'); flashScreen('#00ff44', 0.35)
    setTimeout(() => clearObstacle(obs), 380)
  } else {
    S.wrongTaps++; S.noWrongAnswers = false; obs.wrongCount++
    btn.classList.add('wrong')
    trainContainer.x -= 15; setTimeout(() => { trainContainer.x += 15 }, 150)
    flashScreen('#ff8800', 0.25)
    const dots = document.querySelectorAll('.mercy-dot')
    dots.forEach((d, i) => { if (i < obs.wrongCount) d.classList.add('used') })
    if (obs.wrongCount >= 3) setTimeout(() => clearObstacle(obs), 450)
    else setTimeout(() => { quizLocked = false }, 500)
  }
}

function clearObstacle(obs) {
  hideQuizPanel(); obs.cleared = true; S.cleared++; S.currentObstacleIdx = -1
  explodeObstacle(obs)
  S.trainState = 'BOOSTING'; S.boostTimer = 0.9
  document.getElementById('speed-lines').style.opacity = '0.6'
  setTimeout(() => { document.getElementById('speed-lines').style.opacity = '0' }, 700)
  document.getElementById('obstacle-count').textContent = `🚧 ${S.cleared}/${S.totalObstacles}`
  if (S.cleared === S.totalObstacles) setTimeout(() => triggerWin(), 600)
}

function explodeObstacle(obs) {
  if (!obs.container) return
  for (let i = 0; i < 18; i++) {
    const p = new PIXI.Graphics()
    p.circle(0, 0, 3 + Math.random() * 5).fill({ color: i % 2 === 0 ? 0x4ade80 : 0xfbbf24 })
    p.x = obs.container.x; p.y = obs.container.y - 40
    const angle = (i / 18) * Math.PI * 2; const speed = 120 + Math.random() * 100
    p._vx = Math.cos(angle) * speed; p._vy = Math.sin(angle) * speed - 60
    p._life = 0.6 + Math.random() * 0.3; stage.addChild(p); sparkParticles.push(p)
  }
  let alpha = 1
  const iv = setInterval(() => {
    alpha -= 0.15; if (obs.container) obs.container.alpha = Math.max(alpha, 0)
    if (alpha <= 0) { clearInterval(iv); if (obs.container) stage.removeChild(obs.container) }
  }, 30)
}

function hideQuizPanel() { quizActive = false; quizLocked = false; document.getElementById('quiz-panel').classList.remove('show') }

// ── Triggers ──────────────────────────────────────────────────────────────────
function triggerDeath() { S.trainState = 'DEAD'; S.deadTimer = 1.2; S.gameOver = true; hideQuizPanel(); flashScreen('#ff0000', 0.5) }
function triggerWin() {
  if (S.gameOver) return; S.gameOver = true; S.running = false; hideQuizPanel()
  document.getElementById('speed-lines').style.opacity = '0'
  setTimeout(() => showWin(), 400)
}

// ── HUD ────────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('level-text').textContent = `Level ${S.level}`
  document.getElementById('status-text').textContent = 'Selamatkan Kereta!'
  document.getElementById('obstacle-count').textContent = `🚧 0/${S.totalObstacles}`
}
function updateHUDFrame() {
  const W = app.screen.width
  const pct = Math.min(Math.max((S.trainX - W * 0.08) / (W * 0.97 - 40 - W * 0.08) * 100, 0), 100)
  document.getElementById('danger-fill').style.width = pct + '%'
  const fill = document.getElementById('danger-fill')
  if (pct > 75) fill.style.background = 'linear-gradient(90deg,#ef4444,#dc2626)'
  else if (pct > 50) fill.style.background = 'linear-gradient(90deg,#fbbf24,#ef4444)'
  else fill.style.background = 'linear-gradient(90deg,#86efac,#fbbf24,#ef4444)'
  if (S.trainState === 'BOOSTING') document.getElementById('status-text').textContent = '💨 TURBO!'
  else if (S.trainState === 'STOPPED') document.getElementById('status-text').textContent = '🚨 Jawab!'
  else if (pct > 70) document.getElementById('status-text').textContent = '⚠️ Bahaya!'
  else document.getElementById('status-text').textContent = '🚂 Melaju...'
}

// ── Win / Lose ─────────────────────────────────────────────────────────────────
function calcStars() {
  const elapsed = (performance.now() - S.startTime) / 1000
  const est = (S.trackLength / (80 + S.level * 12)) * 1.4
  let stars = 3
  if (S.cleared < S.totalObstacles) stars = 1
  if (S.noWrongAnswers) stars = Math.min(stars + 1, 5)
  if (elapsed / est < 0.6) stars = Math.min(stars + 1, 5)
  return Math.max(stars, 1)
}
function showWin() {
  const stars = calcStars()
  document.getElementById('win-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(5 - stars)
  const msgs = ['','','','Bagus sekali!','Luar biasa cepat!','SEMPURNA! 🏆']
  document.getElementById('win-msg').textContent = msgs[stars] || 'Terus berlatih!'
  document.getElementById('win-title').textContent = stars >= 5 ? 'SEMPURNA! 🏆' : stars >= 4 ? 'Hebat Sekali! 🌟' : 'Kereta Selamat! 🎉'
  try { sessionStorage.setItem('g16Result', JSON.stringify({ stars, level: S.level, cleared: S.cleared, total: S.totalObstacles })) } catch(_){}
  document.getElementById('ovl-win').classList.add('show')
}
function showLose() {
  document.getElementById('lose-msg').textContent = `Kereta jatuh ke tebing! (${S.cleared}/${S.totalObstacles} rintangan bersih)`
  try { sessionStorage.setItem('g16Result', JSON.stringify({ stars: 0, level: S.level })) } catch(_){}
  document.getElementById('ovl-lose').classList.add('show')
}

// ── Flash / Nav ───────────────────────────────────────────────────────────────
function flashScreen(color, alpha) {
  const el = document.getElementById('flash'); el.style.background = color; el.style.opacity = alpha
  setTimeout(() => { el.style.opacity = '0' }, 120)
}
function goBack() { if (document.referrer) history.back(); else window.location.href = '../index.html' }
function confirmBack() { if (!S.running || S.gameOver) { goBack(); return } if (confirm('Keluar?')) goBack() }
function finishGame() { goBack() }
function restartGame() { location.reload() }

window.addEventListener('resize', () => { if (app) app.renderer.resize(window.innerWidth, window.innerHeight) })
</script>
