<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Gym Pokémon ⚔️</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100svh;overflow:hidden;background:#0a0212;font-family:'Fredoka One',sans-serif;touch-action:none;user-select:none}

/* BG */
#battle-bg{position:fixed;inset:0;background-size:cover;background-position:center;z-index:0;transition:background-image 0.4s}
#battle-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.35) 0%,transparent 40%,transparent 60%,rgba(0,0,0,0.5) 100%)}

/* HUD Top */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 14px 8px;background:linear-gradient(180deg,rgba(0,0,0,0.8) 0%,transparent 100%);pointer-events:none}
#btn-back{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);border-radius:12px;color:#fff;padding:7px 12px;font-size:15px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0}
#game-title{flex:1;font-size:15px;font-weight:900;color:#fff;text-shadow:0 0 10px rgba(139,92,246,0.9)}
#badge-count{background:rgba(139,92,246,0.35);border:1.5px solid rgba(139,92,246,0.7);border-radius:10px;padding:5px 12px;color:#e9d5ff;font-size:13px;font-weight:700;flex-shrink:0}

/* Flash overlay */
#flash{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;transition:opacity 0.15s}

/* ─── BATTLE SCREEN ─── */
#battle-screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column}

/* Trainer portraits — corners */
#portrait-enemy{position:fixed;top:52px;right:0;z-index:30;width:min(140px,28vw);height:min(160px,32vw);object-fit:cover;object-position:top center;filter:drop-shadow(-4px 4px 12px rgba(0,0,0,0.7));transform:scaleX(-1)}
#portrait-player{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 240px);left:0;z-index:30;width:min(130px,26vw);height:min(150px,30vw);object-fit:cover;object-position:top center;filter:drop-shadow(4px 4px 12px rgba(0,0,0,0.7))}

/* HP bars area — top area */
#hp-area{position:fixed;top:52px;left:0;right:0;z-index:40;padding:8px 14px;display:flex;flex-direction:column;gap:6px;pointer-events:none}
/* Enemy HP */
.hp-card{background:rgba(0,0,0,0.65);border:1.5px solid rgba(255,255,255,0.12);border-radius:14px;padding:8px 12px;backdrop-filter:blur(6px)}
.hp-name{font-size:13px;font-weight:700;color:#e9d5ff;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.hp-bar-wrap{height:10px;background:rgba(255,255,255,0.12);border-radius:6px;overflow:hidden}
.hp-bar{height:100%;border-radius:6px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);background:linear-gradient(90deg,#4ade80,#22c55e)}
.hp-bar.yellow{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.hp-bar.red{background:linear-gradient(90deg,#f87171,#ef4444)}
.hp-poke-slots{display:flex;gap:4px;margin-top:5px}
.hp-poke-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);transition:background 0.3s}
.hp-poke-dot.alive{background:linear-gradient(135deg,#4ade80,#22c55e);border-color:#86efac}
.hp-poke-dot.fainted{background:rgba(244,63,94,0.4);border-color:#f43f5e}

/* Pokemon sprites in field */
#poke-enemy{position:fixed;top:calc(52px + min(175px,35vw));right:min(60px,15vw);z-index:20;width:min(140px,30vw);height:min(140px,30vw);object-fit:contain;filter:drop-shadow(0 8px 20px rgba(0,0,0,0.5));transition:opacity 0.3s,transform 0.3s;image-rendering:auto}
#poke-player{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 240px);left:min(60px,15vw);z-index:20;width:min(140px,30vw);height:min(140px,30vw);object-fit:contain;filter:drop-shadow(0 8px 20px rgba(0,0,0,0.5));transition:opacity 0.3s,transform 0.3s;image-rendering:auto;transform:scaleX(-1)}

/* VFX layer */
#vfx-layer{position:fixed;inset:0;z-index:25;pointer-events:none}

/* ─── BATTLE UI BOTTOM ─── */
#battle-ui{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(0deg,rgba(5,0,15,0.98) 0%,rgba(15,5,35,0.96) 100%);border-top:3px solid rgba(139,92,246,0.6);padding:10px 14px calc(env(safe-area-inset-bottom,0px) + 12px)}

/* Battle message box */
#msg-box{min-height:52px;margin-bottom:10px}
#msg-text{color:#fff;font-size:16px;line-height:1.4}
#msg-tap{color:rgba(255,255,255,0.35);font-size:11px;text-align:right;margin-top:2px;animation:blink 1s ease-in-out infinite;display:none}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}

/* Action buttons */
#action-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;display:none}
.act-btn{padding:13px 10px;border-radius:16px;border:2px solid;color:#fff;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;transition:transform 0.1s;-webkit-tap-highlight-color:transparent;text-align:center}
.act-btn:active{transform:scale(0.92)}
#btn-fight{background:linear-gradient(160deg,#7C3AED,#6D28D9);border-color:#A78BFA;box-shadow:0 5px 0 #4C1D95}
#btn-switch{background:linear-gradient(160deg,#0D9488,#0F766E);border-color:#2DD4BF;box-shadow:0 5px 0 #064E3B}

/* Move selection */
#move-panel{display:none;flex-direction:column;gap:8px}
#move-header{display:flex;align-items:center;gap:8px;margin-bottom:2px}
#move-back{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:5px 10px;color:#fff;cursor:pointer;font-family:inherit;font-size:13px}
#move-label{color:#a78bfa;font-size:13px;font-weight:700}
#move-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.move-btn{padding:12px 8px;border-radius:14px;border:2px solid;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;text-align:center}
.move-btn:active{transform:scale(0.92)}

/* Switch panel */
#switch-panel{display:none;flex-direction:column;gap:8px}
#switch-header{display:flex;align-items:center;gap:8px;margin-bottom:2px}
#switch-back{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:5px 10px;color:#fff;cursor:pointer;font-family:inherit;font-size:13px}
#switch-label{color:#2DD4BF;font-size:13px;font-weight:700}
#switch-btns{display:flex;flex-wrap:wrap;gap:8px}
.sw-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:14px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;flex:1;min-width:120px;-webkit-tap-highlight-color:transparent}
.sw-btn img{width:36px;height:36px;object-fit:contain}
.sw-btn:active{transform:scale(0.93)}
.sw-btn.fainted{opacity:0.35;pointer-events:none}
.sw-btn.active-poke{border-color:#fbbf24;background:rgba(251,191,36,0.12)}

/* ─── GYM SELECT OVERLAY ─── */
#gym-select{position:fixed;inset:0;z-index:800;background:linear-gradient(180deg,#0e0220 0%,#1a0535 60%,#0e0220 100%);display:flex;flex-direction:column;overflow:hidden}
#gs-header{padding:14px 16px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#gs-back{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.22);border-radius:12px;color:#fff;padding:7px 14px;font-size:15px;cursor:pointer;font-family:inherit}
#gs-title{font-size:20px;font-weight:900;color:#e9d5ff;flex:1;text-align:center}
#gs-subtitle{text-align:center;color:rgba(233,213,255,0.5);font-size:12px;letter-spacing:1.5px;padding:0 16px 10px;flex-shrink:0}
#gs-body{flex:1;overflow-y:auto;padding:6px 14px 24px;-webkit-overflow-scrolling:touch}
#trainer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:480px){#trainer-grid{grid-template-columns:repeat(4,1fr)}}
.trainer-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:18px;border:2px solid rgba(139,92,246,0.3);background:rgba(139,92,246,0.08);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .12s;position:relative}
.trainer-card:active{transform:scale(0.92);background:rgba(139,92,246,0.25)}
.trainer-card.beaten{border-color:#fbbf24;background:rgba(251,191,36,0.1)}
.trainer-card img{width:64px;height:64px;object-fit:contain;object-position:top}
.trainer-card .tc-name{font-size:13px;font-weight:700;color:#e9d5ff;text-align:center}
.trainer-card .tc-badge{font-size:18px;position:absolute;top:6px;right:8px}

/* ─── RESULT OVERLAY ─── */
#result-ovl{position:fixed;inset:0;z-index:600;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(14px)}
#result-card{background:linear-gradient(160deg,#1e0845,#2d1b69);border:2px solid rgba(139,92,246,0.6);border-radius:28px;padding:28px 24px;width:min(360px,92vw);text-align:center;box-shadow:0 20px 60px rgba(139,92,246,0.35)}
#result-title{font-size:32px;font-weight:900;margin-bottom:8px}
#result-stars{font-size:40px;letter-spacing:4px;margin-bottom:8px}
#result-badge-img{font-size:60px;margin-bottom:4px}
#result-msg{color:rgba(233,213,255,0.8);font-size:16px;margin-bottom:20px}
#result-btns{display:flex;gap:10px;justify-content:center}
.result-btn{padding:14px 24px;border-radius:18px;border:none;color:#fff;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit}
#rbtn-again{background:linear-gradient(160deg,#7C3AED,#6D28D9);box-shadow:0 5px 0 #4C1D95}
#rbtn-back{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25)}

/* type colors */
.type-normal{background:linear-gradient(160deg,#6b7280,#4b5563);border-color:#9ca3af;box-shadow:0 5px 0 #374151}
.type-fire{background:linear-gradient(160deg,#c2410c,#ea580c);border-color:#fb923c;box-shadow:0 5px 0 #9a3412}
.type-water{background:linear-gradient(160deg,#1d4ed8,#2563eb);border-color:#60a5fa;box-shadow:0 5px 0 #1e3a8a}
.type-grass{background:linear-gradient(160deg,#15803d,#16a34a);border-color:#4ade80;box-shadow:0 5px 0 #14532d}
.type-electric{background:linear-gradient(160deg,#a16207,#ca8a04);border-color:#fbbf24;box-shadow:0 5px 0 #713f12}
.type-psychic{background:linear-gradient(160deg,#9d174d,#be185d);border-color:#f472b6;box-shadow:0 5px 0 #831843}
.type-rock{background:linear-gradient(160deg,#78716c,#57534e);border-color:#a8a29e;box-shadow:0 5px 0 #44403c}
.type-ghost{background:linear-gradient(160deg,#4c1d95,#5b21b6);border-color:#a78bfa;box-shadow:0 5px 0 #2e1065}
.type-ice{background:linear-gradient(160deg,#0e7490,#0891b2);border-color:#67e8f9;box-shadow:0 5px 0 #164e63}
.type-dragon{background:linear-gradient(160deg,#1d4ed8,#7c3aed);border-color:#818cf8;box-shadow:0 5px 0 #1e3a8a}
.type-dark{background:linear-gradient(160deg,#1c1917,#292524);border-color:#78716c;box-shadow:0 5px 0 #0c0a09}
.type-steel{background:linear-gradient(160deg,#475569,#334155);border-color:#94a3b8;box-shadow:0 5px 0 #1e293b}
.type-fighting{background:linear-gradient(160deg,#9a3412,#b91c1c);border-color:#fca5a5;box-shadow:0 5px 0 #7f1d1d}
.type-ground{background:linear-gradient(160deg,#92400e,#b45309);border-color:#fcd34d;box-shadow:0 5px 0 #78350f}
.type-flying{background:linear-gradient(160deg,#1e40af,#3b82f6);border-color:#bae6fd;box-shadow:0 5px 0 #1e3a8a}
.type-poison{background:linear-gradient(160deg,#6b21a8,#7e22ce);border-color:#d946ef;box-shadow:0 5px 0 #4a044e}
.type-bug{background:linear-gradient(160deg,#3f6212,#4d7c0f);border-color:#a3e635;box-shadow:0 5px 0 #1a2e05}
.type-fairy{background:linear-gradient(160deg,#9d174d,#db2777);border-color:#fbcfe8;box-shadow:0 5px 0 #831843}
</style>
</head>
<body>

<div id="battle-bg"></div>
<div id="flash"></div>
<canvas id="vfx-layer"></canvas>

<!-- HUD -->
<div id="hud-top">
  <button id="btn-back">◀ Kembali</button>
  <div id="game-title">⚔️ Gym Pokémon</div>
  <div id="badge-count">🏅 <span id="badge-num">0</span>/18</div>
</div>

<!-- Trainer portraits -->
<img id="portrait-enemy" src="" alt="">
<img id="portrait-player" src="" alt="">

<!-- HP area -->
<div id="hp-area">
  <div class="hp-card" id="hp-enemy-card">
    <div class="hp-name" id="hp-enemy-name">Misty's Starmie</div>
    <div class="hp-bar-wrap"><div class="hp-bar" id="hp-enemy-bar" style="width:100%"></div></div>
    <div class="hp-poke-slots" id="hp-enemy-dots"></div>
  </div>
  <div class="hp-card" id="hp-player-card">
    <div class="hp-name" id="hp-player-name">Pikachu</div>
    <div class="hp-bar-wrap"><div class="hp-bar" id="hp-player-bar" style="width:100%"></div></div>
    <div class="hp-poke-slots" id="hp-player-dots"></div>
  </div>
</div>

<!-- Pokemon sprites -->
<img id="poke-enemy" src="" alt="">
<img id="poke-player" src="" alt="">

<!-- Battle UI -->
<div id="battle-ui">
  <div id="msg-box">
    <div id="msg-text">Pilih trainer untuk ditantang!</div>
    <div id="msg-tap">▼ tap untuk lanjut</div>
  </div>
  <div id="action-btns">
    <button class="act-btn" id="btn-fight">⚔️ Serang!</button>
    <button class="act-btn" id="btn-switch">🔄 Ganti</button>
  </div>
  <div id="move-panel">
    <div id="move-header">
      <button id="move-back">◀</button>
      <div id="move-label">Pilih serangan:</div>
    </div>
    <div id="move-btns"></div>
  </div>
  <div id="switch-panel">
    <div id="switch-header">
      <button id="switch-back">◀</button>
      <div id="switch-label">Pilih Pokémon:</div>
    </div>
    <div id="switch-btns"></div>
  </div>
</div>

<!-- Gym Select Overlay -->
<div id="gym-select">
  <div id="gs-header">
    <button id="gs-back">◀ Kembali</button>
    <div id="gs-title">Pilih Gym Leader</div>
  </div>
  <div id="gs-subtitle">TANTANG TRAINER POKÉMON</div>
  <div id="gs-body">
    <div id="trainer-grid"></div>
  </div>
</div>

<!-- Result Overlay -->
<div id="result-ovl">
  <div id="result-card">
    <div id="result-badge-img">🏅</div>
    <div id="result-title">Menang!</div>
    <div id="result-stars"></div>
    <div id="result-msg"></div>
    <div id="result-btns">
      <button class="result-btn" id="rbtn-again">Lagi!</button>
      <button class="result-btn" id="rbtn-back">Kembali</button>
    </div>
  </div>
</div>

function getEff(attackType, defType){ return (EFF[attackType]||{})[defType] ?? 1; }

// ─── UTILS ───────────────────────────────────────────────────────────────────
function deepCloneTeam(team){
  return team.map(p=>({
    ...p,
    hp: p.maxHp || p.hp,
    maxHp: p.maxHp || p.hp,
    moves: p.moves || [{name:'Tackle',type:'normal'},{name:'Quick Attack',type:'normal'},{name:'Growl',type:'normal'},{name:'Leer',type:'normal'}]
  }));
}

function calcDmg(moveType, atkPoke, defPoke){
  const base = 20 + Math.floor(Math.random()*15);
  const eff = getEff(moveType, defPoke.type);
  return Math.max(1, Math.round(base * eff));
}

function flashColor(color){
  const f = document.getElementById('flash');

}

// VFX sparkle
function spawnVfx(x,y,color='#fbbf24'){
  const canvas = document.getElementById('vfx-layer');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const particles = [];
  for(let i=0;i<18;i++){
    const angle = (Math.PI*2/18)*i + Math.random()*0.3;
    particles.push({x,y,vx:Math.cos(angle)*(2+Math.random()*4),vy:Math.sin(angle)*(2+Math.random()*4),life:1,color});
  }
  let raf;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    for(const p of particles){
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.04;
      if(p.life>0){ alive=true; ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill(); }
    }
    ctx.globalAlpha=1;
    if(alive) raf=requestAnimationFrame(draw); else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ─── MSG QUEUE ────────────────────────────────────────────────────────────────
function queueMsg(text, cb){
  msgQueue.push({text,cb});
  if(msgQueue.length===1) processMsg();
}
function processMsg(){
  if(!msgQueue.length) return;
  const {text,cb} = msgQueue[0];
  setMsg(text);
  showBattleUI('tap');
  waitingForTap = true;
  if(cb) {
    // auto advance after 1.2s if no interaction OR wait for tap
    battle._pendingCb = cb;
  }
}
function advanceMsg(){
  if(!waitingForTap || !msgQueue.length) return;
  waitingForTap=false;
  const {cb} = msgQueue.shift();
  showBattleUI('none');
  if(msgQueue.length) { processMsg(); return; }
  if(cb) cb();
  else if(battle && !battle.ended) showActionMenu();
}

  document.getElementById('gym-select').style.display='none';

  // set trainer portrait

  ep.onerror = ()=>{ ep.style.display='none'; };

  const pp = document.getElementById('portrait-player');
  pp.src = TRAINER_SPRITE('red'); // player always Red
  pp.onerror = ()=>{ pp.style.display='none'; };

  // init battle state
  battle = {
    trainer,
    enemyTeam: deepCloneTeam(trainer.team),
    playerTeam: deepCloneTeam(PLAYER_TEAM),

// ─── USE MOVE ────────────────────────────────────────────────────────────────
function useMove(moveIdx){
  if(!battle||battle.ended) return;
  showBattleUI('none');
  const pp = battle.playerTeam[battle.playerIdx];
  const ep = battle.enemyTeam[battle.enemyIdx];
  const move = pp.moves[moveIdx];
  const dmg = calcDmg(move.type, pp, ep);
  const eff = getEff(move.type, ep.type);

  ep.hp = Math.max(0, ep.hp - dmg);
  updateHpUI();
  setPokeSpriteEnemy(ep.slug);

  // VFX
  const epEl = document.getElementById('poke-enemy');
  const rect = epEl.getBoundingClientRect();
  spawnVfx(rect.left+rect.width/2, rect.top+rect.height/2, eff>=2?'#fbbf24':eff===0?'#94a3b8':'#a78bfa');
  if(eff>=2) flashColor('yellow');
  else if(eff===0) setMsg(`Tidak berpengaruh...`);

  let effMsg = eff>=2?' Sangat efektif!':eff<=0.5&&eff>0?' Kurang efektif.':eff===0?' Tidak berpengaruh!':'';
  const msgs = [`${pp.name} menggunakan ${move.name}!${effMsg}`];

  if(ep.hp<=0){
    msgs.push(`${ep.name} pingsan!`);
    // enemy fainted
    const nextIdx = battle.enemyTeam.findIndex((p,i)=>i>battle.enemyIdx&&p.hp>0);
    if(nextIdx===-1){
      // all enemy fainted
      msgs.push(`Kamu mengalahkan ${battle.trainer.name}!`);
      queueMsgs(msgs, ()=>endBattleWin());
    } else {
      queueMsgs(msgs, ()=>{
        battle.enemyIdx = nextIdx;
        const next = battle.enemyTeam[nextIdx];
        setPokeSpriteEnemy(next.slug);
        updateHpUI();
        queueMsg(`${battle.trainer.name} mengeluarkan ${next.name}!`, ()=>showActionMenu());
      });
    }
  } else {
    // enemy turn
    queueMsgs(msgs, ()=>enemyTurn());
  }
}

// ─── ENEMY TURN ──────────────────────────────────────────────────────────────
function enemyTurn(){
  if(!battle||battle.ended) return;
  const ep = battle.enemyTeam[battle.enemyIdx];
  const pp = battle.playerTeam[battle.playerIdx];
  const moveTypes = ['normal','fire','water','grass','electric','psychic','rock','ghost','ice','dragon'];
  const rndType = moveTypes[Math.floor(Math.random()*moveTypes.length)];
  const moveNames = ['Tackle','Scratch','Pound','Slam','Bite','Crunch','Hyper Beam','Shadow Ball'];
  const moveName = moveNames[Math.floor(Math.random()*moveNames.length)];
  const dmg = calcDmg(ep.type, ep, pp);
  const eff = getEff(ep.type, pp.type);

  pp.hp = Math.max(0, pp.hp - dmg);
  updateHpUI();

  // VFX on player poke
  const ppEl = document.getElementById('poke-player');
  const rect = ppEl.getBoundingClientRect();
  spawnVfx(rect.left+rect.width/2, rect.top+rect.height/2, '#f43f5e');
  flashColor('red');

  let effMsg = eff>=2?' Sangat efektif!':eff<=0.5&&eff>0?' Kurang efektif.':eff===0?' Tidak berpengaruh!':'';
  const msgs = [`${ep.name} menggunakan ${moveName}!${effMsg}`];

  if(pp.hp<=0){
    msgs.push(`${pp.name} pingsan!`);
    const nextAlive = battle.playerTeam.findIndex((p,i)=>i>battle.playerIdx&&p.hp>0);
    const anyAlive = battle.playerTeam.findIndex(p=>p.hp>0);
    if(anyAlive===-1){
      msgs.push(`Semua Pokémonmu pingsan! Kamu kalah...`);
      queueMsgs(msgs, ()=>endBattleLose());
    } else {
      queueMsgs(msgs, ()=>{
        buildSwitchPanel(true);
        showBattleUI('switch');
        setMsg('Pilih Pokémon berikutnya!');
      });
    }
  } else {
    queueMsgs(msgs, ()=>showActionMenu());
  }
}

  const container = document.getElementById('switch-btns');

    const fainted = p.hp<=0;
    return `<button class="sw-btn ${fainted?'fainted':''} ${isActive?'active-poke':''}" onclick="switchPoke(${i})">
      <img src="${SPRITE_HD(p.slug)}" onerror="this.src='${SPRITE_LOCAL(p.slug)}'" alt="${p.name}">

    </button>`;

function switchPoke(idx){
  if(!battle||battle.ended) return;
  if(idx===battle.playerIdx) return; // same
  if(battle.playerTeam[idx].hp<=0) return;
  const prev = battle.playerTeam[battle.playerIdx].name;
  battle.playerIdx = idx;
  const next = battle.playerTeam[idx];
  setPokeSpritePlayer(next.slug);
  updateHpUI();
  showBattleUI('none');
  queueMsg(`Kembali, ${prev}! Ayo, ${next.name}!`, ()=>showActionMenu());
}

function queueMsgs(arr, finalCb){
  arr.forEach((text,i)=>{
    queueMsg(text, i===arr.length-1 ? finalCb : null);
  });
}

// ─── END BATTLE ───────────────────────────────────────────────────────────────
function endBattleWin(){
  if(!battle||battle.ended) return;
  battle.ended=true;
  const trainer = battle.trainer;
  badges[trainer.id] = true;
  localStorage.setItem('g13c_badges', JSON.stringify(badges));
  updateBadgeCount();
  buildGymSelect();

  const totalBadges = Object.keys(badges).length;
  const stars = totalBadges>=15?5:totalBadges>=10?4:totalBadges>=5?3:totalBadges>=2?2:1;

  const ovl = document.getElementById('result-ovl');
  document.getElementById('result-badge-img').textContent = trainer.badge;
  document.getElementById('result-title').textContent = 'Kamu Menang!';
  document.getElementById('result-stars').textContent = '⭐'.repeat(stars)+'☆'.repeat(5-stars);
  document.getElementById('result-msg').textContent = `Kamu mendapat lencana ${trainer.name}! Total: ${totalBadges}/18 lencana`;
  ovl.style.display='flex';
  flashColor('yellow');

  // return result to index.html
  sessionStorage.setItem('g13cResult', JSON.stringify({stars, badges: totalBadges}));
}

function endBattleLose(){
  if(!battle||battle.ended) return;
  battle.ended=true;
  const ovl = document.getElementById('result-ovl');
  document.getElementById('result-badge-img').textContent = '💔';
  document.getElementById('result-title').textContent = 'Kalah...';
  document.getElementById('result-stars').textContent = '⭐☆☆☆☆';
  document.getElementById('result-msg').textContent = 'Jangan menyerah! Coba lagi!';
  ovl.style.display='flex';
  flashColor('red');
}

// ─── RESULT BUTTONS ──────────────────────────────────────────────────────────
document.getElementById('rbtn-again').onclick = ()=>{
  document.getElementById('result-ovl').style.display='none';
  if(battle && !battle.ended){} // shouldn't happen
  const tid = battle?.trainer?.id;
  battle=null; msgQueue=[]; waitingForTap=false;
  document.getElementById('gym-select').style.display='flex';
  if(tid) startBattle(tid);
};

document.getElementById('rbtn-back').onclick = ()=>{
  document.getElementById('result-ovl').style.display='none';
  battle=null; msgQueue=[]; waitingForTap=false;
  document.getElementById('gym-select').style.display='flex';
};

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
document.getElementById('btn-back').onclick = ()=>goBack();
document.getElementById('gs-back').onclick = ()=>goBack();

function goBack(){
  if(document.referrer) history.back();
  else window.location.href='../index.html';
}

// ─── TAP HANDLER for message advance ─────────────────────────────────────────
document.getElementById('battle-ui').addEventListener('click', e=>{
  if(e.target.closest('button')) return; // let buttons handle themselves
  advanceMsg();
});
document.getElementById('msg-box').addEventListener('click', e=>{
  advanceMsg();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildGymSelect();
document.getElementById('gym-select').style.display='flex';
</script>
</body>
</html>
