<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Gym Pokémon ⚔️</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100svh;overflow:hidden;background:#1a0535;font-family:'Fredoka One',sans-serif;touch-action:none}
#pixi-canvas{position:fixed;inset:0;width:100vw;height:100svh;display:block}

/* HUD Top */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 14px 8px;background:linear-gradient(180deg,rgba(0,0,0,0.75) 0%,transparent 100%);pointer-events:none}
#btn-back{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);border-radius:12px;color:#fff;padding:7px 12px;font-size:15px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0}
#game-title{flex:1;font-size:15px;font-weight:900;color:#fff;text-shadow:0 0 10px rgba(139,92,246,0.8)}
#badge-count{background:rgba(139,92,246,0.3);border:1.5px solid rgba(139,92,246,0.6);border-radius:10px;padding:5px 10px;color:#e9d5ff;font-size:13px;font-weight:700;flex-shrink:0;white-space:nowrap}

/* Flash overlay */
#flash{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:0}

/* Letter Select Overlay */
#letter-select-ovl{position:fixed;inset:0;z-index:400;background:linear-gradient(180deg,#1a0535 0%,#2d0a5e 60%,#1a0535 100%);display:flex;flex-direction:column;overflow:hidden}
#sel-header{padding:14px 16px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#sel-back{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);border-radius:12px;color:#fff;padding:7px 12px;font-size:15px;cursor:pointer;font-family:inherit}
#sel-title-text{font-size:18px;font-weight:900;color:#e9d5ff;flex:1;text-align:center}
#sel-body{flex:1;overflow-y:auto;padding:8px 14px 24px;-webkit-overflow-scrolling:touch}
#sel-subtitle{text-align:center;color:rgba(233,213,255,0.6);font-size:12px;letter-spacing:1.5px;margin-bottom:14px}
#letter-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.letter-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:12px 6px;border-radius:16px;border:2px solid rgba(139,92,246,0.35);background:rgba(139,92,246,0.12);color:#fff;font-size:20px;font-weight:900;cursor:pointer;transition:all .12s;position:relative;-webkit-tap-highlight-color:transparent;min-height:72px}
.letter-btn:active{transform:scale(.92);background:rgba(139,92,246,0.35)}
.letter-btn .ltr{font-size:26px;line-height:1}
.letter-btn .badge-ind{font-size:13px;line-height:1;min-height:16px}
.letter-btn.gold{border-color:#fbbf24;background:rgba(251,191,36,0.2)}
.letter-btn.silver{border-color:#94a3b8;background:rgba(148,163,184,0.15)}
.letter-btn.bronze{border-color:#cd7c2a;background:rgba(205,124,42,0.15)}

/* Quiz Panel */
#quiz-panel{position:fixed;bottom:0;left:0;right:0;z-index:200;display:none;padding:12px 14px 18px;background:linear-gradient(0deg,rgba(10,2,25,0.98) 0%,rgba(26,5,53,0.97) 100%);border-top:3px solid rgba(139,92,246,0.7);backdrop-filter:blur(10px)}
#quiz-letter-badge{text-align:center;color:#a78bfa;font-size:11px;letter-spacing:2px;margin-bottom:6px;font-weight:700}
#quiz-msg{text-align:center;color:#fff;font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.3}
#quiz-choices{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.choice-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 6px 12px;border-radius:16px;border:2px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;transition:all .12s;font-family:inherit;-webkit-tap-highlight-color:transparent;min-height:70px}
.choice-btn .ce{font-size:28px;line-height:1}
.choice-btn .cn{font-size:12px;font-weight:700;color:rgba(255,255,255,0.8)}
.choice-btn:active{transform:scale(.91);background:rgba(139,92,246,0.4)}
.choice-btn.correct{border-color:#4ade80;background:rgba(74,222,128,0.2);animation:correctFlash .3s ease}
.choice-btn.wrong{border-color:#f43f5e;background:rgba(244,63,94,0.2);animation:wrongShake .3s ease}
@keyframes correctFlash{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Battle Message Box */
#battle-msg-box{position:fixed;bottom:0;left:0;right:0;z-index:150;display:none;padding:14px 18px 20px;background:rgba(5,0,15,0.95);border-top:3px solid rgba(139,92,246,0.5);backdrop-filter:blur(10px)}
#battle-msg-text{color:#fff;font-size:16px;line-height:1.4;min-height:44px}
#battle-msg-tap{color:rgba(255,255,255,0.4);font-size:11px;text-align:right;margin-top:4px;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:0.4}50%{opacity:1}}

/* Result Overlay */
#result-ovl{position:fixed;inset:0;z-index:350;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);backdrop-filter:blur(12px)}
#result-ovl.show{display:flex}
#result-card{background:linear-gradient(145deg,#1a0535,#2d0a5e);border:2px solid rgba(139,92,246,0.5);border-radius:28px;padding:30px 24px 24px;text-align:center;max-width:320px;width:90%;box-shadow:0 0 60px rgba(139,92,246,0.4),0 20px 40px rgba(0,0,0,0.7);color:#fff;animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.72);opacity:0}to{transform:scale(1);opacity:1}}
#res-emoji{font-size:64px;display:block;margin-bottom:8px}
#res-title{font-size:26px;font-weight:900;margin-bottom:6px}
#res-badge{font-size:36px;margin:8px 0}
#res-sub{color:rgba(255,255,255,0.65);font-size:14px;margin-bottom:20px;line-height:1.4}
.res-btn{border:none;border-radius:16px;color:#fff;padding:14px 0;font-size:15px;font-weight:900;cursor:pointer;width:100%;margin-top:8px;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.res-btn:active{transform:scale(.96)}
#btn-next-gym{background:linear-gradient(135deg,#7c3aed,#6d28d9);box-shadow:0 5px 0 #4c1d95}
#btn-retry{background:linear-gradient(135deg,#dc2626,#b91c1c);box-shadow:0 5px 0 #7f1d1d}
#btn-home{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);margin-top:8px}

/* Shake animation for body */
@keyframes camShake{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,2px)}40%{transform:translate(5px,-2px)}60%{transform:translate(-3px,1px)}80%{transform:translate(3px,-1px)}}
.cam-shake{animation:camShake .35s ease}

/* Mobile safe bottom */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  #quiz-panel,#battle-msg-box{padding-bottom:calc(18px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<canvas id="pixi-canvas"></canvas>
<div id="flash"></div>

<!-- HUD Top -->
<div id="hud-top">
  <button id="btn-back" onclick="goBack()">⌂</button>
  <span id="game-title">⚔️ Gym Pokémon</span>
  <span id="badge-count">🏅 0</span>
</div>

<!-- Letter Select Overlay -->
<div id="letter-select-ovl">
  <div id="sel-header">
    <button id="sel-back" onclick="goBack()">⌂</button>
    <span id="sel-title-text">🏅 Pilih Gym Huruf</span>
    <span id="sel-badge-cnt" style="background:rgba(139,92,246,0.3);border:1.5px solid rgba(139,92,246,0.5);border-radius:10px;padding:5px 10px;color:#e9d5ff;font-size:13px;font-weight:700">🏅 0</span>
  </div>
  <div id="sel-body">
    <div id="sel-subtitle">TANTANG GYM LEADER POKEMON!</div>
    <div id="letter-grid"></div>
  </div>
</div>

<!-- Battle Message Box -->
<div id="battle-msg-box" onclick="onMsgTap()">
  <div id="battle-msg-text"></div>
  <div id="battle-msg-tap">▼ Ketuk untuk lanjut</div>
</div>

<!-- Quiz Panel -->
<div id="quiz-panel">
  <div id="quiz-letter-badge">HURUF — <span id="quiz-letter-lbl">A</span></div>
  <div id="quiz-msg">Mana yang mulai dengan huruf ini?</div>
  <div id="quiz-choices">
    <button class="choice-btn" id="cb0" onclick="chooseAnswer(0)"><span class="ce" id="ce0">🍎</span><span class="cn" id="cn0">Apel</span></button>
    <button class="choice-btn" id="cb1" onclick="chooseAnswer(1)"><span class="ce" id="ce1">⚽</span><span class="cn" id="cn1">Bola</span></button>
    <button class="choice-btn" id="cb2" onclick="chooseAnswer(2)"><span class="ce" id="ce2">🐘</span><span class="cn" id="cn2">Gajah</span></button>
  </div>
</div>

<!-- Result Overlay -->
<div id="result-ovl">
  <div id="result-card">
    <span id="res-emoji">🏆</span>
    <div id="res-title">Menang!</div>
    <div id="res-badge">🥇</div>
    <div id="res-sub">Gym Huruf A selesai!</div>
    <button class="res-btn" id="btn-next-gym" onclick="backToSelect()">Pilih Gym Lain 🏅</button>
    <button class="res-btn" id="btn-retry" onclick="retryBattle()" style="display:none">Coba Lagi 🔄</button>
    <button class="res-btn" id="btn-home" onclick="goBack()">⌂ Beranda</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script>
'use strict';

// ── DATA ────────────────────────────────────────────────────────────────────
const ITEMS = {
  A:[{e:'🍎',n:'Apel'},{e:'🌊',n:'Awan'},{e:'🦅',n:'Ayam'},{e:'🐜',n:'Semut',skip:true}],
  B:[{e:'⚽',n:'Bola'},{e:'🎈',n:'Balon'},{e:'📚',n:'Buku'},{e:'🚌',n:'Bus'},{e:'🌸',n:'Bunga'}],
  C:[{e:'💍',n:'Cincin'},{e:'🦑',n:'Cumi'},{e:'🍫',n:'Coklat'}],
  D:[{e:'🍃',n:'Daun'},{e:'🐑',n:'Domba'},{e:'🎮',n:'Dadu'}],
  E:[{e:'🦅',n:'Elang'},{e:'🧊',n:'Es'},{e:'🪣',n:'Ember'}],
  F:[{e:'📷',n:'Foto'},{e:'🦩',n:'Flamingo'},{e:'🔥',n:'Flare'}],
  G:[{e:'🐘',n:'Gajah'},{e:'🎸',n:'Gitar'},{e:'⛰️',n:'Gunung'},{e:'🌀',n:'Gasing'}],
  H:[{e:'🐯',n:'Harimau'},{e:'🌧️',n:'Hujan'},{e:'🎃',n:'Horor'}],
  I:[{e:'🐟',n:'Ikan'},{e:'👩',n:'Ibu'},{e:'🦗',n:'Iguana'}],
  J:[{e:'🌽',n:'Jagung'},{e:'⏰',n:'Jam'},{e:'🦒',n:'Jerapah'},{e:'🍄',n:'Jamur'}],
  K:[{e:'🐴',n:'Kuda'},{e:'🐈',n:'Kucing'},{e:'🎂',n:'Kue'},{e:'🐇',n:'Kelinci'}],
  L:[{e:'🐬',n:'Lumba'},{e:'🐝',n:'Lebah'},{e:'🎃',n:'Labu'},{e:'🌺',n:'Lotus'}],
  M:[{e:'☀️',n:'Matahari'},{e:'🥭',n:'Mangga'},{e:'🐒',n:'Monyet'},{e:'🍯',n:'Madu'}],
  N:[{e:'🍚',n:'Nasi'},{e:'🍍',n:'Nanas'},{e:'🦟',n:'Nyamuk'}],
  O:[{e:'🦧',n:'Orang Utan'},{e:'🌊',n:'Ombak'},{e:'💊',n:'Obat'}],
  P:[{e:'🍌',n:'Pisang'},{e:'🌳',n:'Pohon'},{e:'🐼',n:'Panda'},{e:'🎉',n:'Pesta'}],
  R:[{e:'🦌',n:'Rusa'},{e:'🚀',n:'Roket'},{e:'🦊',n:'Rubah'}],
  S:[{e:'🐜',n:'Semut'},{e:'🚲',n:'Sepeda'},{e:'🐄',n:'Sapi'},{e:'🐍',n:'Ular',skip:true}],
  T:[{e:'🎩',n:'Topi'},{e:'🐭',n:'Tikus'},{e:'🥚',n:'Telur'},{e:'🌺',n:'Teratai'}],
  U:[{e:'🪼',n:'Ubur'},{e:'🦐',n:'Udang'},{e:'🛸',n:'UFO'},{e:'🐛',n:'Ulat'}],
  W:[{e:'🥕',n:'Wortel'},{e:'🎨',n:'Warna'},{e:'🦎',n:'Waran'}],
  Z:[{e:'🦓',n:'Zebra'},{e:'🫒',n:'Zaitun'}],
};
const DISTRACTORS = {
  A:['Bola','Kuda','Ikan','Gajah'],B:['Apel','Gajah','Kucing','Matahari'],
  C:['Apel','Bola','Domba','Ikan'],D:['Apel','Bola','Gajah','Ikan'],
  E:['Apel','Bola','Gajah','Kuda'],F:['Apel','Gajah','Kucing','Lumba'],
  G:['Apel','Bola','Ikan','Kucing'],H:['Apel','Bola','Gajah','Ikan'],
  I:['Apel','Bola','Gajah','Kuda'],J:['Apel','Bola','Gajah','Ikan'],
  K:['Apel','Bola','Gajah','Ikan'],L:['Apel','Bola','Gajah','Ikan'],
  M:['Apel','Bola','Gajah','Ikan'],N:['Apel','Bola','Gajah','Kuda'],
  O:['Apel','Bola','Gajah','Ikan'],P:['Apel','Gajah','Ikan','Kuda'],
  R:['Apel','Bola','Gajah','Ikan'],S:['Apel','Bola','Gajah','Kuda'],
  T:['Apel','Bola','Gajah','Kuda'],U:['Apel','Bola','Gajah','Ikan'],
  W:['Apel','Bola','Gajah','Ikan'],Z:['Apel','Bola','Gajah','Kuda'],
};
const DISTRACTOR_EMOJIS = {
  'Apel':'🍎','Bola':'⚽','Gajah':'🐘','Ikan':'🐟','Pohon':'🌳',
  'Kuda':'🐴','Kucing':'🐈','Matahari':'☀️','Nanas':'🍍','Monyet':'🐒',
  'Mangga':'🥭','Lumba':'🐬','Domba':'🐑',
};
const GYM_POKEMON = {
  A:'aipom',B:'bulbasaur',C:'caterpie',D:'dewgong',E:'eevee',
  F:'fennekin',G:'gengar',H:'haunter',I:'ivysaur',J:'jigglypuff',
  K:'kadabra',L:'lapras',M:'meowth',N:'ninetales',O:'onix',
  P:'pikachu',R:'raichu',S:'snorlax',T:'togetic',U:'umbreon',
  W:'wigglytuff',Z:'zubat',
};
const POKEMON_EMOJI = {
  A:'🐒',B:'🌿',C:'🐛',D:'🐬',E:'🦊',F:'🦊',G:'👻',H:'👻',
  I:'🌿',J:'🎤',K:'🔮',L:'🧊',M:'🐱',N:'🦊',O:'🪨',P:'⚡',
  R:'⚡',S:'😴',T:'🧚',U:'🌙',W:'🎤',Z:'🦇',
};
const LETTERS_ORDER = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','R','S','T','U','W','Z'];

// ── STATE ───────────────────────────────────────────────────────────────────
let STATE = 'LETTER_SELECT';
const S = {
  letter:'', enemySlug:'', enemyName:'',
  enemyHp:5, enemyMaxHp:5,
  playerHp:3, playerMaxHp:3,
  round:0, total:5,
  wrongCount:0,
  badges:{},
  pendingItems:[], usedItems:[],
  correctIdx:0,
  locked:false,
  msgQueue:[],
  msgCallback:null,
};

// ── PIXI REFS ────────────────────────────────────────────────────────────────
let app, stage;
let bgGfx, groundGfx, starGfxArr=[];
let enemySpr, playerSpr;
let enemyStatusGfx, playerStatusGfx;
let enemyHpBarBg, enemyHpBarFill, enemyNameTxt, enemyHpTxt;
let playerHeartsTxt;
let particleContainer;
let attackBeam;
let screenFlashGfx;
let animTicker = null;

// target HP bar values for tweening
let enemyHpTarget = 5, enemyHpCurrent = 5;
let enemyHpBarMaxW = 0;

// sprite original positions
let enemySprX=0, enemySprY=0;
let playerSprX=0, playerSprY=0;
let enemySprStartX=0;

// ── NAVIGATION ───────────────────────────────────────────────────────────────
function goBack(){
  if(document.referrer) history.back();
  else window.location.href='../index.html';
}

// ── BADGE LOGIC ──────────────────────────────────────────────────────────────
function loadBadges(){
  try{ S.badges = JSON.parse(localStorage.getItem('g13c_badges')||'{}'); }
  catch(e){ S.badges = {}; }
}
function saveBadges(){
  try{ localStorage.setItem('g13c_badges', JSON.stringify(S.badges)); }
  catch(e){}
}
function countBadges(){ return Object.keys(S.badges).length; }
function updateBadgeCount(){
  const n = countBadges();
  document.getElementById('badge-count').textContent = '🏅 '+n;
  document.getElementById('sel-badge-cnt').textContent = '🏅 '+n;
}

// ── LETTER SELECT ────────────────────────────────────────────────────────────
function buildLetterGrid(){
  const grid = document.getElementById('letter-grid');
  grid.innerHTML='';
  for(const ltr of LETTERS_ORDER){
    const badge = S.badges[ltr];
    const btn = document.createElement('button');
    btn.className = 'letter-btn' + (badge?' '+badge:'');
    btn.innerHTML = `<span class="ltr">${ltr}</span><span class="badge-ind">${badge==='gold'?'🥇':badge==='silver'?'🥈':badge==='bronze'?'🥉':''}</span>`;
    btn.onclick = ()=> startBattle(ltr);
    grid.appendChild(btn);
  }
  updateBadgeCount();
}

function showLetterSelect(){
  STATE = 'LETTER_SELECT';
  document.getElementById('letter-select-ovl').style.display='flex';
  document.getElementById('letter-select-ovl').style.flexDirection='column';
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('battle-msg-box').style.display='none';
  document.getElementById('result-ovl').classList.remove('show');
  buildLetterGrid();
}

// ── BATTLE START ─────────────────────────────────────────────────────────────
async function startBattle(letter){
  S.letter = letter;
  S.enemySlug = GYM_POKEMON[letter];
  S.enemyName = S.enemySlug.charAt(0).toUpperCase()+S.enemySlug.slice(1);
  S.enemyHp = S.enemyMaxHp = 5;
  S.playerHp = S.playerMaxHp = 3;
  S.round = 0; S.total = 5;
  S.wrongCount = 0;
  S.locked = false;
  S.msgQueue = [];

  // build pool of valid items (not skipped)
  const validItems = (ITEMS[letter]||[]).filter(i=>!i.skip);
  S.pendingItems = shuffle([...validItems]);
  S.usedItems = [];

  document.getElementById('quiz-letter-lbl').textContent = letter;

  // hide letter select
  document.getElementById('letter-select-ovl').style.display='none';
  document.getElementById('result-ovl').classList.remove('show');
  document.getElementById('quiz-panel').style.display='none';
  document.getElementById('battle-msg-box').style.display='none';

  STATE = 'BATTLE_INTRO';

  // Load enemy Pokemon sprite
  await loadEnemySprite();
  updatePixiStatus();
  playBattleIntro();
}

// ── PIXI SETUP ───────────────────────────────────────────────────────────────
async function initPixi(){
  app = new PIXI.Application();
  await app.init({
    canvas: document.getElementById('pixi-canvas'),
    resizeTo: window,
    backgroundColor: 0x1a0535,
    antialias: true,
    autoDensity: true,
    resolution: window.devicePixelRatio||1,
  });
  stage = app.stage;

  drawBattleScene();

  // Particle container
  particleContainer = new PIXI.Container();
  stage.addChild(particleContainer);

  // Screen flash overlay
  screenFlashGfx = new PIXI.Graphics();
  stage.addChild(screenFlashGfx);
}

function drawBattleScene(){
  const W = app.screen.width;
  const H = app.screen.height;

  // Sky background gradient via layered rects
  bgGfx = new PIXI.Graphics();
  bgGfx.rect(0,0,W,H).fill(0x1a0535);
  // Lighter middle band
  bgGfx.rect(0,H*0.3,W,H*0.4).fill({color:0x2d0a5e, alpha:0.5});
  stage.addChild(bgGfx);

  // Stars
  for(let i=0;i<60;i++){
    const g = new PIXI.Graphics();
    const r = Math.random()*1.8+0.4;
    g.circle(0,0,r).fill(0xffffff);
    g.x = Math.random()*W;
    g.y = Math.random()*(H*0.5);
    g.alpha = Math.random()*0.6+0.2;
    stage.addChild(g);
    starGfxArr.push(g);
    // twinkle
    const speed = Math.random()*0.02+0.008;
    const offset = Math.random()*Math.PI*2;
    app.ticker.add(()=>{ g.alpha = (Math.sin(Date.now()*speed+offset)+1)*0.3+0.1; });
  }

  // Ground base
  groundGfx = new PIXI.Graphics();
  groundGfx.rect(0, H*0.72, W, H*0.28).fill(0x1e2a08);
  stage.addChild(groundGfx);

  // Enemy platform (right, raised)
  const epX = W*0.52, epY = H*0.42, epW = W*0.44, epH = H*0.12;
  const enemyPlatform = new PIXI.Graphics();
  enemyPlatform.rect(epX, epY+epH*0.25, epW, epH*0.75).fill(0x4a3520);
  enemyPlatform.rect(epX, epY, epW, epH*0.3).fill(0x6b4e30);
  stage.addChild(enemyPlatform);

  // Player platform (left, raised)
  const ppX = W*0.04, ppY = H*0.56, ppW = W*0.44, ppH = H*0.12;
  const playerPlatform = new PIXI.Graphics();

async function loadPlayerSprite(){
  const W = app.screen.width, H = app.screen.height;
  const ppX = W*0.04, ppY = H*0.56, ppW = W*0.44;
  const url = 'https://img.pokemondb.net/sprites/black-white/anim/normal/pikachu.gif';
  try {
    const tex = await PIXI.Assets.load(url);
    const spr = new PIXI.Sprite(tex);
    spr.anchor.set(0.5,1);
    spr.x = ppX + ppW*0.5;
    spr.y = ppY + 4;
    spr.scale.set(1.8);
    spr.scale.x = -1.8; // face right
    stage.removeChild(playerSpr);
    playerSpr = spr;
    playerSprX = spr.x;
    playerSprY = spr.y;
    stage.addChild(playerSpr);
    // re-add particles and flash on top
    stage.removeChild(particleContainer);
    stage.removeChild(screenFlashGfx);
    stage.addChild(particleContainer);
    stage.addChild(screenFlashGfx);
  } catch(e){
    // fallback already set
    const old = playerSpr;
    playerSpr = old;
    playerSprX = old.x;
    playerSprY = old.y;
  }
}

async function loadEnemySprite(){

// ── STATUS UPDATE ────────────────────────────────────────────────────────────
function updatePixiStatus(){
  if(!enemyNameTxt) return;
  enemyNameTxt.text = S.enemyName;
  enemyHpTxt.text = S.enemyHp+'/'+S.enemyMaxHp;
  enemyHpCurrent = S.enemyHp;
  enemyHpTarget = S.enemyHp;
  redrawEnemyHpBar(S.enemyHp / S.enemyMaxHp);

  // hearts
  const hearts = '💖'.repeat(S.playerHp) + '🖤'.repeat(S.playerMaxHp - S.playerHp);
  if(playerHeartsTxt) playerHeartsTxt.text = hearts;
}

function redrawEnemyHpBar(ratio){
  if(!enemyHpBarFill) return;
  enemyHpBarFill.clear();
  const barX=32, barY=36, barH=8;
  const barW = Math.max(0, enemyHpBarMaxW * ratio);
  const col = ratio > 0.5 ? 0x4ade80 : ratio > 0.25 ? 0xfacc15 : 0xf43f5e;
  if(barW>0) enemyHpBarFill.roundRect(barX,barY,barW,barH,4).fill(col);
}

// Animate HP bar tween
function animateHpBar(fromRatio, toRatio, duration=500){
  const start = Date.now();
  const tick = ()=>{
    const t = Math.min(1,(Date.now()-start)/duration);
    const ratio = fromRatio + (toRatio-fromRatio)*easeOut(t);
    redrawEnemyHpBar(ratio);
    if(t<1) requestAnimationFrame(tick);
  };
  tick();
}

function easeOut(t){ return 1-(1-t)*(1-t); }

// ── BATTLE INTRO ─────────────────────────────────────────────────────────────
function playBattleIntro(){
  const W = app.screen.width, H = app.screen.height;

  const startX = W + 200;

// ── QUIZ PANEL ───────────────────────────────────────────────────────────────
function showQuizPanel(){
  if(STATE !== 'PLAYER_TURN') return;
  document.getElementById('battle-msg-box').style.display='none';
  S.locked = false;

  // Build question
  const valid = (ITEMS[S.letter]||[]).filter(i=>!i.skip);
  if(valid.length === 0){ endBattle(true); return; }

  // pick correct item
  let pool = S.pendingItems.filter(i=>!i.skip);
  if(pool.length === 0){
    S.pendingItems = shuffle([...valid]);
    pool = S.pendingItems.filter(i=>!i.skip);
  }
  const correct = pool[0];
  S.pendingItems = S.pendingItems.filter(i=>i!==correct);

  // pick 2 distractors
  const distNames = shuffle([...(DISTRACTORS[S.letter]||[])]).slice(0,2);
  const options = shuffle([
    { e: correct.e, n: correct.n, isCorrect: true },
    ...distNames.map(nm=>({ e: DISTRACTOR_EMOJIS[nm]||'❓', n: nm, isCorrect: false })),
  ]);

  S.correctIdx = options.findIndex(o=>o.isCorrect);

  // update UI
  for(let i=0;i<3;i++){
    document.getElementById('ce'+i).textContent = options[i].e;
    document.getElementById('cn'+i).textContent = options[i].n;
    document.getElementById('cb'+i).className = 'choice-btn';
    document.getElementById('cb'+i).disabled = false;
  }
  document.getElementById('quiz-msg').textContent =
    `Mana yang mulai dengan huruf "${S.letter}"?`;

  document.getElementById('quiz-panel').style.display='block';
}

function chooseAnswer(idx){
  if(S.locked) return;
  if(STATE !== 'PLAYER_TURN') return;
  S.locked = true;

  const correct = idx === S.correctIdx;
  const btn = document.getElementById('cb'+idx);

  // Disable all buttons
  for(let i=0;i<3;i++) document.getElementById('cb'+i).disabled=true;

  if(correct){
    btn.classList.add('correct');
    setTimeout(()=>{ playerAttack(); }, 350);
  } else {
    btn.classList.add('wrong');
    // show correct
    document.getElementById('cb'+S.correctIdx).classList.add('correct');
    setTimeout(()=>{ enemyAttack(); }, 500);
  }
}

// ── PLAYER ATTACK ─────────────────────────────────────────────────────────────
function playerAttack(){
  STATE = 'PLAYER_ATTACK';
  document.getElementById('quiz-panel').style.display='none';

  const W = app.screen.width, H = app.screen.height;
  const ep = enemySpr;

  // Pikachu slides toward enemy
  const startX = playerSprX, endX = playerSprX + (ep ? ep.x - playerSprX - 80 : 100);
  const duration = 250;
  const st = Date.now();

  const slide = ()=>{
    const t = Math.min(1,(Date.now()-st)/duration);
    if(playerSpr) playerSpr.x = startX + (endX-startX)*easeOut(t);
    if(t<1){ requestAnimationFrame(slide); }
    else {
      spawnHitParticles(ep ? ep.x : W*0.7, ep ? ep.y - 50 : H*0.45, '#facc15', 12);
      screenShake(4);
      flashEnemy();
      // HP
      const oldRatio = S.enemyHp / S.enemyMaxHp;
      S.enemyHp = Math.max(0, S.enemyHp-1);
      S.round++;
      const newRatio = S.enemyHp / S.enemyMaxHp;
      animateHpBar(oldRatio, newRatio);
      enemyHpTxt.text = S.enemyHp+'/'+S.enemyMaxHp;

      // Slide back
      const st2 = Date.now();
      const slideBack = ()=>{
        const t2 = Math.min(1,(Date.now()-st2)/220);
        if(playerSpr) playerSpr.x = endX + (startX-endX)*easeOut(t2);
        if(t2<1){ requestAnimationFrame(slideBack); }
        else {
          if(playerSpr) playerSpr.x = startX;
          afterAttack();
        }
      };
      slideBack();
    }
  };
  slide();
}

function afterAttack(){
  if(S.enemyHp <= 0){
    // WIN
    setTimeout(()=> playFaintAnim(true), 300);
    return;
  }
  if(S.round >= S.total){
    // ran out of rounds, treat as win if enemy has low HP
    if(S.enemyHp <= 2){ setTimeout(()=> playFaintAnim(true), 300); return; }
  }
  STATE = 'PLAYER_TURN';
  showQuizPanel();
}

// ── ENEMY ATTACK ──────────────────────────────────────────────────────────────
function enemyAttack(){
  STATE = 'ENEMY_ATTACK';
  document.getElementById('quiz-panel').style.display='none';

  S.wrongCount++;

  const ep = enemySpr;
  const startX = ep ? ep.x : app.screen.width*0.7;
  const endX = playerSprX + 80;
  const duration = 250;
  const st = Date.now();

  const slide = ()=>{
    const t = Math.min(1,(Date.now()-st)/duration);
    if(ep) ep.x = startX + (endX-startX)*easeOut(t);
    if(t<1){ requestAnimationFrame(slide); }
    else {
      spawnHitParticles(playerSprX, playerSprY - 30, '#f43f5e', 12);
      screenShake(8);
      redScreenFlash();
      flashPlayer();

      // reduce player HP
      S.playerHp = Math.max(0, S.playerHp-1);
      const hearts = '💖'.repeat(S.playerHp) + '🖤'.repeat(S.playerMaxHp - S.playerHp);
      if(playerHeartsTxt) playerHeartsTxt.text = hearts;

      // Slide back
      const st2 = Date.now();
      const slideBack = ()=>{
        const t2 = Math.min(1,(Date.now()-st2)/220);
        if(ep) ep.x = endX + (startX-endX)*easeOut(t2);
        if(t2<1){ requestAnimationFrame(slideBack); }
        else {
          if(ep) ep.x = startX;
          afterEnemyAttack();
        }
      };
      slideBack();
    }
  };
  slide();
}

function afterEnemyAttack(){
  if(S.playerHp <= 0){
    setTimeout(()=> playFaintAnim(false), 300);
    return;
  }
  STATE = 'PLAYER_TURN';
  showBattleMsg(`😖 Salah! ${S.enemyName} menyerang!\n💖 Sisa nyawa: ${'💖'.repeat(S.playerHp)}`, ()=>{
    STATE = 'PLAYER_TURN';
    showQuizPanel();
  });
}

// ── FAINT ANIMATION ──────────────────────────────────────────────────────────
function playFaintAnim(enemyFaints){
  const spr = enemyFaints ? enemySpr : playerSpr;
  if(!spr){ endBattle(enemyFaints); return; }

  const startY = spr.y;
  const duration = 600;
  const st = Date.now();

  spawnExplosion(spr.x, startY - 30);

  const fall = ()=>{
    const t = Math.min(1,(Date.now()-st)/duration);
    spr.y = startY + t*80;
    spr.alpha = 1-t;
    if(t<1){ requestAnimationFrame(fall); }
    else {
      spr.alpha = 0;
      endBattle(enemyFaints);
    }
  };
  fall();
}

// ── END BATTLE ────────────────────────────────────────────────────────────────
function endBattle(playerWon){
  if(playerWon){
    STATE = 'BATTLE_WIN';
    // determine badge
    const badgeType = S.wrongCount === 0 ? 'gold' : S.playerHp >= 2 ? 'silver' : 'bronze';
    const existing = S.badges[S.letter];
    const order = {gold:3,silver:2,bronze:1};
    if(!existing || order[badgeType] > order[existing]){
      S.badges[S.letter] = badgeType;
      saveBadges();
    }
    updateBadgeCount();
    showResult(true, badgeType);
  } else {
    STATE = 'BATTLE_LOSE';
    showResult(false, null);
  }
}

function showResult(won, badgeType){
  const ovl = document.getElementById('result-ovl');
  document.getElementById('res-emoji').textContent = won ? '🏆' : '😔';
  document.getElementById('res-title').textContent = won ? 'Menang!' : 'Kalah...';
  document.getElementById('res-badge').textContent =
    won ? (badgeType==='gold'?'🥇 Lencana Emas!':badgeType==='silver'?'🥈 Lencana Perak!':'🥉 Lencana Perunggu!') : '';
  document.getElementById('res-sub').textContent =
    won ? `Kamu menguasai Gym Huruf ${S.letter}!\n${S.wrongCount===0?'Tanpa salah! Luar biasa!':S.wrongCount===1?'Hanya 1 kesalahan!':'Terus berlatih!'}` :
          `Pikachu pingsan... Coba lagi?`;

  document.getElementById('btn-next-gym').style.display = won ? 'block' : 'none';
  document.getElementById('btn-retry').style.display = won ? 'none' : 'block';

  // Spawn sparkles if won
  if(won){
    for(let i=0;i<5;i++) setTimeout(()=>spawnSparkle(), i*150);
  }

  ovl.classList.add('show');
}

function backToSelect(){
  document.getElementById('result-ovl').classList.remove('show');
  // reset sprites alpha
  if(enemySpr){ enemySpr.alpha=1; enemySpr.y = enemySprY; }
  if(playerSpr){ playerSpr.alpha=1; playerSpr.x = playerSprX; }
  showLetterSelect();
}

function retryBattle(){
  document.getElementById('result-ovl').classList.remove('show');
  if(enemySpr){ enemySpr.alpha=1; }
  if(playerSpr){ playerSpr.alpha=1; }
  startBattle(S.letter);
}

// ── VISUAL EFFECTS ────────────────────────────────────────────────────────────
function spawnHitParticles(x, y, colorHex, count){
  const col = parseInt(colorHex.replace('#',''), 16);
  for(let i=0;i<count;i++){
    const g = new PIXI.Graphics();
    const r = Math.random()*5+2;
    g.circle(0,0,r).fill(col);
    g.x = x + (Math.random()-0.5)*20;
    g.y = y + (Math.random()-0.5)*20;
    const vx = (Math.random()-0.5)*8;
    const vy = (Math.random()-0.5)*8 - 3;
    particleContainer.addChild(g);
    const st = Date.now();
    const tick = ()=>{
      const dt = (Date.now()-st)/1000;
      g.x += vx*dt*60/60;
      g.y += vy*dt*60/60 + dt*dt*200;
      g.alpha = 1 - dt*2;
      if(g.alpha > 0) requestAnimationFrame(tick);
      else particleContainer.removeChild(g);
    };
    tick();
  }
}

function spawnExplosion(x,y){
  const cols=[0xfacc15,0xf43f5e,0xa78bfa,0xfb923c,0x4ade80];
  for(let i=0;i<20;i++){
    const g = new PIXI.Graphics();
    const r = Math.random()*8+3;
    g.circle(0,0,r).fill(cols[i%cols.length]);
    g.x = x + (Math.random()-0.5)*30;
    g.y = y + (Math.random()-0.5)*30;
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*6+3;
    const vx = Math.cos(angle)*speed;
    const vy = Math.sin(angle)*speed;
    particleContainer.addChild(g);
    const st = Date.now();
    const tick = ()=>{
      const dt = (Date.now()-st)/600;
      g.x += vx*dt*60/100;
      g.y += vy*dt*60/100;
      g.alpha = 1-dt;
      g.scale.set(1-dt*0.5);
      if(g.alpha>0) requestAnimationFrame(tick);
      else particleContainer.removeChild(g);
    };
    tick();
  }
}

function spawnSparkle(){
  const W=app.screen.width, H=app.screen.height;
  const g = new PIXI.Text({
    text:'⭐',
    style: new PIXI.TextStyle({fontSize:32})
  });
  g.x = Math.random()*W*0.8 + W*0.1;
  g.y = H*0.6;
  particleContainer.addChild(g);
  const st = Date.now();
  const tick = ()=>{
    const dt = (Date.now()-st)/1000;
    g.y -= dt*80;
    g.alpha = 1-dt*1.2;
    g.scale.set(1+dt);
    if(g.alpha>0) requestAnimationFrame(tick);
    else particleContainer.removeChild(g);
  };
  tick();
}

function screenShake(intensity){
  const body = document.body;
  body.style.animation='none';
  body.offsetHeight; // reflow
  body.style.animation=`camShake ${0.3}s ease`;
  setTimeout(()=>{ body.style.animation='none'; }, 350);
}

function redScreenFlash(){
  const fl = document.getElementById('flash');
  fl.style.background='rgba(244,63,94,0.35)';
  fl.style.opacity='1';
  fl.style.transition='opacity 0.1s';
  setTimeout(()=>{
    fl.style.transition='opacity 0.4s';
    fl.style.opacity='0';
  }, 100);
}

function flashEnemy(){
  if(!enemySpr) return;
  const origAlpha = enemySpr.alpha;
  let blinks = 0;
  const blinkFn = ()=>{
    enemySpr.alpha = blinks%2===0 ? 0.2 : origAlpha;
    blinks++;
    if(blinks<6) setTimeout(blinkFn, 60);
    else enemySpr.alpha = origAlpha;
  };
  blinkFn();
}

function flashPlayer(){
  if(!playerSpr) return;
  const orig = playerSpr.alpha;
  let blinks=0;
  const blinkFn=()=>{
    playerSpr.alpha = blinks%2===0?0.2:orig;
    blinks++;
    if(blinks<6) setTimeout(blinkFn,60);
    else playerSpr.alpha=orig;
  };
  blinkFn();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ── MAIN INIT ─────────────────────────────────────────────────────────────────
(async ()=>{
  loadBadges();
  await initPixi();
  showLetterSelect();
})();
