<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Balapan Kereta 🚂</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100svh;overflow:hidden;background:#050c02;font-family:'Fredoka One',sans-serif;touch-action:none}
#pixi-canvas{position:fixed;inset:0;width:100vw;height:100svh;display:block}

/* ── HUD ── */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 14px 8px;background:linear-gradient(180deg,rgba(0,0,0,0.72) 0%,transparent 100%);pointer-events:none}
#btn-back{background:#fff3c4;border:2.5px solid #f59e0b;border-radius:8px;color:#3f2a08;padding:8px 12px;font-size:14px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0;box-shadow:0 3px 0 #b45309;font-weight:900;min-width:96px;text-align:center}
#btn-back:active{transform:translateY(2px);box-shadow:0 1px 0 #b45309}
#train-name-badge{background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,255,255,0.18);border-radius:10px;padding:5px 10px;color:#fbbf24;font-size:13px;font-weight:700;flex-shrink:0;white-space:nowrap}
#race-info{flex:1;text-align:center;min-width:0}
#distance-text{font-size:13px;color:#86efac;font-weight:700}
#position-badge{font-size:17px;font-weight:900;color:#fff}
#lives-hud{font-size:20px;letter-spacing:1px;flex-shrink:0}
#speed-hud{background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,255,255,0.18);border-radius:10px;padding:5px 10px;color:#38bdf8;font-size:12px;font-weight:700;flex-shrink:0;white-space:nowrap;min-width:56px;text-align:center}

/* Progress strip */
#prog-strip{position:fixed;top:56px;left:0;right:0;z-index:49;height:4px;background:rgba(255,255,255,0.08)}
#prog-fill{height:100%;background:linear-gradient(90deg,#86efac,#22d3ee);transition:width .2s;width:0%}

/* Checkpoints */
#cp-row{position:fixed;top:60px;left:0;right:0;z-index:48;display:flex;justify-content:space-around;pointer-events:none;padding:0 10%}
.cp-dot{font-size:14px;opacity:0.35;transition:opacity .3s,transform .3s}
.cp-dot.reached{opacity:1;transform:scale(1.4)}

/* Bottom controls */
#ctrl-area{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:10px 14px 14px;background:linear-gradient(0deg,rgba(0,0,0,0.78) 0%,transparent 100%)}
#ctrl-row{display:flex;gap:10px;align-items:stretch}
.ctrl-btn{flex:1;padding:16px 0;border-radius:18px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.09);color:#fff;font-size:22px;cursor:pointer;backdrop-filter:blur(6px);user-select:none;-webkit-user-select:none;transition:transform .08s,background .08s;font-family:inherit;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{transform:scale(.91);background:rgba(255,255,255,.2)}
#btn-boost{background:linear-gradient(135deg,rgba(239,68,68,0.35),rgba(251,146,60,0.35));border-color:rgba(239,68,68,0.6);flex:1.4;font-size:14px;padding:14px 6px;line-height:1.2}
#btn-boost.cooldown{opacity:0.45;pointer-events:none}
#btn-boost.boosting{background:linear-gradient(135deg,rgba(239,68,68,0.6),rgba(251,146,60,0.6));animation:boostGlow .25s ease-in-out infinite alternate}
@keyframes boostGlow{to{box-shadow:0 0 18px rgba(251,146,60,0.7)}}

/* Pressure gauge */
#pressure-row{display:flex;align-items:center;gap:8px;margin-top:8px}
#pressure-label{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;flex-shrink:0}
#pressure-track{flex:1;height:6px;background:rgba(255,255,255,0.1);border-radius:3px}
#pressure-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#22d3ee,#86efac);transition:width .3s}
#pressure-pct{font-size:10px;color:rgba(255,255,255,0.5);flex-shrink:0;min-width:28px;text-align:right}

/* ── Math Quiz overlay ── */
#quiz-ovl{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(5,12,2,0.97);backdrop-filter:blur(10px);border-top:3px solid #ef4444;padding:14px 16px 20px;display:none}
#quiz-label{text-align:center;color:rgba(251,191,36,0.8);font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:6px}
#quiz-q{text-align:center;color:white;font-size:26px;font-weight:900;margin-bottom:12px}
#quiz-choices{display:flex;gap:10px;justify-content:center}
.quiz-btn{flex:1;max-width:88px;padding:14px 4px;border:2px solid rgba(255,255,255,.22);border-radius:14px;background:rgba(255,255,255,.08);color:#fff;font-size:20px;font-weight:900;cursor:pointer;transition:all .12s;font-family:inherit;-webkit-tap-highlight-color:transparent}
.quiz-btn:active{transform:scale(.9);background:rgba(239,68,68,.4)}

/* Overlays handled by game-modal.js */

/* ── Train Select — soft palette ── */
#select-ovl{position:fixed;inset:0;z-index:400;background:linear-gradient(180deg,#1a1028 0%,#2a1848 40%,#1e1230 70%,#140e22 100%);display:flex;flex-direction:column;overflow:hidden}
#select-header{padding:14px 16px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#sel-back{background:rgba(248,240,255,0.9);border:2px solid rgba(180,160,220,0.5);border-radius:12px;color:#3b2066;padding:8px 14px;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 rgba(100,60,160,0.2);font-weight:900;min-width:100px;text-align:center}
#sel-back:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(100,60,160,0.2)}
#sel-title{font-size:16px;font-weight:900;color:#c4b5fd;flex:1;text-align:center}
#select-body{flex:1;overflow-y:auto;padding:8px 14px 20px;-webkit-overflow-scrolling:touch}
.cat-btn{width:100%;display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:16px;cursor:pointer;margin-bottom:10px;text-align:left;border:2px solid rgba(180,160,220,0.2);transition:all .15s;background:rgba(248,240,255,0.06);color:#e9d5ff;font-family:inherit}
.cat-btn:active{transform:scale(.97);background:rgba(139,92,246,0.15)}
.cat-emoji{font-size:32px;flex-shrink:0}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:14px;font-weight:900;color:#e9d5ff}
.cat-desc{font-size:11px;color:rgba(200,180,230,.5);margin-top:2px}
.cat-arr{font-size:18px;color:rgba(200,180,230,.3)}
.train-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
@media(min-width:480px){.train-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:700px){.train-grid{grid-template-columns:repeat(5,1fr)}}
.train-card{background:rgba(248,240,255,0.06);border:2px solid rgba(180,160,220,0.2);border-radius:12px;padding:8px 6px;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;color:#e9d5ff;overflow:hidden}
.train-card:active,.train-card.sel{border-color:#a78bfa;background:rgba(139,92,246,0.18)}
.train-emoji{font-size:28px;display:block;margin-bottom:4px}
.train-nm{font-size:11px;font-weight:900;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.train-sub{font-size:9px;color:rgba(200,180,230,.45);margin-top:1px}
.train-spd{font-size:10px;color:#fbbf24;font-weight:700;margin-top:2px}
#go-btn-wrap{padding:12px 16px 20px;flex-shrink:0}
#go-btn{width:100%;padding:16px 0;border-radius:18px;background:linear-gradient(160deg,#4ade80,#22c55e);border:none;color:#fff;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #15803d;font-family:inherit;display:none}
#go-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #15803d}

/* Back crumb */
#sel-crumb{display:none;align-items:center;gap:6px;padding:0 16px 8px;cursor:pointer;color:rgba(200,180,230,.5);font-size:13px}
#sel-crumb:active{color:#e9d5ff}

/* Flash */
#flash{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:0;transition:opacity .05s}
</style>
</head>
<body>
<canvas id="pixi-canvas"></canvas>

<!-- HUD Top -->
<div id="hud-top">
  <button id="btn-back" type="button" onclick="confirmBack()">← Kembali</button>
  <div id="train-name-badge">🚂 —</div>
  <div id="race-info">
    <div id="distance-text">0 m</div>
    <div id="position-badge">🏁 Mulai!</div>
  </div>
  <div id="lives-hud">❤️❤️❤️</div>
  <div id="speed-hud">0 km/h</div>
</div>
<div id="prog-strip"><div id="prog-fill"></div></div>
<div id="cp-row">
  <span class="cp-dot" id="cp0">🚉</span>
  <span class="cp-dot" id="cp1">🚉</span>
  <span class="cp-dot" id="cp2">🚉</span>
  <span class="cp-dot" id="cp3">🏁</span>
</div>

<!-- Controls -->
<div id="ctrl-area">
  <div id="ctrl-row">
    <button class="ctrl-btn" id="btn-up"
      ontouchstart="laneUp();event.preventDefault()" onclick="laneUp()">▲<br><span style="font-size:10px">ATAS</span></button>
    <button class="ctrl-btn" id="btn-boost" onclick="triggerBoost()">🔥<br><span style="font-size:12px;font-weight:900">BOOST!</span></button>
    <button class="ctrl-btn" id="btn-dn"
      ontouchstart="laneDn();event.preventDefault()" onclick="laneDn()">▼<br><span style="font-size:10px">BAWAH</span></button>
  </div>
  <div id="pressure-row">
    <span id="pressure-label">TEKANAN</span>
    <div id="pressure-track"><div id="pressure-fill" style="width:70%"></div></div>
    <span id="pressure-pct">70%</span>
  </div>
</div>

<!-- Math Quiz -->
<div id="quiz-ovl">
  <div id="quiz-label">🔥 JAWAB UNTUK BOOST!</div>
  <div id="quiz-q">? + ? = ?</div>
  <div id="quiz-choices"></div>
</div>

<!-- Train Select -->
<div id="select-ovl">
  <div id="select-header">
    <button id="sel-back" type="button" onclick="selBack()">← Kembali</button>
    <div id="sel-title">Pilih Kereta 🚂</div>
  </div>
  <div id="sel-crumb" onclick="showCategories()">← Semua Kategori</div>
  <div id="select-body"></div>
  <div id="go-btn-wrap"><button id="go-btn" onclick="startRace()">🚦 Mulai Balapan!</button></div>
</div>

<script src="game-modal.js"></script>

<div id="flash"></div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>

async function initPixi() {
  const W = window.innerWidth, H = window.innerHeight
  app = new PIXI.Application()
  await app.init({
    canvas: document.getElementById('pixi-canvas'),
    width: W, height: H,
    backgroundColor: 0x050c02,
    antialias: true,
    resolution: Math.min(window.devicePixelRatio || 1, 2),
    autoDensity: true,
  })
  stage = app.stage

  // Game area between top HUD (~70px) and controls (~120px)
  gameTop = 74
  const gameBot = H - 122
  gameH = gameBot - gameTop
  laneH = gameH / LANE_COUNT
  laneYs = Array.from({length: LANE_COUNT}, (_, i) => gameTop + laneH * i + laneH / 2)

  buildSky()

// ── Sky ───────────────────────────────────────────────────
function buildSky() {
  const c = new PIXI.Container(); L.sky = c; stage.addChild(c)
  const W = app.screen.width, H = app.screen.height

  // Gradient sky
  const steps = 10
  for (let i = 0; i < steps; i++) {
    const t = i / steps
    const g = new PIXI.Graphics()
    g.rect(0, 0, W, H / steps + 2).fill(lerpColor(0x071a0d, 0x0d3318, t))
    g.y = H * i / steps
    c.addChild(g)
  }

  // Stars
  for (let i = 0; i < 60; i++) {
    const r = 0.5 + Math.random() * 1.5
    const s = new PIXI.Graphics()
    s.circle(0, 0, r).fill(0xffffff)
    s.x = Math.random() * W
    s.y = Math.random() * gameTop + Math.random() * 10
    s.alpha = 0.3 + Math.random() * 0.5
    c.addChild(s)
  }
}

// ── Clouds ────────────────────────────────────────────────
let clouds = []
function buildClouds() {
  const c = new PIXI.Container(); L.clouds = c; stage.addChild(c)
  const W = app.screen.width
  for (let i = 0; i < 6; i++) {
    const cloud = makeCloud()
    cloud.x = Math.random() * W
    cloud.y = gameTop + Math.random() * 40
    cloud._speed = 0.2 + Math.random() * 0.3
    c.addChild(cloud)
    clouds.push(cloud)
  }
}
function makeCloud() {
  const g = new PIXI.Graphics()
  const w = 60 + Math.random() * 80, h = 18 + Math.random() * 18
  g.ellipse(0, 0, w, h).fill(0x1a3a1a)
  g.ellipse(-w * 0.25, -h * 0.3, w * 0.55, h * 0.7).fill(0x1a3a1a)
  g.ellipse(w * 0.2, -h * 0.25, w * 0.45, h * 0.65).fill(0x1a3a1a)
  g.alpha = 0.4
  return g
}
function tickClouds(delta) {
  const W = app.screen.width
  for (const c of clouds) {
    c.x -= c._speed * delta
    if (c.x < -150) { c.x = W + 50; c.y = gameTop + Math.random() * 40 }
  }
}

// ── Far scenery ───────────────────────────────────────────
function buildFarScenery() {
  const c = new PIXI.Container(); L.far = c; stage.addChild(c)
  const W = app.screen.width

  for (let i = 0; i < 12; i++) {

}

// ── Mid scenery ───────────────────────────────────────────
let midItems = []
function buildMidScenery() {
  const c = new PIXI.Container(); L.mid = c; stage.addChild(c)
  const W = app.screen.width, H = app.screen.height
  const treeEmojis = ['🌲','🌳','🌴','🌵','🎋']
  for (let i = 0; i < 16; i++) {
    const lane = i % LANE_COUNT
    const yt = laneYs[lane] + laneH * 0.38 + (i % 2) * 8
    // Top of lane (above rail)
    const t = new PIXI.Text({ text: treeEmojis[i % treeEmojis.length], style: { fontSize: 20 + Math.random() * 10 } })
    t.alpha = 0.55
    t.x = (i * W / 8) + Math.random() * 30
    t.y = yt - laneH * 0.3
    t._speed = 0.4
    t._laneY = yt - laneH * 0.3
    c.addChild(t)
    midItems.push(t)
  }
}

// ── Tracks ────────────────────────────────────────────────
let trackTies = []
const TIE_W = 28, TIE_H = 6, TIE_GAP = 38

function buildTracks() {
  const c = new PIXI.Container(); L.tracks = c; stage.addChild(c)
  const W = app.screen.width

  // Per-lane track
  for (let ln = 0; ln < LANE_COUNT; ln++) {
    const cy = laneYs[ln]
    const railOffset = laneH * 0.28

    // Ground fill for lane
    const ground = new PIXI.Graphics()
    ground.rect(0, cy - laneH * 0.5, W, laneH).fill(ln === 1 ? 0x0d2008 : 0x071005)
    ground.alpha = 0.6
    c.addChild(ground)

    // Lane separator
    if (ln < LANE_COUNT - 1) {
      const sep = new PIXI.Graphics()
      sep.rect(0, cy + laneH * 0.5 - 1, W, 2).fill(0x1a3a1a)
      sep.alpha = 0.6
      c.addChild(sep)
    }

    // Rail lines (top + bottom of lane, inset)
    for (const sign of [-1, 1]) {
      const rail = new PIXI.Graphics()
      rail.rect(0, cy + sign * railOffset - 2, W, 4).fill(0x4b5563)
      c.addChild(rail)

      // Glow strip
      const glow = new PIXI.Graphics()
      glow.rect(0, cy + sign * railOffset - 3, W, 6).fill(0x86efac)
      glow.alpha = 0.12
      c.addChild(glow)
    }

    // Ties (sleepers) — scrolling
    const numTies = Math.ceil(W / (TIE_W + TIE_GAP)) + 3
    for (let j = 0; j < numTies; j++) {
      const tie = new PIXI.Graphics()
      tie.rect(-TIE_W / 2, cy - railOffset - 2, TIE_W, railOffset * 2 + 4).fill(0x292524)
      tie.x = j * (TIE_W + TIE_GAP)
      c.addChild(tie)
      trackTies.push({ g: tie, ln })
    }
  }
}

function tickTracks(delta) {
  const W = app.screen.width
  const px = S.speed * delta * 1.0
  const period = (TIE_W + TIE_GAP) * (Math.ceil(W / (TIE_W + TIE_GAP)) + 3)
  for (const t of trackTies) {
    t.g.x -= px
    if (t.g.x < -(TIE_W + 10)) t.g.x += period
  }
}

// ── Mid items scroll ─────────────────────────────────────
function tickMid(delta) {
  const W = app.screen.width
  for (const t of midItems) {
    t.x -= t._speed * S.speed * delta * 0.4
    if (t.x < -60) t.x = W + 20
  }
  // Far
  if (L.far) {
    L.far.children.forEach(c => {
      c.x -= 0.15 * delta
      if (c.x < -200) c.x = W + 50
    })
  }
}

// Draw train silhouette on a 2D canvas — 5 distinct shapes per category
function drawTrainCard2d(canvas, bodyC, accC, catKey, v) {
  const ctx = canvas.getContext('2d');
  const CW = canvas.width, CH = canvas.height;
  ctx.clearRect(0, 0, CW, CH);
  const vi = ((v||1) - 1) % 5;
  const tY = CH - 4;           // ground line
  const bodyB = tY - 2;        // body bottom

  function rr(x,y,w,h,r=0){ctx.beginPath();if(r>0)ctx.roundRect(x,y,w,h,r);else ctx.rect(x,y,w,h);ctx.fill();}
  function whl(cx,cy,r,rim,spoke){
    ctx.fillStyle=rim;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=spoke;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-r,cy);ctx.lineTo(cx+r,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.lineTo(cx,cy+r);ctx.stroke();
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(cx,cy,r*0.35,0,Math.PI*2);ctx.fill();

      // Boiler bands
      for(let i=0;i<3;i++){ctx.fillStyle='rgba(255,255,255,.08)';rr(bX+bW*.25+i*bW*.2,CH*.26,1.5,CH*.44);}
      ctx.fillStyle='#9ca3af';ctx.beginPath();ctx.arc(bX+bW*.5,CH*.26,CH*.09,Math.PI,0);ctx.fill(); // dome
      ctx.fillStyle='#111';rr(bX+bW*.2,CH*.08,6,CH*.18);rr(bX+bW*.15,CH*.06,10,CH*.07,2);
      ctx.fillStyle='#6b7280';rr(bX+bW*.62,CH*.2,5,CH*.1,1);rr(bX+bW*.69,CH*.2,5,CH*.1,1); // safety valves
      // Whistle + bell
      ctx.fillStyle='#d97706';rr(bX+bW*.56,CH*.18,2,CH*.08);
      ctx.fillStyle=accC;rr(bX+bW-2,CH*.18,13,CH*.54,2);
      ctx.fillStyle='#e0f2fe';rr(bX+bW,CH*.24,10,CH*.24,2);
      // Running board
      ctx.fillStyle=accC;rr(bX-2,CH*.68,bW+4,2);
      // Headlight
      headlights(bX+2,CH*.38,2.5);
      // Firebox glow
      ctx.fillStyle='rgba(249,115,22,.12)';rr(bX+bW*.6,CH*.64,bW*.15,3);
      // Connecting rods
      ctx.fillStyle='rgba(156,163,175,.4)';rr(bX+bW*.28,tY-4,bW*.5,1.5);
      // Cowcatcher
      ctx.fillStyle='#374151';ctx.beginPath();ctx.moveTo(bX,CH*.62);ctx.lineTo(bX-5,tY);ctx.lineTo(bX,tY);ctx.closePath();ctx.fill();
      for(const f of[.28,.44,.6,.76]) whl(bX+bW*f,tY-2,CH*.17,'#292524',accC);
      whl(bX+bW*.1,tY,5,'#374151','#6b7280'); // pilot
    },
    ()=>{ // v3: Pacific streamlined (deflectors, pilot+trailer, tapered nose)
      const bX=5,bW=CW-13;
      ctx.fillStyle=bodyC;
      ctx.beginPath();ctx.moveTo(bX,CH*.36);ctx.quadraticCurveTo(bX+10,CH*.24,bX+bW*.14,CH*.24);ctx.lineTo(bX+bW,CH*.24);ctx.lineTo(bX+bW,CH*.72);ctx.lineTo(bX,CH*.65);ctx.closePath();ctx.fill();
      ctx.fillStyle=accC;rr(bX,CH*.38,bW,CH*.1);
      // Deflectors
      ctx.fillStyle=accC;rr(bX+bW*.2,CH*.24,3,CH*.48);rr(bX+bW*.36,CH*.24,3,CH*.48);
      ctx.fillStyle='#1c1917';rr(bX+bW*.22,CH*.1,5,CH*.14);rr(bX+bW*.18,CH*.08,9,CH*.06,2); // chimney
      ctx.fillStyle='#9ca3af';ctx.beginPath();ctx.arc(bX+bW*.46,CH*.24,7,Math.PI,0);ctx.fill(); // dome
      ctx.fillStyle=accC;rr(bX+bW-10,CH*.2,10,CH*.52,2);
      ctx.fillStyle='#e0f2fe';rr(bX+bW-9,CH*.26,8,CH*.2,2);
      for(const f of[.32,.48,.64]) whl(bX+bW*f,tY-2,CH*.18,accC,'#fde68a');
      whl(bX+bW*.1,tY,4,'#374151','#888'); // pilot
      whl(bX+bW*.82,tY,4,'#374151','#888'); // trailer
    },
    ()=>{ // v4: Garratt articulated — two bogies, central tank, very long
      ctx.fillStyle=bodyC;rr(CW*.19,CH*.22,CW*.62,CH*.38,3); // central boiler
      ctx.fillStyle=bodyC;rr(3,CH*.32,CW*.22,CH*.28,2);      // front bogie frame
      ctx.fillStyle=bodyC;rr(CW*.79,CH*.32,CW*.19,CH*.26,2); // rear bogie frame
      ctx.fillStyle=accC;rr(CW*.19,CH*.33,CW*.62,CH*.09);    // band
      ctx.fillStyle='#111';
      rr(CW*.24,CH*.08,5,CH*.14);rr(CW*.21,CH*.06,9,CH*.06,2); // chimney 1
      rr(CW*.34,CH*.08,5,CH*.14);rr(CW*.31,CH*.06,9,CH*.06,2); // chimney 2
      ctx.fillStyle=accC;rr(CW*.8,CH*.24,CW*.19,CH*.36,2);   // cab
      ctx.fillStyle='#dbeafe';rr(CW*.82,CH*.28,CW*.14,CH*.2,2);
      for(const f of[.06,.15]) whl(CW*f,tY-2,5,'#292524','#6b7280');
      for(const f of[.26,.34]) whl(CW*f,tY-2,CH*.13,accC,'#fde68a');
      for(const f of[.64,.72]) whl(CW*f,tY-2,CH*.13,accC,'#fde68a');
      for(const f of[.84,.93]) whl(CW*f,tY-2,5,'#292524','#6b7280');
    },
    ()=>{ // v5: Tank locomotive — side tanks, wide, no tender
      const bX=4,bW=CW-10;
      ctx.fillStyle=bodyC;rr(bX,CH*.22,bW,CH*.5,3);
      ctx.fillStyle=accC; // side tanks (darker panels)
      rr(bX,CH*.24,bW*.3,CH*.28);rr(bX+bW-bW*.3,CH*.24,bW*.3,CH*.28);
      ctx.fillStyle=bodyC;rr(bX+bW*.28,CH*.24,bW*.44,CH*.3,2); // central boiler
      ctx.fillStyle='#1c1917';rr(bX+bW*.1,CH*.08,6,CH*.14);rr(bX+bW*.06,CH*.06,10,CH*.06,2); // chimney
      ctx.fillStyle='#6b7280';ctx.beginPath();ctx.arc(bX+bW*.56,CH*.24,7,Math.PI,0);ctx.fill(); // dome
      ctx.fillStyle=accC;rr(bX+bW-10,CH*.18,12,CH*.54,2);
      ctx.fillStyle='#dbeafe';rr(bX+bW-9,CH*.24,10,CH*.22,2);
      for(const f of[.22,.44,.66]) whl(bX+bW*f,tY-2,CH*.16,'#374151',accC);
    },
  ][vi]();
}

// Draw a train silhouette on a PIXI.Graphics object (center-anchored, W≈70, H≈26)
function drawTrainG(g, bodyC, accC, catKey, trainKey, variant) {
  g.clear()
  const bC = hexN(bodyC), aC = hexN(accC)
  const W = 70, hW = 35, H = 26, hH = 13

  // ── White glow helper: draw an outline glow ─────────────────────────────
  function glowOutline(x, y, w, h, r) {
    // Outer glow layer (widest, most transparent)
    g.roundRect(x - 3, y - 3, w + 6, h + 6, r + 2).fill({ color: 0xffffff, alpha: 0.08 })
    // Inner glow layer
    g.roundRect(x - 1.5, y - 1.5, w + 3, h + 3, r + 1).fill({ color: 0xffffff, alpha: 0.18 })
    // Hard white stroke
    g.roundRect(x, y, w, h, r).stroke({ color: 0xffffff, width: 1.8, alpha: 0.75 })
  }

  if (catKey === 'maglev') {
    // ── Maglev streamlined capsule ──────────────────────────────────────
    g.roundRect(-hW - 3, -hH - 3, W + 6, H + 6, 12).fill({ color: 0xffffff, alpha: 0.08 })
    g.roundRect(-hW - 1, -hH - 1, W + 2, H + 2, 10).fill({ color: 0xffffff, alpha: 0.18 })
    g.roundRect(-hW, -hH, W, H, 9).fill(bC)
    glowOutline(-hW, -hH, W, H, 9)
    // Upper body highlight
    g.roundRect(-hW + 2, -hH + 1, W - 4, 5, 4).fill({ color: 0xffffff, alpha: 0.08 })
    // Speed stripe (double)
    g.rect(-hW + 2, -3, W - 4, 6).fill(aC)
    g.rect(-hW + 2, -1, W - 4, 2).fill({ color: 0xffffff, alpha: 0.15 })
    // Visor windshield
    g.roundRect(-hW + 5, -hH + 3, W - 10, 9, 3).fill(0x0f172a)
    g.roundRect(-hW + 5, -hH + 3, W - 10, 4, 3).fill({ color: 0x93c5fd, alpha: 0.5 })
    // Window pillars
    for (let wp = 0; wp < 4; wp++) g.rect(-hW + 14 + wp * 12, -hH + 3, 1.5, 9).fill({ color: bC, alpha: 0.6 })
    // Nose cone
    g.poly([hW - 8, -hH, hW + 8, 0, hW - 8, hH]).fill(bC)
    g.poly([hW - 8, -hH, hW + 8, 0, hW - 8, hH]).stroke({ color: 0xffffff, width: 1, alpha: 0.5 })
    g.roundRect(hW - 10, -hH, 4, H, 2).fill(aC)
    // Headlights
    g.circle(hW + 2, -3, 3).fill(0xfef08a); g.circle(hW + 2, -3, 1.5).fill(0xffffff)
    g.circle(hW + 2, 3, 3).fill(0xfef08a); g.circle(hW + 2, 3, 1.5).fill(0xffffff)
    // Panel lines
    for (let pl = 0; pl < 5; pl++) g.rect(-hW + 4 + pl * 12, -hH + 1, 0.8, H - 2).fill({ color: 0x000000, alpha: 0.12 })
    // Door markers
    g.rect(-hW + 16, -hH + 2, 8, H - 4).stroke({ color: 0xffffff, width: 0.6, alpha: 0.2 })
    g.rect(-hW + 40, -hH + 2, 8, H - 4).stroke({ color: 0xffffff, width: 0.6, alpha: 0.2 })
    // Levitation rail + glow
    g.rect(-hW + 6, hH, W - 12, 2).fill(0x1e3a8a)
    g.rect(-hW + 6, hH + 2, W - 12, 4).fill(0x38bdf8)
    g.rect(-hW + 6, hH + 2, W - 12, 2).fill({ color: 0x7dd3fc, alpha: 0.7 })
    // Pulsing LED strip under body
    g.rect(-hW + 4, hH - 1, W - 8, 1.5).fill({ color: aC, alpha: 0.45 })
    g.rect(-hW + 8, hH - 1, 6, 1.5).fill({ color: 0xffffff, alpha: 0.3 })
    // Undercarriage sensors
    for (let si = 0; si < 6; si++) {
      g.circle(-hW + 12 + si * 10, hH + 1, 1.5).fill({ color: 0x38bdf8, alpha: 0.5 })
      g.circle(-hW + 12 + si * 10, hH + 1, 0.8).fill({ color: 0xffffff, alpha: 0.7 })
    }
    // Ventilation grilles (roof)
    for (let vi = 0; vi < 3; vi++) g.roundRect(-hW + 8 + vi * 16, -hH - 2, 10, 2, 1).fill({ color: 0x000000, alpha: 0.15 })
    // Aerodynamic fairing covers
    g.poly([-hW, hH, -hW - 4, hH + 3, -hW, hH + 3]).fill({ color: bC, alpha: 0.5 })
    // Number plate
    g.roundRect(-hW + 2, hH - 5, 14, 4, 1).fill({ color: 0x000000, alpha: 0.3 })
    // Tail light
    g.circle(-hW - 1, 0, 2.5).fill(0xef4444); g.circle(-hW - 1, 0, 1.2).fill(0xfca5a5)
    return
  }

  if (catKey === 'hsr') {
    // ── Bullet-nose high-speed train ────────────────────────────────────
    g.roundRect(-hW - 2, -hH - 2, W - 8, H + 4, 5).fill({ color: 0xffffff, alpha: 0.1 })
    // Main body
    g.roundRect(-hW, -hH, W - 12, H, 4).fill(bC)
    // Nose cone (elongated triangle)
    g.poly([hW - 12, -hH, hW + 8, -2, hW + 8, 2, hW - 12, hH]).fill(bC)
    g.poly([hW - 12, -hH, hW + 8, -2, hW + 8, 2, hW - 12, hH]).stroke({ color: 0xffffff, width: 1, alpha: 0.5 })
    g.roundRect(-hW, -hH, W - 12, H, 4).stroke({ color: 0xffffff, width: 1.5, alpha: 0.7 })
    // Upper highlight
    g.roundRect(-hW + 2, -hH + 1, W - 16, 4, 2).fill({ color: 0xffffff, alpha: 0.08 })
    // Speed stripe (accent band)
    g.rect(-hW, -2, W - 6, 5).fill(aC)
    g.rect(-hW, -1, W - 6, 1.5).fill({ color: 0xffffff, alpha: 0.12 })
    // Windshield visor
    g.roundRect(-hW + 4, -hH + 3, W - 22, 9, 2).fill(0x0f172a)
    g.roundRect(-hW + 4, -hH + 3, W - 22, 4, 2).fill({ color: 0xbfdbfe, alpha: 0.5 })
    // Window pillars
    for (let wp = 0; wp < 3; wp++) g.rect(-hW + 14 + wp * 11, -hH + 3, 1, 9).fill({ color: bC, alpha: 0.5 })
    // Headlights (dual)
    g.circle(hW + 4, -2, 3.5).fill(0xfef08a); g.circle(hW + 4, -2, 2).fill(0xffffff)
    g.circle(hW + 4, 2, 2.5).fill(0xfca5a5); g.circle(hW + 4, 2, 1.5).fill(0xfecdd3)
    // Pantograph (detailed diamond shape)
    const px = -hW + 12
    g.rect(px, -hH - 7, 2, 7).fill({ color: 0xd1d5db, alpha: 0.8 })
    g.rect(px + 16, -hH - 7, 2, 7).fill({ color: 0xd1d5db, alpha: 0.8 })
    g.rect(px - 2, -hH - 8, 22, 1.5).fill({ color: 0xd1d5db, alpha: 0.8 })
    // Cross-arm
    g.moveTo(px + 1, -hH).lineTo(px + 9, -hH - 7).stroke({ color: 0xd1d5db, width: 1, alpha: 0.6 })
    g.moveTo(px + 17, -hH).lineTo(px + 9, -hH - 7).stroke({ color: 0xd1d5db, width: 1, alpha: 0.6 })
    // Contact wire
    g.rect(px - 4, -hH - 10, 28, 1).fill({ color: 0xfbbf24, alpha: 0.4 })
    // Bogies/Wheels with suspension detail
    for (const bx of [-24, 10]) {
      // Bogie frame
      g.roundRect(bx - 4, hH - 1, 18, 4, 1.5).fill({ color: 0x1f2937, alpha: 0.6 })
      // Wheels (paired)
      g.circle(bx, hH + 3, 4.5).fill(0x1f2937).stroke({ color: 0x6b7280, width: 1.2 })
      g.circle(bx, hH + 3, 2).fill(0x9ca3af)
      g.circle(bx + 10, hH + 3, 4.5).fill(0x1f2937).stroke({ color: 0x6b7280, width: 1.2 })
      g.circle(bx + 10, hH + 3, 2).fill(0x9ca3af)
      // Suspension springs
      g.rect(bx + 2, hH - 2, 6, 2).fill({ color: 0x6b7280, alpha: 0.4 })
    }
    // Door markings (double doors)
    g.rect(-hW + 18, -hH + 2, 7, H - 4).stroke({ color: 0xffffff, width: 0.6, alpha: 0.2 })
    g.rect(-hW + 38, -hH + 2, 7, H - 4).stroke({ color: 0xffffff, width: 0.5, alpha: 0.15 })
    // Skirt (lower body panel / aerodynamic fairing)
    g.rect(-hW, hH - 3, W - 12, 3).fill({ color: 0x000000, alpha: 0.2 })
    g.rect(-hW, hH - 5, W - 12, 2).fill({ color: bC, alpha: 0.3 })
    // Brake disc indicators (between bogies)
    for (let bi = 0; bi < 3; bi++) g.circle(-10 + bi * 8, hH + 1, 1).fill({ color: 0xd97706, alpha: 0.3 })
    // Ventilation grilles (roof)
    for (let vi = 0; vi < 2; vi++) g.roundRect(-hW + 6 + vi * 18, -hH - 3, 12, 2.5, 1).fill({ color: 0x000000, alpha: 0.12 })
    // Destination LED board
    g.roundRect(-hW + 3, -hH + 13, 16, 5, 1).fill(0x000000)
    g.roundRect(-hW + 4, -hH + 14, 14, 3, 0.5).fill({ color: 0xfbbf24, alpha: 0.6 })
    // Tail light
    g.circle(-hW - 1, -4, 2).fill(0xef4444); g.circle(-hW - 1, -4, 1).fill(0xfca5a5)
    g.circle(-hW - 1, 4, 2).fill(0xef4444); g.circle(-hW - 1, 4, 1).fill(0xfca5a5)
    // Number plate
    g.roundRect(-hW + 2, -hH + 2, 14, 6, 1).fill({ color: 0x000000, alpha: 0.3 })
    // Coupler cover (nose)
    g.roundRect(hW + 6, -3, 4, 6, 1).fill({ color: bC, alpha: 0.6 })
    return
  }

  // ── General body: steam / diesel / emu ──────────────────────────────────
  const isSteam = catKey && catKey.includes('steam')
  const isEmu = catKey && catKey.includes('emu')
  // Glow shell
  g.roundRect(-hW - 3, -hH - 3, W + 6, H + 6, 7).fill({ color: 0xffffff, alpha: 0.08 })
  g.roundRect(-hW - 1.5, -hH - 1.5, W + 3, H + 3, 6).fill({ color: 0xffffff, alpha: 0.15 })
  // Body
  g.roundRect(-hW, -hH, W, H, 4).fill(bC)
  g.roundRect(-hW, -hH, W, H, 4).stroke({ color: 0xffffff, width: 1.5, alpha: 0.7 })
  // Upper body highlight
  g.roundRect(-hW + 2, -hH + 1, W - 4, 3, 2).fill({ color: 0xffffff, alpha: 0.06 })
  // Accent stripe (double band)
  g.rect(-hW, -hH + 3, W, 4).fill(aC)
  g.rect(-hW, -hH + 4, W, 1.5).fill({ color: 0xffffff, alpha: 0.1 })
  g.rect(-hW, -hH + 7, W, 1).fill({ color: 0x000000, alpha: 0.2 })
  // Windows
  const winCount = isSteam ? 1 : isEmu ? 5 : 3
  const winW = isEmu ? 8 : 11
  const winGap = isEmu ? 11 : 16
  for (let i = 0; i < winCount; i++) {
    const wx = -hW + 6 + i * winGap
    g.roundRect(wx, -hH + 6, winW, 9, 2).fill(0x0f172a)
    g.roundRect(wx, -hH + 6, winW, 3.5, 2).fill({ color: 0xbfdbfe, alpha: 0.4 })
    g.roundRect(wx, -hH + 6, winW, 9, 2).stroke({ color: 0x93c5fd, width: 0.8, alpha: 0.5 })
  }
  if (!isSteam) {
    // ── Diesel/EMU nose (integrated, no protruding block) ──
    // Sloped nose end
    g.poly([hW, -hH, hW + 6, -hH + 4, hW + 6, hH - 4, hW, hH]).fill(aC)
    g.poly([hW, -hH, hW + 6, -hH + 4, hW + 6, hH - 4, hW, hH]).stroke({ color: 0xffffff, width: 0.8, alpha: 0.4 })
    // Nose highlight
    g.poly([hW, -hH, hW + 4, -hH + 3, hW + 4, -hH + 6, hW, -hH + 4]).fill({ color: 0xffffff, alpha: 0.08 })
    // Front windshield (on nose) — split pane
    g.roundRect(hW - 12, -hH + 2, 12, 9, 2).fill(0x0f172a)
    g.roundRect(hW - 12, -hH + 2, 12, 4, 2).fill({ color: 0x87ceeb, alpha: 0.35 })
    g.rect(hW - 6, -hH + 2, 1, 9).fill({ color: bC, alpha: 0.4 }) // center pillar
    // Headlights (dual top + marker bottom)
    g.circle(hW + 3, -hH + 5, 3).fill(0xfef08a); g.circle(hW + 3, -hH + 5, 1.8).fill(0xffffff)
    g.circle(hW + 3, -hH + 10, 2).fill(0xfef08a); g.circle(hW + 3, -hH + 10, 1).fill(0xffffff)
    g.circle(hW + 3, hH - 5, 2.5).fill(0xfca5a5); g.circle(hW + 3, hH - 5, 1.2).fill(0xfecdd3)
    // Ditch lights (low-mounted, widely spaced)
    g.circle(hW + 1, hH - 10, 1.5).fill({ color: 0xfef08a, alpha: 0.6 })
    // Exhaust + radiator (diesel hood)
    if (!isEmu) {
      // Exhaust stack
      g.roundRect(-hW + 2, -hH - 4, 8, 4, 1).fill({ color: 0x1f2937, alpha: 0.5 })
      g.roundRect(-hW + 3, -hH - 5, 6, 2, 1).fill({ color: 0x374151, alpha: 0.4 })
      // Radiator grilles (long hood detail)
      for (let gi = 0; gi < 6; gi++) g.rect(-hW + 3 + gi * 2, -hH - 3, 1, 2.5).fill({ color: 0x6b7280, alpha: 0.3 })
      // Radiator fan (round on top)
      g.circle(-hW + 18, -hH - 2, 4).fill({ color: 0x1f2937, alpha: 0.3 })
      g.circle(-hW + 18, -hH - 2, 4).stroke({ color: 0x6b7280, width: 0.8, alpha: 0.3 })
      g.circle(-hW + 18, -hH - 2, 1.5).fill({ color: 0x9ca3af, alpha: 0.3 })
      // Horn (on roof)
      g.rect(hW - 16, -hH - 5, 3, 5).fill({ color: 0xd1d5db, alpha: 0.5 })
      g.roundRect(hW - 17, -hH - 7, 5, 3, 1).fill({ color: 0xfbbf24, alpha: 0.4 })
      // Bell
      g.circle(hW - 8, -hH - 3, 2.5).fill({ color: 0xd97706, alpha: 0.5 })
      g.rect(hW - 8, -hH - 6, 1, 3).fill({ color: 0xd1d5db, alpha: 0.4 })
      // Handrails (nose)
      g.rect(hW - 2, -hH + 12, 8, 1).fill({ color: 0xfbbf24, alpha: 0.3 })
      g.rect(hW + 5, -hH + 8, 1, 5).fill({ color: 0xfbbf24, alpha: 0.3 })
      // Dynamic brake blister (roof hump)
      g.roundRect(-hW + 28, -hH - 3, 14, 3, 1.5).fill({ color: 0x000000, alpha: 0.15 })
    }
    // Pantograph (EMU — detailed diamond)
    if (isEmu) {
      const px = -hW + 10
      g.rect(px, -hH - 8, 2, 8).fill({ color: 0xd1d5db, alpha: 0.7 })
      g.rect(px + 18, -hH - 8, 2, 8).fill({ color: 0xd1d5db, alpha: 0.7 })
      g.rect(px - 2, -hH - 9, 24, 1.5).fill({ color: 0xd1d5db, alpha: 0.7 })
      // Cross arms
      g.moveTo(px + 1, -hH).lineTo(px + 10, -hH - 8).stroke({ color: 0xd1d5db, width: 1, alpha: 0.5 })
      g.moveTo(px + 19, -hH).lineTo(px + 10, -hH - 8).stroke({ color: 0xd1d5db, width: 1, alpha: 0.5 })
      // Contact wire
      g.rect(px - 4, -hH - 11, 30, 1).fill({ color: 0xfbbf24, alpha: 0.35 })
      // Destination LED board
      g.roundRect(-hW + 4, -hH + 14, 14, 4, 1).fill(0x000000)
      g.roundRect(-hW + 5, -hH + 15, 12, 2, 0.5).fill({ color: 0xfbbf24, alpha: 0.5 })
      // Inter-car connector (rear)
      g.roundRect(-hW - 3, -hH + 3, 3, H - 6, 1).fill({ color: 0x374151, alpha: 0.4 })
      // AC unit (roof)
      g.roundRect(-hW + 32, -hH - 3, 12, 3, 1).fill({ color: 0xd1d5db, alpha: 0.2 })
    }
    // Door markings (double door)
    g.rect(-hW + 22, -hH + 2, 6, H - 4).stroke({ color: 0xffffff, width: 0.5, alpha: 0.18 })
    g.rect(-hW + 40, -hH + 2, 6, H - 4).stroke({ color: 0xffffff, width: 0.4, alpha: 0.12 })
    // Grab irons (side handrails)
    g.rect(-hW + 1, -hH + 8, 1, 10).fill({ color: 0xfbbf24, alpha: 0.25 })
    g.rect(hW - 2, -hH + 8, 1, 10).fill({ color: 0xfbbf24, alpha: 0.25 })
  }
  // Rivet dots
  for (const ry of [-hH + 1, hH - 2]) {
    for (let rx = -hW + 4; rx < hW - 14; rx += 8) {
      g.circle(rx, ry, 0.8).fill({ color: 0xffffff, alpha: 0.2 })
    }
  }
  // Number board
  g.roundRect(-hW + 2, -hH + 1, 14, 6, 1).fill({ color: 0x000000, alpha: 0.3 })
  // Bogies + Wheels
  for (const bx of [-24, isSteam ? -4 : 8]) {
    // Bogie frame
    if (!isSteam) g.roundRect(bx - 3, hH - 1, 16, 3, 1).fill({ color: 0x1f2937, alpha: 0.5 })
    // Wheels
    g.circle(bx, hH + 3, 6).fill(0x1f2937).stroke({ color: 0x6b7280, width: 1.2 })
    g.circle(bx, hH + 3, 3.5).fill(0x374151)
    g.circle(bx, hH + 3, 1.5).fill(0x9ca3af)
    g.circle(bx + 10, hH + 3, 6).fill(0x1f2937).stroke({ color: 0x6b7280, width: 1.2 })
    g.circle(bx + 10, hH + 3, 3.5).fill(0x374151)
    g.circle(bx + 10, hH + 3, 1.5).fill(0x9ca3af)
    // Axle
    g.rect(bx, hH + 2.5, 10, 1).fill({ color: 0x6b7280, alpha: 0.4 })
  }
  // Undercarriage
  g.rect(-hW, hH - 1, W, 2.5).fill({ color: 0x000000, alpha: 0.35 })
  // Coupling hooks
  g.rect(-hW - 4, hH - 2, 4, 3).fill({ color: 0x6b7280, alpha: 0.4 })
  if (!isSteam) g.rect(hW, hH - 2, 4, 3).fill({ color: 0x6b7280, alpha: 0.4 })
  if (catKey && catKey.includes('steam')) {
    const v = variant ? (variant-1) : (trainKey||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0) % 5
    // ── Boiler bands (3 rings around cylindrical boiler) ──
    for (let bi = 0; bi < 3; bi++) {
      const bx = -hW + 12 + bi * 18
      g.rect(bx, -hH, 2, H).fill({ color: 0xffffff, alpha: 0.12 })
    }
    // ── Running board / footplate (long horizontal bar) ──
    g.rect(-hW - 2, hH - 4, W + 8, 2.5).fill(aC)
    g.rect(-hW - 2, hH - 4, W + 8, 1).fill({ color: 0xffffff, alpha: 0.2 })
    // ── Smokestack / Chimney ──
    const chX = hW - 16 - v * 2
    const chW = 5 + v % 2
    g.rect(chX, -hH - 12 - v, chW, 12 + v).fill(bC)
    g.rect(chX, -hH - 12 - v, chW, 12 + v).stroke({ color: 0xffffff, width: 0.8, alpha: 0.4 })
    // Chimney cap (wider flared top)
    g.roundRect(chX - 3, -hH - 14 - v, chW + 6, 4, 2).fill(0x1f2937)
    g.roundRect(chX - 3, -hH - 14 - v, chW + 6, 1.5, 1).fill({ color: 0xffffff, alpha: 0.15 })
    // ── Steam dome (brass, raised) ──
    const dX = hW - 30 - v * 2
    g.ellipse(dX, -hH - 3, 6, 7).fill(aC)
    g.ellipse(dX, -hH - 3, 6, 7).stroke({ color: 0xffffff, width: 0.8, alpha: 0.4 })
    g.ellipse(dX, -hH - 6, 4, 3).fill({ color: 0xffffff, alpha: 0.15 }) // highlight
    // ── Safety valve (small between dome and chimney) ──
    g.rect(dX + 8, -hH - 6, 3, 6).fill(0x9ca3af)
    g.circle(dX + 9.5, -hH - 7, 2).fill(0xb8b8b8)
    // ── Sandbox (second smaller dome) ──
    if (v < 3) {
      g.ellipse(dX - 12, -hH - 1, 4, 5).fill(0x6b7280)
      g.ellipse(dX - 12, -hH - 1, 4, 5).stroke({ color: 0xffffff, width: 0.6, alpha: 0.3 })
    }
    // ── Headlight (on smokebox front) ──
    g.circle(hW - 2, -hH + 4, 4).fill(0xfef08a)
    g.circle(hW - 2, -hH + 4, 2.5).fill(0xffffff)
    g.circle(hW - 2, -hH + 4, 4).stroke({ color: 0x9ca3af, width: 1 })
    // ── Smokebox door (circular front face) ──
    g.circle(hW - 1, 0, hH - 2).fill({ color: 0x000000, alpha: 0.15 })
    g.circle(hW - 1, 0, hH - 4).stroke({ color: 0xffffff, width: 0.6, alpha: 0.2 })
    // ── Cowcatcher / pilot ──
    g.poly([hW + 1, -hH + 5, hW + 8, hH - 3, hW + 1, hH - 3]).fill(0x1f2937)
    for (let ci = 0; ci < 3; ci++) {
      g.rect(hW + 1, hH - 6 + ci * 2.5, 6, 1).fill({ color: 0x9ca3af, alpha: 0.4 })
    }
    // ── Cab (rear, taller with window) ──
    g.roundRect(-hW - 2, -hH - 6, 14, H + 6, 2).fill(aC)
    g.roundRect(-hW - 2, -hH - 6, 14, H + 6, 2).stroke({ color: 0xffffff, width: 0.8, alpha: 0.4 })
    // Cab window
    g.roundRect(-hW + 1, -hH - 3, 8, 8, 1.5).fill(0x0f172a)
    g.roundRect(-hW + 1, -hH - 3, 8, 4, 1.5).fill({ color: 0x87ceeb, alpha: 0.4 })
    // Cab roof
    g.roundRect(-hW - 4, -hH - 8, 18, 3, 1).fill({ color: 0x000000, alpha: 0.3 })
    // ── Tender car (coal wagon behind cab) ──
    g.roundRect(-hW - 24, -hH + 1, 20, H - 2, 3).fill(bC)
    g.roundRect(-hW - 24, -hH + 1, 20, H - 2, 3).stroke({ color: 0xffffff, width: 0.8, alpha: 0.35 })
    // Coal load
    g.poly([-hW-22,-hH+1, -hW-18,-hH-3, -hW-12,-hH-2, -hW-6,-hH+1]).fill({ color: 0x111111 })
    // Tender wheels
    g.circle(-hW - 18, hH + 3, 5).fill(0x1f2937).stroke({ color: 0x6b7280, width: 1 })
    g.circle(-hW - 18, hH + 3, 2).fill(0x9ca3af)
    g.circle(-hW - 8, hH + 3, 5).fill(0x1f2937).stroke({ color: 0x6b7280, width: 1 })
    g.circle(-hW - 8, hH + 3, 2).fill(0x9ca3af)
    // ── Connecting rods (detailed, multiple) ──
    g.rect(-22, hH + 1, 40, 2).fill({ color: 0x9ca3af, alpha: 0.5 })
    g.rect(-18, hH + 0, 34, 1).fill({ color: 0x6b7280, alpha: 0.3 })
    // ── Valve gear (Walschaerts motion) ──
    g.rect(-10, hH - 2, 18, 1.5).fill({ color: 0x9ca3af, alpha: 0.35 })
    g.circle(6, hH - 1, 2).fill({ color: 0x9ca3af, alpha: 0.4 })
    // ── Piston cross-head (front) ──
    g.roundRect(hW - 6, hH - 3, 6, 5, 1).fill({ color: 0x9ca3af, alpha: 0.4 })
    g.rect(hW - 4, hH + 0, 8, 1.5).fill({ color: 0x6b7280, alpha: 0.35 })
    // ── Steam pipes (on side of boiler) ──
    g.rect(dX + 2, -hH + 2, hW - dX - 4, 1.5).fill({ color: 0x9ca3af, alpha: 0.3 })
    // ── Firebox glow (under boiler, orange) ──
    g.rect(-hW + 14, hH - 2, 12, 3).fill({ color: 0xf97316, alpha: 0.2 })
    g.rect(-hW + 16, hH - 1, 8, 2).fill({ color: 0xfbbf24, alpha: 0.15 })
    // ── Whistle (on boiler top) ──
    g.rect(dX - 4, -hH - 5, 2, 5).fill({ color: 0xd97706, alpha: 0.5 })
    g.circle(dX - 3, -hH - 6, 1.5).fill({ color: 0xf59e0b, alpha: 0.6 })
    // ── Bell (front of boiler) ──
    g.circle(hW - 10, -hH - 3, 2.5).fill({ color: 0xd97706, alpha: 0.45 })
    g.rect(hW - 10, -hH - 6, 1, 3).fill({ color: 0xd1d5db, alpha: 0.35 })
    // ── Handrails (running along boiler) ──
    g.rect(-hW + 12, -hH + 2, hW * 2 - 26, 0.8).fill({ color: 0xfbbf24, alpha: 0.2 })
    // ── Water gauge (cab side) ──
    g.rect(-hW + 2, -hH + 8, 2, 8).fill({ color: 0x0891b2, alpha: 0.3 })
    g.rect(-hW + 2, -hH + 12, 2, 4).fill({ color: 0x22d3ee, alpha: 0.4 })
    // ── Splasher / wheel guard ──
    g.poly([-16, hH - 2, -4, hH - 2, -4, hH + 1, -16, hH + 1]).fill({ color: bC, alpha: 0.3 })
    g.arc(-10, hH + 3, 8, Math.PI, 0).stroke({ color: aC, width: 1.5, alpha: 0.3 })
  }
}

function buildPlayer() {
  const c = new PIXI.Container(); L.player = c; stage.addChild(c)
  c.x = app.screen.width * PLAYER_X

  // Glow ellipse
  playerGlow = new PIXI.Graphics()
  playerGlow.ellipse(0, 8, 38, 12).fill(0x86efac)
  playerGlow.alpha = 0.25
  c.addChild(playerGlow)

  // Train graphic (replaces emoji Text for cross-device compatibility)
  playerSprite = new PIXI.Graphics()
  drawTrainG(playerSprite, '#1e3a8a', '#3b82f6', 'diesel_id')  // default until train selected
  c.addChild(playerSprite)

  c.y = laneYs[S.lane]

  // Steam container
  L.steam = new PIXI.Container(); stage.addChild(L.steam)
}

function updatePlayerEmoji() {
  if (!playerSprite || !S.trainCfg) return
  const cat = S.trainCfg.category || ''
  const drawKey = cat.includes('maglev') ? 'maglev' : cat.includes('hsr') ? 'hsr' : cat.includes('steam') ? 'steam' : cat.includes('emu') ? 'emu' : 'diesel'
  drawTrainG(playerSprite, S.trainCfg.bodyColor, S.trainCfg.accColor, drawKey, S.trainCfg.key, S.trainCfg.variant||1)
}

function tickPlayer(delta) {
  if (!L.player) return
  const targetY = laneYs[S.targetLane]
  const dy = targetY - L.player.y
  L.player.y += dy * 0.22 * delta

  // Bob
  L.player.y += Math.sin(S.frame * 0.12) * 0.4

  // Glow pulse
  if (playerGlow) playerGlow.alpha = 0.18 + Math.sin(S.frame * 0.08) * 0.1

  // Invincibility flash
  if (S.invincible > 0) {
    S.invincible -= delta
    L.player.alpha = Math.sin(S.invincible * 0.7) > 0 ? 1 : 0.3
    if (S.invincible <= 0) L.player.alpha = 1
  }

  // Screen shake on crash
  if (S.shakeTimer > 0) {
    S.shakeTimer -= delta
    const t = S.shakeTimer / 22
    stage.x = Math.sin(S.shakeTimer * 1.5) * 7 * t
    stage.y = Math.cos(S.shakeTimer * 1.2) * 4 * t
  } else {
    stage.x *= 0.8
    stage.y *= 0.8
  }
}

// ── Steam ─────────────────────────────────────────────────
function tickSteam(delta) {
  S.frame++
  // Only spawn smoke for steam trains
  const cat = S.trainCfg?.category || ''
  const isSteamTrain = cat.includes('steam')
  if (S.frame % 3 === 0 && isSteamTrain) spawnSteam()
  // Diesel gets small exhaust puffs (less visible)
  if (S.frame % 8 === 0 && !isSteamTrain && cat.includes('diesel')) spawnSteam()
  for (let i = S.steam.length - 1; i >= 0; i--) {
    const p = S.steam[i]
    p.g.x -= (S.speed * 0.6 + p.vx) * delta
    p.g.y += p.vy * delta
    p.life -= p.decay * delta
    p.g.alpha = p.life * 0.5
    p.g.scale.set(1 + (1 - p.life) * 1.5)
    if (p.life <= 0) { L.steam.removeChild(p.g); S.steam.splice(i, 1) }
  }
}
function spawnSteam() {
  if (!L.player) return
  const px = L.player.x - 24  // top of boiler
  const py = L.player.y - 22
  const g = new PIXI.Graphics()
  const r = 4 + Math.random() * 5
  g.circle(0, 0, r).fill(S.boosting ? 0xff6622 : 0xaaaaaa)
  g.x = px + (Math.random() - 0.5) * 8
  g.y = py
  g.alpha = 0.5
  L.steam.addChild(g)
  S.steam.push({ g, vx: 0.3 + Math.random() * 0.5, vy: -(0.8 + Math.random() * 1.2), life: 1, decay: 0.038 + Math.random() * 0.025 })
}

// ── AI Trains ─────────────────────────────────────────────
function buildAI() {
  L.ai.removeChildren()
  S.aiTrains = []
  const pool = shuffle([...ALL_TRAINS]).slice(0, AI_COUNT)
  pool.forEach((cfg, i) => {
    const c = new PIXI.Container()
    const spr = new PIXI.Graphics()
    drawTrainG(spr, cfg.bodyColor || '#374151', cfg.accColor || '#9ca3af', cfg.category)
    c.addChild(spr)

    // Glow
    const glow = new PIXI.Graphics()
    glow.ellipse(0, 8, 28, 9).fill(0x86efac)
    glow.alpha = 0.18
    c.addChild(glow)

    const aiLane = [0, 1, 2].filter(l => l !== S.lane)[i % 2]
    c.y = laneYs[aiLane]
    c.x = app.screen.width * (0.55 + i * 0.15)
    L.ai.addChild(c)

    const variation = 0.96 + Math.random() * 0.08
    S.aiTrains.push({
      cfg, container: c,
      lane: aiLane,
      speed: S.baseSpeed * variation,
      distance: 0,
    })
  })
}

function tickAI(delta) {
  const W = app.screen.width
  const playerX = W * PLAYER_X

  S.aiTrains.forEach(ai => {
    ai.distance += ai.speed * delta * 0.12
    // Screen position based on relative distance
    const relDist = ai.distance - S.distance
    const screenX = playerX + relDist * 1.8
    ai.container.x = screenX
    ai.container.visible = screenX > -80 && screenX < W + 80
    // Bob
    ai.container.y = laneYs[ai.lane] + Math.sin(S.frame * 0.1 + ai.lane) * 0.5
  })

  // Update race position
  const aiAhead = S.aiTrains.filter(a => a.distance > S.distance).length
  S.position = aiAhead + 1
  const posText = S.position === 1 ? '🥇 Posisi 1!' : S.position === 2 ? '🥈 Posisi 2' : '🥉 Posisi 3'
  document.getElementById('position-badge').textContent = posText
}

// ── Obstacles ─────────────────────────────────────────────
const OBS_EMOJIS = ['🪨','🐄','🐔','🌵','⚠️','🛑','🪵','🧱']
const OBS_SIZE = 44

function spawnObstacle() {
  const lane = Math.floor(Math.random() * LANE_COUNT)
  const W = app.screen.width
  const emoji = OBS_EMOJIS[Math.floor(Math.random() * OBS_EMOJIS.length)]

  const c = new PIXI.Container()
  const txt = new PIXI.Text({ text: emoji, style: { fontSize: OBS_SIZE, fontFamily: 'Arial' } })
  txt.anchor.set(0.5)
  c.addChild(txt)

  // Warning glow
  const wg = new PIXI.Graphics()
  wg.circle(0, 0, OBS_SIZE * 0.65).fill(0xef4444)
  wg.alpha = 0.15
  c.addChild(wg)

  c.x = W + OBS_SIZE
  c.y = laneYs[lane]
  c._lane = lane
  c._alive = true
  c._warned = false

  L.obstacles.addChild(c)
  S.obstacles.push(c)

  // Lane warning
  const warnBtns = ['btn-up','btn-boost','btn-dn']
  // Flash the lane change button
  const btnId = lane === 0 ? 'btn-dn' : lane === 2 ? 'btn-up' : null
  if (btnId) {
    const btn = document.getElementById(btnId)
    if (btn) { btn.style.borderColor = '#ef4444'; btn.style.boxShadow = '0 0 12px rgba(239,68,68,0.6)'; setTimeout(() => { btn.style.borderColor = ''; btn.style.boxShadow = '' }, 600) }
  }
}

function tickObstacles(delta) {
  const W = app.screen.width
  const playerX = W * PLAYER_X
  const hitZoneX = playerX + 10

  for (let i = S.obstacles.length - 1; i >= 0; i--) {
    const o = S.obstacles[i]
    if (!o._alive) { L.obstacles.removeChild(o); S.obstacles.splice(i, 1); continue }

    o.x -= S.speed * delta * 1.0
    // Pulse warning
    o.children[1].alpha = 0.1 + Math.sin(S.frame * 0.2) * 0.1

    if (o.x < -OBS_SIZE * 2) { o._alive = false; continue }

    // Collision
    if (S.invincible <= 0 && o._lane === S.lane &&
        o.x > hitZoneX - OBS_SIZE && o.x < hitZoneX + OBS_SIZE) {
      o._alive = false
      crashHit()
    }
  }
}

function crashHit() {
  if (S.invincible > 0) return
  S.invincible = 60
  S.shakeTimer = 24
  S.hp--
  spawnCrashFX(L.player.x, L.player.y)
  playTone(200, 0.2, 'square')
  screenFlash('rgba(255,60,60,0.35)')
  updateHUD()
  if (S.hp <= 0) setTimeout(endRace, 500)
}

// ── FX ────────────────────────────────────────────────────
function spawnCrashFX(x, y) {
  for (let i = 0; i < 18; i++) {
    const g = new PIXI.Graphics()
    const r = 2 + Math.random() * 5
    g.circle(0, 0, r).fill(i % 2 === 0 ? 0xff4444 : 0xffaa44)
    g.x = x; g.y = y
    L.fx.addChild(g)
    S.sparks.push({ g, vx: (Math.random() - 0.5) * 9, vy: -Math.random() * 7 - 1, gravity: 0.3, life: 1, decay: 0.022 + Math.random() * 0.02 })
  }
}

function spawnBoostFX() {
  for (let i = 0; i < 24; i++) {
    const g = new PIXI.Graphics()
    g.circle(0, 0, 3 + Math.random() * 4).fill(0xfbbf24)
    g.x = L.player.x + (Math.random() - 0.5) * 40
    g.y = L.player.y + (Math.random() - 0.5) * 20
    L.fx.addChild(g)
    S.sparks.push({ g, vx: -(3 + Math.random() * 5), vy: (Math.random() - 0.5) * 3, gravity: 0.05, life: 1, decay: 0.03 + Math.random() * 0.02 })
  }
}

function tickFX(delta) {
  for (let i = S.sparks.length - 1; i >= 0; i--) {
    const p = S.sparks[i]
    p.g.x += p.vx * delta; p.g.y += p.vy * delta
    p.vy += p.gravity * delta
    p.life -= p.decay * delta
    p.g.alpha = p.life
    if (p.life <= 0) { L.fx.removeChild(p.g); S.sparks.splice(i, 1) }
  }
}

// ── Speed Lines ───────────────────────────────────────────
let spdLines = []
function tickSpeedLines(delta) {
  if (!S.boosting) { L.speedlines.alpha *= 0.9; return }
  L.speedlines.alpha = Math.min(1, L.speedlines.alpha + 0.1 * delta)

  if (S.frame % 4 === 0) {
    const W = app.screen.width
    const g = new PIXI.Graphics()
    const y = gameTop + Math.random() * gameH
    const len = 60 + Math.random() * 120
    g.rect(0, 0, len, 1.5).fill(0xffffff)
    g.x = W; g.y = y; g.alpha = 0.4 + Math.random() * 0.4
    g._vx = -(25 + Math.random() * 15)
    L.speedlines.addChild(g)
    spdLines.push(g)
  }
  for (let i = spdLines.length - 1; i >= 0; i--) {
    const l = spdLines[i]
    l.x += l._vx * delta
    l.alpha -= 0.04 * delta
    if (l.alpha <= 0 || l.x < -200) { L.speedlines.removeChild(l); spdLines.splice(i, 1) }
  }
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
function loop(ticker) {
  if (!S.running) return
  const delta = ticker.deltaTime
  const now = performance.now()

  // Spawn obstacle
  if (now - lastObsTime > OBS_INTERVAL_MS) {
    spawnObstacle()
    lastObsTime = now
  }

  tickClouds(delta)
  tickMid(delta)
  tickTracks(delta)
  tickSteam(delta)
  tickPlayer(delta)
  tickAI(delta)
  tickObstacles(delta)
  tickFX(delta)
  tickSpeedLines(delta)

  // Advance distance
  const speedFactor = S.boosting ? S.trainCfg.boostMult : 1.0
  S.distance += S.speed * delta * 0.12 * speedFactor
  S.speed = Math.min(S.maxSpeed, S.speed + 0.0003 * delta)

  // Pressure recovery
  S.pressure = Math.min(100, S.pressure + 0.05 * delta)
  updatePressure()

  updateHUD()

  // Checkpoints
  const frac = S.distance / S.finishLine
  ;[['cp0',0.25],['cp1',0.5],['cp2',0.75]].forEach(([id,th]) => {
    const el = document.getElementById(id)
    if (frac >= th && !el.classList.contains('reached')) el.classList.add('reached')
  })
  if (frac >= 1) {
    document.getElementById('cp3').classList.add('reached')
    endRace()
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════════════════
function startRace() {
  if (!S.trainCfg) return
  document.getElementById('select-ovl').style.display = 'none'
  document.getElementById('go-btn').style.display = 'none'

  S.distance = 0; S.hp = LIVES_MAX; S.pressure = 70
  S.obstacles = []; S.steam = []; S.sparks = []; spdLines = []; S.frame = 0
  S.boosting = false; S.boostCooldown = false; S.invincible = 0
  S.lane = 1; S.targetLane = 1
  S.speed = S.baseSpeed = S.trainCfg.baseSpeed
  S.maxSpeed = S.trainCfg.baseSpeed * 2.5
  L.obstacles.removeChildren(); L.ai.removeChildren()

  updatePlayerEmoji()
  buildAI()
  updateHUD()
  lastObsTime = performance.now() + 2500
  S.running = true
}

function endRace() {
  if (!S.running) return
  S.running = false
  document.getElementById('quiz-ovl').style.display = 'none'

  const posScore = S.position === 1 ? 5 : S.position === 2 ? 3 : 1
  const stars = Math.min(5, posScore - (LIVES_MAX - S.hp))
  const emoji = stars >= 4 ? '🏆' : stars >= 2 ? '🥈' : '😤'
  const title = S.position === 1 ? 'Juara 1!' : S.position === 2 ? 'Posisi 2' : 'Posisi 3'
  const msg = stars >= 4 ? 'Luar biasa! Kamu juaranya!' :
    stars >= 2 ? `${Math.floor(S.distance)}m ditempuh, bagus!` :
    'Coba pilih kereta lebih cepat!'

  const nextLevel = (cfg.level||5) < 30 ? () => { sessionStorage.setItem('g14Config', JSON.stringify({...cfg, level:(cfg.level||5)+1})); location.reload(); } : null;
  GameModal.show({
    emoji, title, stars, msg,
    onNext: nextLevel,
    onAgain: () => startRace(),
    onBack: () => goBack(),
    onExtra: { label: 'Ganti Kereta 🚂', action: () => showSelectScreen() }
  })

  try {
    sessionStorage.setItem('g14Result', JSON.stringify({ stars, distance: Math.floor(S.distance), position: S.position }))
  } catch(_) {}
}

function showSelectScreen() {
  S.running = false
  document.getElementById('quiz-ovl').style.display = 'none'
  const so = document.getElementById('select-ovl')
  so.style.display = 'flex'
  showCategories()
}

function finishGame() { goBack() }
function goBack() {
  S.running = false
  window.location.replace('../index.html')
}
function confirmBack() {
  goBack()
}

// ═══════════════════════════════════════════════════════════
//  BOOST + QUIZ
// ═══════════════════════════════════════════════════════════
function triggerBoost() {
  if (!S.running || S.boostCooldown || S.boosting || S.pressure < 20) return
  if (S.quizOpen) return
  S.quizOpen = true
  buildQuiz()
  document.getElementById('quiz-ovl').style.display = 'block'
  playTone(440, 0.08)
}

function buildQuiz() {
  const lv = cfg.level || 5
  let a, b, answer, op
  const ops = lv <= 6 ? ['+'] : lv <= 12 ? ['+', '-'] : ['+', '-', '*']
  op = ops[Math.floor(Math.random() * ops.length)]
  if (op === '+') {
    const max = 10 + lv * 3
    a = Math.floor(Math.random() * max) + 1
    b = Math.floor(Math.random() * max) + 1
    answer = a + b
  } else if (op === '-') {
    a = Math.floor(Math.random() * 20) + 10
    b = Math.floor(Math.random() * a) + 1
    answer = a - b
  } else {
    a = Math.floor(Math.random() * 6) + 2
    b = Math.floor(Math.random() * 6) + 2
    answer = a * b
  }
  const symbol = op === '*' ? '×' : op
  document.getElementById('quiz-q').textContent = `${a} ${symbol} ${b} = ?`
  const wrong = new Set()
  while (wrong.size < 3) {
    const d = Math.floor(Math.random() * 8) + 1
    const w = answer + (Math.random() < 0.5 ? d : -d)
    if (w !== answer && w > 0) wrong.add(w)
  }
  const choices = [answer, ...[...wrong]].slice(0, 4).sort(() => Math.random() - 0.5)
  const el = document.getElementById('quiz-choices')
  el.innerHTML = ''
  choices.forEach(c => {
    const btn = document.createElement('button')
    btn.className = 'quiz-btn'
    btn.textContent = c
    btn.onclick = () => answerQuiz(c, answer)
    el.appendChild(btn)
  })
  S.boostQ = { answer }
}

function answerQuiz(val, correct) {
  document.getElementById('quiz-ovl').style.display = 'none'
  S.quizOpen = false
  if (val === correct) {
    executeBoost()
  } else {
    playTone(200, 0.15, 'square')
    screenFlash('rgba(255,60,60,0.2)')
  }
}

function executeBoost() {
  if (!S.trainCfg) return
  S.boosting = true
  S.boostCooldown = true
  S.pressure = Math.max(10, S.pressure - 30)
  updatePressure()
  document.getElementById('btn-boost').classList.add('boosting')
  document.getElementById('btn-boost').textContent = ''
  document.getElementById('btn-boost').innerHTML = '🔥<br><span style="font-size:12px">BOOSTING!</span>'
  spawnBoostFX()
  playTone(660, 0.12); playTone(880, 0.08)
  screenFlash('rgba(251,191,36,0.2)')

  setTimeout(() => {
    S.boosting = false
    S.speed = S.baseSpeed
    document.getElementById('btn-boost').classList.remove('boosting')
    document.getElementById('btn-boost').innerHTML = '🔥<br><span style="font-size:12px;font-weight:900">BOOST!</span>'
    setTimeout(() => {
      S.boostCooldown = false
      document.getElementById('btn-boost').classList.remove('cooldown')
    }, 3000)
  }, (S.trainCfg.boostDur || 2000))
  document.getElementById('btn-boost').classList.add('cooldown')
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
function laneUp() { if (S.running && S.targetLane > 0) { S.targetLane--; playTone(500, 0.05) } }
function laneDn() { if (S.running && S.targetLane < LANE_COUNT - 1) { S.targetLane++; playTone(400, 0.05) } }
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') { laneUp(); e.preventDefault() }
  if (e.key === 'ArrowDown') { laneDn(); e.preventDefault() }
  if (e.key === ' ') { triggerBoost(); e.preventDefault() }
})
let touchY0 = null
window.addEventListener('touchstart', e => { touchY0 = e.touches[0].clientY }, {passive:true})
window.addEventListener('touchend', e => {
  if (touchY0 === null) return
  const dy = e.changedTouches[0].clientY - touchY0
  if (Math.abs(dy) > 40) { dy < 0 ? laneUp() : laneDn() }
  touchY0 = null
}, {passive:true})

// ═══════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════
function updateHUD() {
  const frac = Math.min(1, S.distance / S.finishLine)
  document.getElementById('prog-fill').style.width = (frac * 100).toFixed(1) + '%'
  document.getElementById('distance-text').textContent = `${Math.floor(S.distance)} / ${S.finishLine}m`
  document.getElementById('lives-hud').textContent = '❤️'.repeat(S.hp) + '🖤'.repeat(LIVES_MAX - S.hp)
  if (S.trainCfg) {
    const displayKmh = Math.round(S.trainCfg.kmh * (S.speed / S.baseSpeed) * (S.boosting ? S.trainCfg.boostMult : 1))
    document.getElementById('speed-hud').textContent = displayKmh + ' km/h'
  }
}
function updatePressure() {
  const pct = Math.round(S.pressure)
  document.getElementById('pressure-fill').style.width = pct + '%'
  document.getElementById('pressure-pct').textContent = pct + '%'
  document.getElementById('pressure-fill').style.background =
    pct < 20 ? 'linear-gradient(90deg,#ef4444,#f97316)' :
    pct < 50 ? 'linear-gradient(90deg,#f97316,#fbbf24)' :
    'linear-gradient(90deg,#22d3ee,#86efac)'
}

// ═══════════════════════════════════════════════════════════
//  TRAIN SELECTOR UI
// ═══════════════════════════════════════════════════════════
function showCategories() {
  document.getElementById('sel-crumb').style.display = 'none'
  document.getElementById('sel-title').textContent = 'Pilih Kereta 🚂'
  document.getElementById('go-btn').style.display = 'none'
  const body = document.getElementById('select-body')
  body.innerHTML = ''
  TRAIN_CATS.forEach(cat => {
    const btn = document.createElement('button')
    btn.className = 'cat-btn'
    btn.style.borderColor = cat.color
    btn.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><div class="cat-info"><div class="cat-name">${cat.name}</div><div class="cat-desc">${cat.desc}</div></div><span class="cat-arr">›</span>`
    btn.onclick = () => showTrainsForCat(cat)
    body.appendChild(btn)
  })
}

function showTrainsForCat(cat) {
  document.getElementById('sel-crumb').style.display = 'flex'
  document.getElementById('sel-title').textContent = cat.name
  const body = document.getElementById('select-body')
  body.innerHTML = ''
  const grid = document.createElement('div')
  grid.className = 'train-grid'
  cat.trains.forEach((t, idx) => {
    const card = document.createElement('button')
    card.className = 'train-card'
    const cv = document.createElement('canvas')
    cv.width = 96; cv.height = 48
    cv.className = 'train-emoji'  // reuse sizing slot
    cv.style.cssText = 'display:block;margin:0 auto 4px;width:84px;height:42px'
    card.appendChild(cv)
    const info = document.createElement('div')
    info.innerHTML = `<div class="train-nm">${t.name}</div><div class="train-sub">${t.sub}</div><div class="train-spd">${t.kmh} km/h</div>`
    card.appendChild(info)
    const trainV = (idx % 5) + 1
    drawTrainCard2d(cv, t.bodyColor, t.accColor, cat.key, trainV)
    card.onclick = () => {
      grid.querySelectorAll('.train-card').forEach(c => c.classList.remove('sel'))
      card.classList.add('sel')
      S.trainCfg = { ...t, category: cat.key, variant: trainV }
      document.getElementById('train-name-badge').textContent = t.name
      document.getElementById('go-btn').style.display = 'block'
    }
    grid.appendChild(card)
  })
  body.appendChild(grid)
}

function selBack() {
  if (document.getElementById('sel-crumb').style.display !== 'none') {
    showCategories()
  } else {
    goBack()
  }
}

// ═══════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════
let audioCtx
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  if (audioCtx.state === 'suspended') audioCtx.resume()
  return audioCtx
}
function playTone(freq, dur = 0.1, type = 'sine') {
  try {
    const ctx = ensureAudio()
    const osc = ctx.createOscillator(), gain = ctx.createGain()
    osc.connect(gain); gain.connect(ctx.destination)
    osc.frequency.value = freq; osc.type = type
    gain.gain.setValueAtTime(0.1, ctx.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur)
    osc.start(); osc.stop(ctx.currentTime + dur)
  } catch(_) {}
}

// ═══════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════
function lerpColor(a, b, t) {
  const ar = (a>>16)&0xff, ag = (a>>8)&0xff, ab = a&0xff
  const br = (b>>16)&0xff, bg = (b>>8)&0xff, bb = b&0xff
  return ((Math.round(ar+(br-ar)*t)<<16)|(Math.round(ag+(bg-ag)*t)<<8)|Math.round(ab+(bb-ab)*t))
}
function shuffle(arr) {
  for (let i = arr.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]] }
  return arr
}
let flashTimer = null
function screenFlash(color) {
  const f = document.getElementById('flash')
  f.style.background = color; f.style.opacity = '1'
  clearTimeout(flashTimer); flashTimer = setTimeout(() => { f.style.opacity = '0' }, 80)
}

//  BOOT
// ═══════════════════════════════════════════════════════════
;(async function boot() {
  document.addEventListener('touchstart', ensureAudio, {once:true})
  document.addEventListener('click', ensureAudio, {once:true})
  await initPixi()
  showCategories()
})()
</script>
