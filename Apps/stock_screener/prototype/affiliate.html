<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StockMap Affiliate Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body data-page="affiliate">
  <div class="page-shell">
    <nav class="nav">
      <div class="nav-inner">
        <a class="logo" href="./index.html">StockMap<span>.</span></a>
        <div class="nav-actions">
          <a class="nav-link" href="./app.html">Open App</a>
          <a class="nav-link" href="./methodology.html">Methodology</a>
        </div>
      </div>
    </nav>

    <main class="simple-wrap">
      <section class="simple-hero">
        <div class="eyebrow">Prototype affiliate flow</div>
        <h1 style="margin:14px 0 0;font-family:var(--font-serif);font-style:italic;font-size:56px">Affiliate Program</h1>
        <p class="page-sub" style="margin-left:0;text-align:left;max-width:760px">
          This page mirrors the researched affiliate flow structure: join, receive a referral code,
          share the link, and track referred conversions.
        </p>
      </section>

      <section class="simple-grid">
        <article class="simple-card">
          <h2>How It Works</h2>
          <ul id="affiliate-steps" style="margin-top:12px"></ul>
        </article>

        <article class="simple-card">
          <h2>Apply</h2>
          <form class="simple-form" id="affiliate-form" style="display:grid;gap:8px;margin-top:12px">
            <label for="affiliate-name">Name</label>
            <input class="inline-input" id="affiliate-name" name="name" placeholder="Your full name">
            <label for="affiliate-email">Email</label>
            <input class="inline-input" id="affiliate-email" name="email" placeholder="you@email.com">
            <label for="affiliate-contact">Contact</label>
            <input class="inline-input" id="affiliate-contact" name="contact" placeholder="WhatsApp / Telegram">
            <label for="affiliate-code">Referral Code</label>
            <input class="inline-input" id="affiliate-code" name="code" placeholder="your-code">
            <label for="affiliate-upline">Referred By</label>
            <input class="inline-input" id="affiliate-upline" name="referred_by" placeholder="optional upline code">
            <label for="affiliate-note">Note</label>
            <textarea class="textarea" id="affiliate-note" name="note" placeholder="Short background or audience details"></textarea>
            <button class="primary-btn" type="submit">Apply</button>
          </form>
          <div class="form-msg" id="affiliate-msg"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="./assets/mock-data.js"></script>
  <script src="./assets/utils.js"></script>
  <script src="./assets/site.js"></script>
</body>
</html>
