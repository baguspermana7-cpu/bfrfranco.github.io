<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StockMap Entity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body data-page="entity">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="page-shell">
    <nav class="nav">
      <div class="nav-inner">
        <a class="logo" href="./index.html">StockMap<span>.</span></a>
        <div class="nav-actions">
          <a class="nav-link" id="entity-app-link" href="./app.html">App</a>
          <a class="nav-link" href="./methodology.html">Methodology</a>
        </div>
      </div>
    </nav>

    <main class="entity-wrap" id="main-content">
      <a class="back-link" id="entity-back-link" href="./app.html">&larr; Back to dashboard</a>

      <section class="entity-hero reveal">
        <div class="eyebrow" id="entity-eyebrow">Entity detail</div>
        <h1 id="entity-title">Loading...</h1>
        <p class="entity-sub" id="entity-summary"></p>
        <div class="entity-tags" id="entity-tags"></div>
        <div class="entity-metrics" id="entity-metrics"></div>
      </section>

      <section class="entity-grid">
        <article class="entity-panel reveal">
          <h2>Research Notes</h2>
          <div class="entity-summary-list" id="entity-summary-points"></div>
        </article>
        <article class="entity-panel reveal">
          <h2>Related Entities</h2>
          <div class="entity-related" id="entity-related"></div>
        </article>
      </section>

      <section class="entity-grid">
        <article class="entity-panel reveal">
          <h2 id="entity-chart-title">Distribution</h2>
          <div class="entity-chart" id="entity-pie-chart"></div>
        </article>
        <article class="entity-panel reveal">
          <h2 id="entity-bar-title">Top Records</h2>
          <div class="entity-chart" id="entity-bar-chart"></div>
        </article>
      </section>

      <section class="entity-panel reveal" style="margin-top:16px">
        <h2 id="entity-table-title">Visible Records</h2>
        <div class="table-wrap">
          <table class="table">
            <thead id="entity-table-head"></thead>
            <tbody id="entity-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="./assets/mock-data.js"></script>
  <script src="./assets/utils.js"></script>
  <script src="./assets/entity.js"></script>
</body>
</html>
