<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain — ResistanceZero</title>
<meta name="description" content="Interactive knowledge graph — ResistanceZero content map.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
/* ═══════ TOKENS ═══════ */
:root{
  --ink:#010209;
  --surface:#060a14;
  --panel:rgba(6,10,20,0.93);
  --glass:rgba(255,255,255,0.03);
  --rim:rgba(255,255,255,0.06);
  --rim-neon:rgba(0,229,196,0.2);

  /* PRIMARY: electric teal — nothing like Claude */
  --neon:#00e5c4;
  --neon-dim:#00b89c;
  --neon-glow:rgba(0,229,196,0.18);
  --blue:#0ea5e9;
  --coral:#ff6b6b;
  --gold:#ffd166;

  --text:#d9eaf5;
  --text-2:#4d7a96;
  --text-3:#1e3d52;
  --mono:'Space Mono',monospace;
  --sans:'Inter',system-ui,sans-serif;

  --nav-h:52px;
  --tool-h:46px;
  --sb-w:330px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--ink);color:var(--text);font-family:var(--sans);font-size:13px;-webkit-font-smoothing:antialiased}

/* ═══════ STAR CANVAS ═══════ */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ═══════ COLOR BLOBS ═══════ */
.blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;opacity:0.55}
.blob-a{width:500px;height:500px;top:-120px;left:-60px;
  background:radial-gradient(circle,rgba(0,160,140,0.12) 0%,transparent 70%);
  animation:b1 28s ease-in-out infinite}
.blob-b{width:420px;height:420px;bottom:-80px;right:-40px;
  background:radial-gradient(circle,rgba(14,165,233,0.08) 0%,transparent 70%);
  animation:b2 22s ease-in-out infinite}
.blob-c{width:300px;height:300px;top:40%;left:55%;
  background:radial-gradient(circle,rgba(255,107,107,0.06) 0%,transparent 70%);
  animation:b3 35s ease-in-out infinite}
@keyframes b1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,25px)}}
@keyframes b2{0%,100%{transform:translate(0,0)}50%{transform:translate(-25px,-20px)}}
@keyframes b3{0%,100%{transform:translate(0,0)}33%{transform:translate(20px,-15px)}66%{transform:translate(-15px,20px)}}

/* ═══════ LOADER ═══════ */
#loader{
  position:fixed;inset:0;z-index:999;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity 0.6s,visibility 0.6s;
}
#loader.gone{opacity:0;visibility:hidden;pointer-events:none}
.ld-icon{
  width:56px;height:56px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.ld-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid var(--rim);
  border-top-color:var(--neon);
  border-right-color:var(--blue);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-dot{width:8px;height:8px;border-radius:50%;background:var(--neon);box-shadow:0 0 10px var(--neon)}
.ld-title{font-family:var(--mono);font-size:0.75rem;color:var(--neon);letter-spacing:0.2em;text-transform:uppercase}
.ld-sub{font-size:0.7rem;color:var(--text-2);letter-spacing:0.08em}

/* ═══════ NAV ═══════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--nav-h);
  display:flex;align-items:center;gap:0;
  background:rgba(1,2,9,0.9);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--rim);
  box-shadow:0 1px 0 var(--rim-neon);
}
.nav-logo{
  display:flex;align-items:center;gap:10px;padding:0 16px;
  height:100%;border-right:1px solid var(--rim);
  text-decoration:none;flex-shrink:0;
}
.nav-hex{
  width:30px;height:30px;position:relative;flex-shrink:0;
}
.nav-hex svg{display:block}
.nav-wordmark{
  font-family:var(--mono);font-size:0.72rem;font-weight:700;
  color:var(--neon);letter-spacing:0.14em;text-transform:uppercase;
  text-shadow:0 0 14px rgba(0,229,196,0.5);
}
.nav-sub{font-size:0.6rem;color:var(--text-2);letter-spacing:0.06em;font-family:var(--mono);margin-top:1px}

.nav-stats{
  display:flex;align-items:center;padding:0 16px;gap:20px;flex:1;
  height:100%;border-right:1px solid var(--rim);
}
.nav-stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.nav-stat-val{font-family:var(--mono);font-size:0.85rem;font-weight:700;color:var(--neon);line-height:1}
.nav-stat-lbl{font-size:0.57rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--mono)}
.nav-sep{width:1px;height:20px;background:var(--rim)}

.nav-back{
  display:flex;align-items:center;gap:6px;
  padding:0 16px;height:100%;
  font-family:var(--mono);font-size:0.65rem;color:var(--text-2);
  text-decoration:none;letter-spacing:0.06em;text-transform:uppercase;
  transition:color 0.2s;flex-shrink:0;
}
.nav-back:hover{color:var(--neon)}
.nav-back svg{color:var(--neon)}

/* ═══════ TOOLBAR ═══════ */
.toolbar{
  position:fixed;top:var(--nav-h);left:0;right:0;z-index:190;
  height:var(--tool-h);
  display:flex;align-items:center;gap:8px;
  padding:0 12px;
  background:rgba(3,6,16,0.88);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--rim);
}

/* search */
.srch{
  position:relative;flex-shrink:0;width:200px;
}
.srch svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none}
#searchInput{
  width:100%;height:30px;padding:0 8px 0 26px;
  background:var(--glass);border:1px solid var(--rim);
  border-radius:6px;color:var(--text);font-size:0.75rem;font-family:var(--sans);
  outline:none;transition:border-color 0.15s;
}
#searchInput::placeholder{color:var(--text-3)}
#searchInput:focus{border-color:var(--rim-neon)}

/* vertical divider */
.tdiv{width:1px;height:22px;background:var(--rim);flex-shrink:0}

/* filter pills */
.filters{display:flex;align-items:center;gap:4px;overflow-x:auto;flex:1;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fp{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:4px;
  font-size:0.67rem;font-weight:600;font-family:var(--mono);letter-spacing:0.02em;
  border:1px solid transparent;cursor:pointer;white-space:nowrap;
  background:transparent;transition:all 0.15s;color:var(--text-3);
}
.fp .fd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.fp .fc{font-size:0.6rem;opacity:0.6;margin-left:1px}
.fp:hover{color:var(--text-2);background:var(--glass)}
.fp.on{color:var(--text);background:var(--glass);border-color:var(--rim)}

/* active indicator line below */
.fp.on::after{content:'';display:block;position:absolute;bottom:-1px;left:0;right:0;height:2px;background:currentColor;border-radius:2px}
.fp{position:relative}

/* layout toggles */
.ltog{display:flex;align-items:center;gap:3px;flex-shrink:0}
.lb{
  width:26px;height:26px;border-radius:5px;
  background:transparent;border:1px solid var(--rim);
  color:var(--text-3);cursor:pointer;font-size:0.7rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.lb:hover{border-color:var(--rim-neon);color:var(--neon)}
.lb.on{background:rgba(0,229,196,0.08);border-color:var(--rim-neon);color:var(--neon)}

/* ═══════ GRAPH ═══════ */
#gWrap{
  position:fixed;
  top:calc(var(--nav-h) + var(--tool-h));
  left:0;right:0;bottom:0;
  transition:right 0.3s cubic-bezier(.4,0,.2,1);
}
#gWrap.sb-open{right:var(--sb-w)}

/* ═══════ EMPTY ═══════ */
#empty{
  display:none;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);text-align:center;pointer-events:none;
}
#empty .ei{
  width:52px;height:52px;border-radius:50%;
  border:1px solid var(--rim);margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center;color:var(--text-3);
}
#empty p{font-size:0.75rem;color:var(--text-3);font-family:var(--mono);letter-spacing:0.05em}

/* ═══════ SIDEBAR ═══════ */
#sidebar{
  position:fixed;top:0;right:0;bottom:0;
  width:var(--sb-w);z-index:180;
  background:rgba(4,8,18,0.97);
  backdrop-filter:blur(24px);
  border-left:1px solid var(--rim);
  transform:translateX(100%);
  transition:transform 0.3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  overflow:hidden;
}
#sidebar.open{transform:translateX(0)}

/* colored stripe at top based on group */
#sbStripe{height:3px;flex-shrink:0;transition:background 0.3s}

.sb-head{
  flex-shrink:0;padding:14px 14px 10px;
  border-bottom:1px solid var(--rim);
}
.sb-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.sb-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:3px;
  font-family:var(--mono);font-size:0.58rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  border:1px solid;
}
.sb-x{
  width:24px;height:24px;border-radius:4px;flex-shrink:0;
  background:var(--glass);border:1px solid var(--rim);
  color:var(--text-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.sb-x:hover{border-color:var(--coral);color:var(--coral)}
#sbTitle{
  font-family:var(--sans);font-size:1rem;font-weight:600;
  color:var(--text);line-height:1.3;margin-bottom:6px;
}
#sbDesc{font-size:0.75rem;color:var(--text-2);line-height:1.6}

.sb-body{flex:1;overflow-y:auto;padding:12px 14px 20px;scrollbar-width:thin;scrollbar-color:var(--rim) transparent}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--rim);border-radius:2px}

.sb-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.sb-m{
  background:var(--glass);border:1px solid var(--rim);
  border-radius:6px;padding:8px 10px;
}
.sb-m-l{font-family:var(--mono);font-size:0.55rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px}
.sb-m-v{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--text)}

.sb-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.sb-tag{
  font-family:var(--mono);font-size:0.6rem;color:var(--text-2);
  background:var(--glass);border:1px solid var(--rim);
  border-radius:3px;padding:2px 6px;
}

.sb-s-title{
  font-family:var(--mono);font-size:0.58rem;color:var(--text-3);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;font-weight:700;
}
.conns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.conn{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:4px;
  font-size:0.68rem;color:var(--text-2);
  background:var(--glass);border:1px solid var(--rim);
  cursor:pointer;transition:all 0.15s;
}
.conn .cd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.conn:hover{background:rgba(0,229,196,0.06);border-color:var(--rim-neon);color:var(--text)}

.sb-div{border:none;border-top:1px solid var(--rim);margin:10px 0}

.sb-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:9px 12px;border-radius:6px;
  font-size:0.75rem;font-weight:600;cursor:pointer;
  text-decoration:none;transition:all 0.2s;border:none;font-family:var(--sans);
}
.sb-btn-p{
  background:linear-gradient(135deg,var(--neon-dim),var(--blue));
  color:#fff;box-shadow:0 4px 16px rgba(0,229,196,0.25);
}
.sb-btn-p:hover{box-shadow:0 4px 24px rgba(0,229,196,0.4);transform:translateY(-1px)}
.sb-btn-s{
  background:var(--glass);border:1px solid var(--rim);
  color:var(--text-2);margin-top:6px;
}
.sb-btn-s:hover{border-color:var(--rim-neon);color:var(--neon)}

/* ═══════ LEGEND ═══════ */
#legend{
  position:fixed;bottom:16px;left:16px;z-index:100;
  background:rgba(4,8,18,0.92);backdrop-filter:blur(12px);
  border:1px solid var(--rim);border-radius:8px;
  padding:10px 12px;
  transition:right 0.3s cubic-bezier(.4,0,.2,1),opacity 0.3s;
}
.leg-t{font-family:var(--mono);font-size:0.55rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.leg-r{display:flex;align-items:center;gap:6px;font-size:0.68rem;color:var(--text-2);margin-bottom:3px}
.leg-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ═══════ ZOOM ═══════ */
#zctrl{
  position:fixed;bottom:16px;right:16px;z-index:100;
  display:flex;flex-direction:column;gap:4px;
  transition:right 0.3s cubic-bezier(.4,0,.2,1);
}
#zctrl.sb-open{right:calc(var(--sb-w) + 16px)}
.zb{
  width:32px;height:32px;border-radius:6px;
  background:rgba(4,8,18,0.92);backdrop-filter:blur(12px);
  border:1px solid var(--rim);color:var(--text-2);
  cursor:pointer;font-size:0.9rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-family:var(--mono);
}
.zb:hover{border-color:var(--rim-neon);color:var(--neon);background:rgba(0,229,196,0.06)}

/* ═══════ VIS TOOLTIP OVERRIDE ═══════ */
.vis-tooltip{
  background:rgba(4,8,18,0.97) !important;
  border:1px solid var(--rim-neon) !important;
  border-radius:8px !important;
  font-size:12px !important;
  padding:0 !important;
  box-shadow:0 8px 32px rgba(0,0,0,0.7) !important;
  color:var(--text) !important;
}

@media(max-width:720px){
  :root{--sb-w:100vw}
  #legend{display:none}
  .nav-stats{display:none}
  .srch{width:140px}
}
</style>
</head>
<body>

<!-- STAR FIELD (canvas drawn by JS) -->
<canvas id="stars"></canvas>

<!-- COLOR BLOBS -->
<div class="blob blob-a"></div>
<div class="blob blob-b"></div>
<div class="blob blob-c"></div>

<!-- LOADER -->
<div id="loader">
  <div class="ld-icon">
    <div class="ld-ring"></div>
    <div class="ld-dot"></div>
  </div>
  <div class="ld-title">Second Brain</div>
  <div class="ld-sub">mapping knowledge graph…</div>
</div>

<!-- NAV -->
<nav>
  <a href="../../index.html" class="nav-logo">
    <div class="nav-hex">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <polygon points="15,2 27,8.5 27,21.5 15,28 3,21.5 3,8.5" stroke="#00e5c4" stroke-width="1.5" fill="rgba(0,229,196,0.06)"/>
        <circle cx="15" cy="15" r="4" fill="#00e5c4" opacity="0.9"/>
        <line x1="15" y1="2" x2="15" y2="11" stroke="#00e5c4" stroke-width="0.8" opacity="0.4"/>
        <line x1="27" y1="8.5" x2="19.2" y2="12.5" stroke="#00e5c4" stroke-width="0.8" opacity="0.4"/>
        <line x1="27" y1="21.5" x2="19.2" y2="17.5" stroke="#00e5c4" stroke-width="0.8" opacity="0.4"/>
        <line x1="15" y1="28" x2="15" y2="19" stroke="#00e5c4" stroke-width="0.8" opacity="0.4"/>
        <line x1="3" y1="21.5" x2="10.8" y2="17.5" stroke="#00e5c4" stroke-width="0.8" opacity="0.4"/>
        <line x1="3" y1="8.5" x2="10.8" y2="12.5" stroke="#00e5c4" stroke-width="0.8" opacity="0.4"/>
      </svg>
    </div>
    <div>
      <div class="nav-wordmark">Second Brain</div>
      <div class="nav-sub">ResistanceZero · Knowledge Graph</div>
    </div>
  </a>

  <div class="nav-stats">
    <div class="nav-stat">
      <div class="nav-stat-val" id="statNodes">—</div>
      <div class="nav-stat-lbl">Nodes</div>
    </div>
    <div class="nav-sep"></div>
    <div class="nav-stat">
      <div class="nav-stat-val" id="statEdges">—</div>
      <div class="nav-stat-lbl">Links</div>
    </div>
    <div class="nav-sep"></div>
    <div class="nav-stat">
      <div class="nav-stat-val">9</div>
      <div class="nav-stat-lbl">Categories</div>
    </div>
  </div>

  <a href="../../index.html" class="nav-back">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to site
  </a>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="srch">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search nodes… (⌘K)" autocomplete="off" spellcheck="false">
  </div>
  <div class="tdiv"></div>

  <div class="filters" id="filters">
    <button class="fp on" data-g="all">
      <div class="fd" style="background:var(--neon)"></div>ALL
      <span class="fc" id="cn-all">0</span>
    </button>
    <button class="fp" data-g="core">
      <div class="fd" style="background:#c4b5fd"></div>CORE
      <span class="fc" id="cn-core">7</span>
    </button>
    <button class="fp" data-g="articles">
      <div class="fd" style="background:#22d3ee"></div>ARTICLES
      <span class="fc" id="cn-articles">29</span>
    </button>
    <button class="fp" data-g="calculators">
      <div class="fd" style="background:#fbbf24"></div>CALCS
      <span class="fc" id="cn-calculators">7</span>
    </button>
    <button class="fp" data-g="comparisons">
      <div class="fd" style="background:#34d399"></div>COMPARE
      <span class="fc" id="cn-comparisons">10</span>
    </button>
    <button class="fp" data-g="reports">
      <div class="fd" style="background:#f87171"></div>REPORTS
      <span class="fc" id="cn-reports">6</span>
    </button>
    <button class="fp" data-g="apps">
      <div class="fd" style="background:#f472b6"></div>APPS
      <span class="fc" id="cn-apps">4</span>
    </button>
    <button class="fp" data-g="series">
      <div class="fd" style="background:#c084fc"></div>SERIES
      <span class="fc" id="cn-series">2</span>
    </button>
    <button class="fp" data-g="standards">
      <div class="fd" style="background:#94a3b8"></div>STANDARDS
      <span class="fc" id="cn-standards">10</span>
    </button>
  </div>

  <div class="tdiv"></div>
  <div class="ltog">
    <button class="lb on" id="bForce" title="Force layout">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="5" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="12" cy="19" r="2"/><line x1="7" y1="5" x2="17" y2="5"/><line x1="6" y1="7" x2="11" y2="17"/><line x1="18" y1="7" x2="13" y2="17"/></svg>
    </button>
    <button class="lb" id="bHier" title="Hierarchical">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="2" width="5" height="4" rx="1"/><rect x="8" y="13" width="5" height="4" rx="1"/><rect x="15" y="13" width="5" height="4" rx="1"/><line x1="5" y1="6" x2="5" y2="9"/><line x1="5" y1="9" x2="10" y2="13"/><line x1="5" y1="9" x2="17" y2="13"/></svg>
    </button>
    <button class="lb" id="bFit" title="Fit all">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
    </button>
  </div>
</div>

<!-- GRAPH -->

(function(){
  const c=document.getElementById('stars');
  const ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:90},()=>({
    x:Math.random(),y:Math.random(),
    r:Math.random()*1.2+0.2,
    a:Math.random()*0.6+0.1,
    speed:Math.random()*0.0003+0.0001,
    phase:Math.random()*Math.PI*2,
  }));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const now=performance.now()/1000;
    stars.forEach(s=>{
      const alpha=s.a*(0.7+0.3*Math.sin(now*s.speed*100+s.phase));
      ctx.beginPath();
      ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(210,230,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── GRAPH ── */
let net=null, vN=null, vE=null, activeG='all', q='';

function build(){
  const fil=RAW.filter(n=>{
    const gm=activeG==='all'||n.group===activeG;
    const sm=!q||n.label.toLowerCase().includes(q)||n.id.includes(q)||(n.tags||[]).some(t=>t.includes(q));
    return gm&&sm;
  });
  const ids=new Set(fil.map(n=>n.id));
  const edges=EDGES.filter(([a,b])=>ids.has(a)&&ids.has(b));
  const deg={};
  edges.forEach(([a,b])=>{deg[a]=(deg[a]||0)+1;deg[b]=(deg[b]||0)+1});

  const vNodes=fil.map(n=>{
    const g=G[n.group]||G.core;
    const d=deg[n.id]||0;
    const sz=g.sz+Math.min(d*1.6,13);
    return {
      id:n.id,label:n.label,
      color:{
        background:g.col,border:g.brd,
        highlight:{background:'#ffffff',border:g.brd},
        hover:{background:g.col,border:'#ffffff'},
      },
      size:sz,
      borderWidth:1.5,borderWidthSelected:3,
      font:{color:'#cde8f5',size:11,face:"'Inter',system-ui,sans-serif",
        strokeWidth:4,strokeColor:'rgba(0,0,0,0.85)'},
      shadow:{enabled:true,color:g.glow,size:14,x:0,y:0},
      title:mkTip(n,d),_raw:n,
    };
  });

  const vEdges=edges.map(([a,b],i)=>{
    const ga=G[(fil.find(n=>n.id===a)||{}).group]||G.core;
    return {
      id:'e'+i,from:a,to:b,
      color:{color:ga.col+'40',highlight:ga.col+'cc',hover:ga.col+'99'},
      width:1,hoverWidth:2.5,selectionWidth:3,
      smooth:{type:'dynamic'},
      arrows:{to:{enabled:true,scaleFactor:0.35}},
    };
  });

  document.getElementById('empty').style.display=fil.length?'none':'block';
  document.getElementById('statNodes').textContent=fil.length;
  document.getElementById('statEdges').textContent=edges.length;

  const container=document.getElementById('gWrap');
  vN=new vis.DataSet(vNodes);
  vE=new vis.DataSet(vEdges);

  const opts={
    physics:{
      enabled:true,solver:'forceAtlas2Based',
      forceAtlas2Based:{gravitationalConstant:-55,centralGravity:0.005,springLength:130,springConstant:0.055,damping:0.4},
      stabilization:{iterations:260,fit:true},
    },
    interaction:{
      hover:true,tooltipDelay:280,
      hideEdgesOnDrag:false,   /* ← FIXED: edges visible while dragging */
      keyboard:{enabled:true,speed:{x:8,y:8,zoom:0.03}},
      zoomView:true,
    },
    nodes:{shape:'dot',scaling:{min:14,max:44}},
    edges:{selectionWidth:3},
  };

  if(net){net.destroy();}
  net=new vis.Network(container,{nodes:vN,edges:vE},opts);

  net.on('click',p=>{
    if(p.nodes.length)openSB(p.nodes[0]);
    else closeSidebar();
  });

  net.on('stabilizationIterationsDone',()=>{
    net.setOptions({physics:{
      enabled:true,solver:'forceAtlas2Based',
      forceAtlas2Based:{gravitationalConstant:-28,centralGravity:0.002,springLength:130,springConstant:0.018,damping:0.65},
    }});
  });
}

/* ── TOOLTIP (DOM element, no HTML leak) ── */
function mkTip(n,deg){
  const g=G[n.group]||G.core;
  const w=document.createElement('div');
  w.style.cssText='background:#030810;border:1px solid rgba(0,229,196,0.25);border-radius:8px;padding:10px 13px;max-width:230px;font-family:Inter,system-ui,sans-serif;font-size:12px;line-height:1.5;box-shadow:0 8px 32px rgba(0,0,0,0.8);pointer-events:none';

  const row=document.createElement('div');
  row.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:4px';
  const dot=document.createElement('span');
  dot.style.cssText=`width:7px;height:7px;border-radius:50%;background:${g.col};display:inline-block;box-shadow:0 0 6px ${g.col}`;
  const lbl=document.createElement('span');
  lbl.style.cssText=`color:${g.col};font-weight:600;font-size:12px`;
  lbl.textContent=n.label;
  row.append(dot,lbl);

  const meta=document.createElement('div');
  meta.style.cssText='font-family:Space Mono,monospace;font-size:10px;color:#336680;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px';
  meta.textContent=`${n.group}  ·  ${deg} conn`;

  const desc=document.createElement('div');
  desc.style.cssText='color:#6b98b4;font-size:11px;line-height:1.55';
  desc.textContent=n.desc;

  w.append(row,meta,desc);
  return w;
}

  const ae=vE.get();
  const cids=ae.filter(e=>e.from===r.id||e.to===r.id).map(e=>e.from===r.id?e.to:e.from);
  const cnodes=cids.map(id=>RAW.find(n=>n.id===id)).filter(Boolean);

  document.getElementById('sbStripe').style.background=
    `linear-gradient(90deg,${g.col},${g.brd})`;

  const badge=document.getElementById('sbBadge');
  badge.textContent=r.group;
  badge.style.cssText=`background:${g.col}12;color:${g.col};border-color:${g.col}40;font-family:Space Mono,monospace;font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;border:1px solid`;

  document.getElementById('sbTitle').textContent=r.label;
  document.getElementById('sbDesc').textContent=r.desc;

  document.getElementById('sbM').innerHTML=`
    <div class="sb-m">
      <div class="sb-m-l">Connections</div>
      <div class="sb-m-v" style="color:${g.col}">${cnodes.length}</div>
    </div>
    <div class="sb-m">
      <div class="sb-m-l">Category</div>
      <div class="sb-m-v">${r.group}</div>
    </div>`;

  document.getElementById('sbT').innerHTML=(r.tags||[])
    .map(t=>`<span class="sb-tag">${t}</span>`).join('');

  let ch='';
  if(cnodes.length){
    ch=`<div class="sb-s-title">Connected (${cnodes.length})</div><div class="conns">`;
    cnodes.slice(0,14).forEach(cn=>{
      const cg=G[cn.group]||G.core;
      ch+=`<span class="conn" onclick="focusNode('${cn.id}')"><span class="cd" style="background:${cg.col}"></span>${cn.label}</span>`;
    });
    if(cnodes.length>14)ch+=`<span style="font-size:.65rem;color:var(--text-3)">+${cnodes.length-14}</span>`;
    ch+='</div>';
  }
  document.getElementById('sbC').innerHTML=ch;

  const url=r.url.startsWith('http')?r.url:BASE+r.url;
  document.getElementById('sbA').innerHTML=`
    <a href="${url}" target="_blank" class="sb-btn sb-btn-p">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open Page
    </a>
    <button class="sb-btn sb-btn-s" onclick="hilite('${r.id}')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      Highlight Network
    </button>`;

  document.getElementById('sidebar').classList.add('open');
  document.getElementById('gWrap').classList.add('sb-open');
  document.getElementById('zctrl').classList.add('sb-open');
}

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('gWrap').classList.remove('sb-open');
  document.getElementById('zctrl').classList.remove('sb-open');
}

window.focusNode=function(id){
  if(!net)return;
  net.selectNodes([id]);
  net.focus(id,{scale:1.3,animation:{duration:500,easingFunction:'easeInOutQuad'}});
  openSB(id);
};
window.hilite=function(id){
  if(!net)return;
  const e=vE.get();
  const c=e.filter(x=>x.from===id||x.to===id).map(x=>x.from===id?x.to:x.from);
  net.selectNodes([id,...c]);
  net.fit({nodes:[id,...c],animation:{duration:600,easingFunction:'easeInOutQuad'}});
};

/* ── FILTER BUTTONS ── */
document.querySelectorAll('.fp').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fp').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeG=btn.dataset.g;
    build();
    if(net)net.fit({animation:{duration:500,easingFunction:'easeInOutQuad'}});
  });
});

/* counts */
['core','articles','calculators','comparisons','reports','apps','series','standards'].forEach(c=>{
  const el=document.getElementById('cn-'+c);
  if(el)el.textContent=RAW.filter(n=>n.group===c).length;
});
document.getElementById('cn-all').textContent=RAW.length;

/* ── SEARCH ── */
let st;
document.getElementById('searchInput').addEventListener('input',e=>{
  clearTimeout(st);
  st=setTimeout(()=>{
    q=e.target.value.toLowerCase().trim();
    build();
    if(net&&q)net.fit({animation:{duration:400}});
  },200);
});

/* ── LAYOUT ── */
document.getElementById('bForce').addEventListener('click',()=>{
  if(net)net.setOptions({layout:{improvedLayout:true},physics:{enabled:true,solver:'forceAtlas2Based'}});
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));
  document.getElementById('bForce').classList.add('on');
});
document.getElementById('bHier').addEventListener('click',()=>{
  if(net)net.setOptions({layout:{hierarchical:{direction:'UD',sortMethod:'directed',levelSeparation:110}},physics:{enabled:false}});
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));
  document.getElementById('bHier').classList.add('on');
});
document.getElementById('bFit').addEventListener('click',()=>{
  if(net)net.fit({animation:{duration:600,easingFunction:'easeInOutQuad'}});
});

/* ── ZOOM ── */
document.getElementById('zIn').addEventListener('click',()=>net&&net.moveTo({scale:net.getScale()*1.3,animation:{duration:200}}));
document.getElementById('zOut').addEventListener('click',()=>net&&net.moveTo({scale:net.getScale()*0.75,animation:{duration:200}}));
document.getElementById('zFit').addEventListener('click',()=>net&&net.fit({animation:{duration:500,easingFunction:'easeInOutQuad'}}));

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeSidebar();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
});

/* ── INIT ── */
build();
setTimeout(()=>document.getElementById('loader').classList.add('gone'),800);

})();
</script>
</body>
</html>
