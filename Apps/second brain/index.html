<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a2e;
  --border: rgba(139,92,246,0.15);
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --accent: #8b5cf6;
  --accent-glow: rgba(139,92,246,0.3);
  --cyan: #06b6d4;
  --amber: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --pink: #ec4899;
  --deep-purple: #7c3aed;
  --slate: #64748b;
  --sidebar-w: 320px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; height:100vh; overflow:hidden; }

/* NAV */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 1.5rem; height:56px;
  background:rgba(10,10,15,0.95); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.nav-brand { display:flex; align-items:center; gap:0.5rem; font-weight:700; font-size:1rem; color:var(--text); text-decoration:none; }
.nav-brand svg { color:var(--accent); }
.nav-back { display:flex; align-items:center; gap:0.4rem; color:var(--text-muted); text-decoration:none; font-size:0.85rem; transition:color 0.2s; }
.nav-back:hover { color:var(--accent); }
.nav-actions { display:flex; align-items:center; gap:0.75rem; }
.nav-stats { display:flex; gap:1rem; }
.stat-pill { font-size:0.75rem; color:var(--text-muted); background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:0.2rem 0.7rem; }
.stat-pill span { color:var(--accent); font-weight:600; }

/* TOOLBAR */
.toolbar {
  position:fixed; top:56px; left:0; right:0; z-index:90;
  display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;
  padding:0.6rem 1rem;
  background:rgba(17,17,24,0.95); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
.search-wrap { position:relative; flex:1; max-width:280px; }
.search-wrap svg { position:absolute; left:0.6rem; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; }
#searchInput {
  width:100%; padding:0.45rem 0.75rem 0.45rem 2rem;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:0.82rem;
  outline:none; transition:border-color 0.2s;
}
#searchInput:focus { border-color:var(--accent); }
.filter-btns { display:flex; gap:0.4rem; flex-wrap:wrap; }
.filter-btn {
  padding:0.35rem 0.8rem; border-radius:20px; font-size:0.75rem; font-weight:600;
  border:1.5px solid transparent; cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.filter-btn.active { opacity:1; }
.filter-btn:not(.active) { opacity:0.45; }
.btn-all { background:rgba(139,92,246,0.15); border-color:var(--accent); color:var(--accent); }
.btn-articles { background:rgba(6,182,212,0.12); border-color:var(--cyan); color:var(--cyan); }
.btn-calcs { background:rgba(245,158,11,0.12); border-color:var(--amber); color:var(--amber); }
.btn-compare { background:rgba(16,185,129,0.12); border-color:var(--green); color:var(--green); }
.btn-reports { background:rgba(239,68,68,0.12); border-color:var(--red); color:var(--red); }
.btn-apps { background:rgba(236,72,153,0.12); border-color:var(--pink); color:var(--pink); }
.btn-series { background:rgba(124,58,237,0.12); border-color:var(--deep-purple); color:#a78bfa; }
.btn-standards { background:rgba(100,116,139,0.12); border-color:var(--slate); color:var(--slate); }
.btn-core { background:rgba(139,92,246,0.1); border-color:rgba(139,92,246,0.5); color:#c4b5fd; }
.view-toggle { display:flex; gap:0.3rem; margin-left:auto; }
.view-btn { padding:0.35rem 0.6rem; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text-muted); cursor:pointer; transition:all 0.2s; font-size:0.75rem; }
.view-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* GRAPH CANVAS */
#graphCanvas {
  position:fixed; top:112px; left:0; right:0; bottom:0;
  transition:right 0.3s ease;
}
#graphCanvas.sidebar-open { right:var(--sidebar-w); }

/* SIDEBAR */
#sidebar {
  position:fixed; top:56px; right:0; bottom:0; width:var(--sidebar-w);
  background:var(--surface); border-left:1px solid var(--border);
  overflow-y:auto; z-index:80;
  transform:translateX(100%); transition:transform 0.3s ease;
  padding:1.25rem;
}
#sidebar.open { transform:translateX(0); }
.sidebar-close { float:right; background:none; border:none; color:var(--text-muted); cursor:pointer; padding:0.25rem; margin-top:-0.25rem; }
.sidebar-close:hover { color:var(--text); }
.node-badge { display:inline-block; padding:0.2rem 0.65rem; border-radius:20px; font-size:0.7rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; margin-bottom:0.75rem; }
#sidebar h2 { font-size:1.1rem; font-weight:700; margin-bottom:0.5rem; line-height:1.3; }
#sidebar .node-desc { font-size:0.82rem; color:var(--text-muted); line-height:1.6; margin-bottom:1rem; }
.meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-bottom:1rem; }
.meta-item { background:var(--surface2); border-radius:8px; padding:0.5rem 0.75rem; }
.meta-label { font-size:0.68rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }
.meta-value { font-size:0.88rem; font-weight:600; color:var(--text); }
.conn-section h4 { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); margin-bottom:0.5rem; }
.conn-chip { display:inline-flex; align-items:center; gap:0.3rem; padding:0.25rem 0.6rem; background:var(--surface2); border:1px solid var(--border); border-radius:20px; font-size:0.75rem; margin:0.2rem; cursor:pointer; transition:border-color 0.2s; }
.conn-chip:hover { border-color:var(--accent); }
.open-btn { display:flex; align-items:center; justify-content:center; gap:0.5rem; width:100%; padding:0.65rem; background:var(--accent); border:none; border-radius:8px; color:#fff; font-size:0.85rem; font-weight:600; cursor:pointer; text-decoration:none; transition:opacity 0.2s; margin-top:1rem; }
.open-btn:hover { opacity:0.85; }
.open-btn-sec { background:transparent; border:1px solid var(--border); color:var(--text-muted); margin-top:0.5rem; }
.divider { border:none; border-top:1px solid var(--border); margin:1rem 0; }

/* LEGEND FLOAT */
.legend {
  position:fixed; bottom:1.5rem; left:1.5rem; z-index:90;
  background:rgba(17,17,24,0.95); backdrop-filter:blur(8px);
  border:1px solid var(--border); border-radius:10px; padding:0.75rem 1rem;
  display:flex; flex-direction:column; gap:0.35rem;
}
.legend-item { display:flex; align-items:center; gap:0.5rem; font-size:0.72rem; color:var(--text-muted); }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* TOOLTIP */
.vis-tooltip { background:var(--surface2) !important; border:1px solid var(--border) !important; color:var(--text) !important; border-radius:8px !important; font-size:0.78rem !important; padding:0.4rem 0.7rem !important; }

/* ZOOM CONTROLS */
.zoom-ctrl {
  position:fixed; bottom:1.5rem; right:1.5rem; z-index:90;
  display:flex; flex-direction:column; gap:0.4rem;
}
.zoom-btn { width:36px; height:36px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.zoom-btn:hover { border-color:var(--accent); color:var(--accent); }

/* EMPTY STATE */
#emptyState { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; color:var(--text-muted); }
#emptyState svg { margin-bottom:0.75rem; opacity:0.4; }

@media (max-width:640px) {
  :root { --sidebar-w: 100vw; }
  .legend { display:none; }
  .nav-stats { display:none; }
}
</style>

/* ═══════════════════════════════════════════════
   VIS.JS SETUP
═══════════════════════════════════════════════ */
let network, allNodes, allEdges, currentGroup = 'all';

function buildGraph(filter = 'all', searchTerm = '') {
  const container = document.getElementById('graphCanvas');

  const filteredNodes = rawNodes.filter(n => {
    const matchGroup = filter === 'all' || n.group === filter;
    const matchSearch = !searchTerm ||
      n.label.toLowerCase().includes(searchTerm.toLowerCase()) ||
      (n.tags||[]).some(t => t.includes(searchTerm.toLowerCase()));
    return matchGroup && matchSearch;
  });

  const filteredIds = new Set(filteredNodes.map(n => n.id));

  const filteredEdges = rawEdges.filter(e => filteredIds.has(e.from) && filteredIds.has(e.to));

  // Count connections per node
  const connCount = {};
  filteredEdges.forEach(e => {
    connCount[e.from] = (connCount[e.from]||0) + 1;
    connCount[e.to] = (connCount[e.to]||0) + 1;
  });

  const visNodes = filteredNodes.map(n => {
    const g = GROUPS[n.group] || GROUPS.core;
    const conns = connCount[n.id] || 0;
    const size = g.size + Math.min(conns * 2, 16);
    return {
      id: n.id,
      label: n.label,
      title: `<strong>${n.label}</strong><br><small>${n.group}</small><br>${n.desc}`,
      color: { background: g.color, border: g.border, highlight: { background: '#fff', border: g.border } },
      size,
      font: { color: '#e2e8f0', size: 12, face: 'Inter, system-ui, sans-serif' },
      borderWidth: 2,
      shadow: { enabled: true, color: g.color + '44', size: 8, x: 0, y: 2 },
      _raw: n,
    };
  });

  const visEdges = filteredEdges.map((e, i) => ({
    id: 'e' + i,
    from: e.from,
    to: e.to,
    color: { color: 'rgba(139,92,246,0.2)', highlight: 'rgba(139,92,246,0.7)' },
    width: 1.5,
    smooth: { type: 'dynamic' },
    arrows: { to: { enabled: true, scaleFactor: 0.5 } },
  }));

  document.getElementById('emptyState').style.display = filteredNodes.length === 0 ? 'block' : 'none';
  document.getElementById('statNodes').textContent = filteredNodes.length;
  document.getElementById('statEdges').textContent = filteredEdges.length;

  allNodes = new vis.DataSet(visNodes);
  allEdges = new vis.DataSet(visEdges);

  const options = {
    physics: {
      enabled: true,
      solver: 'forceAtlas2Based',
      forceAtlas2Based: { gravitationalConstant: -60, centralGravity: 0.006, springLength: 120, springConstant: 0.06 },
      stabilization: { iterations: 300 },
    },
    interaction: {
      hover: true,
      tooltipDelay: 200,
      navigationButtons: false,
      keyboard: { enabled: true, speed: { x: 8, y: 8, zoom: 0.03 } },
    },
    nodes: { shape: 'dot', scaling: { min: 16, max: 40 } },
    edges: { selectionWidth: 3 },
  };

  if (network) { network.destroy(); }
  network = new vis.Network(container, { nodes: allNodes, edges: allEdges }, options);

  network.on('click', params => {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      const node = allNodes.get(nodeId);
      if (node) showSidebar(node, allEdges.get());
    } else {
      closeSidebar();
    }
  });
}

function showSidebar(node, edges) {
  const raw = node._raw;
  const g = GROUPS[raw.group] || GROUPS.core;
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('sidebarContent');

  // Find connected nodes
  const connectedIds = edges
    .filter(e => e.from === raw.id || e.to === raw.id)
    .map(e => e.from === raw.id ? e.to : e.from);
  const connectedNodes = connectedIds.map(id => rawNodes.find(n => n.id === id)).filter(Boolean);

  const badgeStyle = `background:${g.color}22;color:${g.color};border:1px solid ${g.color}44`;
  const url = raw.url.startsWith('http') ? raw.url : SITE_BASE + raw.url;

  content.innerHTML = `
    <span class="node-badge" style="${badgeStyle}">${raw.group}</span>
    <h2>${raw.label}</h2>
    <p class="node-desc">${raw.desc}</p>
    <div class="meta-grid">
      <div class="meta-item">
        <div class="meta-label">Connections</div>
        <div class="meta-value" style="color:${g.color}">${connectedNodes.length}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Category</div>
        <div class="meta-value">${raw.group}</div>
      </div>
    </div>
    ${raw.tags && raw.tags.length ? `
    <div style="margin-bottom:1rem">
      ${raw.tags.map(t => `<span style="display:inline-block;padding:.15rem .5rem;background:rgba(100,116,139,.15);border-radius:4px;font-size:.68rem;color:var(--text-muted);margin:.15rem">#${t}</span>`).join('')}
    </div>` : ''}
    ${connectedNodes.length ? `
    <div class="conn-section">
      <h4>Connected Nodes (${connectedNodes.length})</h4>
      <div>
        ${connectedNodes.slice(0,12).map(cn => {
          const cg = GROUPS[cn.group] || GROUPS.core;
          return `<span class="conn-chip" onclick="focusNode('${cn.id}')" style="border-color:${cg.border}44">
            <span style="width:6px;height:6px;border-radius:50%;background:${cg.color};flex-shrink:0"></span>
            ${cn.label}
          </span>`;
        }).join('')}
        ${connectedNodes.length > 12 ? `<span style="font-size:.72rem;color:var(--text-muted)">+${connectedNodes.length-12} more</span>` : ''}
      </div>
    </div>` : ''}
    <hr class="divider">
    <a href="${url}" target="_blank" class="open-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open Page
    </a>
  `;

  sidebar.classList.add('open');
  document.getElementById('graphCanvas').classList.add('sidebar-open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('graphCanvas').classList.remove('sidebar-open');
}

window.focusNode = function(id) {
  if (network) {
    network.selectNodes([id]);
    network.focus(id, { animation: { duration: 500, easingFunction: 'easeInOutQuad' }, scale: 1.2 });
    const node = allNodes.get(id);
    if (node) showSidebar(node, allEdges.get());
  }
};

/* FILTER BUTTONS */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentGroup = btn.dataset.group;
    buildGraph(currentGroup, document.getElementById('searchInput').value);
  });
});

/* SEARCH */
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => buildGraph(currentGroup, e.target.value), 250);
});

/* VIEW TOGGLES */
document.getElementById('btnPhysics').addEventListener('click', () => {
  if (network) { network.setOptions({ physics: { enabled: true, solver: 'forceAtlas2Based' } }); }
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btnPhysics').classList.add('active');
});

document.getElementById('btnHierarchy').addEventListener('click', () => {
  if (network) { network.setOptions({ layout: { hierarchical: { direction: 'UD', sortMethod: 'directed', levelSeparation: 120 } }, physics: { enabled: false } }); }
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btnHierarchy').classList.add('active');
});

document.getElementById('btnFit').addEventListener('click', () => {
  if (network) network.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
});

/* ZOOM */
document.getElementById('zoomIn').addEventListener('click',    () => network && network.moveTo({ scale: network.getScale() * 1.3, animation: true }));
document.getElementById('zoomOut').addEventListener('click',   () => network && network.moveTo({ scale: network.getScale() * 0.75, animation: true }));
document.getElementById('zoomReset').addEventListener('click', () => network && network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } }));

/* INIT */
buildGraph();

})();
</script>
