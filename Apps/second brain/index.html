<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain — ResistanceZero</title>
<meta name="description" content="Interactive knowledge graph mapping all ResistanceZero content, tools, and relationships.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
/* ── TOKENS ── */
:root{
  --bg:#04040a;
  --bg2:#07070f;
  --glass:rgba(255,255,255,0.035);
  --glass-hover:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.07);
  --border-accent:rgba(139,92,246,0.35);
  --text:#f0f0f8;
  --text-2:#8b8bab;
  --text-3:#4e4e6a;
  --accent:#9d6ff7;
  --accent-dim:#7c3aed;
  --glow:rgba(139,92,246,0.25);
  --cyan:#22d3ee;
  --amber:#fbbf24;
  --green:#34d399;
  --red:#f87171;
  --pink:#f472b6;
  --violet:#c084fc;
  --slate:#6b7280;
  --sidebar-w:340px;
  --nav-h:58px;
  --tool-h:54px;
  --radius:14px;
}

*{margin:0;padding:0;box-sizing:border-box}

/* ── BASE ── */
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}

/* ── ANIMATED BACKGROUND ── */
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(139,92,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(139,92,246,0.04) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}
.bg-orb{
  position:fixed;z-index:0;pointer-events:none;border-radius:50%;filter:blur(90px);
}
.bg-orb-1{
  width:600px;height:600px;top:-200px;left:-100px;
  background:radial-gradient(circle, rgba(109,40,217,0.12) 0%, transparent 70%);
  animation:orbFloat1 20s ease-in-out infinite;
}
.bg-orb-2{
  width:500px;height:500px;bottom:-150px;right:-100px;
  background:radial-gradient(circle, rgba(6,182,212,0.07) 0%, transparent 70%);
  animation:orbFloat2 25s ease-in-out infinite;
}
@keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.05)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,-20px) scale(1.08)}}

/* ── LOADING SCREEN ── */
#loader{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;
  transition:opacity 0.5s ease, visibility 0.5s ease;
}
#loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-ring{
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-right-color:var(--violet);
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:0.8rem;color:var(--text-2);letter-spacing:0.15em;text-transform:uppercase}
.loader-brand{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.3rem;font-weight:700;
  background:linear-gradient(135deg,#a78bfa,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.25rem 0 1rem;
  background:rgba(4,4,10,0.85);
  backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);
}
.nav-left{display:flex;align-items:center;gap:0.75rem}
.nav-logo{
  display:flex;align-items:center;gap:0.6rem;
  text-decoration:none;
}
.nav-logo-icon{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,#6d28d9,#4f46e5);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(109,40,217,0.5);
  flex-shrink:0;
}
.nav-logo-text{
  font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:700;
  background:linear-gradient(135deg,#c4b5fd 20%,#818cf8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-sep{width:1px;height:24px;background:var(--border)}
.nav-badge{
  font-size:0.68rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--text-2);background:var(--glass);border:1px solid var(--border);
  border-radius:6px;padding:0.2rem 0.55rem;
}
.nav-center{display:flex;align-items:center;gap:0.5rem}
.nav-stat{
  display:flex;align-items:center;gap:0.35rem;
  font-size:0.75rem;color:var(--text-2);
  background:var(--glass);border:1px solid var(--border);
  border-radius:20px;padding:0.25rem 0.75rem;
}
.nav-stat strong{color:var(--accent);font-weight:600}
.nav-right{display:flex;align-items:center;gap:0.5rem}
.nav-back{
  display:inline-flex;align-items:center;gap:0.4rem;
  font-size:0.78rem;color:var(--text-2);text-decoration:none;
  padding:0.4rem 0.75rem;border-radius:8px;
  border:1px solid var(--border);background:var(--glass);
  transition:all 0.2s;
}
.nav-back:hover{border-color:var(--border-accent);color:var(--accent);background:rgba(139,92,246,0.08)}
.nav-back svg{flex-shrink:0}

/* ── TOOLBAR ── */
.toolbar{
  position:fixed;top:var(--nav-h);left:0;right:0;z-index:190;
  height:var(--tool-h);
  display:flex;align-items:center;gap:0.75rem;
  padding:0 1.25rem;
  background:rgba(4,4,10,0.75);
  backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);
}
.search-box{
  position:relative;flex-shrink:0;width:220px;
}
.search-box svg{
  position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);
  color:var(--text-3);pointer-events:none;
}
#searchInput{
  width:100%;height:34px;padding:0 0.75rem 0 2.1rem;
  background:var(--glass);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-size:0.8rem;font-family:inherit;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
#searchInput::placeholder{color:var(--text-3)}
#searchInput:focus{border-color:var(--border-accent);box-shadow:0 0 0 3px rgba(139,92,246,0.1)}

.filter-row{display:flex;align-items:center;gap:0.35rem;flex:1;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.f-btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  padding:0.3rem 0.75rem;border-radius:20px;
  font-size:0.72rem;font-weight:600;letter-spacing:0.02em;
  border:1px solid transparent;cursor:pointer;
  white-space:nowrap;transition:all 0.2s;
  background:var(--glass);
}
.f-btn .f-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.f-btn .f-count{
  font-size:0.65rem;font-weight:700;
  padding:0.05rem 0.35rem;border-radius:10px;
  background:rgba(0,0,0,0.3);
}
.f-btn.inactive{opacity:0.38;filter:grayscale(0.4)}
.f-btn:hover{opacity:0.85;filter:none}
.f-btn.active{opacity:1;filter:none}

/* category colors */
.f-all   {color:#c4b5fd;border-color:rgba(196,181,253,0.3)}
.f-all.active{background:rgba(139,92,246,0.15);border-color:rgba(139,92,246,0.5);box-shadow:0 0 12px rgba(139,92,246,0.15)}
.f-core  {color:#c4b5fd;border-color:rgba(196,181,253,0.2)}
.f-core.active{background:rgba(139,92,246,0.12);border-color:rgba(196,181,253,0.4)}
.f-art   {color:var(--cyan);border-color:rgba(34,211,238,0.2)}
.f-art.active{background:rgba(34,211,238,0.08);border-color:rgba(34,211,238,0.4)}
.f-calc  {color:var(--amber);border-color:rgba(251,191,36,0.2)}
.f-calc.active{background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.4)}
.f-cmp   {color:var(--green);border-color:rgba(52,211,153,0.2)}
.f-cmp.active{background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.4)}
.f-rep   {color:var(--red);border-color:rgba(248,113,113,0.2)}
.f-rep.active{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.4)}
.f-app   {color:var(--pink);border-color:rgba(244,114,182,0.2)}
.f-app.active{background:rgba(244,114,182,0.08);border-color:rgba(244,114,182,0.4)}
.f-ser   {color:var(--violet);border-color:rgba(192,132,252,0.2)}
.f-ser.active{background:rgba(192,132,252,0.08);border-color:rgba(192,132,252,0.4)}
.f-std   {color:var(--slate);border-color:rgba(107,114,128,0.2)}
.f-std.active{background:rgba(107,114,128,0.08);border-color:rgba(107,114,128,0.4)}

.toolbar-right{display:flex;align-items:center;gap:0.4rem;flex-shrink:0;margin-left:auto}
.layout-btn{
  width:30px;height:30px;border-radius:7px;
  background:var(--glass);border:1px solid var(--border);
  color:var(--text-2);cursor:pointer;font-size:0.75rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.layout-btn:hover{border-color:var(--border-accent);color:var(--accent)}
.layout-btn.active{background:rgba(139,92,246,0.15);border-color:var(--border-accent);color:var(--accent)}

/* ── CANVAS ── */
#graphWrap{
  position:fixed;
  top:calc(var(--nav-h) + var(--tool-h));
  left:0;right:0;bottom:0;
  transition:right 0.35s cubic-bezier(0.4,0,0.2,1);
}
#graphWrap.sidebar-open{right:var(--sidebar-w)}
#graphCanvas{width:100%;height:100%}

/* ── EMPTY STATE ── */
#emptyState{
  display:none;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);text-align:center;
  pointer-events:none;
}
.empty-icon{
  width:64px;height:64px;border-radius:50%;
  background:var(--glass);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1rem;color:var(--text-3);
}
#emptyState p{font-size:0.85rem;color:var(--text-2)}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;top:0;right:0;bottom:0;
  width:var(--sidebar-w);z-index:180;
  background:rgba(6,6,14,0.97);
  backdrop-filter:blur(24px) saturate(200%);
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;
  overflow:hidden;
}
#sidebar.open{transform:translateX(0)}

.sb-header{
  flex-shrink:0;
  padding:1rem 1rem 0.75rem;
  border-bottom:1px solid var(--border);
  position:relative;
}
.sb-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem}
.sb-close{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  background:var(--glass);border:1px solid var(--border);
  color:var(--text-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.sb-close:hover{border-color:var(--red);color:var(--red)}
.sb-category{
  display:inline-flex;align-items:center;gap:0.35rem;
  padding:0.2rem 0.6rem;border-radius:20px;
  font-size:0.66rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  margin-bottom:0.6rem;
}
.sb-cat-dot{width:7px;height:7px;border-radius:50%}
#sbTitle{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.05rem;font-weight:700;color:var(--text);
  line-height:1.3;margin-bottom:0.5rem;
}
#sbDesc{font-size:0.78rem;color:var(--text-2);line-height:1.65}

.sb-body{flex:1;overflow-y:auto;padding:0.75rem 1rem 1.5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sb-body::-webkit-scrollbar{width:4px}
.sb-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sb-metrics{
  display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;
  margin:0.75rem 0;
}
.sb-metric{
  background:var(--glass);border:1px solid var(--border);
  border-radius:10px;padding:0.6rem 0.75rem;
}
.sb-metric-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);margin-bottom:0.2rem}
.sb-metric-val{font-size:0.95rem;font-weight:700;color:var(--text)}

.sb-tags{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.85rem}
.sb-tag{
  font-size:0.67rem;color:var(--text-2);
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:4px;padding:0.15rem 0.45rem;
}

.sb-section-title{
  font-size:0.67rem;text-transform:uppercase;letter-spacing:0.08em;
  color:var(--text-3);margin-bottom:0.5rem;font-weight:600;
}
.conn-list{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:1rem}
.conn-chip{
  display:inline-flex;align-items:center;gap:0.3rem;
  padding:0.25rem 0.6rem;border-radius:20px;
  font-size:0.72rem;font-weight:500;
  background:var(--glass);border:1px solid var(--border);
  cursor:pointer;transition:all 0.2s;color:var(--text-2);
}
.conn-chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.conn-chip:hover{background:var(--glass-hover);border-color:var(--border-accent);color:var(--text)}

.sb-divider{border:none;border-top:1px solid var(--border);margin:0.85rem 0}

.sb-open-btn{
  display:flex;align-items:center;justify-content:center;gap:0.5rem;
  width:100%;padding:0.65rem;border-radius:10px;
  font-size:0.82rem;font-weight:600;cursor:pointer;
  text-decoration:none;transition:all 0.2s;border:none;font-family:inherit;
}
.sb-open-primary{
  background:linear-gradient(135deg,#7c3aed,#4f46e5);
  color:#fff;box-shadow:0 4px 20px rgba(109,40,217,0.35);
}
.sb-open-primary:hover{box-shadow:0 4px 28px rgba(109,40,217,0.55);transform:translateY(-1px)}
.sb-open-sec{
  background:var(--glass);border:1px solid var(--border);
  color:var(--text-2);margin-top:0.45rem;
}
.sb-open-sec:hover{border-color:var(--border-accent);color:var(--accent)}

/* ── LEGEND ── */
.legend{
  position:fixed;bottom:1.25rem;left:1.25rem;z-index:100;
  background:rgba(6,6,14,0.9);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:12px;
  padding:0.65rem 0.85rem;
  display:flex;flex-direction:column;gap:0.3rem;
  transition:opacity 0.3s;
}
.legend-title{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-3);margin-bottom:0.2rem;font-weight:600}
.legend-row{display:flex;align-items:center;gap:0.45rem;font-size:0.71rem;color:var(--text-2)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── ZOOM ── */
.zoom-wrap{
  position:fixed;bottom:1.25rem;right:1.25rem;z-index:100;
  display:flex;flex-direction:column;gap:0.35rem;
  transition:right 0.35s cubic-bezier(0.4,0,0.2,1);
}
.zoom-wrap.sidebar-open{right:calc(var(--sidebar-w) + 1.25rem)}
.zoom-btn{
  width:34px;height:34px;border-radius:9px;
  background:rgba(6,6,14,0.9);backdrop-filter:blur(12px);
  border:1px solid var(--border);color:var(--text-2);
  cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.zoom-btn:hover{border-color:var(--border-accent);color:var(--accent);background:rgba(139,92,246,0.08)}

/* ── SELECTION GLOW ── */
.node-selected-glow{
  animation:nodeGlow 1.5s ease-in-out infinite;
}
@keyframes nodeGlow{
  0%,100%{box-shadow:0 0 12px var(--glow)}
  50%{box-shadow:0 0 24px var(--glow)}
}

@media(max-width:768px){
  :root{--sidebar-w:100vw}
  .legend{display:none}
  .nav-center{display:none}
  .nav-badge{display:none}
  .search-box{width:160px}
}
</style>
</head>
<body>

<!-- BACKGROUND FX -->
<div class="bg-grid" aria-hidden="true"></div>
<div class="bg-orb bg-orb-1" aria-hidden="true"></div>
<div class="bg-orb bg-orb-2" aria-hidden="true"></div>

<!-- LOADER -->
<div id="loader">
  <div class="loader-brand">Second Brain</div>
  <div class="loader-ring"></div>
  <div class="loader-text">Mapping knowledge graph…</div>
</div>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a href="../../index.html" class="nav-logo">
      <div class="nav-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      </div>
      <span class="nav-logo-text">Second Brain</span>
    </a>
    <div class="nav-sep"></div>
    <span class="nav-badge">Knowledge Graph</span>
  </div>

  <div class="nav-center">
    <div class="nav-stat">Nodes <strong id="statNodes">—</strong></div>
    <div class="nav-stat">Links <strong id="statEdges">—</strong></div>
    <div class="nav-stat">Categories <strong>9</strong></div>
  </div>

  <div class="nav-right">
    <a href="../../index.html" class="nav-back">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      ResistanceZero
    </a>
  </div>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-box">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search nodes…" autocomplete="off" spellcheck="false">
  </div>

  <div class="filter-row" id="filterRow">
    <button class="f-btn f-all active" data-group="all">
      <div class="f-dot" style="background:var(--accent)"></div>All
      <span class="f-count" id="cnt-all">0</span>
    </button>
    <button class="f-btn f-core inactive" data-group="core">
      <div class="f-dot" style="background:#c4b5fd"></div>Core
      <span class="f-count" id="cnt-core">7</span>
    </button>
    <button class="f-btn f-art inactive" data-group="articles">
      <div class="f-dot" style="background:var(--cyan)"></div>Articles
      <span class="f-count" id="cnt-articles">29</span>
    </button>
    <button class="f-btn f-calc inactive" data-group="calculators">
      <div class="f-dot" style="background:var(--amber)"></div>Calcs
      <span class="f-count" id="cnt-calculators">7</span>
    </button>
    <button class="f-btn f-cmp inactive" data-group="comparisons">
      <div class="f-dot" style="background:var(--green)"></div>Compare
      <span class="f-count" id="cnt-comparisons">10</span>
    </button>
    <button class="f-btn f-rep inactive" data-group="reports">
      <div class="f-dot" style="background:var(--red)"></div>Reports
      <span class="f-count" id="cnt-reports">6</span>
    </button>
    <button class="f-btn f-app inactive" data-group="apps">
      <div class="f-dot" style="background:var(--pink)"></div>Apps
      <span class="f-count" id="cnt-apps">4</span>
    </button>
    <button class="f-btn f-ser inactive" data-group="series">
      <div class="f-dot" style="background:var(--violet)"></div>Series
      <span class="f-count" id="cnt-series">2</span>
    </button>
    <button class="f-btn f-std inactive" data-group="standards">
      <div class="f-dot" style="background:var(--slate)"></div>Standards
      <span class="f-count" id="cnt-standards">10</span>
    </button>
  </div>

  <div class="toolbar-right">
    <button class="layout-btn active" id="btnPhysics" title="Force layout">

];

/* ── VIS.JS ── */
let network=null, visNodes=null, visEdges=null;
let activeGroup='all', searchTerm='';

function buildGraph(){
  const filtered = RAW.filter(n=>{
    const gMatch = activeGroup==='all'||n.group===activeGroup;
    const sMatch = !searchTerm||
      n.label.toLowerCase().includes(searchTerm)||
      n.id.toLowerCase().includes(searchTerm)||
      (n.tags||[]).some(t=>t.includes(searchTerm));
    return gMatch&&sMatch;
  });

  const ids = new Set(filtered.map(n=>n.id));
  const edges = EDGES.filter(([a,b])=>ids.has(a)&&ids.has(b));

  const deg={};
  edges.forEach(([a,b])=>{deg[a]=(deg[a]||0)+1;deg[b]=(deg[b]||0)+1});

  const vNodes = filtered.map(n=>{
    const g=GROUPS[n.group]||GROUPS.core;
    const d=deg[n.id]||0;
    const size=g.sz+Math.min(d*1.8,14);
    return {
      id:n.id,label:n.label,
      color:{
        background:g.col,border:g.brd,
        highlight:{background:'#fff',border:g.brd},
        hover:{background:g.col,border:'#fff'},
      },
      size,
      borderWidth:1.5,
      borderWidthSelected:3,
      font:{
        color:'#e0e0ef',size:11,face:"'Inter',system-ui,sans-serif",
        bold:{color:'#ffffff'},
        strokeWidth:3,strokeColor:'rgba(0,0,0,0.7)',
      },
      shadow:{enabled:true,color:g.col+'55',size:10,x:0,y:2},
      title:buildTooltip(n,d),
      _raw:n,
    };
  });

  const vEdges = edges.map(([a,b],i)=>({
    id:'e'+i,from:a,to:b,
    color:{color:'rgba(139,92,246,0.18)',highlight:'rgba(192,132,252,0.7)',hover:'rgba(192,132,252,0.5)'},
    width:1.2,
    hoverWidth:2.5,
    selectionWidth:3,
    smooth:{type:'dynamic'},
    arrows:{to:{enabled:true,scaleFactor:0.4}},
  }));

  document.getElementById('emptyState').style.display=filtered.length?'none':'block';
  document.getElementById('statNodes').textContent=filtered.length;
  document.getElementById('statEdges').textContent=edges.length;

  const container=document.getElementById('graphWrap');
  visNodes=new vis.DataSet(vNodes);
  visEdges=new vis.DataSet(vEdges);

  const options={
    physics:{
      enabled:true,
      solver:'forceAtlas2Based',
      forceAtlas2Based:{
        gravitationalConstant:-55,centralGravity:0.005,
        springLength:130,springConstant:0.055,
        damping:0.4,
      },
      stabilization:{iterations:250,fit:true},
    },
    interaction:{
      hover:true,tooltipDelay:300,
      hideEdgesOnDrag:true,
      keyboard:{enabled:true,speed:{x:8,y:8,zoom:0.03}},
      zoomView:true,
    },
    nodes:{shape:'dot',scaling:{min:14,max:44}},
    edges:{selectionWidth:3},
    background:'transparent',
  };

  if(network){network.destroy();}
  network=new vis.Network(container,{nodes:visNodes,edges:visEdges},options);

  network.on('click',p=>{
    if(p.nodes.length){openSidebar(p.nodes[0]);}
    else{closeSidebar();}
  });

  network.on('stabilizationIterationsDone',()=>{
    network.setOptions({physics:{enabled:false}});
  });
}

function buildTooltip(n,deg){
  const g=GROUPS[n.group]||GROUPS.core;
  const wrap=document.createElement('div');
  wrap.style.cssText=[
    'background:#09090f',
    'border:1px solid rgba(139,92,246,0.35)',
    'border-radius:10px',
    'padding:10px 14px',
    'max-width:240px',
    'font-family:Inter,system-ui,sans-serif',
    'font-size:12px',
    'line-height:1.5',
    'box-shadow:0 8px 32px rgba(0,0,0,0.6)',
    'pointer-events:none',
  ].join(';');

  const top=document.createElement('div');
  top.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:5px';

  const dot=document.createElement('span');
  dot.style.cssText=`width:8px;height:8px;border-radius:50%;background:${g.col};flex-shrink:0;display:inline-block`;

  const title=document.createElement('span');
  title.style.cssText=`color:${g.col};font-weight:700;font-size:12px`;
  title.textContent=n.label;  /* textContent — no HTML injection */

  top.appendChild(dot);
  top.appendChild(title);

  const meta=document.createElement('div');
  meta.style.cssText='color:#6b7280;font-size:10.5px;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em';
  meta.textContent=`${n.group}  ·  ${deg} connections`;

  const desc=document.createElement('div');
  desc.style.cssText='color:#94a3b8;font-size:11px;line-height:1.55';
  desc.textContent=n.desc;  /* textContent — safe */

  wrap.appendChild(top);
  wrap.appendChild(meta);
  wrap.appendChild(desc);
  return wrap;
}

/* ── SIDEBAR ── */
function openSidebar(nodeId){
  const node=visNodes.get(nodeId);
  if(!node)return;
  const raw=node._raw;
  const g=GROUPS[raw.group]||GROUPS.core;
  const allEdges=visEdges.get();
  const connIds=allEdges.filter(e=>e.from===raw.id||e.to===raw.id).map(e=>e.from===raw.id?e.to:e.from);
  const connNodes=connIds.map(id=>RAW.find(n=>n.id===id)).filter(Boolean);

  // Category badge
  document.getElementById('sbCategory').innerHTML=
    `<div class="sb-cat-dot" style="background:${g.col}"></div>${raw.group}`;
  document.getElementById('sbCategory').style.cssText=
    `background:${g.col}18;color:${g.col};border:1px solid ${g.col}35;display:inline-flex;align-items:center;gap:.35rem;padding:.2rem .6rem;border-radius:20px;font-size:.66rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.6rem`;
  document.getElementById('sbTitle').textContent=raw.label;
  document.getElementById('sbDesc').textContent=raw.desc;

  // Metrics
  document.getElementById('sbMetrics').innerHTML=`
    <div class="sb-metric">
      <div class="sb-metric-label">Connections</div>
      <div class="sb-metric-val" style="color:${g.col}">${connNodes.length}</div>
    </div>
    <div class="sb-metric">
      <div class="sb-metric-label">Category</div>
      <div class="sb-metric-val">${raw.group}</div>
    </div>
  `;

  // Tags
  document.getElementById('sbTags').innerHTML=(raw.tags||[])
    .map(t=>`<span class="sb-tag">#${t}</span>`).join('');

  // Connections
  let connHtml='';
  if(connNodes.length){
    connHtml=`<div class="sb-section-title">Connected Nodes (${connNodes.length})</div><div class="conn-list">`;
    connNodes.slice(0,14).forEach(cn=>{
      const cg=GROUPS[cn.group]||GROUPS.core;
      connHtml+=`<span class="conn-chip" onclick="focusNode('${cn.id}')">
        <span class="conn-chip-dot" style="background:${cg.col}"></span>${cn.label}
      </span>`;
    });
    if(connNodes.length>14)connHtml+=`<span style="font-size:.7rem;color:var(--text-3);padding:.15rem .3rem">+${connNodes.length-14} more</span>`;
    connHtml+='</div>';
  }
  document.getElementById('sbConnections').innerHTML=connHtml;

  // Actions
  const url=raw.url.startsWith('http')?raw.url:BASE+raw.url;
  document.getElementById('sbActions').innerHTML=`
    <a href="${url}" target="_blank" class="sb-open-btn sb-open-primary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open Page
    </a>
    <button class="sb-open-btn sb-open-sec" onclick="highlightConnections('${raw.id}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      Highlight Network
    </button>
  `;

  document.getElementById('sidebar').classList.add('open');
  document.getElementById('graphWrap').classList.add('sidebar-open');
  document.getElementById('zoomWrap').classList.add('sidebar-open');
}

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('graphWrap').classList.remove('sidebar-open');
  document.getElementById('zoomWrap').classList.remove('sidebar-open');
}

window.focusNode=function(id){
  if(!network)return;
  network.selectNodes([id]);
  network.focus(id,{scale:1.3,animation:{duration:500,easingFunction:'easeInOutQuad'}});
  openSidebar(id);
};

window.highlightConnections=function(id){
  if(!network)return;
  const edges=visEdges.get();
  const connIds=edges.filter(e=>e.from===id||e.to===id).map(e=>e.from===id?e.to:e.from);
  network.selectNodes([id,...connIds]);
  network.fit({nodes:[id,...connIds],animation:{duration:600,easingFunction:'easeInOutQuad'}});
};

/* ── FILTER BUTTONS ── */
document.querySelectorAll('.f-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.f-btn').forEach(b=>{b.classList.remove('active');b.classList.add('inactive')});
    btn.classList.add('active');btn.classList.remove('inactive');
    activeGroup=btn.dataset.group;
    buildGraph();
    if(network)network.fit({animation:{duration:500,easingFunction:'easeInOutQuad'}});
  });
});

// Update counts
const cats=['core','articles','calculators','comparisons','reports','apps','series','standards'];
cats.forEach(c=>{
  const n=RAW.filter(x=>x.group===c).length;
  const el=document.getElementById('cnt-'+c);
  if(el)el.textContent=n;
});
document.getElementById('cnt-all').textContent=RAW.length;

/* ── SEARCH ── */
let searchTimer;
document.getElementById('searchInput').addEventListener('input',e=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    searchTerm=e.target.value.toLowerCase().trim();
    buildGraph();
    if(network&&searchTerm)network.fit({animation:{duration:400,easingFunction:'easeInOutQuad'}});
  },220);
});

/* ── LAYOUT TOGGLES ── */
document.getElementById('btnPhysics').addEventListener('click',()=>{
  if(network)network.setOptions({layout:{improvedLayout:true},physics:{enabled:true,solver:'forceAtlas2Based'}});
  document.querySelectorAll('.layout-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btnPhysics').classList.add('active');
});
document.getElementById('btnHier').addEventListener('click',()=>{
  if(network)network.setOptions({layout:{hierarchical:{direction:'UD',sortMethod:'directed',levelSeparation:110,nodeSpacing:120}},physics:{enabled:false}});
  document.querySelectorAll('.layout-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btnHier').classList.add('active');
});
document.getElementById('btnFit').addEventListener('click',()=>{
  if(network)network.fit({animation:{duration:600,easingFunction:'easeInOutQuad'}});
});

/* ── ZOOM ── */
document.getElementById('zIn').addEventListener('click',()=>network&&network.moveTo({scale:network.getScale()*1.3,animation:{duration:200}}));
document.getElementById('zOut').addEventListener('click',()=>network&&network.moveTo({scale:network.getScale()*0.75,animation:{duration:200}}));
document.getElementById('zReset').addEventListener('click',()=>network&&network.fit({animation:{duration:500,easingFunction:'easeInOutQuad'}}));

/* ── KEYBOARD SHORTCUTS ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeSidebar();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
});

/* ── INIT ── */
buildGraph();
setTimeout(()=>{
  document.getElementById('loader').classList.add('hidden');
},900);

})();
</script>
</body>
</html>
